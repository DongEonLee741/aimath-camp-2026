/* ---- S2 · 사고과정 정리 → 수학적 해석 → 미니 체험 → 정리 (4 step, 요청서 §B 화면2) ---- */
var S2_PAIRS = [
  {inKey:'p1', inLabel:'학교 잘 다녀왔니?', outLabel:'응, 오늘 재밌었어.'},
  {inKey:'p2', inLabel:'이거 좀 도와줄래?', outLabel:'그럼, 뭐 도와줄까?'},
  {inKey:'p3', inLabel:'지금 몇 시야?', outLabel:'세 시 십 분이야.'},
  {inKey:'p4', inLabel:'나 오늘 좀 힘들었어', outLabel:'무슨 일 있었어?'}
];
var S2_OUT_ORDER = ['p3','p1','p4','p2'];
function buildS2(){
  /* step3(미니 체험) 완료 1초 후 자동 슬라이드 타이머. build 스코프(모듈 수준)에 두어 재방문 시에도
     중복 스케줄을 막고, 발화 시점에 위치를 재확인해 화면 이탈 후에도 안전하게 무시되도록 한다. */
  var s2AutoTimer = null;
  var s2WrongTimers = []; /* 오답 매칭 500ms 자동해제 타이머(복수 동시 가능) — G3-16 */
  return {
    /* ROUTER.next/prev/go가 이 화면을 떠날 때 호출(G3-10·G3-16): 위치 가드(§3762 부근)만으로는
       "완료→1초 내 다음→이전 왕복" 경합을 못 막아 s2AutoTimer를 직접 취소한다. 같은 훅으로
       오답 500ms 삭제 타이머(구 pane의 renderAll을 나중에 호출해 잔상을 남기던 문제)도 함께 정리한다. */
    onStepExit: function(){
      if(s2AutoTimer){ clearTimeout(s2AutoTimer); s2AutoTimer = null; }
      s2WrongTimers.forEach(function(t){ clearTimeout(t); });
      s2WrongTimers = [];
    },
    steps: [
      /* step1: 앞선 대화의 사고과정 정리 + 생각칸 (게이팅: 비어있으면 다음 비활성) */
      {
        key:'think', title:'사고과정 정리',
        mount: function(container){
          var screen = el('div', {class:'screen'});
          screen.appendChild(el('div', {class:'screen-eyebrow'}, '섹션1 · 사고과정과 인공지능'));
          screen.appendChild(el('h2', {class:'screen-title'}, '앞선 대화에서 사고과정은 무엇이라고 할 수 있을까요?'));
          screen.appendChild(Components.ThoughtBox({
            screenId:'s2', key:'thought', labelText:'생각을 적어보세요',
            placeholder:'예: 질문에 알맞은 대답을 떠올리는 것'
          }));
          container.appendChild(screen);
        },
        isComplete: function(){ return (STATE.screen('s2').thought||'').trim().length>0; }
      },
      /* step2: 수학적 해석 질문 + S1 답의 x→y 재표기(원문 문구 보존, 색 하이라이트+KaTeX만 추가) */
      {
        key:'interpret', title:'수학적으로 어떻게 해석할까요?',
        mount: function(container){
          var screen = el('div', {class:'screen'});
          screen.appendChild(el('div', {class:'screen-eyebrow'}, '섹션1 · 사고과정과 인공지능'));
          screen.appendChild(el('h2', {class:'screen-title'}, '질문(입력)에 대한 올바른 답변(출력)을 고르는 것이에요!'));
          screen.appendChild(el('p', {}, '이걸 수학적으로 어떻게 해석할 수 있을까요?'));
          var s1Thought = (STATE.screen('s1').thought||'').trim() || '(밥 먹었니? 에 대한 답)';
          screen.appendChild(el('p', {}, ['방금 여러분이 적은 대화를 ', el('span', {'data-katex':'x \\to y'}), '로 다시 표기해봅시다.']));
          screen.appendChild(Components.Highlight([
            {tone:'x', label:['입력 = ', el('span', {'data-katex':'x'}), '  (밥 먹었니?)']},
            {tone:'y', label:['출력 = ', el('span', {'data-katex':'y'}), '  (' + s1Thought + ')']}
          ]));
          container.appendChild(screen);
        },
        isComplete: function(){ return true; }
      },
      /* step3(미니 체험): 축소 카드 좌우 배치 + 사이 드래그 연결선(SVG) + 키보드 대체(좌 선택→우 선택) */
      {
        key:'mini', title:'미니 체험',
        mount: function(container){
          var st = STATE.screen('s2');
          var screen = el('div', {class:'screen'});
          screen.appendChild(el('div', {class:'screen-eyebrow'}, '섹션1 · 사고과정과 인공지능'));
          screen.appendChild(el('h2', {class:'screen-title'}, '미니 체험: 입력에 어울리는 출력을 이어보세요'));
          screen.appendChild(el('p', {class:'muted'}, '입력 카드를 눌러 선택한 뒤 출력 칸을 누르세요(키보드: Enter). 카드를 출력 칸까지 드래그해 이어도 돼요.'));
          /* 정오답 SR 낭독 채널(G3-07) — 색·모션(shake) 전용이던 피드백을 낭독으로도 전달한다. */
          var statusEl = el('div', {class:'board-status', 'aria-live':'polite'}, '');
          screen.appendChild(statusEl);

          var SVG_NS = 'http://www.w3.org/2000/svg';
          var matchWrap = el('div', {class:'match-wrap compact'});
          var svg = document.createElementNS(SVG_NS, 'svg');
          svg.setAttribute('class', 'match-svg');
          svg.setAttribute('aria-hidden', 'true');
          var inCol = el('div', {class:'match-col'});
          inCol.appendChild(el('div', {class:'match-col-label'}, '입력'));
          var outCol = el('div', {class:'match-col'});
          outCol.appendChild(el('div', {class:'match-col-label'}, '출력'));

          var selected = null;
          var inputBtns = {}, outputSlots = {};
          function isAssigned(inKey){ return !!st.match[inKey]; }
          function assignedInputOf(outKey){ for(var k in st.match){ if(st.match[k]===outKey) return k; } return null; }
          function labelOf(inKey){ return S2_PAIRS.filter(function(p){ return p.inKey===inKey; })[0].inLabel; }

          function wrapRectOf(){ return matchWrap.getBoundingClientRect(); }
          function anchorRight(node){ var wr=wrapRectOf(), r=node.getBoundingClientRect(); return {x:r.right-wr.left, y:r.top-wr.top+r.height/2}; }
          function anchorLeft(node){ var wr=wrapRectOf(), r=node.getBoundingClientRect(); return {x:r.left-wr.left, y:r.top-wr.top+r.height/2}; }
          function drawLines(){
            while(svg.firstChild){ svg.removeChild(svg.firstChild); }
            for(var inKey in st.match){
              var outKey = st.match[inKey];
              var inBtn = inputBtns[inKey], outSlot = outputSlots[outKey];
              if(!inBtn || !outSlot) continue;
              var p1 = anchorRight(inBtn), p2 = anchorLeft(outSlot);
              var line = document.createElementNS(SVG_NS, 'line');
              line.setAttribute('x1', p1.x); line.setAttribute('y1', p1.y);
              line.setAttribute('x2', p2.x); line.setAttribute('y2', p2.y);
              line.setAttribute('class', 'conn' + (inKey===outKey ? '' : ' wrong'));
              svg.appendChild(line);
            }
          }

          function renderAll(){
            S2_PAIRS.forEach(function(p){
              var btn = inputBtns[p.inKey];
              btn.classList.toggle('selected', selected===p.inKey);
              btn.classList.toggle('used', isAssigned(p.inKey));
              btn.setAttribute('aria-pressed', selected===p.inKey?'true':'false');
            });
            S2_OUT_ORDER.forEach(function(outKey){
              var slot = outputSlots[outKey];
              var hint = slot.querySelector('.slot-hint');
              var assignedIn = assignedInputOf(outKey);
              var outPair = S2_PAIRS.filter(function(p){ return p.inKey===outKey; })[0];
              slot.classList.remove('filled','correct','wrong');
              if(assignedIn){
                var ok = assignedIn===outKey;
                slot.classList.add('filled', ok?'correct':'wrong');
                /* 색만으로 정오를 구분하지 않도록 오답에는 기호(✕)를 병기한다(G3-07). */
                if(hint) hint.textContent = (ok?'':'✕ ') + labelOf(assignedIn);
                slot.setAttribute('aria-label', '출력 칸: '+outPair.outLabel+', '+(ok?'정답 연결됨: ':'오답 연결됨: ')+labelOf(assignedIn));
              } else {
                if(hint) hint.textContent = '여기로';
                slot.setAttribute('aria-label', '출력 칸: '+outPair.outLabel);
              }
            });
            drawLines();
            refreshNav();
          }
          function tryAssign(inKey, outKey){
            if(isAssigned(inKey)) return;
            st.match[inKey] = outKey;
            STATE.save();
            selected = null;
            renderAll();
            var slot = outputSlots[outKey];
            var outPair = S2_PAIRS.filter(function(p){ return p.inKey===outKey; })[0];
            if(inKey===outKey){
              FX.pop(slot);
              statusEl.textContent = labelOf(inKey)+' → '+outPair.outLabel+' 연결: 정답이에요.';
              var allDone = S2_PAIRS.every(function(p){ return st.match[p.inKey]===p.inKey; });
              if(allDone && !s2AutoTimer){
                s2AutoTimer = setTimeout(function(){
                  s2AutoTimer = null;
                  /* 이탈 가드: 발화 시점에도 여전히 s2 미니 체험 step(인덱스 2)일 때만 진행한다 */
                  if(STATE.data.screenId==='s2' && currentStepIdx()===2){ ROUTER.next(); }
                }, 1000);
              }
            } else {
              FX.shake(slot);
              statusEl.textContent = labelOf(inKey)+' → '+outPair.outLabel+' 연결: 오답이에요. 잠시 후 다시 시도할 수 있어요.';
              var wrongTimer = setTimeout(function(){
                var wi = s2WrongTimers.indexOf(wrongTimer);
                if(wi>=0) s2WrongTimers.splice(wi,1);
                delete st.match[inKey]; STATE.save(); renderAll();
              }, 500);
              s2WrongTimers.push(wrongTimer);
            }
          }
          S2_PAIRS.forEach(function(p){
            var btn = el('button', {type:'button', class:'match-card input-card compact', 'aria-label':'입력 카드: '+p.inLabel}, p.inLabel);
            btn.addEventListener('click', function(){
              if(isAssigned(p.inKey)) return;
              selected = (selected===p.inKey) ? null : p.inKey;
              renderAll();
            });
            btn.addEventListener('pointerdown', function(e){
              if(isAssigned(p.inKey)) return;
              e.preventDefault();
              selected = null; renderAll();
              var startPt = anchorRight(btn);
              var liveLine = document.createElementNS(SVG_NS, 'line');
              liveLine.setAttribute('class', 'conn live');
              liveLine.setAttribute('x1', startPt.x); liveLine.setAttribute('y1', startPt.y);
              liveLine.setAttribute('x2', startPt.x); liveLine.setAttribute('y2', startPt.y);
              svg.appendChild(liveLine);
              function move(ev){
                var wr = wrapRectOf();
                liveLine.setAttribute('x2', ev.clientX-wr.left);
                liveLine.setAttribute('y2', ev.clientY-wr.top);
              }
              function cleanup(){
                document.removeEventListener('pointermove', move);
                document.removeEventListener('pointerup', up);
                document.removeEventListener('pointercancel', cancelDrag);
                liveLine.remove();
              }
              function up(ev){
                cleanup();
                var target = document.elementFromPoint(ev.clientX, ev.clientY);
                var slotEl = target && target.closest ? target.closest('.match-slot') : null;
                if(slotEl){
                  var dropOutKey = null;
                  for(var k in outputSlots){ if(outputSlots[k]===slotEl){ dropOutKey=k; break; } }
                  if(dropOutKey) tryAssign(p.inKey, dropOutKey);
                }
              }
              function cancelDrag(){ cleanup(); } /* 태블릿에서 스크롤 등으로 pointercancel이 발생해도 잔여 리스너·임시 선을 정리 */
              document.addEventListener('pointermove', move);
              document.addEventListener('pointerup', up);
              document.addEventListener('pointercancel', cancelDrag);
            });
            inputBtns[p.inKey] = btn;
            inCol.appendChild(btn);
          });
          S2_OUT_ORDER.forEach(function(outKey){
            var pair = S2_PAIRS.filter(function(p){ return p.inKey===outKey; })[0];
            var slot = el('div', {class:'match-slot compact', tabindex:'0', role:'button', 'aria-label':'출력 칸: '+pair.outLabel});
            slot.appendChild(el('span', {}, pair.outLabel));
            slot.appendChild(el('span', {class:'slot-hint'}, '여기로'));
            slot.addEventListener('click', function(){ if(selected) tryAssign(selected, outKey); });
            slot.addEventListener('keydown', function(e){
              if((e.key==='Enter'||e.key===' ') && selected){ e.preventDefault(); tryAssign(selected, outKey); }
            });
            outputSlots[outKey] = slot;
            outCol.appendChild(slot);
          });
          matchWrap.appendChild(svg);
          matchWrap.appendChild(inCol);
          matchWrap.appendChild(outCol);
          screen.appendChild(matchWrap);
          container.appendChild(screen);
          renderAll(); /* DOM에 실제로 붙은 뒤 호출 — getBoundingClientRect 기반 SVG 좌표가 정확해야 함 */
        },
        isComplete: function(){
          var st = STATE.screen('s2');
          return S2_PAIRS.every(function(p){ return st.match[p.inKey]===p.inKey; });
        }
      },
      /* step4: 4쌍 완료 1초 후 자동 진입(위 타이머) + x·y KaTeX 하이라이트 정리 문구 */
      {
        key:'reveal', title:'방금 한 일 정리',
        mount: function(container){
          var screen = el('div', {class:'screen'});
          screen.appendChild(el('div', {class:'screen-eyebrow'}, '섹션1 · 사고과정과 인공지능'));
          screen.appendChild(el('h2', {class:'screen-title'}, '방금 여러분이 한 일은?'));
          screen.appendChild(el('p', {}, ['각 질문(', el('span', {'data-katex':'x'}), ')에 올바른 대답(', el('span', {'data-katex':'y'}), ')를 고른 것이죠?']));
          screen.appendChild(Components.SummaryCard({ color:'peach', body:'방금 여러분이 한 일 = 각 x에 올바른 y를 고른 것.' }));
          container.appendChild(screen);
        },
        isComplete: function(){ return true; }
      }
    ]
  };
}

  if(st.ui.tier==null){

      if(!tierUnlocked(stageNum, tier)) return;
      st.ui.tier = tier; STATE.save(); ROUTER.refresh('.game-back-btn');
    });
  } else {
    var tier = st.ui.tier;
    var layout = el('div', {class:'game-layout'});

    var boardArea = el('div', {class:'game-board-area'});

    backBtn.addEventListener('click', function(){ st.ui.tier=null; STATE.save(); ROUTER.refresh('.stage-tile:not([disabled])'); });
    panelArea.appendChild(backBtn);

        nav.appendChild(nextBtn2);
      }

      listBtn.addEventListener('click', function(){ st.ui.tier=null; STATE.save(); ROUTER.refresh('.stage-tile:not([disabled])'); });
      nav.appendChild(listBtn);
      panelArea.appendChild(nav);
    }
    if(stageNum===1) mountStage1Play(boardArea, panelArea, tier, onCleared);
    else if(stageNum===2) mountStage2Play(boardArea, panelArea, tier, onCleared);
    else mountStage3Play(boardArea, panelArea, tier, onCleared);

function mountRLSection(container){

    '지도학습은 사람이 정답(y)을 알려주지만, 강화학습은 로봇이 직접 부딪혀보며 배웁니다.'));

}
function buildS5(){
  return {
    mount: function(container){
      var st = STATE.screen('s5');
      /* 판 진행 중(3탭 각각 tier/deduceIdx/coordpickIdx 선택 완료 상태)엔 상단 6블록을
         아예 append하지 않는다 — computeSquareCellPx가 마운트 시점에 game-board-area를
         동기 실측하므로, 보드가 커진 레이아웃을 처음부터 재고 시작해야 한다(1뷰포트 보드
         실측 공간 확보, 수정요청_S5-집중모드_v1 D-1·D-2). RL 모드는 판을 고르는 목록 단계가
         없어 늘 "재생 중" 상태라 완전 접힘 대신 컴팩트 접힘을 쓴다(수정요청_RL정돈-좌표지목추론_v1
         §A-1): 설명 문단·범례·NextTease 3개만 빼고, eyebrow·제목·모드 토글(지도학습↔강화학습)은
         남긴다 — RL엔 판 선택 해제 같은 복귀 경로가 없어 모드 토글이 유일한 탈출구다(소프트락 방지). */
      var focusLevel = st.ui.mode === 'rl' ? 'rl' : (
        (st.ui.supTab === 'vanilla'   && st.ui.tier        != null) ||
        (st.ui.supTab === 'deduce'    && st.ui.deduceIdx   != null) ||
        (st.ui.supTab === 'coordpick' && st.ui.coordpickIdx != null)
      ) ? 'play' : 'none';
      var screenCls = 'screen s5-screen' +
        (focusLevel==='play' ? ' s5-screen--focus' : (focusLevel==='rl' ? ' s5-screen--focus-rl' : ''));
      var screen = el('div', {class: screenCls});
      if(focusLevel !== 'play'){
        var modeToggle = Components.SegToggle({
          ariaLabel:'모드 선택', groupKey:'s5mode', value: st.ui.mode,
          options:[{value:'supervised',label:'지도학습'},{value:'rl',label:'강화학습'}],
          onChange:function(v){ st.ui.mode=v; STATE.save(); ROUTER.refresh('[data-seg-group="s5mode"] .seg-btn.active'); }
        });
      }
      if(focusLevel==='none'){
        screen.appendChild(el('div', {class:'screen-eyebrow'}, '섹션2 · 지뢰찾기 게임'));
        screen.appendChild(el('h1', {class:'screen-title'}, '지뢰를 찾고, 안전하게 집으로 가자!'));
        screen.appendChild(el('p', {}, '지뢰를 찾는 게임이 아니라 지뢰를 피해 출발점에서 도착점까지 가는 게임이에요. 지뢰를 찾아도 게임오버가 아니에요.'));
        screen.appendChild(el('div', {class:'board-legend'}, [
          legendItem(BOARD_COLORS.safe, '안전 ✓'),
          legendItem(BOARD_COLORS.mine, '지뢰 ●'),
          legendItem(BOARD_COLORS.path, '확정 경로 —'),
          legendItem(BOARD_COLORS.robot, '로봇(루미)'),
          legendItem(BOARD_COLORS.goal, '도착')
        ]));
        screen.appendChild(Components.NextTease('다음 화면으로 가려면: 개념 익히기 세 스테이지 각 1판 클리어 + 강화학습 감상 1개 이상 보기'));
        screen.appendChild(modeToggle);
      } else if(focusLevel==='rl'){
        screen.appendChild(el('div', {class:'screen-eyebrow'}, '섹션2 · 지뢰찾기 게임'));
        screen.appendChild(el('h1', {class:'screen-title'}, '지뢰를 찾고, 안전하게 집으로 가자!'));
        screen.appendChild(modeToggle);
      }
      var body = el('div', {class:'screen-block s5-body', style:{marginTop:'var(--sp-md)'}});
      screen.appendChild(body);
      /* 보드 캔버스가 computeSquareCellPx로 game-board-area를 실측하므로(blocking-1),
         측정 전에 screen을 실제 문서에 붙여야 한다 — 붙이기 전에는 이 subtree 전체가
         DOM에서 분리돼 있어 clientWidth/Height가 전부 0으로 읽힌다. */
      container.appendChild(screen);
      if(st.ui.mode==='supervised') mountSupervisedSection(body);
      else mountRLSection(body);
    },
    isComplete: function(){
      var st = STATE.screen('s5');
      var vanillaAll = [1,2,3].every(function(s){ return Object.keys(st.supervised[s].cleared).length>0; });
      var rlAny = st.rl.watched.line || st.rl.watched.curve || st.rl.watched.maze;
      return vanillaAll && rlAny;
    }
  };
}

/* ---- S6 · 비지도학습 — 무리 짓기(군집) 미니 체험 (4 step: 생각칸 → 원 묶기 → 컴퓨터 비교 → 정리) ---- */
function buildS6(){
  return {
    steps: [
      {
        key:'think', title:'생각해보기',
        mount: function(container){
          var screen = el('div', {class:'screen'});
          screen.appendChild(el('div', {class:'screen-eyebrow'}, '섹션3 · 비지도학습 미니 체험'));
          screen.appendChild(el('h2', {class:'screen-title'}, '비지도학습 — 무리 짓기(군집) 미니 체험'));
          screen.appendChild(Components.ThoughtBox({
            screenId:'s6', key:'thought', labelText:'정답도 점수도 없이, 배울 수 있는 게 있을까요?',
            placeholder:'생각을 적어보세요'
          }));
          container.appendChild(screen);
        },
        isComplete: function(){ return (STATE.screen('s6').thought||'').trim().length>0; }
      },
      {
        key:'circle', title:'원으로 묶어보기',
        mount: function(container){
          var screen = el('div', {class:'screen'});
          screen.appendChild(el('div', {class:'screen-eyebrow'}, '섹션3 · 비지도학습 미니 체험'));
          screen.appendChild(el('h2', {class:'screen-title'}, '산점도에서 무리를 원으로 묶어보세요'));
          screen.appendChild(el('p', {}, '아래 산점도(하루 게임 시간 × 수면 시간)에 점이 여러 개 있어요. 몇 무리로 보이나요? 원으로 묶어 보세요.'));
          var host = el('div', {});
          screen.appendChild(host);
          screen.appendChild(Components.ThoughtBox({
            screenId:'s6', key:'thoughtWhy', labelText:'왜 그렇게 나눴나요?',
            placeholder:'생각을 적어보세요', compact:true
          }));
          /* mountClusterScatter의 캔버스 실측 반응형화(G3-05)가 host.closest('.view-pane')로
             남는 세로 여유를 재므로, host 아래에 올 생각칸까지 먼저 문서에 붙인 뒤 호출한다
             (§S5 blocking-1과 동일 패턴). */
          container.appendChild(screen);
          mountClusterScatter(host, {
            onCircleDrawn: function(){ refreshNav(); },
            onAutoRun: function(){ refreshNav(); }
          });
          /* 이 step은 "직접 묶기"만 다룬다. 컴퓨터 비교는 다음 step 몫이라 버튼만 호출부에서 제거한다
             (CLUSTER 섹션의 mountClusterScatter 자체·kmeans·genClusterData는 무변경). */
          var autoBtn = host.querySelector('.cluster-toolbar .btn-primary');
          if(autoBtn) autoBtn.remove();
        },
        isComplete: function(){
          var st = STATE.screen('s6');
          return (st.circles && st.circles.length>0) && (st.thoughtWhy||'').trim().length>0;
        }
      },
      {
        key:'compare', title:'컴퓨터 무리 찾기·비교',
        mount: function(container){
          var screen = el('div', {class:'screen'});
          screen.appendChild(el('div', {class:'screen-eyebrow'}, '섹션3 · 비지도학습 미니 체험'));
          screen.appendChild(el('h2', {class:'screen-title'}, '컴퓨터가 찾은 무리와 비교해보세요'));
          screen.appendChild(el('p', {}, '[컴퓨터 무리 찾기]를 누르면 컴퓨터가 스스로 무리를 찾아요. 여러분이 그린 원과 비교해보세요.'));
          var host = el('div', {});
          screen.appendChild(host);
          /* mountClusterScatter의 캔버스 실측 반응형화(G3-05, host.closest('.view-pane'))가
             동작하려면 host가 이미 문서에 붙어 있어야 한다(§S5 blocking-1과 동일 패턴). */
          container.appendChild(screen);
          mountClusterScatter(host, {
            onCircleDrawn: function(){ refreshNav(); },
            onAutoRun: function(){ refreshNav(); }
          });
        },
        isComplete: function(){ return !!STATE.screen('s6').autoRun; }
      },
      {
        key:'summary', title:'정리',
        mount: function(container){
          var screen = el('div', {class:'screen'});
          screen.appendChild(el('div', {class:'screen-eyebrow'}, '섹션3 · 비지도학습 미니 체험'));
          screen.appendChild(el('h2', {class:'screen-title'}, '정리'));
          screen.appendChild(Components.SummaryCard({ color:'lavender', body:'정답 없이 데이터의 구조를 찾는 것 = 비지도학습(군집).' }));
          container.appendChild(screen);
        },
        isComplete: function(){ return true; }
      }
    ]
  };
}

/* ---- S7 · 정리 — 비교 표 → 퀴즈 → 소감 (3 step) ---- */
var S7_QUIZ_ITEMS = [
  {key:'q1', question:'스팸 메일을 "스팸/정상"으로 분류하는 AI', answerKey:'sup'},
  {key:'q2', question:'취향이 비슷한 손님끼리 무리로 나누는 AI', answerKey:'uns'},
  {key:'q3', question:'게임을 반복하며 점점 고수가 되는 AI', answerKey:'rl'}
];
var S7_OPTIONS = [{key:'sup',label:'지도학습'},{key:'uns',label:'비지도학습'},{key:'rl',label:'강화학습'}];
function buildS7(){
  return {
    steps: [
      {
        key:'compare', title:'세 방법 비교',
        mount: function(container){
          var screen = el('div', {class:'screen'});
          screen.appendChild(el('div', {class:'screen-eyebrow'}, '섹션4 · 정리'));
          screen.appendChild(el('h2', {class:'screen-title'}, '정리 — 세 방법 비교'));
          var wrap = el('div', {class:'compare-wrap'});
          var table = el('table', {class:'compare-table'});
          table.appendChild(el('tr',{}, [el('th',{},''), el('th',{},'주어지는 것'), el('th',{},'배우는 방식'), el('th',{},'오늘 한 활동')]));
          table.appendChild(el('tr',{}, [el('th',{},'지도학습'), el('td',{},'정답(레이블)'), el('td',{},'입력-정답 관계 학습'), el('td',{}, ['정답 ', el('span', {'data-katex':'y'}), ' 입력 / 함수 알려주기'])]));
          table.appendChild(el('tr',{}, [el('th',{},'강화학습'), el('td',{},'보상·벌'), el('td',{},'시행착오로 점진 학습'), el('td',{},'감상(구경) / 만들기')]));
          table.appendChild(el('tr',{}, [el('th',{},'비지도학습'), el('td',{},'정답 없음'), el('td',{},'데이터 구조 스스로 발견'), el('td',{},'무리 짓기(군집)')]));
          wrap.appendChild(table);
          screen.appendChild(wrap);
          container.appendChild(screen);
        },
        isComplete: function(){ return true; }
      },
      {
        key:'quiz', title:'어떤 학습 방법일까요?',
        mount: function(container){
          var st = STATE.screen('s7');
          var screen = el('div', {class:'screen'});
          screen.appendChild(el('div', {class:'screen-eyebrow'}, '섹션4 · 정리'));
          screen.appendChild(el('h2', {class:'screen-title'}, '어떤 학습 방법일까요?'));
          S7_QUIZ_ITEMS.forEach(function(item){
            screen.appendChild(Components.Quiz3({
              question:item.question, options:S7_OPTIONS, answerKey:item.answerKey, initial: st.quiz[item.key],
              onCorrect:function(k){ st.quiz[item.key]=k; STATE.save(); refreshNav(); }
            }));
          });
          container.appendChild(screen);
        },
        isComplete: function(){
          var st = STATE.screen('s7');
          return st.quiz.q1==='sup' && st.quiz.q2==='uns' && st.quiz.q3==='rl';
        }
      },
      {
        key:'reflect', title:'소감',
        mount: function(container){
          var screen = el('div', {class:'screen'});
          screen.appendChild(el('div', {class:'screen-eyebrow'}, '섹션4 · 정리'));
          screen.appendChild(el('h2', {class:'screen-title'}, '오늘 배운 것을 정리해봐요'));
          screen.appendChild(Components.ThoughtBox({
            screenId:'s7', key:'thought', labelText:'오늘 배운 것에 대한 소감을 적어보세요', placeholder:'생각을 적어보세요'
          }));
          container.appendChild(screen);
        },
        isComplete: function(){ return (STATE.screen('s7').thought||'').trim().length>0; }
      }
    ]
  };
}

var SCREENS = {
  s1: buildS1(), s2: buildS2(), s3: buildS3(), s4: buildS4(),
  s5: buildS5(), s6: buildS6(), s7: buildS7()
};

/* ============================================================
   12) TEACHER — 교사 패널
   ============================================================ */
var TEACHER = {
  tapCount: 0,
  tapTimer: null,
  init: function(){
    var titleBtn = document.getElementById('appTitleBtn');
    titleBtn.addEventListener('click', function(){
      TEACHER.tapCount++;
      clearTimeout(TEACHER.tapTimer);
      TEACHER.tapTimer = setTimeout(function(){ TEACHER.tapCount = 0; }, 2500);
      if(TEACHER.tapCount >= 5){ TEACHER.tapCount = 0; TEACHER.open(); }
    });
    document.addEventListener('keydown', function(e){
      if(e.altKey && (e.key==='r' || e.key==='R')){ TEACHER.open(); }
      if(e.key === 'Escape'){ TEACHER.close(); }
    });
    document.getElementById('teacherCloseBtn').addEventListener('click', TEACHER.close);
    document.getElementById('teacherResetBtn').addEventListener('click', function(){
      var area = document.getElementById('teacherConfirmArea');
      area.textContent = '';
      var box = el('div', {class:'card-hairline', style:{marginTop:'10px'}});
      box.appendChild(el('p', {style:{margin:'0 0 10px'}}, '정말 초기화할까요? 이 학습지의 진행 상황이 모두 사라집니다.'));
      var row = el('div', {class:'btn-row'});
      var yes = el('button', {type:'button', class:'btn btn-primary'}, '예, 초기화');
      yes.addEventListener('click', function(){
        STATE.reset();
        ROUTER.go('s1', {silent:true});
        TEACHER.close();
        toast('초기화되었습니다.');
      });
      var no = el('button', {type:'button', class:'btn btn-secondary'}, '아니오');
      no.addEventListener('click', function(){ area.textContent = ''; });
      row.appendChild(yes); row.appendChild(no);
      box.appendChild(row);
      area.appendChild(box);
    });
  },
  open: function(){
    document.getElementById('teacherPanel').classList.add('open');
    document.getElementById('teacherConfirmArea').textContent = '';
  },
  close: function(){
    document.getElementById('teacherPanel').classList.remove('open');
  }
};

/* ============================================================
   13) BOOT
   ============================================================ */
function boot(){
  STATE.load();
  ROUTER.screenEl = document.getElementById('screenRoot');
  MASCOT.mountMini();
  TEACHER.init();
  document.getElementById('prevBtn').addEventListener('click', function(){ ROUTER.prev(); });
  document.getElementById('nextBtn').addEventListener('click', function(){ ROUTER.next(); });
  /* ←→ 화면·step 내비. 입력 요소(모든 input·textarea·select)에 포커스가 있거나 IME 조합 중이면
     무시하고, 다른 위젯이 이미 이 키를 처리했다면(e.defaultPrevented) 무시한다. */
  document.addEventListener('keydown', function(e){
    if(e.isComposing || e.keyCode === 229) return;
    if(e.key !== 'ArrowLeft' && e.key !== 'ArrowRight') return;
    var tag = document.activeElement && document.activeElement.tagName;
    if(tag==='INPUT' || tag==='TEXTAREA' || tag==='SELECT') return;
    if(e.defaultPrevented) return;
    if(e.key === 'ArrowLeft'){ ROUTER.prev(); } else { ROUTER.next(); }
  });
  ROUTER.render();
}

if(document.readyState === 'loading'){
  document.addEventListener('DOMContentLoaded', boot);
} else {
  boot();
}

})();
</script>
