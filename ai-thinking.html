<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>AI는 어떻게 생각을 할까? — 인공지능 수학 학습지</title>
<link rel="stylesheet" href="katex/katex.min.css">
<style>
/* ============================================================
   디자인 토큰 (DESIGN-clay.md 상속 + 명세 6.1 게임 시맨틱 색)
   ============================================================ */
:root{
  --primary:#0a0a0a; --primary-active:#1f1f1f; --primary-disabled:#e5e5e5;
  --ink:#0a0a0a; --body-c:#3a3a3a; --body-strong:#1a1a1a;
  --muted:#6a6a6a; --muted-soft:#9a9a9a;
  --hairline:#e5e5e5; --hairline-soft:#f0f0f0;
  --canvas:#fffaf0; --surface-soft:#faf5e8; --surface-card:#f5f0e0; --surface-strong:#ebe6d6;
  --on-primary:#ffffff;
  --brand-pink:#ff4d8b; --brand-teal:#1a3a3a; --brand-lavender:#b8a4ed;
  --brand-peach:#ffb084; --brand-ochre:#e8b94a; --brand-mint:#a4d4c5; --brand-coral:#ff6b5a;

  --r-xs:6px; --r-sm:8px; --r-md:12px; --r-lg:16px; --r-xl:24px; --r-pill:9999px;

  --sp-xxs:4px; --sp-xs:8px; --sp-sm:12px; --sp-md:16px; --sp-lg:24px; --sp-xl:32px; --sp-xxl:48px; --sp-section:96px;

  /* 이 학습지 게임 시맨틱 색 (명세 6.1, 임시값 기재대로 그대로 사용) */
  --safe:#2ea043; --mine:#e5484d; --robot:#1f6feb; --path:#f5a623; --grid-line:#d7deea; --goal:#8957e5;
  --sel:#2f6df0;

  --font-body:'Inter',-apple-system,BlinkMacSystemFont,'Apple SD Gothic Neo','Segoe UI','Malgun Gothic',Roboto,sans-serif;
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;height:100%;overflow:hidden;}
body{
  background:var(--canvas); color:var(--body-c); font-family:var(--font-body);
  font-size:16px; line-height:1.55; -webkit-text-size-adjust:100%;
}
h1,h2,h3{ color:var(--ink); font-weight:500; letter-spacing:-0.02em; margin:0 0 var(--sp-sm); }
h1{font-size:clamp(20px,4.2vw,26px); line-height:1.15;}
h2{font-size:clamp(17px,3vw,21px); line-height:1.2;}
h3{font-size:clamp(14px,2.4vw,16px); line-height:1.3;}
p{margin:0 0 var(--sp-sm);}
button{font-family:inherit;}
.sr-only{position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap;border:0;}
:focus-visible{outline:3px solid var(--sel); outline-offset:2px;}

/* ---------- 앱 셸 (1뷰포트: header·screen-root·bottom-nav 3단 flex column) ---------- */
.app-shell{max-width:980px;margin:0 auto;height:100vh;height:100dvh;display:flex;flex-direction:column;padding:0 var(--sp-md);}
.app-header{flex:none;background:var(--canvas);z-index:20;padding:var(--sp-sm) 0;border-bottom:1px solid var(--hairline);}
.header-top{display:flex;align-items:center;justify-content:space-between;gap:var(--sp-sm);}
.app-title-btn{background:none;border:none;padding:2px 4px;cursor:pointer;text-align:left;font:inherit;}
.app-title{font-size:15px;font-weight:600;color:var(--ink);letter-spacing:-0.01em;}
.section-tag{font-size:12px;color:var(--muted);font-weight:600;letter-spacing:0.02em;}
.mascot-mini{width:34px;height:34px;flex:none;border-radius:50%;overflow:hidden;background:var(--brand-lavender);display:flex;align-items:center;justify-content:center;}
.mascot-mini.mascot-fallback::after{content:'✦';font-size:16px;color:var(--ink);}
.progress-track{display:flex;gap:4px;margin-top:var(--sp-xs);}
.progress-seg{flex:1;height:6px;border-radius:var(--r-pill);background:var(--hairline);overflow:hidden;position:relative;}
.progress-seg .fill{position:absolute;inset:0;background:var(--ink);width:0%;transition:width .25s ease;}
.progress-seg.section-done .fill{background:var(--safe);}

/* ---------- 화면 공통 ---------- */
.screen-root{flex:1;min-height:0;position:relative;overflow:hidden;}
.screen{animation:screenIn .28s ease both;}
@keyframes screenIn{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:none;}}

/* ---------- 서브 슬라이드 스테이지(G2-A): 화면·step 전환 pane ---------- */
.view-pane{
  position:absolute; inset:0; height:100%; padding:var(--sp-lg) 0;
  overflow-y:auto; /* 안전밸브 — 콘텐츠가 넘칠 때만 내부 스크롤(일반 화면용) */
  transition:transform .28s cubic-bezier(.455,.03,.515,.955), opacity .28s cubic-bezier(.455,.03,.515,.955);
}
/* 게임 화면(S5)은 자체 1뷰포트 레이아웃을 쓰므로 페이지 스크롤 안전밸브를 끈다(G2-C).
   내부 스크롤은 .game-panel-area/.game-stage-area.scrollable에서만 허용한다. */
.view-pane.pane-game{overflow:hidden;}
.view-pane.pane-game .screen{height:100%; display:flex; flex-direction:column; min-height:0;}
.view-pane.pane-active{transform:translateX(0); opacity:1;}
.view-pane.pane-enter-right{transform:translateX(48px); opacity:0;}
.view-pane.pane-enter-left{transform:translateX(-48px); opacity:0;}
.view-pane.pane-exit-left{transform:translateX(-48px); opacity:0;}
.view-pane.pane-exit-right{transform:translateX(48px); opacity:0;}
/* 진입/퇴장 애니메이션 중인 pane은 클릭 불가(G3-01 방어층) — 전환 타이머 취소(ROUTER._rebuild)가
   주 수정이고, 이건 그 사이 틈에서도 오조작을 한 번 더 막는 안전망이다. */
.view-pane.pane-enter-right,.view-pane.pane-enter-left,.view-pane.pane-exit-left,.view-pane.pane-exit-right{pointer-events:none;}
.step-dots{display:flex;gap:6px;justify-content:center;margin:0 0 var(--sp-sm);}
.step-dot{width:7px;height:7px;border-radius:50%;background:var(--hairline);}
.step-dot.active{background:var(--ink);width:18px;border-radius:var(--r-pill);}

/* ---------- 게임 레이아웃(S5, G2-C): 정사각 보드 + 옆 컨트롤 패널, 좁으면 하단 시트 ---------- */
.game-layout{display:grid;grid-template-columns:minmax(0,1fr) clamp(320px,34vw,360px);gap:var(--sp-md);height:100%;min-height:0;}
.game-board-area{min-width:0;min-height:0;display:flex;align-items:center;justify-content:center;}
.game-panel-area{min-height:0;overflow-y:auto;display:flex;flex-direction:column;gap:var(--sp-sm);}
@media (max-width:860px), (orientation:portrait){
  .game-layout{display:flex;flex-direction:column;}
  .game-board-area{flex:1;min-height:0;}
  .game-panel-area{flex:none;max-height:42%;border-top:1px solid var(--hairline);padding-top:var(--sp-sm);}
}
/* S5 전체 뼈대: 상단 고정 소개부(subbar) + 남는 공간을 채우는 스테이지 영역 */
.s5-body{flex:1;min-height:0;display:flex;flex-direction:column;}
.game-body{flex:1;min-height:0;display:flex;flex-direction:column;gap:var(--sp-sm);}
.game-subbar{flex:none;}
.game-stage-area{flex:1;min-height:0;overflow:hidden;}
.game-stage-area.scrollable{overflow-y:auto;}
.game-stage-area .game-layout{height:100%;}
.stage-kind-label{display:block;font-size:10px;font-weight:600;color:var(--muted);margin-top:1px;}
.func-formula-label{font-size:13px;color:var(--muted);margin-bottom:6px;}

.screen-eyebrow{font-size:13px;font-weight:600;color:var(--muted);letter-spacing:0.02em;margin-bottom:4px;}
.screen-title{margin-bottom:var(--sp-sm);}
.screen-prompt{font-size:17px;color:var(--body-strong);background:var(--surface-soft);border-radius:var(--r-lg);padding:var(--sp-md);margin-bottom:var(--sp-md);}
.screen-block{margin-bottom:var(--sp-lg);}
.muted{color:var(--muted);font-size:14px;}

/* ---------- 버튼 ---------- */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;min-height:44px;padding:10px 20px;border-radius:var(--r-md);font-size:14px;font-weight:600;border:1px solid transparent;cursor:pointer;touch-action:manipulation;}
.btn-primary{background:var(--primary);color:var(--on-primary);}
.btn-primary:hover{background:var(--primary-active);}
.btn-primary:disabled{background:var(--primary-disabled);color:var(--muted);cursor:not-allowed;}
.btn-secondary{background:var(--canvas);color:var(--ink);border-color:var(--hairline);}
.btn-secondary:hover{border-color:var(--ink);}
.btn-secondary:disabled{color:var(--muted-soft);cursor:not-allowed;}
.btn-ghost{background:transparent;color:var(--ink);border-color:transparent;}
.btn-sm{min-height:38px;padding:6px 14px;font-size:13px;}
.btn-row{display:flex;flex-wrap:wrap;gap:var(--sp-xs);align-items:center;}

/* ---------- 카드 (피처 카드: 정의·모드·클리어 강조 순간에만, Clay 6색 순환) ---------- */
.card{border-radius:var(--r-xl);padding:var(--sp-lg);}
.feature-card{margin-top:var(--sp-lg);}
.card-title{font-size:14px;font-weight:700;margin-bottom:6px;opacity:.85;}
.card-body{font-size:16px;font-weight:600;}
.card-cream{background:var(--surface-card);color:var(--ink);}
.card-pink{background:var(--brand-pink);color:var(--on-primary);}
.card-teal{background:var(--brand-teal);color:var(--on-primary);}
.card-lavender{background:var(--brand-lavender);color:var(--ink);}
.card-peach{background:var(--brand-peach);color:var(--ink);}
.card-ochre{background:var(--brand-ochre);color:var(--ink);}
.card-hairline{background:var(--canvas);border:1px solid var(--hairline);border-radius:var(--r-lg);padding:var(--sp-md);}

/* ---------- 생각칸 ---------- */
.thought-box{background:var(--surface-soft);border-radius:var(--r-lg);padding:var(--sp-md);margin:var(--sp-md) 0;}
.thought-label{display:block;font-size:13px;font-weight:700;color:var(--body-strong);margin-bottom:6px;}
.thought-input{width:100%;min-height:64px;border:1px solid var(--hairline);border-radius:var(--r-md);padding:10px 12px;font:inherit;font-size:15px;resize:vertical;background:var(--canvas);color:var(--ink);}
.thought-input:focus{border-color:var(--sel);}
/* G3-05: S6 step2(원 묶기)처럼 캔버스와 한 화면에 같이 들어가는 생각칸만 여백·최소높이를 줄인
   변형(opts.compact). 문구·판정 로직·다른 화면의 기본 .thought-box는 무변경. */
.thought-box-compact{padding:var(--sp-sm);margin:var(--sp-sm) 0;}
.thought-box-compact .thought-input{min-height:40px;}

/* ---------- 칩 / 세그토글 ---------- */
.chips-row{display:flex;flex-wrap:wrap;gap:8px;margin:8px 0;}
.chip{min-height:44px;padding:8px 16px;border-radius:var(--r-pill);border:1px solid var(--hairline);background:var(--canvas);color:var(--body-c);font-size:14px;font-weight:600;cursor:pointer;}
.chip.active{background:var(--ink);color:var(--on-primary);border-color:var(--ink);}
.seg-toggle{display:inline-flex;background:var(--surface-strong);border-radius:var(--r-pill);padding:4px;gap:2px;flex-wrap:wrap;}
.seg-btn{min-height:44px;padding:6px 16px;border-radius:var(--r-pill);border:none;background:transparent;color:var(--muted);font-size:13px;font-weight:700;cursor:pointer;}
.seg-btn.active{background:var(--ink);color:var(--on-primary);}

/* ---------- 하이라이트 (x/y 색 강조) ---------- */
.highlight-row{display:flex;flex-wrap:wrap;gap:8px;margin:8px 0;}
.highlight-chip{padding:6px 14px;border-radius:var(--r-sm);font-weight:800;font-size:14px;}
.highlight-chip.tone-x{background:rgba(31,111,235,.14);color:#1355b0;}
.highlight-chip.tone-y{background:rgba(255,77,139,.16);color:#c22368;}
.hl-x{color:#1355b0;font-weight:800;}
.hl-y{color:#c22368;font-weight:800;}

/* ---------- 마스코트 ---------- */
.mascot-row{display:flex;align-items:flex-start;gap:10px;margin:var(--sp-sm) 0;}
.mascot-avatar{width:48px;height:48px;border-radius:50%;overflow:hidden;flex:none;background:var(--brand-lavender);display:flex;align-items:center;justify-content:center;font-size:22px;color:var(--ink);}
.mascot-avatar img{width:100%;height:100%;object-fit:cover;display:block;}
.mascot-avatar.mascot-fallback::after{content:'✦';}
.mascot-bubble{background:var(--canvas);border:1px solid var(--hairline);border-radius:var(--r-lg);border-top-left-radius:4px;padding:10px 14px;font-size:14px;color:var(--body-strong);max-width:560px;}
.mascot-bubble.tone-cheer{background:#fff8ec;border-color:var(--brand-ochre);}

/* ---------- 채팅 목업 (S1) ---------- */
.chat-mock{background:var(--surface-card);border-radius:var(--r-lg);padding:var(--sp-md);margin:var(--sp-md) 0;display:flex;flex-direction:column;gap:8px;}
.chat-bubble{max-width:78%;padding:10px 14px;border-radius:var(--r-lg);font-size:15px;}
.chat-bubble.me{align-self:flex-end;background:var(--ink);color:#fff;border-bottom-right-radius:4px;}
.chat-bubble.ai{align-self:flex-start;background:var(--canvas);border:1px solid var(--hairline);border-bottom-left-radius:4px;color:var(--muted-soft);}

/* ---------- 카드 매칭 미니 (S2) ---------- */
.match-wrap{display:flex;gap:var(--sp-lg);flex-wrap:wrap;margin:var(--sp-sm) 0;}
.match-col{flex:1;min-width:200px;display:flex;flex-direction:column;gap:8px;}
.match-col-label{font-size:12px;font-weight:700;color:var(--muted);letter-spacing:.02em;}
.match-card{min-height:52px;padding:10px 14px;border-radius:var(--r-md);border:2px solid var(--hairline);background:var(--canvas);font-size:15px;font-weight:600;cursor:pointer;text-align:left;touch-action:none;user-select:none;}
.match-card.input-card{border-color:#1f6feb44;}
.match-card.selected{border-color:var(--sel);box-shadow:0 0 0 3px rgba(47,109,240,.16);}
.match-card.used{opacity:.4;}
.match-card.dragging{opacity:.5;}
.match-slot{min-height:52px;padding:10px 14px;border-radius:var(--r-md);border:2px dashed var(--hairline-soft);background:var(--surface-soft);font-size:15px;font-weight:600;display:flex;align-items:center;justify-content:space-between;gap:8px;cursor:pointer;}
.match-slot .slot-hint{color:var(--muted-soft);font-weight:500;font-size:13px;}
.match-slot.filled{border-style:solid;border-color:var(--hairline);background:var(--canvas);}
.match-slot.correct{border-color:var(--safe);background:rgba(46,160,67,.1);}
.match-slot.wrong{border-color:var(--mine);}
/* ---- 카드 매칭 미니 축소판 + SVG 연결선(S2 step3) ---- */
.match-wrap.compact{position:relative;}
.match-col{position:relative;z-index:1;}
.match-card.compact,.match-slot.compact{min-height:44px;max-width:190px;padding:8px 12px;font-size:13px;}
.match-svg{position:absolute;inset:0;width:100%;height:100%;pointer-events:none;z-index:0;}
.match-svg .conn{stroke:var(--sel);stroke-width:3;stroke-linecap:round;}
.match-svg .conn.wrong{stroke:var(--mine);}
.match-svg .conn.live{stroke:var(--muted-soft);stroke-dasharray:4 3;}

/* ---------- 뒤집기 카드 (S3/S4) ---------- */
.flip-card{perspective:1200px;min-height:132px;cursor:pointer;}
.flip-card-inner{position:relative;width:100%;height:100%;min-height:132px;transition:transform .5s cubic-bezier(.4,.2,.2,1);transform-style:preserve-3d;}
.flip-card.flipped .flip-card-inner{transform:rotateY(180deg);}
.flip-face{position:absolute;inset:0;backface-visibility:hidden;border-radius:var(--r-xl);padding:var(--sp-md);display:flex;flex-direction:column;justify-content:center;}
.flip-face.back{transform:rotateY(180deg);}
.flip-hint{font-size:12px;font-weight:700;opacity:.75;margin-top:6px;}

/* ---------- 모드 카드 그리드 (S4) ---------- */
.mode-card-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:var(--sp-md);margin:var(--sp-md) 0;}

/* ---------- 정의 카드(단일, S3) ---------- */
.def-card-wrap{max-width:520px;}

/* ---------- 스테이지 선택 ---------- */
.stage-select{margin:var(--sp-sm) 0;}
.stage-grid{display:flex;flex-wrap:wrap;gap:10px;}
.stage-tile{min-width:70px;min-height:56px;border-radius:var(--r-md);border:2px solid var(--hairline);background:var(--canvas);cursor:pointer;padding:6px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;}
.stage-tile .stage-id{font-weight:800;font-size:14px;color:var(--ink);}
.stage-tile .stars{font-size:11px;color:var(--brand-ochre);letter-spacing:1px;}
.stage-tile.cleared{border-color:var(--safe);background:rgba(46,160,67,.08);}
.stage-tile.locked{opacity:.4;cursor:not-allowed;}
.stage-tile.current{border-color:var(--sel);box-shadow:0 0 0 3px rgba(47,109,240,.16);}

/* ---------- 규칙/원리 카드 ---------- */
.rule-card{background:var(--surface-soft);border-radius:var(--r-lg);padding:var(--sp-md);margin:var(--sp-sm) 0;font-size:14px;color:var(--body-strong);}
.rule-card b{color:var(--ink);}

/* ---------- 게임 보드(Canvas) ---------- */
.grid-board-wrap{overflow:auto;border:1px solid var(--hairline);border-radius:var(--r-lg);background:var(--canvas);max-width:100%;max-height:100%;touch-action:none;}
/* G2-C BLOCKING-1-잔여 수정: 탭(pointerdown 즉시 활성화, 드래그 없음) 전용 보드 래퍼만
   터치 팬을 허용해 오버플로 행에 손가락으로 도달할 수 있게 한다. RL 만들기·군집(드래그
   기반) 래퍼는 기존 touch-action:none을 그대로 유지(무변경). */
.grid-board-wrap.tapscroll{touch-action:pan-x pan-y;}
.board-canvas{display:block;cursor:pointer;}
.board-legend{display:flex;flex-wrap:wrap;gap:14px;margin:8px 0;font-size:13px;color:var(--body-c);}
.board-legend .legend-item{display:flex;align-items:center;gap:6px;}
.legend-dot{width:14px;height:14px;border-radius:50%;display:inline-block;}
.board-status{font-size:13px;color:var(--muted);margin:4px 0;min-height:18px;}

/* ---------- 화살표 명령 (스테이지1) ---------- */
.arrow-card-row{display:flex;gap:8px;flex-wrap:wrap;margin:8px 0;}
.arrow-card{min-width:56px;min-height:56px;border-radius:var(--r-md);border:2px solid var(--hairline);background:var(--canvas);font-size:22px;font-weight:800;cursor:pointer;touch-action:manipulation;color:var(--ink);}
.arrow-card:active{transform:scale(.94);}
.queue-track{display:flex;flex-wrap:wrap;gap:6px;min-height:52px;padding:8px;border-radius:var(--r-md);background:var(--surface-soft);border:1px dashed var(--hairline-soft);align-items:center;}
.queue-chip{min-width:36px;min-height:36px;display:inline-flex;align-items:center;justify-content:center;border-radius:var(--r-sm);background:var(--canvas);border:1px solid var(--hairline);font-weight:800;font-size:16px;cursor:pointer;color:var(--ink);}
.queue-empty{color:var(--muted-soft);font-size:13px;padding:6px;}

/* ---------- x,y 표 ---------- */
.xy-wrap{overflow-x:auto;margin:8px 0;}
.xy-table{border-collapse:separate;border-spacing:0;font-size:14px;}
.xy-table th,.xy-table td{border:1px solid var(--hairline);padding:6px 10px;text-align:center;}
.xy-table th{background:var(--surface-soft);font-weight:700;color:var(--body-strong);}
.xy-input{width:52px;min-height:44px;text-align:center;border:1px solid var(--hairline);border-radius:var(--r-sm);font:inherit;font-size:15px;font-weight:700;}
.xy-input.correct{border-color:var(--safe);background:rgba(46,160,67,.12);color:#1e7a34;}
.xy-input.wrong{animation:shakeX .4s ease;border-color:var(--mine);}

/* ---------- 함수 입력기 ---------- */
.func-panel{background:var(--surface-soft);border-radius:var(--r-lg);padding:var(--sp-md);margin:8px 0;}
.coef-row{display:flex;align-items:center;gap:10px;margin:8px 0;flex-wrap:wrap;}
.coef-label{min-width:96px;font-weight:700;font-size:14px;color:var(--body-strong);}
.stepper-group{display:flex;align-items:center;gap:6px;}
.stepper-btn{width:44px;height:44px;border-radius:50%;border:1px solid var(--hairline);background:var(--canvas);font-size:17px;font-weight:800;cursor:pointer;touch-action:manipulation;}
.stepper-val{min-width:56px;text-align:center;font-weight:800;font-size:15px;color:var(--ink);}
.func-expr{font-family:ui-monospace,'Consolas',monospace;font-size:16px;font-weight:700;color:var(--body-strong);background:var(--canvas);border:1px solid var(--hairline);border-radius:var(--r-sm);padding:8px 12px;display:inline-block;}

/* ---------- 강화학습 컨트롤 ---------- */
.rl-toolbar{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin:8px 0;}
.rl-stat-row{display:flex;gap:10px;flex-wrap:wrap;font-size:13px;color:var(--body-c);margin:6px 0;}
.stat-pill{background:var(--surface-card);border-radius:var(--r-pill);padding:5px 12px;font-weight:700;}

/* ---------- 별점 ---------- */
.star-rating{display:inline-flex;gap:2px;font-size:22px;color:var(--hairline);}
.star-rating .star.on{color:var(--brand-ochre);}
.star-pop{display:inline-block;}

/* ---------- 군집 ---------- */
.cluster-toolbar{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin:8px 0;}

/* ---------- 퀴즈3 ---------- */
/* margin sp-sm(12px)→sp-xs(8px)(G3-05): S7 step2(퀴즈 3문항)가 800×640에서 8px 오버플로.
   블록 3개 사이 collapse 간격만 줄어들고(첫 블록 top은 앞 h2의 12px에 눌려 그대로),
   문항 간 여백·문구·판정 로직은 무변경. */
.quiz3-block{background:var(--surface-soft);border-radius:var(--r-lg);padding:var(--sp-md);margin:var(--sp-xs) 0;}
.quiz3-question{font-weight:700;color:var(--body-strong);margin-bottom:8px;}
.quiz3-options{display:flex;gap:8px;flex-wrap:wrap;}
.quiz3-opt{min-height:44px;padding:8px 16px;border-radius:var(--r-md);border:2px solid var(--hairline);background:var(--canvas);font-weight:600;cursor:pointer;}
.quiz3-opt.correct{border-color:var(--safe);background:rgba(46,160,67,.12);color:#1e7a34;}
.quiz3-opt.wrong{border-color:var(--mine);animation:shakeX .4s ease;}
.quiz3-opt:disabled{cursor:default;}

/* ---------- 비교 표 (S7) ---------- */
.compare-wrap{overflow-x:auto;margin:8px 0;}
.compare-table{border-collapse:separate;border-spacing:0;font-size:14px;width:100%;min-width:520px;}
.compare-table th,.compare-table td{border:1px solid var(--hairline);padding:10px 12px;text-align:left;}
.compare-table th{background:var(--surface-soft);color:var(--body-strong);}

/* ---------- 넥스트 티저 / 토스트 ---------- */
.next-tease{display:flex;align-items:center;gap:8px;background:var(--surface-card);border-radius:var(--r-pill);padding:10px 18px;font-weight:700;color:var(--body-strong);width:fit-content;margin-top:var(--sp-sm);}
.toast{position:fixed;left:50%;bottom:88px;transform:translateX(-50%);background:var(--ink);color:#fff;padding:10px 18px;border-radius:var(--r-pill);font-size:14px;z-index:60;}
.toast:empty{display:none;}

/* ---------- 하단 내비 ---------- */
.bottom-nav{flex:none;background:var(--canvas);border-top:1px solid var(--hairline);padding:10px var(--sp-md);display:flex;align-items:center;justify-content:space-between;gap:var(--sp-sm);z-index:30;}
.nav-status{font-size:12px;color:var(--muted);}

/* ---------- 교사 패널 ---------- */
.teacher-panel{display:none;position:fixed;inset:0;background:rgba(10,10,10,.5);z-index:80;align-items:center;justify-content:center;padding:var(--sp-md);}
.teacher-panel.open{display:flex;}
.teacher-card{background:var(--canvas);border-radius:var(--r-xl);padding:var(--sp-xl);max-width:420px;width:100%;}

/* ---------- 게임필 ---------- */
.fx-pop{animation:fxPop .32s cubic-bezier(.34,1.56,.64,1);}
@keyframes fxPop{0%{transform:scale(1);}45%{transform:scale(1.14);}100%{transform:scale(1);}}
.fx-shake{animation:shakeX .4s ease;}
@keyframes shakeX{0%,100%{transform:translateX(0);}20%{transform:translateX(-4px);}40%{transform:translateX(4px);}60%{transform:translateX(-3px);}80%{transform:translateX(3px);}}
.confetti-piece{position:absolute;width:8px;height:8px;border-radius:2px;pointer-events:none;}

@media (prefers-reduced-motion: reduce){
  *{animation-duration:.001s !important; transition-duration:.001s !important;}
  .flip-card-inner{transition-duration:.001s !important;}
}
@media (max-width:600px){
  .app-shell{padding:0 var(--sp-sm);}
  .match-wrap{gap:var(--sp-md);}
}
</style>
</head>
<body>
<div class="app-shell">
  <header class="app-header">
    <div class="header-top">
      <button type="button" class="app-title-btn" id="appTitleBtn" aria-label="AI는 어떻게 생각을 할까 학습지, 다섯 번 누르면 교사 패널">
        <span class="app-title" id="appTitle">AI는 어떻게 생각을 할까?</span>
      </button>
      <span class="mascot-mini" id="mascotMini" aria-hidden="true"></span>
    </div>
    <div class="section-tag" id="sectionTag">섹션1 · 사고과정과 인공지능</div>
    <div class="progress-track" id="progressTrack"></div>
  </header>
  <main class="screen-root" id="screenRoot" tabindex="-1"></main>
  <nav class="bottom-nav">
    <button type="button" class="btn btn-secondary" id="prevBtn">이전</button>
    <span class="nav-status" id="navStatus" aria-live="off">1 / 7</span>
    <button type="button" class="btn btn-primary" id="nextBtn">다음</button>
  </nav>
</div>

<div class="teacher-panel" id="teacherPanel">
  <div class="teacher-card" role="dialog" aria-modal="true" aria-labelledby="teacherTitle">
    <h2 id="teacherTitle">교사 패널</h2>
    <p class="muted">이 학습지의 저장 데이터(aimath26_ai_ 네임스페이스)만 초기화합니다. 다른 학습지에는 영향이 없습니다.</p>
    <div id="teacherConfirmArea"></div>
    <div class="btn-row" style="margin-top:var(--sp-md);">
      <button type="button" class="btn btn-primary" id="teacherResetBtn">전체 초기화</button>
      <button type="button" class="btn btn-secondary" id="teacherCloseBtn">닫기</button>
    </div>
  </div>
</div>

<div class="toast" id="toast" role="status" aria-live="polite"></div>
<div class="sr-only" id="liveRegion" aria-live="polite"></div>

<script src="katex/katex.min.js"></script>
<script>
(function(){
'use strict';

/* ============================================================
   1) STATE — 전역 상태 + localStorage (네임스페이스 aimath26_ai_)
   ============================================================ */
var STORAGE_KEY = 'aimath26_ai_state';

function mergeDefaults(def, saved){
  if(Array.isArray(def)){
    return Array.isArray(saved) ? saved : def.slice();
  }
  if(def && typeof def === 'object'){
    var keys = Object.keys(def);
    if(keys.length === 0){
      /* 스키마 없는 동적 사전(클리어맵·별점맵 등) — 저장된 값을 통째로 신뢰해 복원 */
      return (saved && typeof saved === 'object' && !Array.isArray(saved)) ? saved : {};
    }
    var out = {};
    for(var k in def){ out[k] = mergeDefaults(def[k], saved ? saved[k] : undefined); }
    return out;
  }
  return saved !== undefined ? saved : def;
}

function emptyStageProgress(){ return { cleared:{}, stars:{} }; }

function DEFAULT_STATE(){
  return {
    version: 2,
    screenId: 's1',
    screens: {
      s1: { step:0, thought:'' },
      s2: { step:0, thought:'', match:{} },
      s3: { step:0, flipped:false },
      s4: { step:0, thought:'', flipped:{ sup:false, uns:false, rl:false } },
      s5: {
        step:0,
        ui: { mode:'supervised', supStage:1, tier:null, rlSub:'watch', watchPreset:'line', supTab:'vanilla', deduceIdx:null, coordpickIdx:null },
        supervised: { 1:emptyStageProgress(), 2:emptyStageProgress(), 3:emptyStageProgress() },
        deduce: emptyStageProgress(),
        coordpick: emptyStageProgress(),
        rl: { watched:{ line:false, curve:false, maze:false }, watchRegen:{ line:0, curve:0, maze:0 }, builtCount:0 }
      },
      s6: { step:0, circles:[], autoRun:false, thought:'', thoughtWhy:'' },
      s7: { step:0, quiz:{ q1:null, q2:null, q3:null }, thought:'' }
    }
  };
}

var STATE = {
  data: null,
  load: function(){
    var loaded = null;
    try{
      var raw = localStorage.getItem(STORAGE_KEY);
      if(raw) loaded = JSON.parse(raw);
    }catch(e){ loaded = null; }
    /* 상태 v2 마이그레이션: 구버전(version!==2) 저장분은 폐기하고 기본값으로 시작한다(캠프 전·실데이터 없음, 교사 리셋 존재). */
    if(loaded && loaded.version !== 2){ loaded = null; }
    this.data = mergeDefaults(DEFAULT_STATE(), loaded);
    /* 손상된 저장값(변조·확장프로그램 등) 방어(G3-15): 존재하지 않는 화면·범위 밖 step으로
       부팅해 빈 화면·TypeError가 나는 걸 막는다. */
    if(!SCREEN_DEFS.some(function(s){ return s.id === STATE.data.screenId; })) STATE.data.screenId = 's1';
    var curMod = SCREENS[STATE.data.screenId], curSt = STATE.data.screens[STATE.data.screenId];
    var stepN = (curMod && curMod.steps) ? curMod.steps.length : 0;
    if(stepN && curSt && (typeof curSt.step !== 'number' || curSt.step < 0 || curSt.step >= stepN)) curSt.step = 0;
    this.save(); /* 진입 즉시 영속 (resume 3겹 중 1겹) */
  },
  save: function(){
    try{ localStorage.setItem(STORAGE_KEY, JSON.stringify(this.data)); }catch(e){}
  },
  reset: function(){
    try{
      var keys = Object.keys(localStorage);
      for(var i=0;i<keys.length;i++){ if(keys[i].indexOf('aimath26_ai_') === 0) localStorage.removeItem(keys[i]); }
    }catch(e){}
    this.data = DEFAULT_STATE();
    this.save();
  },
  screen: function(id){ return this.data.screens[id]; }
};

/* ============================================================
   2) ROUTER — 화면 목록·이동·진행바
   ============================================================ */
var SCREEN_DEFS = [
  {id:'s1', section:1, label:'"밥 먹었니?" 채팅'},
  {id:'s2', section:1, label:'사고과정 미니 체험'},
  {id:'s3', section:1, label:'오늘의 학습목표'},
  {id:'s4', section:1, label:'어떻게 가르칠까?'},
  {id:'s5', section:2, label:'지뢰를 찾고, 안전하게 집으로 가자!'},
  {id:'s6', section:3, label:'무리 짓기(군집)'},
  {id:'s7', section:4, label:'정리'}
];
var SECTION_LABEL = {
  1:'섹션1 · 사고과정과 인공지능',
  2:'섹션2 · 지뢰찾기 게임',
  3:'섹션3 · 비지도학습 미니 체험',
  4:'섹션4 · 정리'
};

/* ---- KaTeX 렌더 헬퍼: [data-katex] 전부에 수식을 그린다. katex 미로드 시 원문 텍스트로 폴백. ---- */
function renderMath(root){
  if(!root || !root.querySelectorAll) return;
  var nodes = root.querySelectorAll('[data-katex]');
  for(var i=0;i<nodes.length;i++){
    var node = nodes[i];
    var tex = node.getAttribute('data-katex') || '';
    if(typeof katex === 'undefined'){
      node.textContent = tex;
      continue;
    }
    try{ katex.render(tex, node, {throwOnError:false}); }
    catch(e){ node.textContent = tex; }
  }
}

/* ---- 서브 슬라이드 엔진 헬퍼: SCREENS[id].steps(선택 배열) 위에서 화면·step 이동을 통일 처리한다.
   steps 미정의 화면은 기존과 동일하게 mod.mount(container) 한 번만 호출된다(하위호환). ---- */
function currentMod(){ return SCREENS[STATE.data.screenId]; }
function stepCountOf(mod){ return (mod && mod.steps && mod.steps.length) ? mod.steps.length : 0; }
function currentStepIdx(){
  var mod = currentMod();
  var n = stepCountOf(mod);
  if(!n) return 0;
  var st = STATE.screen(STATE.data.screenId);
  var idx = (st && typeof st.step === 'number') ? st.step : 0;
  if(idx < 0) idx = 0;
  if(idx > n-1) idx = n-1;
  return idx;
}
function mountCurrentView(pane){
  var mod = currentMod();
  if(!mod) return mod;
  /* S5(게임 화면)만 페이지 스크롤 안전밸브를 끈다(G2-C, .view-pane.pane-game 참고).
     보드 실측(computeSquareCellPx 등)이 mount() 내부에서 동기 실행되므로, 실측이 기대하는
     레이아웃 클래스는 mount 호출 전에 걸어 둬야 clientWidth/Height가 정확히 잡힌다. */
  pane.classList.toggle('pane-game', STATE.data.screenId === 's5');
  var n = stepCountOf(mod);
  if(n){
    var idx = currentStepIdx();
    mod.steps[idx].mount(pane);
    renderStepDots(pane, mod, idx);
  } else {
    mod.mount(pane);
  }
  renderMath(pane);
  return mod;
}
function renderStepDots(pane, mod, idx){
  if(!mod.steps || mod.steps.length<2) return;
  var row = el('div', {class:'step-dots'});
  for(var i=0;i<mod.steps.length;i++){
    row.appendChild(el('span', {class:'step-dot'+(i===idx?' active':''), 'aria-hidden':'true'}));
  }
  row.appendChild(el('span', {class:'sr-only'}, (idx+1) + ' / ' + mod.steps.length + ' 단계'));
  pane.insertBefore(row, pane.firstChild);
}
function focusView(pane){
  var heading = pane.querySelector('h1, h2');
  var target = heading || pane;
  if(!target.hasAttribute('tabindex')) target.setAttribute('tabindex', '-1');
  target.focus({preventScroll:true});
}
/* refresh()(같은 화면 내 재구성) 전용 포커스 착지(G3-02): 제목으로 강탈하지 않고
   호출부가 지정한 조작 원점(selector)이 있으면 그곳, 없으면 새로 그려진 영역의 첫 컨트롤로 되돌린다.
   둘 다 못 찾으면(빈 목록 등) focusView로 안전 폴백한다. */
function focusFirstControl(pane, selector){
  var target = selector ? pane.querySelector(selector) : null;
  if(!target){
    target = pane.querySelector('button:not([disabled]), a[href], input:not([disabled]), select:not([disabled]), textarea:not([disabled]), [tabindex]:not([tabindex="-1"])');
  }
  if(!target){ focusView(pane); return; }
  target.focus({preventScroll:true});
}
function announceViewChange(def){
  var mod = currentMod();
  var n = stepCountOf(mod);
  if(n){ announce(def.label + ' 화면, ' + (currentStepIdx()+1) + ' / ' + n + ' 단계'); }
  else { announce(def.label + ' 화면'); }
}

var ROUTER = {
  screenEl: null,
  activePane: null,
  _transitioning: false,
  _transitionTimer: null,
  index: function(id){ for(var i=0;i<SCREEN_DEFS.length;i++){ if(SCREEN_DEFS[i].id===id) return i; } return -1; },
  stepCount: function(mod){ return stepCountOf(mod); },
  go: function(id, opts){
    opts = opts || {};
    if(this.index(id) < 0 || this._transitioning) return;
    var curMod = currentMod();
    if(curMod && curMod.onStepExit && id !== STATE.data.screenId) curMod.onStepExit(currentStepIdx());
    var mod = SCREENS[id];
    var tgtState = STATE.data.screens[id];
    var n = stepCountOf(mod);
    if(n){
      if(opts.enterStep === 'last') tgtState.step = n-1;
      else if(opts.enterStep === 'first') tgtState.step = 0;
      else if(typeof tgtState.step !== 'number' || tgtState.step<0 || tgtState.step>=n) tgtState.step = 0;
    }
    STATE.data.screenId = id;
    STATE.save();
    this.transitionTo(opts.dir || 'next', {silent: opts.silent});
  },
  canGoNext: function(){
    var mod = currentMod();
    if(!mod) return true;
    var n = stepCountOf(mod);
    if(n){
      var step = mod.steps[currentStepIdx()];
      return step && typeof step.isComplete === 'function' ? !!step.isComplete() : true;
    }
    return typeof mod.isComplete === 'function' ? !!mod.isComplete() : true;
  },
  next: function(){
    if(this._transitioning) return;
    var mod = currentMod();
    var n = stepCountOf(mod);
    if(n){
      var stAll = STATE.screen(STATE.data.screenId);
      var idx = (typeof stAll.step === 'number') ? stAll.step : 0;
      if(idx < n-1){
        if(!this.canGoNext()) return;
        if(mod.onStepExit) mod.onStepExit(idx);
        stAll.step = idx+1;
        STATE.save();
        this.transitionTo('next', {});
        return;
      }
    }
    if(!this.canGoNext()) return;
    if(mod && mod.onStepExit) mod.onStepExit(currentStepIdx());
    var i = this.index(STATE.data.screenId);
    if(i < SCREEN_DEFS.length-1) this.go(SCREEN_DEFS[i+1].id, {dir:'next', enterStep:'first'});
  },
  prev: function(){
    if(this._transitioning) return;
    var mod = currentMod();
    var n = stepCountOf(mod);
    if(n){
      var stAll = STATE.screen(STATE.data.screenId);
      var idx = (typeof stAll.step === 'number') ? stAll.step : 0;
      if(idx > 0){
        if(mod.onStepExit) mod.onStepExit(idx);
        stAll.step = idx-1;
        STATE.save();
        this.transitionTo('prev', {});
        return;
      }
    }
    var i = this.index(STATE.data.screenId);
    if(i>0){
      if(mod && mod.onStepExit) mod.onStepExit(currentStepIdx());
      this.go(SCREEN_DEFS[i-1].id, {dir:'prev', enterStep:'last'});
    }
  },
  refresh: function(focusSelector){
    /* 화면·step을 새로 이동하지 않고 같은 위치를 다시 그려야 할 때(스테이지 진입 등) — 전환 애니메이션 없이 즉시 교체.
       render()와 달리 포커스를 화면 제목으로 강탈하지 않는다(G3-02) — 호출부가 넘긴 focusSelector(조작
       원점)가 있으면 그곳, 없으면 새로 그려진 영역의 첫 컨트롤로 포커스를 되돌린다. */
    this._rebuild();
    focusFirstControl(this.activePane, focusSelector);
  },
  render: function(){
    /* 최초 부팅·교사 리셋 등: 전환 애니메이션 없이 현재 위치를 그대로 그리고 제목에 포커스한다(하우스 규칙③) */
    this._rebuild();
    focusView(this.activePane);
  },
  _rebuild: function(){
    /* render()·refresh() 공용 재그리기. 대기 중인 전환 타이머가 있으면 취소해(G3-01) 스테일
       activePane 참조·pane 누수를 막는다 — transitionTo의 300ms 타이머가 나중에 발화하며
       activePane을 이미 DOM에서 떨어져나간 newPane으로 덮어써, 다음 실제 전환이 지금 새로 그린
       pane을 영영 못 지우는 문제가 있었다. */
    if(this._transitionTimer){ clearTimeout(this._transitionTimer); this._transitionTimer = null; }
    this._transitioning = false;
    var i = this.index(STATE.data.screenId);
    var def = SCREEN_DEFS[i];
    this.screenEl.innerHTML = '';
    var pane = el('div', {class:'view-pane pane-active'});
    this.screenEl.appendChild(pane);
    mountCurrentView(pane);
    this.activePane = pane;
    renderProgress(i, def);
    renderNav(i);
  },
  transitionTo: function(dir, opts){
    opts = opts || {};
    var self = this;
    var i = this.index(STATE.data.screenId);
    var def = SCREEN_DEFS[i];
    var oldPane = this.activePane;
    var newPane = el('div', {class:'view-pane'});
    this.screenEl.appendChild(newPane);
    mountCurrentView(newPane);
    renderProgress(i, def);
    renderNav(i);
    if(FX.reducedMotion){
      if(oldPane) oldPane.remove();
      newPane.classList.add('pane-active');
      this.activePane = newPane;
      focusView(newPane);
      if(!opts.silent) announceViewChange(def);
      return;
    }
    var enterCls = dir==='prev' ? 'pane-enter-left' : 'pane-enter-right';
    var exitCls = dir==='prev' ? 'pane-exit-right' : 'pane-exit-left';
    self._transitioning = true;
    newPane.classList.add(enterCls);
    void newPane.offsetWidth; /* 강제 리플로우로 진입 시작 상태를 확정한 뒤, 다음 프레임에 목표 상태로 전환한다(FLIP 기법) */
    if(oldPane) oldPane.classList.add(exitCls);
    requestAnimationFrame(function(){
      newPane.classList.remove(enterCls);
      newPane.classList.add('pane-active');
    });
    if(self._transitionTimer){ clearTimeout(self._transitionTimer); }
    self._transitionTimer = setTimeout(function(){
      self._transitionTimer = null;
      if(oldPane) oldPane.remove();
      self.activePane = newPane;
      self._transitioning = false;
      focusView(newPane);

function renderNav(i){
  var prevBtn = document.getElementById('prevBtn');
  var nextBtn = document.getElementById('nextBtn');
  var status = document.getElementById('navStatus');
  var mod = SCREENS[SCREEN_DEFS[i].id];
  var n = stepCountOf(mod);
  var stepIdx = n ? currentStepIdx() : 0;
  var atFirstStep = !n || stepIdx===0;
  var atLastStep = !n || stepIdx===n-1;
  prevBtn.style.visibility = (i>0 || !atFirstStep) ? 'visible' : 'hidden';
  var isLast = (i === SCREEN_DEFS.length-1) && atLastStep;
  nextBtn.textContent = isLast ? '완료' : '다음';
  var enabled = ROUTER.canGoNext();
  /* 마지막 화면·마지막 step도 게이팅 규칙은 동일하게 적용한다(완료 버튼이 실제 완료 여부를 보여줘야 함).
     ROUTER.next()가 마지막 위치에서는 어차피 이동하지 않으므로 활성화돼도 부작용은 없다. */
  setDisabled(nextBtn, !enabled);
  var stepTxt = n>1 ? (' · ' + (stepIdx+1) + '/' + n + '단계') : '';
  status.textContent = (i+1) + ' / ' + SCREEN_DEFS.length + ' · ' + SCREEN_DEFS[i].label + stepTxt;

   3) COMPONENTS — 상속 컴포넌트 팩토리
   ============================================================ */
function el(tag, attrs, children){
  var e = document.createElement(tag);
  if(attrs){
    for(var k in attrs){
      var v = attrs[k];
      if(v == null) continue;
      if(k === 'class') e.className = v;
      else if(k === 'html') e.innerHTML = v;
      else if(k.indexOf('on') === 0 && typeof v === 'function') e.addEventListener(k.slice(2), v);
      else if(k === 'style' && typeof v === 'object'){ for(var sk in v) e.style[sk] = v[sk]; }
      else e.setAttribute(k, v);
    }
  }
  if(children){
    (Array.isArray(children) ? children : [children]).forEach(function(c){
      if(c == null) return;
      e.appendChild(typeof c === 'string' ? document.createTextNode(c) : c);
    });
  }
  return e;
}

function setDisabled(btn, disabled){
  var hadFocus = document.activeElement === btn;
  btn.disabled = disabled;
  if(disabled && hadFocus){
    var root = document.getElementById('screenRoot');
    if(root) root.focus({preventScroll:true});
  }
}

function announce(msg){
  var lr = document.getElementById('liveRegion');
  if(lr) lr.textContent = msg;
}

var toastTimer = null;
function toast(msg){
  var t = document.getElementById('toast');
  if(!t) return;
  t.textContent = msg;
  clearTimeout(toastTimer);
  toastTimer = setTimeout(function(){ t.textContent = ''; }, 2200);
}

var fxSeedRng = null;

/* ============================================================
   6) LOGIC — 순수 함수 (검증 대상, window.__AI 로 노출)
   verify_ai.py로 독립 재검증을 통과한 알고리즘을 그대로 이식했다.
   무작위는 전부 시드 PRNG(mulberry32)로만 하며 브라우저 기본 난수 함수를 직접 쓰지 않는다.
   ============================================================ */

/* ---- 시드 PRNG (mulberry32) + JS 반올림 ---- */
function mulberry32(a){
  return function(){
    a |= 0; a = a + 0x6D2B79F5 | 0;
    var t = Math.imul(a ^ a >>> 15, 1 | a);
    t = t + Math.imul(t ^ t >>> 7, 61 | t) | 0;
    return ((t ^ t >>> 14) >>> 0) / 4294967296;
  };
}
function jsRound(x){ return Math.round(x); } /* JS Math.round는 항상 +Infinity 쪽 (예: -0.5 -> -0) */

/* ---- 격자 유틸 (명세 9.1) ---- */
var DIRS4 = [[1,0],[-1,0],[0,1],[0,-1]]; /* 동,서,북,남 */
function inBounds(x,y,N){ return x>=0 && x<N && y>=0 && y<N; }
function manhattan(a,b){ return Math.abs(a[0]-b[0]) + Math.abs(a[1]-b[1]); }
function ptKey(x,y){ return x*1000+y; }
function keyToPt(k){ return [Math.floor(k/1000), k%1000]; }
function samePt(a,b){ return a[0]===b[0] && a[1]===b[1]; }

function staircase(p1,p2){
  var x1=p1[0],y1=p1[1],x2=p2[0],y2=p2[1];
  var pts=[[x1,y1]];
  var stepx = x2>x1 ? 1 : (x2<x1 ? -1 : 0);
  var x=x1;
  while(x!==x2){ x+=stepx; pts.push([x,y1]); }
  var stepy = y2>y1 ? 1 : (y2<y1 ? -1 : 0);
  var y=y1;
  while(y!==y2){ y+=stepy; pts.push([x2,y]); }
  return pts;
}
function connectPath(points){
  var full=[points[0]];
  for(var i=1;i<points.length;i++){
    var seg = staircase(points[i-1], points[i]);
    for(var j=1;j<seg.length;j++) full.push(seg[j]);
  }
  return full;
}
function rngShuffle(arr, rng){
  for(var i=arr.length-1;i>0;i--){
    var j = Math.floor(rng()*(i+1));
    var tmp=arr[i]; arr[i]=arr[j]; arr[j]=tmp;
  }
}
function bfsReachable(N, minesSet, start, goal){
  var sk = ptKey(start[0],start[1]), gk = ptKey(goal[0],goal[1]);
  if(minesSet.has(sk) || minesSet.has(gk)) return false;
  var seen = new Set([sk]);
  var q = [start], qi = 0;
  while(qi < q.length){
    var cur = q[qi++];
    if(samePt(cur,goal)) return true;
    for(var d=0; d<4; d++){
      var nx=cur[0]+DIRS4[d][0], ny=cur[1]+DIRS4[d][1];
      var nk = ptKey(nx,ny);
      if(inBounds(nx,ny,N) && !minesSet.has(nk) && !seen.has(nk)){ seen.add(nk); q.push([nx,ny]); }
    }
  }
  return seen.has(gk);
}

/* ---- 레벨 절차 생성 (명세 9.4): 안전 경로를 먼저 만들고 그 밖에 지뢰를 놓는다 ---- */
function genWalkPath(N, start, goal, rng, bias, maxSteps){
  bias = bias==null ? 0.7 : bias;
  maxSteps = maxSteps==null ? 3*N : maxSteps;
  var path=[start];
  var visited = new Set([ptKey(start[0],start[1])]);
  var cur = start, steps=0;
  while(!samePt(cur,goal) && steps<maxSteps){
    var dx=goal[0]-cur[0], dy=goal[1]-cur[1];
    var toward=[];
    if(dx>0) toward.push([1,0]);
    if(dx<0) toward.push([-1,0]);
    if(dy>0) toward.push([0,1]);
    if(dy<0) toward.push([0,-1]);
    var useToward = (rng() < bias) && toward.length>0;
    var pool = useToward ? toward : DIRS4;
    var valid=[];
    for(var i=0;i<pool.length;i++){
      var nx=cur[0]+pool[i][0], ny=cur[1]+pool[i][1];
      if(inBounds(nx,ny,N) && !visited.has(ptKey(nx,ny))) valid.push([nx,ny]);
    }
    if(valid.length===0){
      for(var i2=0;i2<DIRS4.length;i2++){
        var nx2=cur[0]+DIRS4[i2][0], ny2=cur[1]+DIRS4[i2][1];
        if(inBounds(nx2,ny2,N) && !visited.has(ptKey(nx2,ny2))) valid.push([nx2,ny2]);
      }
    }
    if(valid.length===0) break;
    var nxt = valid[Math.floor(rng()*valid.length)];
    path.push(nxt); visited.add(ptKey(nxt[0],nxt[1])); cur=nxt; steps++;
  }
  if(!samePt(cur,goal)){
    var tail = staircase(cur, goal).slice(1);
    for(var k=0;k<tail.length;k++){ path.push(tail[k]); visited.add(ptKey(tail[k][0],tail[k][1])); }
  }
  return path;
}
function placeMines(N, forbiddenSet, count, rng){
  var candidates=[];
  for(var x=0;x<N;x++){ for(var y=0;y<N;y++){ if(!forbiddenSet.has(ptKey(x,y))) candidates.push([x,y]); } }
  rngShuffle(candidates, rng);
  var out = new Set();
  var n = Math.max(0, Math.min(count, candidates.length));
  for(var i=0;i<n;i++) out.add(ptKey(candidates[i][0], candidates[i][1]));
  return out;
}

function genStage1Level(N, mineCount, seed, bias, start, goal, maxSteps){
  bias = bias==null ? 0.7 : bias;
  start = start || [0,0];
  goal = goal || [N-1,N-1];
  maxSteps = maxSteps==null ? 3*N : maxSteps;
  var path, pathSet, forbidden, rng;
  for(var attempt=0; attempt<20; attempt++){
    rng = mulberry32((seed*1000003 + attempt*97) >>> 0);
    path = genWalkPath(N, start, goal, rng, bias, maxSteps);
    pathSet = new Set(path.map(function(p){ return ptKey(p[0],p[1]); }));
    forbidden = new Set(pathSet);
    forbidden.add(ptKey(start[0],start[1])); forbidden.add(ptKey(goal[0],goal[1]));
    var free = N*N - forbidden.size;
    if(free >= mineCount){
      var mines = placeMines(N, forbidden, mineCount, rng);
      return {N:N, start:start, goal:goal, path:path, mines:mines};
    }
  }
  var mines2 = placeMines(N, forbidden, mineCount, rng);
  return {N:N, start:start, goal:goal, path:path, mines:mines2};
}

/* 개정 §1.1 — 바닐라 9판(스테이지당 3티어). verify_ai.py stage1_tier/stage2_tier/stage3_tier와 값 동일(SSOT=py). */
var STAGE1_N_BY = [5,7,9];
var STAGE1_MINES_BY = [2,8,14];
function stage1Tier(tier){
  var i = tier-1;
  return {N:STAGE1_N_BY[i], mines:STAGE1_MINES_BY[i]};
}

var STAGE2_N_BY = [5,7,9];
var STAGE2_COLS_BY = [3,4,5];
var STAGE2_MINES_BY = [4,8,12];
function stage2Tier(tier){
  var i = tier-1;
  return {N:STAGE2_N_BY[i], cols:STAGE2_COLS_BY[i], mines:STAGE2_MINES_BY[i]};
}

var STAGE3_N_BY = [5,7,9];
var STAGE3_TYPE_BY = ['const','linear','quadratic'];
var STAGE3_MINES_BY = [4,8,12];
function stage3Tier(tier){
  var i = tier-1;
  return {N:STAGE3_N_BY[i], type:STAGE3_TYPE_BY[i], mines:STAGE3_MINES_BY[i]};
}
/* 바닐라 s3 프로덕션 시드(수정요청_S5-우회봉쇄-OOB주행-로봇집표시_v1 §3 D-A): t1·t2는 기존
   3000+tier 값을 그대로 유지하고, t3만 하위 차수(상수·일차)로 우회 가능한 지뢰 배치를
   봉쇄하는 시드로 교체했다. mountStage3Play·dumpAllBoards·verify_ai.py가 이 배열을
   3000+tier 하드코딩 대신 단일 소스로 참조한다(window.__AI.STAGE3_SEED_BY로도 노출). */
var STAGE3_SEED_BY = [3001, 3002, 100014];

function stage2Checkpoints(N, cols){
  var xs=[];
  for(var i=0;i<cols;i++){ xs.push(cols>1 ? jsRound(i*(N-1)/(cols-1)) : 0); }
  var seen={}, uniq=[];
  for(var j=0;j<xs.length;j++){ if(!seen[xs[j]]){ uniq.push(xs[j]); seen[xs[j]]=true; } }
  return uniq;
}

function genStage2Level(N, cols, mineCount, seed){
  var xs = stage2Checkpoints(N, cols);
  var start=[0,0], goal=[N-1,N-1];
  var waypoints, fullPath, forbidden, decoys, rng;
  for(var attempt=0; attempt<20; attempt++){
    rng = mulberry32((seed*1000003 + attempt*97) >>> 0);
    var ys=[]; ys[0] = Math.floor(rng()*N);
    var maxDelta = Math.max(2, Math.floor(N/3));
    for(var i=1;i<xs.length;i++){
      var prev=ys[i-1];
      var lo=Math.max(0,prev-maxDelta), hi=Math.min(N-1,prev+maxDelta);
      ys[i]=lo+Math.floor(rng()*(hi-lo+1));
    }
    waypoints = xs.map(function(x,idx){ return [x, ys[idx]]; });
    fullPath = connectPath([start].concat(waypoints, [goal]));
    var pathSet = new Set(fullPath.map(function(p){ return ptKey(p[0],p[1]); }));
    forbidden = new Set(pathSet);
    decoys = new Set();
    for(var wi=0; wi<waypoints.length; wi++){
      var wx=waypoints[wi][0], wy=waypoints[wi][1];
      var offs=[1,-1,2,-2];
      for(var oi=0;oi<offs.length;oi++){
        var cx=wx, cy=wy+offs[oi], ck=ptKey(cx,cy);
        if(inBounds(cx,cy,N) && !forbidden.has(ck) && !decoys.has(ck)){ decoys.add(ck); break; }
      }
    }
    var forbiddenPlusDecoys = new Set(forbidden); decoys.forEach(function(k){ forbiddenPlusDecoys.add(k); });
    var free = N*N - forbiddenPlusDecoys.size;
    var remaining = mineCount - decoys.size;
    if(free >= Math.max(0,remaining)){
      var extra = placeMines(N, forbiddenPlusDecoys, Math.max(0,remaining), rng);
      var mines = new Set(decoys); extra.forEach(function(k){ mines.add(k); });
      return {N:N, start:start, goal:goal, checkpoints:waypoints, path:fullPath, mines:mines, xs:xs};
    }
  }
  var forbiddenPlusDecoysF = new Set(forbidden); decoys.forEach(function(k){ forbiddenPlusDecoysF.add(k); });
  var extraF = placeMines(N, forbiddenPlusDecoysF, Math.max(0, mineCount-decoys.size), rng);
  var minesF = new Set(decoys); extraF.forEach(function(k){ minesF.add(k); });
  return {N:N, start:start, goal:goal, checkpoints:waypoints, path:fullPath, mines:minesF, xs:xs};
}

/* ---- 함수 평가·격자 매핑 (명세 9.2): 상수/일차/이차 통일형 f(x)=ax^2+bx+c ---- */
function evalF(a,b,c,x){ return jsRound(a*x*x + b*x + c); }

function genStage3Function(N, funcType, rng){
  if(funcType==='const'){
    var c0 = Math.floor(rng()*N);
    return {a:0, b:0, c:c0};
  }
  if(funcType==='linear'){
    var loSpan = Math.max(1, Math.floor((N-1)/3));
    var span = loSpan + Math.floor(rng()*(N-1-loSpan+1));
    span = Math.max(1, Math.min(span, N-1));
    var sign = rng()<0.5 ? 1 : -1;
    var a = sign*span/(N-1);
    var y0 = sign>0 ? Math.floor(rng()*(N-span)) : (span + Math.floor(rng()*(N-span)));
    return {a:0, b:a, c:y0};
  }
  if(funcType==='quadratic'){
    var h = Math.floor((N-1)/2);
    var loSpan2 = Math.max(1, Math.floor((N-1)/3));
    var span2 = loSpan2 + Math.floor(rng()*(N-1-loSpan2+1));
    span2 = Math.max(1, Math.min(span2, N-1));
    var sign2 = rng()<0.5 ? 1 : -1;
    var a2 = (h>0) ? Math.round((sign2*span2/(h*h))*10000)/10000 : 0;
    var k = sign2>0 ? Math.floor(rng()*Math.max(1,(N-span2))) : (span2 + Math.floor(rng()*Math.max(1,(N-span2))));
    var b2 = -2*a2*h;
    var c2 = a2*h*h + k;
    for(var guard=0; guard<10; guard++){
      var ok=true;
      for(var x=0;x<N;x++){ var y=evalF(a2,b2,c2,x); if(y<0 || y>N-1){ ok=false; break; } }
      if(ok) break;
      if(sign2>0) k=Math.max(0,k-1); else k=Math.min(N-1,k+1);
      c2 = a2*h*h + k;
    }
    return {a:a2, b:b2, c:c2};
  }
  throw new Error('unknown funcType: '+funcType);
}

function genStage3Level(N, funcType, mineCount, seed){
  var rng = mulberry32(seed);
  var f = genStage3Function(N, funcType, rng);
  var pts=[];
  for(var x=0;x<N;x++) pts.push([x, evalF(f.a,f.b,f.c,x)]);
  var start=[0,0], goal=[N-1,N-1];
  var fullPath = connectPath([start].concat(pts, [goal]));
  var pathSet = new Set(fullPath.map(function(p){ return ptKey(p[0],p[1]); }));
  var mines = placeMines(N, pathSet, mineCount, rng);
  return {N:N, start:start, goal:goal, f:f, pts:pts, path:fullPath, mines:mines};
}

/* ---- 경로 연결 판정 (명세 9.3, 강화 만들기) ---- */
function isPathConnected(points, start, goal){
  if(!points || points.length===0) return false;
  if(!samePt(points[0],start) || !samePt(points[points.length-1],goal)) return false;
  var seen = new Set();
  for(var i=0;i<points.length;i++){
    var k = ptKey(points[i][0], points[i][1]);
    if(seen.has(k)) return false; /* 재방문 = 분기/자기교차 금지 */
    seen.add(k);
  }
  for(var j=1;j<points.length;j++){
    if(manhattan(points[j-1], points[j]) !== 1) return false;
  }
  return true;
}

/* ---- 스테이지1 화살표 명령 실행 ---- */
function executeCommands(N, minesSet, start, goal, commands){
  var cur = start, trace=[cur];
  for(var i=0;i<commands.length;i++){
    var d = DIRS4[commands[i]];
    var nxt = [cur[0]+d[0], cur[1]+d[1]];
    if(!inBounds(nxt[0],nxt[1],N)) continue; /* 경계 밖 명령은 무시 */
    cur = nxt; trace.push(cur);
    if(minesSet.has(ptKey(cur[0],cur[1]))) return {success:false, hitMine:true, trace:trace};
  }
  return {success: samePt(cur,goal), hitMine:false, trace:trace};
}

/* ---- 강화학습 단순 시뮬 (명세 9.5) ---- */
var RL_PARAMS = {
  alpha: 0.5, epsStart: 0.3, epsEnd: 0.02, epsDecayFrac: 0.7,
  rewardProgress: 1.0, rewardStall: -0.3, rewardMine: -15.0, rewardGoal: 15.0,
  maxEpisodes: 200
};
function rlMaxSteps(N){ return 4*N + 20; }

function validDirs(pt, N){
  var out=[];
  for(var i=0;i<4;i++){
    var nx=pt[0]+DIRS4[i][0], ny=pt[1]+DIRS4[i][1];
    if(inBounds(nx,ny,N)) out.push(i);
  }
  return out;
}
function bfsDistMap(N, minesSet, goal){
  var dist = new Map();
  var gk = ptKey(goal[0],goal[1]);
  if(minesSet.has(gk)) return dist;
  dist.set(gk,0);
  var q=[goal], qi=0;
  while(qi<q.length){
    var cur=q[qi++]; var ck=ptKey(cur[0],cur[1]); var dcur=dist.get(ck);
    for(var d=0;d<4;d++){
      var nx=cur[0]+DIRS4[d][0], ny=cur[1]+DIRS4[d][1]; var nk=ptKey(nx,ny);
      if(inBounds(nx,ny,N) && !minesSet.has(nk) && !dist.has(nk)){ dist.set(nk, dcur+1); q.push([nx,ny]); }
    }
  }
  return dist;
}
function wKey(pt,d){ return ptKey(pt[0],pt[1])*4+d; }

function trainRL(N, minesSet, start, goal, seed, maxEpisodes){
  maxEpisodes = maxEpisodes==null ? RL_PARAMS.maxEpisodes : maxEpisodes;
  var rng = mulberry32(seed);
  var maxSteps = rlMaxSteps(N);
  var dmap = bfsDistMap(N, minesSet, goal);
  var w = new Map();
  function getw(pt,d){ var k=wKey(pt,d); return w.has(k)?w.get(k):0; }
  function setw(pt,d,v){ w.set(wKey(pt,d), v); }
  function argmaxDir(pt){
    var dirs = validDirs(pt,N);
    var best = -Infinity;
    for(var i=0;i<dirs.length;i++){ var v=getw(pt,dirs[i]); if(v>best) best=v; }
    var bests=[];
    for(var j=0;j<dirs.length;j++){ if(getw(pt,dirs[j])===best) bests.push(dirs[j]); }
    return bests[Math.floor(rng()*bests.length)];
  }
  var firstSuccessEp = null;
  var episodeSnapshots = []; /* 감상 재생용: 각 에피소드의 궤적 + 그 시점의 선호도(자신감 화살표용) */
  for(var ep=0; ep<maxEpisodes; ep++){
    var frac = Math.min(1, ep/(maxEpisodes*RL_PARAMS.epsDecayFrac));
    var eps = RL_PARAMS.epsStart + (RL_PARAMS.epsEnd-RL_PARAMS.epsStart)*frac;
    var cur = start;
    var trace=[cur];
    var hitMine=false, reachedGoal=false;
    for(var step=0; step<maxSteps; step++){
      var dirs = validDirs(cur,N);
      var d = (rng()<eps) ? dirs[Math.floor(rng()*dirs.length)] : argmaxDir(cur);
      var nxt = [cur[0]+DIRS4[d][0], cur[1]+DIRS4[d][1]];
      if(minesSet.has(ptKey(nxt[0],nxt[1]))){
        setw(cur,d, getw(cur,d) + RL_PARAMS.alpha*RL_PARAMS.rewardMine);
        trace.push(nxt); hitMine=true; break;
      }
      if(samePt(nxt,goal)){
        setw(cur,d, getw(cur,d) + RL_PARAMS.alpha*RL_PARAMS.rewardGoal);
        cur=nxt; trace.push(cur); reachedGoal=true; break;
      }
      var ck=ptKey(cur[0],cur[1]), nk=ptKey(nxt[0],nxt[1]);
      var d0 = dmap.has(ck)?dmap.get(ck):999, d1 = dmap.has(nk)?dmap.get(nk):999;
      var r = (d1<d0) ? RL_PARAMS.rewardProgress : RL_PARAMS.rewardStall;
      setw(cur,d, getw(cur,d) + RL_PARAMS.alpha*r);
      cur = nxt; trace.push(cur);
    }
    if(firstSuccessEp===null){
      var chk = greedyRollout(N, minesSet, start, goal, w, maxSteps);
      if(chk.success) firstSuccessEp = ep;
    }
    /* 스냅샷은 재생에 필요한 구간까지만 담아도 되지만, 보드가 작아(N<=9) 전량 저장해도 가볍다 */
    episodeSnapshots.push({trace:trace, hitMine:hitMine, reachedGoal:reachedGoal, wSnapshot:new Map(w)});
  }
  var final = greedyRollout(N, minesSet, start, goal, w, maxSteps);
  return {w:w, finalOk:final.success, finalTraj:final.trace, firstSuccessEp:firstSuccessEp, episodes:episodeSnapshots};
}
function greedyRollout(N, minesSet, start, goal, w, maxSteps){
  function getw(pt,d){ var k=wKey(pt,d); return w.has(k)?w.get(k):0; }
  var cur=start, traj=[cur];
  for(var step=0; step<maxSteps; step++){
    var dirs = validDirs(cur,N);
    var best=-Infinity;
    for(var i=0;i<dirs.length;i++){ var v=getw(cur,dirs[i]); if(v>best) best=v; }
    var bests=[];
    for(var j=0;j<dirs.length;j++){ if(getw(cur,dirs[j])===best) bests.push(dirs[j]); }
    var d = bests[0];
    var nxt=[cur[0]+DIRS4[d][0], cur[1]+DIRS4[d][1]];
    if(minesSet.has(ptKey(nxt[0],nxt[1]))) return {success:false, trace:traj};
    traj.push(nxt); cur=nxt;
    if(samePt(cur,goal)) return {success:true, trace:traj};
  }
  return {success:false, trace:traj};
}

var RL_PRESETS = {
  line:  {N:9, kind:'walk', bias:0.95, mines:6,  baseSeed:101, label:'직선'},
  curve: {N:9, kind:'func', ftype:'quadratic', mines:10, baseSeed:102, label:'곡선'},
  maze:  {N:9, kind:'walk', bias:0.5,  mines:16, baseSeed:103, label:'미로'}
};
function makeRLLevel(presetKey, regenIdx){
  var cfg = RL_PRESETS[presetKey];
  var seed = cfg.baseSeed + regenIdx;
  if(cfg.kind==='walk') return genStage1Level(cfg.N, cfg.mines, seed, cfg.bias);
  return genStage3Level(cfg.N, cfg.ftype, cfg.mines, seed);
}
function rlTrainSeedFor(presetKey, regenIdx){
  var cfg = RL_PRESETS[presetKey];
  return (cfg.baseSeed + regenIdx) * 7 + 1000;
}

/* ---- 군집 k-평균 (명세 9.6) ---- */
var CLUSTER_CONFIG = { dataSeed: 20260714, k: 3, kmeansSeed: 42, iters: 8 };
function genClusterData(seed){
  seed = seed==null ? CLUSTER_CONFIG.dataSeed : seed;
  var rng = mulberry32(seed);
  var blobs = [
    {label:'A', cx:5.2, cy:4.6, sx:0.7, sy:0.6, n:10},
    {label:'B', cx:1.2, cy:8.6, sx:0.6, sy:0.7, n:10},
    {label:'C', cx:3.2, cy:6.6, sx:0.6, sy:0.6, n:10}
  ];
  var pts=[];
  blobs.forEach(function(b){
    for(var i=0;i<b.n;i++){
      var x = b.cx + (rng()-0.5)*2*b.sx;
      var y = b.cy + (rng()-0.5)*2*b.sy;
      x = Math.max(0.2, Math.min(6.5, x));
      y = Math.max(3.5, Math.min(10.5, y));
      pts.push({x:Math.round(x*100)/100, y:Math.round(y*100)/100, trueLabel:b.label});
    }
  });
  return pts;
}
function kmeans(points, k, seed, iters){
  iters = iters==null ? CLUSTER_CONFIG.iters : iters;
  var rng = mulberry32(seed);
  var idxs=[]; for(var i=0;i<points.length;i++) idxs.push(i);
  rngShuffle(idxs, rng);
  var centroids=[]; for(var c=0;c<k;c++) centroids.push([points[idxs[c]].x, points[idxs[c]].y]);
  var assign = new Array(points.length).fill(0);
  for(var it=0; it<iters; it++){
    for(var p=0;p<points.length;p++){
      var bestD=Infinity, bestC=0;
      for(var ci=0;ci<k;ci++){
        var dx=points[p].x-centroids[ci][0], dy=points[p].y-centroids[ci][1];
        var d=dx*dx+dy*dy;
        if(d<bestD){ bestD=d; bestC=ci; }
      }
      assign[p]=bestC;
    }
    var newc=[];
    for(var cj=0;cj<k;cj++){
      var sx=0,sy=0,n=0;
      for(var pi=0;pi<points.length;pi++){ if(assign[pi]===cj){ sx+=points[pi].x; sy+=points[pi].y; n++; } }
      newc.push(n>0 ? [sx/n, sy/n] : centroids[cj]);
    }
    centroids = newc;
  }
  return {assign:assign, centroids:centroids};
}

/* ---- 좌표<->픽셀 (명세 9.8) ---- */
function gridToPixel(gx,gy,originX,originY,cellSize){ return [originX+gx*cellSize, originY-gy*cellSize]; }
function pixelToGrid(px,py,originX,originY,cellSize){ return [jsRound((px-originX)/cellSize), jsRound((originY-py)/cellSize)]; }

/* ============================================================
   6b) LEVELGEN — 지뢰찾기(deduce)·좌표지목(coordpick) 신규 판 생성
   (개정계획 §1.2~§1.7. SSOT는 verify_ai.py의 DEDUCE_CONFIGS/COORDPICK_CONFIGS/
   티어 함수/솔버/DP/후보집합 — 이 블록은 그 코드의 순수 JS 이식이다.)
   ============================================================ */

function neighbors4(c, N){
  var out=[];
  for(var d=0; d<4; d++){
    var nx=c[0]+DIRS4[d][0], ny=c[1]+DIRS4[d][1];
    if(inBounds(nx,ny,N)) out.push([nx,ny]);
  }
  return out;
}

/* 뭉침 지표(개정 §1.2): 지뢰 중 4이웃에 다른 지뢰가 있는 비율 */
function clusteringRatio(minesSet, N){
  if(minesSet.size===0) return 0;
  var c=0, n=0;
  minesSet.forEach(function(k){
    n++;
    var pt = keyToPt(k);
    var nbs = neighbors4(pt, N);
    for(var i=0;i<nbs.length;i++){
      if(minesSet.has(ptKey(nbs[i][0],nbs[i][1]))){ c++; return; }
    }
  });
  return c/n;
}

/* 안전 교점의 4이웃(경계 안) 지뢰 수 힌트(0~4) */
function computeHints(N, minesSet){
  var H = new Map();
  for(var x=0;x<N;x++){
    for(var y=0;y<N;y++){
      var k = ptKey(x,y);
      if(minesSet.has(k)) continue;
      var nbs = neighbors4([x,y], N);
      var cnt=0;
      for(var i=0;i<nbs.length;i++){ if(minesSet.has(ptKey(nbs[i][0],nbs[i][1]))) cnt++; }
      H.set(k, cnt);
    }
  }
  return H;
}

/* 스캔 순서 x 바깥·y 안쪽 오름차순으로 힌트0인 첫 안전 교점(개정 §1.2) */
function findSeedCell(N, minesSet){
  var H = computeHints(N, minesSet);
  for(var x=0;x<N;x++){
    for(var y=0;y<N;y++){
      var k = ptKey(x,y);
      if(H.has(k) && H.get(k)===0) return [x,y];
    }
  }
  return null;
}

function isSubsetSet(a,b){ /* a proper subset of b */
  if(a.size >= b.size) return false;
  var ok=true;
  a.forEach(function(v){ if(!b.has(v)) ok=false; });
  return ok;
}
function setDiff(b,a){ var out=new Set(); b.forEach(function(v){ if(!a.has(v)) out.add(v); }); return out; }

/* 무추측 솔버(단일+부분집합 규칙, 개정 §1.4). revealedInit(ptKey Set)에서 시작해
   고정점까지 반복 적용 후 {revealed, knownMine, leaked} 반환(Set<ptKey>, Set<ptKey>, 정수).
   opts(선택, 기본 호출부는 안 넘겨 기존 동작 그대로 — probeSolve 오라클 전용 확장):
   opts.knownMineInit(Set) = 확정 지뢰 시드(물리적으로 정찰해 지뢰로 확인된 칸) 추가,
   opts.mCap(정수) = 확정 지뢰 수가 이 값에 도달하면 나머지 칸 전부 확정 안전(전역 제약,
   수정요청_RL정돈-좌표지목추론_v1 §B-3 propagate 의사코드). */
function solveNoGuess(N, minesSet, revealedInit, opts){
  opts = opts || {};
  var H = computeHints(N, minesSet);
  var revealed = new Set(revealedInit);
  var knownMine = opts.knownMineInit ? new Set(opts.knownMineInit) : new Set();
  var mCap = opts.mCap;
  var changed = true;
  while(changed){
    changed = false;
    if(mCap != null && knownMine.size === mCap){
      for(var mx=0; mx<N; mx++){ for(var my=0; my<N; my++){
        var mk = ptKey(mx,my);
        if(!minesSet.has(mk) && !revealed.has(mk)){ revealed.add(mk); changed=true; }
      }}
    }
    var revList = Array.from(revealed);
    for(var ri=0; ri<revList.length; ri++){
      var ck = revList[ri];
      if(!H.has(ck)) continue;
      var c = keyToPt(ck);
      var nbs = neighbors4(c, N);
      var unk = [];
      for(var j=0;j<nbs.length;j++){
        var nk = ptKey(nbs[j][0],nbs[j][1]);
        if(!revealed.has(nk) && !knownMine.has(nk)) unk.push(nk);
      }
      if(unk.length===0) continue;
      var km=0;
      for(var j2=0;j2<nbs.length;j2++){ if(knownMine.has(ptKey(nbs[j2][0],nbs[j2][1]))) km++; }
      var need = H.get(ck) - km;
      if(need===0){
        for(var u=0;u<unk.length;u++){ if(!revealed.has(unk[u])){ revealed.add(unk[u]); changed=true; } }
      } else if(need===unk.length){
        for(var u2=0;u2<unk.length;u2++){ if(!knownMine.has(unk[u2])){ knownMine.add(unk[u2]); changed=true; } }
      }
    }
    if(changed) continue;
    /* 부분집합 규칙: A(진부분집합) subset B -> 차집합 확정 */
    var cs = [];
    revealed.forEach(function(ck2){
      if(!H.has(ck2)) return;
      var c2 = keyToPt(ck2);
      var nbs2 = neighbors4(c2, N);
      var unkSet = new Set();
      var km2 = 0;
      for(var j3=0;j3<nbs2.length;j3++){
        var nk2 = ptKey(nbs2[j3][0],nbs2[j3][1]);
        if(knownMine.has(nk2)) km2++;
        else if(!revealed.has(nk2)) unkSet.add(nk2);
      }
      if(unkSet.size>0) cs.push([unkSet, H.get(ck2)-km2]);
    });
    for(var ii=0; ii<cs.length; ii++){
      for(var jj=0; jj<cs.length; jj++){
        if(ii===jj) continue;
        var aSet=cs[ii][0], aN=cs[ii][1];
        var bSet=cs[jj][0], bN=cs[jj][1];
        if(isSubsetSet(aSet,bSet)){
          var diff = setDiff(bSet, aSet);
          var dn = bN - aN;
          if(dn===0){
            diff.forEach(function(nb){ if(!revealed.has(nb)){ revealed.add(nb); changed=true; } });
          } else if(dn===diff.size){
            diff.forEach(function(nb){ if(!knownMine.has(nb)){ knownMine.add(nb); changed=true; } });
          }
        }
      }
      if(changed) break;
    }
  }
  var leaked=0;
  revealed.forEach(function(k){ if(minesSet.has(k)) leaked++; });
  return {revealed:revealed, knownMine:knownMine, leaked:leaked};
}

/* revealed(허용) 칸만 통해 4인접으로 start<->goal 연결되는지 */
function bfsWithin(N, allowedSet, start, goal){
  var sk=ptKey(start[0],start[1]), gk=ptKey(goal[0],goal[1]);
  if(!allowedSet.has(sk) || !allowedSet.has(gk)) return false;
  var seen=new Set([sk]);
  var q=[start], qi=0;
  while(qi<q.length){
    var cur=q[qi++];
    if(samePt(cur,goal)) return true;
    var nbs=neighbors4(cur,N);
    for(var i=0;i<nbs.length;i++){
      var nk=ptKey(nbs[i][0],nbs[i][1]);
      if(allowedSet.has(nk) && !seen.has(nk)){ seen.add(nk); q.push(nbs[i]); }
    }
  }
  return seen.has(gk);
}

/* xy판 존재성 DP(개정 §1.5). 전방 F[x][y]·후방 B[x][y]로 열별 실현가능 y집합 계산.
   반환 {exists, kList}: 모든 열 k_x>=1 여부, 열별 k_x 리스트. */
function xyFeasible(N, minesSet){
  function safe(x,y){ return !minesSet.has(ptKey(x,y)); }
  var F=[]; for(var x=0;x<N;x++) F.push(new Array(N).fill(false));
  for(var x1=0;x1<N;x1++){
    for(var y1=0;y1<N;y1++){
      if(!safe(x1,y1)) continue;
      if(x1===0){ F[x1][y1]=true; continue; }
      for(var yp=0;yp<N;yp++){
        if(!F[x1-1][yp]) continue;
        var seg = staircase([x1-1,yp],[x1,y1]);
        var ok=true;
        for(var s=0;s<seg.length;s++){ if(minesSet.has(ptKey(seg[s][0],seg[s][1]))){ ok=false; break; } }
        if(ok){ F[x1][y1]=true; break; }
      }
    }
  }
  var B=[]; for(var x2=0;x2<N;x2++) B.push(new Array(N).fill(false));
  for(var x3=N-1; x3>=0; x3--){
    for(var y3=0;y3<N;y3++){
      if(!safe(x3,y3)) continue;
      if(x3===N-1){ B[x3][y3]=true; continue; }
      for(var yp2=0;yp2<N;yp2++){
        if(!B[x3+1][yp2]) continue;
        var seg2 = staircase([x3,y3],[x3+1,yp2]);
        var ok2=true;
        for(var s2=0;s2<seg2.length;s2++){ if(minesSet.has(ptKey(seg2[s2][0],seg2[s2][1]))){ ok2=false; break; } }
        if(ok2){ B[x3][y3]=true; break; }
      }
    }
  }
  var kList=[];
  for(var xc=0; xc<N; xc++){
    var kx=0;
    for(var yc=0;yc<N;yc++){ if(F[xc][yc] && B[xc][yc]) kx++; }
    kList.push(kx);
  }
  var exists = kList.every(function(kx){ return kx>=1; });
  return {exists:exists, kList:kList};
}

/* func판 후보집합(개정 §1.6). 반환 [a,b,c] 튜플은 evalF(a,b,c,x)에 바로 대입 가능. */
function funcCandidates(ftype, N){
  var out=[];
  if(ftype==='const'){
    for(var c=0;c<N;c++) out.push([0,0,c]);
  } else if(ftype==='linear'){
    for(var ai=-2*(N-1); ai<=2*(N-1); ai++){
      var a = ai/2;
      for(var b=0;b<N;b++) out.push([0,a,b]);
    }
  } else if(ftype==='quadratic'){
    for(var ai2=-4; ai2<=4; ai2++){
      if(ai2===0) continue;
      var a2 = ai2/10;
      for(var bi=-N; bi<=N; bi++){
        var b2 = bi/2;
        for(var c2=0;c2<N;c2++) out.push([a2,b2,c2]);
      }
    }
  } else {
    throw new Error('unknown ftype: '+ftype);
  }
  return out;
}

/* func판 답 존재·제약비율(개정 §1.6). any_ok = 지뢰 회피 후보 존재, fr = 유효/유효범위. */
function funcValidFraction(ftype, N, minesSet){
  var cands = funcCandidates(ftype, N);
  var tot=0, ok=0, anyOk=false;
  for(var i=0;i<cands.length;i++){
    var qa=cands[i][0], qb=cands[i][1], qc=cands[i][2];
    var pts=[], inRange=true;
    for(var x=0;x<N;x++){
      var y = evalF(qa,qb,qc,x);
      if(y<0 || y>N-1){ inRange=false; break; }
      pts.push([x,y]);
    }
    if(!inRange) continue;
    tot++;
    var full = connectPath(pts);
    var safe=true;
    for(var p=0;p<full.length;p++){ if(minesSet.has(ptKey(full[p][0],full[p][1]))){ safe=false; break; } }
    if(safe){ ok++; anyOk=true; }
  }
  var fr = tot ? (ok/tot) : 0;
  return {anyOk:anyOk, fr:fr};
}

/* ---- 채택 필터 임계값(개정 §1.2, 2026-07-17 G1b — verify_ai.py와 값 동일·SSOT=py) ---- */
var CLUSTER_RATIO_CAP = 0.50;
var FUNC_FR_LO = 0.02, FUNC_FR_HI = 0.50;
var XY_BOTTLENECK_T = {7:5, 9:6};

function checkPathFilters(N, minesSet, start, goal){
  if(clusteringRatio(minesSet, N) > CLUSTER_RATIO_CAP) return false;
  if(!bfsReachable(N, minesSet, start, goal)) return false;
  var sres = solveNoGuess(N, minesSet, new Set([ptKey(start[0],start[1])]));
  if(sres.leaked) return false;
  if(!sres.revealed.has(ptKey(goal[0],goal[1]))) return false;
  if(!bfsWithin(N, sres.revealed, start, goal)) return false;
  return true;
}
function checkXyFilters(N, minesSet){
  if(clusteringRatio(minesSet, N) > CLUSTER_RATIO_CAP) return false;
  var xf = xyFeasible(N, minesSet);
  if(!xf.exists) return false;
  var minKx = Math.min.apply(null, xf.kList);
  var t = XY_BOTTLENECK_T[N];
  if(minKx < 1 || (t!==undefined && minKx > t)) return false;
  var seedCell = findSeedCell(N, minesSet);
  if(!seedCell) return false;
  var sres = solveNoGuess(N, minesSet, new Set([ptKey(seedCell[0],seedCell[1])]));
  if(sres.leaked) return false;
  var safeCount = N*N - minesSet.size;
  if(safeCount===0 || sres.revealed.size < 0.5*safeCount) return false;
  return true;
}
function checkFuncFilters(N, minesSet, ftype){
  if(clusteringRatio(minesSet, N) > CLUSTER_RATIO_CAP) return false;
  var fv = funcValidFraction(ftype, N, minesSet);
  if(!(fv.anyOk && fv.fr>=FUNC_FR_LO && fv.fr<=FUNC_FR_HI)) return false;
  var seedCell = findSeedCell(N, minesSet);
  if(!seedCell) return false;
  var sres = solveNoGuess(N, minesSet, new Set([ptKey(seedCell[0],seedCell[1])]));
  if(sres.leaked) return false;
  var safeCount = N*N - minesSet.size;
  if(safeCount===0 || sres.revealed.size < 0.5*safeCount) return false;
  return true;
}
function checkPathFiltersCoordpick(N, minesSet, start, goal){
  if(clusteringRatio(minesSet, N) > CLUSTER_RATIO_CAP) return false;
  return bfsReachable(N, minesSet, start, goal);
}
function checkXyFiltersCoordpick(N, minesSet){
  if(clusteringRatio(minesSet, N) > CLUSTER_RATIO_CAP) return false;
  return xyFeasible(N, minesSet).exists;
}
function checkFuncFiltersCoordpick(N, minesSet, ftype){
  if(clusteringRatio(minesSet, N) > CLUSTER_RATIO_CAP) return false;
  return funcValidFraction(ftype, N, minesSet).anyOk;
}

/* ---- 정찰 오라클 probeSolve(개정 §B-3, 좌표지목 재설계 — 구현 차단 조건) ----
   실제 지뢰 배치를 아는 시뮬레이터가 "무추측 확정" 최소 정찰 과정을 재현한다.
   py(verify_ai.py probe_solve)와 동일 알고리즘·동일 타이브레이크 — probeCount가
   전판 일치해야 한다. PROBE_HARD_CAP은 §B-3의 B_cap(12)과 같은 값(정찰이 노동이
   되지 않게 하는 상한 — 이를 넘는 판은 makeFilterFnCoordpick이 재생성 거른다). */
var PROBE_HARD_CAP = 12;

/* opened(Map<ptKey,{isMine,hint}>)의 안전/지뢰 시드로 solveNoGuess(단일·부분집합 규칙 +
   전역 M 제약)를 돌려 {safe:Set, mine:Set}(확정 안전/확정 지뢰)를 반환한다. */
function propagateProbe(N, minesSet, opened, M){
  var safeSeed = new Set(), mineSeed = new Set();
  opened.forEach(function(info, k){ if(info.isMine) mineSeed.add(k); else safeSeed.add(k); });
  var res = solveNoGuess(N, minesSet, safeSeed, {knownMineInit: mineSeed, mCap: M});
  return {safe: res.revealed, mine: res.knownMine};
}

/* 답 확정 판정(kind별, §B-3): path=확정안전 셀만의 단조(오른쪽/위쪽만) 경로 존재 /
   xy=모든 x열에 확정안전 y가 ≥1 / func=funcCandidates 중 지나는 전 칸이 확정안전인 후보 ≥1. */
function answerCertainPath(N, safeSet){
  var reach = [];
  for(var x=0;x<N;x++) reach.push(new Array(N).fill(false));
  for(var x1=0;x1<N;x1++){
    for(var y1=0;y1<N;y1++){
      if(!safeSet.has(ptKey(x1,y1))) continue;
      if(x1===0 && y1===0){ reach[x1][y1]=true; continue; }
      var ok=false;
      if(x1>0 && reach[x1-1][y1]) ok=true;
      if(!ok && y1>0 && reach[x1][y1-1]) ok=true;
      reach[x1][y1]=ok;
    }
  }
  return reach[N-1][N-1];
}
function answerCertainXY(N, safeSet){
  for(var x=0;x<N;x++){
    var any=false;
    for(var y=0;y<N;y++){ if(safeSet.has(ptKey(x,y))){ any=true; break; } }
    if(!any) return false;
  }
  return true;
}
function answerCertainFunc(N, ftype, safeSet){
  var cands = funcCandidates(ftype, N);
  for(var i=0;i<cands.length;i++){
    var a=cands[i][0], b=cands[i][1], c=cands[i][2];
    var pts=[], inRange=true;
    for(var x=0;x<N;x++){ var y=evalF(a,b,c,x); if(y<0||y>N-1){ inRange=false; break; } pts.push([x,y]); }
    if(!inRange) continue;
    var full = connectPath(pts);
    var allSafe=true;
    for(var p=0;p<full.length;p++){ if(!safeSet.has(ptKey(full[p][0],full[p][1]))){ allSafe=false; break; } }
    if(allSafe) return true;
  }
  return false;
}
function answerCertain(N, kind, ftype, safeSet){
  if(kind==='path') return answerCertainPath(N, safeSet);
  if(kind==='xy') return answerCertainXY(N, safeSet);
  return answerCertainFunc(N, ftype, safeSet);
}

/* 다음 정찰 셀(§B-3 3단계): 미확정 셀 중, 그 셀을 열었을 때(실배치 기준) 새로 확정되는
   칸 수가 최대인 셀. 동률이면 (y,x) 사전순 최소 — y를 바깥, x를 안쪽으로 돌면 스캔 순서
   자체가 (y,x) 오름차순이 되어 첫 최댓값이 곧 최소 타이브레이크다(엄격부등호로만 갱신). */
function bestProbeCell(N, minesSet, opened, known, M){
  var H = computeHints(N, minesSet);
  var base = known.safe.size + known.mine.size;
  var bestGain = -1, bestCell = null;
  for(var y=0;y<N;y++){
    for(var x=0;x<N;x++){
      var k = ptKey(x,y);
      if(known.safe.has(k) || known.mine.has(k)) continue;
      var hypOpened = new Map(opened);
      var isMine = minesSet.has(k);
      hypOpened.set(k, {isMine:isMine, hint: isMine?null:H.get(k)});
      var hyp = propagateProbe(N, minesSet, hypOpened, M);
      var gain = (hyp.safe.size + hyp.mine.size) - base;
      if(gain > bestGain){ bestGain = gain; bestCell = [x,y]; }
    }
  }
  return bestCell;
}

/* probeSolve(§B-3): 결정론. ok:true면 그 판이 probes회 정찰로 무추측 확정 가능(=probeCount). */
function probeSolve(N, minesSet, kind, ftype){
  var M = minesSet.size;
  var H = computeHints(N, minesSet);
  var opened = new Map();
  var probes = 0;
  while(true){
    var known = propagateProbe(N, minesSet, opened, M);
    if(answerCertain(N, kind, ftype, known.safe)) return {ok:true, probes:probes};
    if(probes >= PROBE_HARD_CAP) return {ok:false, probes:probes};
    var cell = bestProbeCell(N, minesSet, opened, known, M);
    if(!cell) return {ok:false, probes:probes};
    var k = ptKey(cell[0], cell[1]);
    var isMine = minesSet.has(k);
    opened.set(k, {isMine:isMine, hint: isMine?null:H.get(k)});
    probes++;
  }
}

function makeFilterFn(cfg){
  var kind=cfg.kind, N=cfg.N;
  if(kind==='path'){
    var start=[0,0], goal=[N-1,N-1];
    return function(minesSet){ return checkPathFilters(N,minesSet,start,goal); };
  }
  if(kind==='xy') return function(minesSet){ return checkXyFilters(N,minesSet); };
  var ftype=cfg.ftype;
  return function(minesSet){ return checkFuncFilters(N,minesSet,ftype); };
}
/* 정찰 예산 게이트(§B-2·§B-3 [교정 v1.1]): 기존 조건(답 존재·밀도·뭉침) 통과 후에만
   probeSolve를 돌려(비용 큰 계산 최소화) 성공+probes<=cfg.B(명시 예산표 PROBE_BUDGETS[idx],
   오라클은 "하한 보증" 역할 — 그 판이 선언된 예산 안에서 무추측 확정 가능함을 보증)까지 확인한다. */
function makeFilterFnCoordpick(cfg){
  var kind=cfg.kind, N=cfg.N, ftype=cfg.ftype||null, budget=cfg.B;
  function probeOk(minesSet){
    var r = probeSolve(N, minesSet, kind, ftype);
    return r.ok && r.probes <= budget;
  }
  if(kind==='path'){
    var start=[0,0], goal=[N-1,N-1];
    return function(minesSet){ return checkPathFiltersCoordpick(N,minesSet,start,goal) && probeOk(minesSet); };
  }
  if(kind==='xy') return function(minesSet){ return checkXyFiltersCoordpick(N,minesSet) && probeOk(minesSet); };
  return function(minesSet){ return checkFuncFiltersCoordpick(N,minesSet,ftype) && probeOk(minesSet); };
}

/* 공통 생성 루프(개정 §1.2): attempt 0..299, mulberry32(baseSeed+attempt*101)로
   placeMines 재사용, 채택 필터(+세트 중복) 통과 시 채택. 300회 실패 시 null(생성 실패). */
function generateConfigSet(configs){
  var results=[];
  var adoptedKeys = new Set();
  for(var ci=0; ci<configs.length; ci++){
    var cfg = configs[ci];
    var N=cfg.N, M=cfg.M, baseSeed=cfg.baseSeed, kind=cfg.kind;
    var forbidden = new Set();
    if(kind==='path'){ forbidden.add(ptKey(0,0)); forbidden.add(ptKey(N-1,N-1)); }
    var filt = cfg._filter;
    var adopted = null;
    for(var attempt=0; attempt<300; attempt++){
      var rng = mulberry32(baseSeed + attempt*101);
      var mines = placeMines(N, forbidden, M, rng);
      if(!filt(mines)) continue;
      var minesArr = Array.from(mines).sort(function(a,b){ return a-b; });
      var key = N+'|'+kind+'|'+minesArr.join(',');
      if(adoptedKeys.has(key)) continue;
      adopted = {mines:mines, attempt:attempt};
      adoptedKeys.add(key);
      break;
    }
    results.push(adopted);
  }
  return results;
}

/* ---- 판 설정표 (개정 §1.2 지뢰찾기 7판 / §1.3 좌표지목 7판, verify_ai.py와 값 동일) ---- */
var DEDUCE_CONFIGS = [
  {idx:0, kind:'path', N:5, M:3,  baseSeed:4010},
  {idx:1, kind:'path', N:7, M:5,  baseSeed:4020},
  {idx:2, kind:'xy',   N:7, M:6,  baseSeed:4030},
  {idx:3, kind:'xy',   N:9, M:11, baseSeed:4040},
  {idx:4, kind:'func', ftype:'const',     N:7, M:6,  baseSeed:4050},
  /* baseSeed 4060->17291(수정요청_S5-우회봉쇄-OOB주행-로봇집표시_v1 §3 D-A): 기존 시드는
     일차 해가 0개라 하위 차수(상수) 우회가 봉쇄되지 않았다. M·필터는 그대로, 시드만 교체. */
  {idx:5, kind:'func', ftype:'linear',    N:9, M:10, baseSeed:17291},
  /* baseSeed 4070->75578(위와 동일 근거, 이차판의 상수 우회 봉쇄). */
  {idx:6, kind:'func', ftype:'quadratic', N:9, M:11, baseSeed:75578}
];
/* B(조회 예산) = 명시 예산표 PROBE_BUDGETS[idx](§B-3 [교정 v1.1]). 이전 "probeCount+slack"
   파생 규칙은 폐기됐다 — 실측 결과 probeCount가 전판 1(오라클의 신 수준 최적 첫 수 + 전파
   연쇄)로 나와 학생 현실 난이도와 유리됐기 때문. 오라클(probeSolve)은 이제 "하한 보증"
   역할만 한다: 그 판이 probeCount<=B[idx] 안에서 무추측 확정 가능함을 보증(makeFilterFnCoordpick).
   비증가 경사(6,6,5,5,4,4,3)로 "난이도↑=선택↓"는 유지 — 값 자체는 [초안](실기기 플레이 후
   선생님 조정 대상). */
var PROBE_BUDGETS = [6, 6, 5, 5, 4, 4, 3];
var COORDPICK_CONFIGS = [
  {idx:0, kind:'path', N:5, M:3,  baseSeed:5010, B:PROBE_BUDGETS[0]},
  {idx:1, kind:'path', N:7, M:6,  baseSeed:5020, B:PROBE_BUDGETS[1]},
  {idx:2, kind:'xy',   N:7, M:6,  baseSeed:5030, B:PROBE_BUDGETS[2]},
  {idx:3, kind:'xy',   N:9, M:10, baseSeed:5040, B:PROBE_BUDGETS[3]},
  {idx:4, kind:'func', ftype:'const',     N:7, M:6,  baseSeed:5050, B:PROBE_BUDGETS[4]},
  /* baseSeed 5060->12534 / 5070->60519 (§3 D-A, 위 DEDUCE_CONFIGS 교체와 동일 근거 —
     하위 차수 우회 봉쇄. M·B·필터는 그대로, 시드만 교체). */
  {idx:5, kind:'func', ftype:'linear',    N:9, M:10, baseSeed:12534, B:PROBE_BUDGETS[5]},
  {idx:6, kind:'func', ftype:'quadratic', N:9, M:10, baseSeed:60519, B:PROBE_BUDGETS[6]}
];
DEDUCE_CONFIGS.forEach(function(c){ c._filter = makeFilterFn(c); });
COORDPICK_CONFIGS.forEach(function(c){ c._filter = makeFilterFnCoordpick(c); });

/* generateConfigSet(DEDUCE/COORDPICK_CONFIGS)는 매번 300attempt×7판을 처음부터 다시 찾는 순수
   함수라(같은 고정 baseSeed·필터 → 항상 같은 결과), 판 선택마다 반복 호출하면(이월 g2c minor-2,
   G3-21) 판 하나 열 때마다 세트 7개 전부를 재생성했다. 최초 1회만 계산해 캐시한다. */
var _deduceBoardsCache = null, _coordpickBoardsCache = null;
/* 지뢰찾기(deduce) i번 판 생성 — 채택 mines/attempt/사전공개(pre-reveal) 반환 */
function genDeduceBoard(i){
  if(!_deduceBoardsCache) _deduceBoardsCache = generateConfigSet(DEDUCE_CONFIGS);
  var cfg = DEDUCE_CONFIGS[i];
  var res = _deduceBoardsCache[i];
  if(!res) return null;
  var N = cfg.N;
  var preReveal;
  if(cfg.kind==='path'){ preReveal = [[0,0]]; }
  else { var sc = findSeedCell(N, res.mines); preReveal = sc ? [sc] : []; }
  return {mode:'deduce', idx:i, kind:cfg.kind, ftype:cfg.ftype||null, N:N,
    mines: Array.from(res.mines).sort(function(a,b){ return a-b; }),
    attempt: res.attempt, preReveal: preReveal};
}
/* 좌표지목(coordpick, "정찰 추론") i번 판 생성 — 지뢰 전부 숨김(사전공개 없음, preReveal:null —
   첫 정찰부터 학생 선택, §B-2). budget = 조회 예산 B(§B-3, COORDPICK_CONFIGS 고정값). */
function genCoordPickBoard(i){
  if(!_coordpickBoardsCache) _coordpickBoardsCache = generateConfigSet(COORDPICK_CONFIGS);
  var cfg = COORDPICK_CONFIGS[i];
  var res = _coordpickBoardsCache[i];
  if(!res) return null;
  var N = cfg.N;
  return {mode:'coordpick', idx:i, kind:cfg.kind, ftype:cfg.ftype||null, N:N,
    mines: Array.from(res.mines).sort(function(a,b){ return a-b; }),
    attempt: res.attempt, preReveal: null, budget: cfg.B};
}

/* D5 하니스용: 바닐라9 + deduce7 + coordpick7 = 23판 전체를 JSON 직렬화 가능 형태로 덤프 */
function dumpAllBoards(){
  var out = [];
  for(var t=1;t<=3;t++){
    var p = stage1Tier(t);
    var lvl = genStage1Level(p.N, p.mines, 1000+t);
    out.push({mode:'vanilla', idx:out.length, N:p.N,
      mines: Array.from(lvl.mines).sort(function(a,b){ return a-b; }),
      attempt: null, preReveal: null, meta:{stage:1, tier:t}});
  }
  for(var t2=1;t2<=3;t2++){
    var p2 = stage2Tier(t2);
    var lvl2 = genStage2Level(p2.N, p2.cols, p2.mines, 2000+t2);
    out.push({mode:'vanilla', idx:out.length, N:p2.N,
      mines: Array.from(lvl2.mines).sort(function(a,b){ return a-b; }),
      attempt: null, preReveal: null, meta:{stage:2, tier:t2, cols:p2.cols}});
  }
  for(var t3=1;t3<=3;t3++){
    var p3 = stage3Tier(t3);
    var lvl3 = genStage3Level(p3.N, p3.type, p3.mines, STAGE3_SEED_BY[t3-1]);
    out.push({mode:'vanilla', idx:out.length, N:p3.N,
      mines: Array.from(lvl3.mines).sort(function(a,b){ return a-b; }),
      attempt: null, preReveal: null, meta:{stage:3, tier:t3, type:p3.type}});
  }
  var deduceResults = generateConfigSet(DEDUCE_CONFIGS);
  for(var i=0;i<DEDUCE_CONFIGS.length;i++){
    var cfg = DEDUCE_CONFIGS[i], res = deduceResults[i];
    if(!res){
      out.push({mode:'deduce', idx:i, N:cfg.N, mines:null, attempt:null, preReveal:null,
        meta:{kind:cfg.kind, ftype:cfg.ftype||null, error:'generation_failed'}});
      continue;
    }
    var pre;
    if(cfg.kind==='path'){ pre=[[0,0]]; }
    else { var sc = findSeedCell(cfg.N, res.mines); pre = sc ? [sc] : []; }
    out.push({mode:'deduce', idx:i, N:cfg.N,
      mines: Array.from(res.mines).sort(function(a,b){ return a-b; }),
      attempt: res.attempt, preReveal: pre,
      meta:{kind:cfg.kind, ftype:cfg.ftype||null}});
  }
  var cpResults = generateConfigSet(COORDPICK_CONFIGS);
  for(var j=0;j<COORDPICK_CONFIGS.length;j++){
    var cfg2 = COORDPICK_CONFIGS[j], res2 = cpResults[j];
    if(!res2){
      out.push({mode:'coordpick', idx:j, N:cfg2.N, mines:null, attempt:null, preReveal:null,
        meta:{kind:cfg2.kind, ftype:cfg2.ftype||null, error:'generation_failed'}});
      continue;
    }
    /* budget·probeCount(§B-3·D5): probeCount는 채택된 mines로 probeSolve를 다시 돌려
       실측한다(저장된 값을 베끼지 않고 재계산 — py↔js 대조의 대상). */
    var probeRes = probeSolve(cfg2.N, res2.mines, cfg2.kind, cfg2.ftype||null);
    out.push({mode:'coordpick', idx:j, N:cfg2.N,
      mines: Array.from(res2.mines).sort(function(a,b){ return a-b; }),
      attempt: res2.attempt, preReveal: null, budget: cfg2.B, probeCount: probeRes.probes,
      meta:{kind:cfg2.kind, ftype:cfg2.ftype||null}});
  }
  return out;
}
