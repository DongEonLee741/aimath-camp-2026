/* ============================================================
   7) GRID — 좌표 보드·로봇·지뢰·경로 렌더(Canvas) + 좌표<->픽셀 + 키보드 이동
   ============================================================ */
var BOARD_COLORS = {
  grid:'#d7deea', safe:'#2ea043', mine:'#e5484d', robot:'#1f6feb',
  path:'#f5a623', goal:'#8957e5', ink:'#0a0a0a', muted:'#6a6a6a', cream:'#fffaf0', cursor:'#2f6df0'
};
/* 지뢰찾기(deduce) 힌트 숫자 0~4의 배경색(색+숫자 병기, G2-C §1.2).
   흰 글자(#fff) 대비 4.5:1 미달이던 0/2/3번 색을 동색 계열로 어둡게 조정(G3-06):
   #9a9a9a→#6a6a6a(기존 BOARD_COLORS.muted와 동일, ~5.4:1) · #2ea043→#1e7a34(기존 .xy-input.correct와 동일, ~5.4:1) · #e5484d→#b91c1c(~6.5:1). */
var HINT_COLORS = ['#6a6a6a', '#1f6feb', '#1e7a34', '#b91c1c', '#8957e5'];
function dirSymbol(d){ return ['→','←','↑','↓'][d]; }
function dirName(d){ return ['오른쪽','왼쪽','위','아래'][d]; }

function setupCanvasHiDPI(canvas, cssW, cssH){
  var dpr = window.devicePixelRatio || 1;
  canvas.width = Math.round(cssW*dpr);
  canvas.height = Math.round(cssH*dpr);
  canvas.style.width = cssW + 'px';
  canvas.style.height = cssH + 'px';
  var ctx = canvas.getContext('2d');
  ctx.setTransform(dpr,0,0,dpr,0,0);
  return ctx;
}
function cellPxFor(N){ return Math.max(44, Math.min(52, Math.floor(480/Math.max(1,N-1)))); }
/* game-board-area(G2-C 정사각 보드 영역)의 실측 크기에 맞춰 셀 크기를 산출한다.
   측정이 아직 안 됐으면(레이아웃 전, avail===0) 기존 고정 산식으로 폴백한다.
   실측값이 있으면 그 값이 아무리 작아도(바닐라 탭처럼 subbar가 두꺼운 레이아웃) 그
   실측에 맞춘 산식을 쓴다 — 예전엔 실측이 120px 미만이면 실측을 버리고 고정 476px급
   캔버스를 그대로 만들어 태블릿에서 보드 대부분이 화면 밖으로 밀려났다(BLOCKING-1-잔여). */
function computeSquareCellPx(boardArea, N){
  var w = boardArea ? boardArea.clientWidth : 0, h = boardArea ? boardArea.clientHeight : 0;
  var avail = Math.min(w||0, h||0);
  if(avail <= 0) return cellPxFor(N);
  var pad = 30;
  var cell = Math.floor((avail - pad*2) / Math.max(1, N-1));
  /* 하한 44px(G3-04): 교점 히트테스트가 최근접 스냅(px2g)이라 셀 간격 자체가 터치 타깃 크기다.
     실측 공간이 부족해 44px를 못 채우면 캔버스가 game-board-area보다 커져 .grid-board-wrap의
     overflow:auto(+tapscroll 팬 스크롤)로 스크롤해 접근한다(레이아웃 압축보다 오탭 방지 우선). */
  return Math.max(44, Math.min(64, cell));
}

/* 좌표 격자 보드(Canvas) 생성: 포인터+키보드 둘 다로 교점을 고르고 활성화(Enter/클릭)할 수 있다. */
function createBoardCanvas(container, N, opts){
  opts = opts || {};
  var cellPx = opts.cellPx || cellPxFor(N);
  var pad = 30;
  var cssW = pad*2 + (N-1)*cellPx;
  var cssH = pad*2 + (N-1)*cellPx;
  var wrap = el('div', {class:'grid-board-wrap tapscroll'});
  /* 키보드 조작 안내는 aria-label 재정의(opts.ariaLabel) 여부와 무관하게 항상 붙인다(G3-12) —
     예전엔 opts.ariaLabel을 넘긴 호출부(7곳)가 이 문구를 덮어써 조작법 발견이 불가능했다. */
  var canvas = el('canvas', {class:'board-canvas', tabindex:'0',
    'aria-label': (opts.ariaLabel || (N+'칸 좌표 격자 보드.')) + ' 화살표 키로 교점 이동, Enter나 Space로 선택.'});
  wrap.appendChild(canvas);
  container.appendChild(wrap);
  var ctx = setupCanvasHiDPI(canvas, cssW, cssH);

  function gx2px(gx){ return pad + gx*cellPx; }
  function gy2px(gy){ return cssH - pad - gy*cellPx; }
  function px2g(px,py){ return [jsRound((px-pad)/cellPx), jsRound((cssH-pad-py)/cellPx)]; }
  function inb(x,y){ return x>=0 && x<N && y>=0 && y<N; }

  var cursor = (opts.initialCursor || [0,0]).slice();

  function eventToGrid(e){
    var rect = canvas.getBoundingClientRect();
    var scaleX = cssW/rect.width, scaleY = cssH/rect.height;
    var px = (e.clientX-rect.left)*scaleX, py = (e.clientY-rect.top)*scaleY;
    return px2g(px,py);
  }
  canvas.addEventListener('pointerdown', function(e){
    canvas.focus();
    var g = eventToGrid(e);
    if(inb(g[0],g[1])){
      cursor = g;
      api.redraw();
      if(opts.onActivate) opts.onActivate(g[0], g[1], e);
    }
  });
  canvas.addEventListener('keydown', function(e){
    var moved=false;
    if(e.key==='ArrowRight'){ cursor[0]=Math.min(N-1,cursor[0]+1); moved=true; }
    else if(e.key==='ArrowLeft'){ cursor[0]=Math.max(0,cursor[0]-1); moved=true; }
    else if(e.key==='ArrowUp'){ cursor[1]=Math.min(N-1,cursor[1]+1); moved=true; }
    else if(e.key==='ArrowDown'){ cursor[1]=Math.max(0,cursor[1]-1); moved=true; }
    else if(e.key==='Enter' || e.key===' '){
      e.preventDefault();
      if(opts.onActivate) opts.onActivate(cursor[0], cursor[1], e);
      return;
    }
    if(moved){
      e.preventDefault(); api.redraw();
      scrollCursorIntoView();
      if(opts.onCursorMove) opts.onCursorMove(cursor.slice());
    }
  });
  /* 보드가 game-board-area보다 커서 .grid-board-wrap이 스크롤될 때(G3-04 하한 44px 여파로
     빈번해짐), 화살표로 커서를 옮겨도 시야 밖이면 안 보였다(G3-24). wrap을 커서 위치로 스크롤. */
  function scrollCursorIntoView(){
    var cw = wrap.clientWidth, ch = wrap.clientHeight;
    if(cw>=cssW && ch>=cssH) return; /* 넘치지 않으면(스크롤 불필요) 손대지 않는다 */
    var margin = cellPx*0.6;
    var px = gx2px(cursor[0]), py = gy2px(cursor[1]);
    var left = px-margin, right = px+margin, top = py-margin, bottom = py+margin;
    if(left < wrap.scrollLeft) wrap.scrollLeft = Math.max(0, left);
    else if(right > wrap.scrollLeft+cw) wrap.scrollLeft = right-cw;
    if(top < wrap.scrollTop) wrap.scrollTop = Math.max(0, top);
    else if(bottom > wrap.scrollTop+ch) wrap.scrollTop = bottom-ch;
  }

  var api = {
    canvas:canvas, wrap:wrap, ctx:ctx, N:N, cellPx:cellPx, pad:pad, cssW:cssW, cssH:cssH,
    gx2px:gx2px, gy2px:gy2px, px2g:px2g, inb:inb,
    getCursor:function(){ return cursor.slice(); },
    setCursor:function(c){ cursor=c.slice(); },
    redraw:function(){ if(opts.onRedraw) opts.onRedraw(ctx, api); }
  };
  return api;
}

function drawGridBase(ctx, api){
  ctx.clearRect(0,0,api.cssW,api.cssH);
  ctx.fillStyle = BOARD_COLORS.cream;
  ctx.fillRect(0,0,api.cssW,api.cssH);
  ctx.strokeStyle = BOARD_COLORS.grid;
  ctx.lineWidth = 1;
  for(var gx=0; gx<api.N; gx++){
    var x = api.gx2px(gx);
    ctx.beginPath(); ctx.moveTo(x, api.gy2px(0)); ctx.lineTo(x, api.gy2px(api.N-1)); ctx.stroke();
  }
  for(var gy=0; gy<api.N; gy++){
    var y = api.gy2px(gy);
    ctx.beginPath(); ctx.moveTo(api.gx2px(0), y); ctx.lineTo(api.gx2px(api.N-1), y); ctx.stroke();
  }
  ctx.fillStyle = BOARD_COLORS.muted;
  ctx.font = "10px 'Inter','Malgun Gothic',sans-serif";
  var step = api.N>13 ? Math.ceil(api.N/10) : 1;
  ctx.textAlign='center'; ctx.textBaseline='top';
  for(var lx=0; lx<api.N; lx+=step){ ctx.fillText(String(lx), api.gx2px(lx), api.gy2px(0)+6); }
  ctx.textAlign='right'; ctx.textBaseline='middle';
  for(var ly=0; ly<api.N; ly+=step){ ctx.fillText(String(ly), api.gx2px(0)-8, api.gy2px(ly)); }
}
function drawHome(ctx, api, pt, isGoal){
  var x=api.gx2px(pt[0]), y=api.gy2px(pt[1]);
  var s = Math.max(7, Math.min(api.cellPx*0.38, 15));
  ctx.save();
  ctx.fillStyle = isGoal ? BOARD_COLORS.goal : '#334155';
  ctx.beginPath();
  ctx.moveTo(x, y-s); ctx.lineTo(x+s, y-s*0.15); ctx.lineTo(x+s*0.68,y-s*0.15); ctx.lineTo(x+s*0.68,y+s*0.75);
  ctx.lineTo(x-s*0.68,y+s*0.75); ctx.lineTo(x-s*0.68,y-s*0.15); ctx.lineTo(x-s,y-s*0.15); ctx.closePath();
  ctx.fill();
  ctx.restore();
}
function drawNeutralDot(ctx, api, pt){
  var x=api.gx2px(pt[0]), y=api.gy2px(pt[1]);
  ctx.save(); ctx.fillStyle='#c7cdd6'; ctx.beginPath(); ctx.arc(x,y,2.5,0,Math.PI*2); ctx.fill(); ctx.restore();
}
function drawRevealMark(ctx, api, pt, isMine, scale, dx, dy){
  var x=api.gx2px(pt[0])+(dx||0), y=api.gy2px(pt[1])+(dy||0);
  var r = Math.max(6, Math.min(api.cellPx*0.3, 11));
  scale = scale==null ? 1 : scale;
  ctx.save();
  ctx.translate(x,y);
  ctx.scale(scale,scale);
  if(isMine){
    ctx.fillStyle = BOARD_COLORS.mine;
    ctx.beginPath(); ctx.arc(0,0,r,0,Math.PI*2); ctx.fill();
  } else {
    ctx.strokeStyle = BOARD_COLORS.safe; ctx.lineWidth=3; ctx.lineCap='round'; ctx.lineJoin='round';
    ctx.beginPath();
    ctx.moveTo(-r*0.6,0); ctx.lineTo(-r*0.1,r*0.5); ctx.lineTo(r*0.7,-r*0.5);
    ctx.stroke();
  }
  ctx.restore();
}
/* 지뢰찾기(deduce) 안전 교점의 4이웃 지뢰 힌트 숫자(0~4) — 색+숫자 병기(G2-C §1.2) */
function drawHintNumberMark(ctx, api, pt, hintVal, scale, dx, dy){
  var x=api.gx2px(pt[0])+(dx||0), y=api.gy2px(pt[1])+(dy||0);
  var r = Math.max(9, Math.min(api.cellPx*0.36, 14));
  scale = scale==null ? 1 : scale;
  var v = Math.max(0, Math.min(4, hintVal||0));
  ctx.save();
  ctx.translate(x,y);
  ctx.scale(scale,scale);
  ctx.fillStyle = HINT_COLORS[v];
  ctx.beginPath(); ctx.arc(0,0,r,0,Math.PI*2); ctx.fill();
  ctx.fillStyle = '#fff';
  ctx.font = "bold " + Math.round(r*1.15) + "px 'Inter','Malgun Gothic',sans-serif";
  ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillText(String(v), 0, 1);
  ctx.restore();
}
function drawCursorRing(ctx, api, pt){
  var x=api.gx2px(pt[0]), y=api.gy2px(pt[1]);
  ctx.save();
  ctx.strokeStyle = BOARD_COLORS.cursor; ctx.lineWidth=2; ctx.setLineDash([3,2]);
  ctx.beginPath(); ctx.arc(x,y, Math.max(9,Math.min(api.cellPx*0.42,16)), 0, Math.PI*2); ctx.stroke();
  ctx.restore();
}
function drawPathLine(ctx, api, points, color, widthPx){
  if(!points || points.length<2) return;
  ctx.save();
  ctx.strokeStyle = color || BOARD_COLORS.path;
  ctx.lineWidth = widthPx || 3;
  ctx.lineJoin='round'; ctx.lineCap='round';
  ctx.beginPath();
  ctx.moveTo(api.gx2px(points[0][0]), api.gy2px(points[0][1]));
  for(var i=1;i<points.length;i++) ctx.lineTo(api.gx2px(points[i][0]), api.gy2px(points[i][1]));
  ctx.stroke();
  ctx.restore();
}
function drawRobot(ctx, api, px, py, squashPhase){
  squashPhase = squashPhase || 0; /* 0..1..0 형태로 hop 중간에 커짐 (호출부에서 계산해 넘김) */
  var jump = Math.sin(Math.PI*squashPhase) * (api.cellPx*0.32);
  var sx = 1 + 0.14*Math.sin(Math.PI*squashPhase);
  var sy = 1 - 0.14*Math.sin(Math.PI*squashPhase);
  var r = Math.max(7, Math.min(api.cellPx*0.32, 13));
  ctx.save();
  ctx.translate(px, py-jump);
  ctx.scale(sx, sy);
  ctx.fillStyle = BOARD_COLORS.robot;
  ctx.beginPath(); ctx.arc(0,0,r,0,Math.PI*2); ctx.fill();
  ctx.fillStyle = '#fff';
  ctx.beginPath(); ctx.arc(-r*0.35,-r*0.12,r*0.22,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(r*0.35,-r*0.12,r*0.22,0,Math.PI*2); ctx.fill();
  ctx.fillStyle = BOARD_COLORS.robot;
  ctx.beginPath(); ctx.arc(-r*0.35,-r*0.12,r*0.09,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(r*0.35,-r*0.12,r*0.09,0,Math.PI*2); ctx.fill();
  ctx.restore();
}
function drawConfidenceArrow(ctx, api, pt, dirIdx, strength){
  if(strength<=0.02) return;
  var x=api.gx2px(pt[0]), y=api.gy2px(pt[1]);
  var d = DIRS4[dirIdx];
  var ang = Math.atan2(-d[1], d[0]);
  var len = api.cellPx*0.34*Math.min(1,strength);
  ctx.save();
  ctx.translate(x,y); ctx.rotate(ang);
  var alpha = 0.22+0.65*Math.min(1,strength);
  ctx.strokeStyle = 'rgba(245,166,35,'+alpha+')';
  ctx.fillStyle = 'rgba(245,166,35,'+alpha+')';
  ctx.lineWidth = 1.6+2.2*Math.min(1,strength);
  ctx.lineCap='round';
  ctx.beginPath(); ctx.moveTo(2,0); ctx.lineTo(len,0); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(len+4,0); ctx.lineTo(len-4,-4); ctx.lineTo(len-4,4); ctx.closePath(); ctx.fill();
  ctx.restore();
}
/* 에피소드 개수·길이가 판마다 들쭉날쭉해도(학생이 그린 판 등) 전체 재생 시간이 목표치 안에 들어오도록
   스텝당 시간을 역산한다. 내용이 적으면 한 스텝을 더 오래, 많으면 더 빠르게 보여준다. */
function computePacedStepMs(episodes, playCap, targetTotalMs, minStepMs, maxStepMs){
  var totalSteps = 0;
  for(var i=0;i<playCap;i++){ totalSteps += Math.max(1, episodes[i].trace.length-1); }
  var stepMs = totalSteps>0 ? targetTotalMs/totalSteps : maxStepMs;
  return Math.max(minStepMs, Math.min(maxStepMs, stepMs));
}

/* 격자 위 로봇을 경로를 따라 hop 애니메이션으로 이동시킨다 (명세 6.5).
   opts: stepMs, onFrame(fromPt,toPt,squashPhase), onLand(pt,idx), mineAt(pt)->bool, onMineHit(idx), onDone() */
function animateRobotAlongPath(path, opts){
  opts = opts || {};
  var stepMs = opts.stepMs || 130;
  var i = 0;
  function doStep(){
    if(i >= path.length-1){ if(opts.onDone) opts.onDone(); return; }
    FX.tween({
      duration: FX.reducedMotion ? 1 : stepMs,
      easing: FX.easeInOutQuad,
      onUpdate: function(t){ if(opts.onFrame) opts.onFrame(path[i], path[i+1], t); },
      onDone: function(){
        i++;
        if(opts.onLand) opts.onLand(path[i], i);
        if(opts.mineAt && opts.mineAt(path[i])){ if(opts.onMineHit) opts.onMineHit(i); return; }
        doStep();
      }
    });
  }
  doStep();
}

/* 지뢰찾기 보드 공용 마운트: 격자+집/도착+공개(reveal)+커서. 스테이지별 UI는 이 위에 얹는다. */
function mountMineBoard(container, level, opts){
  opts = opts || {};
  var api = createBoardCanvas(container, level.N, {
    cellPx: opts.cellPx,
    ariaLabel: opts.ariaLabel,
    initialCursor: level.start,
    onActivate: function(gx,gy){ revealCell(gx,gy); },
    onRedraw: function(ctx){ redraw(); }
  });
  var revealed = {};
  var robotPos = level.start.slice();
  var robotSquash = 0;
  var confirmedPath = null; /* 성공한 경로(있으면 금색으로 표시) */

  function revealCell(gx,gy){
    if((gx===level.start[0]&&gy===level.start[1]) || (gx===level.goal[0]&&gy===level.goal[1])) return;
    var k = ptKey(gx,gy);
    if(revealed.hasOwnProperty(k)) return;
    var isMine = level.mines.has(k);
    revealed[k] = isMine ? 'mine' : 'safe';
    redraw();
    var px = api.gx2px(gx), py = api.gy2px(gy);
    var xPct = (px/api.cssW)*100, yPct=(py/api.cssH)*100;
    if(isMine){ FX.mineParticles(api.wrap, xPct, yPct); FX.shakeScreen(); }
    if(opts.onReveal) opts.onReveal(gx,gy,isMine);
  }
  function redraw(){
    drawGridBase(api.ctx, api);
    for(var x=0;x<level.N;x++){ for(var y=0;y<level.N;y++){
      if((x===level.start[0]&&y===level.start[1]) || (x===level.goal[0]&&y===level.goal[1])) continue;
      var k = ptKey(x,y);
      if(!revealed.hasOwnProperty(k)) drawNeutralDot(api.ctx, api, [x,y]);
    }}
    if(confirmedPath) drawPathLine(api.ctx, api, confirmedPath, '#f5a623', 4);
    Object.keys(revealed).forEach(function(k){
      drawRevealMark(api.ctx, api, keyToPt(+k), revealed[k]==='mine');
    });
    drawHome(api.ctx, api, level.start, false);
    drawHome(api.ctx, api, level.goal, true);
    if(opts.extraDraw) opts.extraDraw(api.ctx, api);
    var rp = [api.gx2px(robotPos[0]), api.gy2px(robotPos[1])];
    drawRobot(api.ctx, api, rp[0], rp[1], robotSquash);
    drawCursorRing(api.ctx, api, api.getCursor());
  }
  redraw();
  return {
    api: api, revealed: revealed,
    redraw: redraw,
    reveal: revealCell,
    setConfirmedPath: function(path){ confirmedPath = path; redraw(); },
    setRobotPos: function(pt, squash){ robotPos = pt; robotSquash = squash||0; redraw(); },
    getRobotPos: function(){ return robotPos; }
  };
}

/* 지뢰찾기(deduce)·좌표지목(coordpick) 공용 보드(G2-C §4·§5, coordpick은 §B-4로 재설계).
   hidden=true: 클릭/Enter로 안전 교점은 4이웃 힌트 숫자, 지뢰는 ●(통통) 공개. 자동 연쇄 공개 없음.
   deduce·coordpick 둘 다 hidden=true(coordpick도 지뢰 전부 숨김 — 정찰로만 정보 공개, §B-1).
   kind==='path'일 때만 출발/도착 집 아이콘을 그린다(xy/func판은 §1.5·§1.6처럼 x=0..N-1 점열만 다룬다).
   opts.onCellActivate가 있으면 기본 reveal 대신 그 콜백을 쓴다(coordpick 정찰 예산 게이트용, §B-4). */
function mountHintBoard(container, boardSpec, opts){
  opts = opts || {};
  var N = boardSpec.N, minesSet = boardSpec.mines, kind = boardSpec.kind, hidden = !!boardSpec.hidden;
  var hasHomeGoal = (kind === 'path');
  var start = hasHomeGoal ? [0,0] : null;
  var goal = hasHomeGoal ? [N-1,N-1] : null;
  var hints = hidden ? computeHints(N, minesSet) : null;
  var revealed = {}; /* ptKey -> {isMine, hint} */
  var scaleMap = {};
  /* xy/func판은 고정 출발점이 없으므로(§1.5·§1.6) 로봇을 임의로 (0,0)에 상주시키지 않는다.
     실행("로봇 출발") 시 setRobotPos로 실제 위치를 받아야 비로소 그려진다(major-1 수정 동근원). */
  var robotPos = start ? start.slice() : null;
  var robotSquash = 0;
  var confirmedPath = null;

  var api = createBoardCanvas(container, N, {
    cellPx: opts.cellPx,
    ariaLabel: opts.ariaLabel,
    initialCursor: start || [0,0],
    onActivate: function(gx,gy){
      if(opts.onCellActivate){ opts.onCellActivate(gx,gy); return; }
      if(hidden) revealCell(gx,gy);
    },
    onRedraw: function(){ redraw(); }
  });

  function bounce(k){
    scaleMap[k] = 0;
    FX.tween({
      duration: 260, easing: FX.easeOutBack,
      onUpdate: function(t){ scaleMap[k]=t; redraw(); },
      onDone: function(){ scaleMap[k]=1; redraw(); }
    });
  }
  function markRevealed(gx, gy, animate){
    var k = ptKey(gx,gy);
    if(revealed.hasOwnProperty(k)) return;
    var isMine = minesSet.has(k);
    var hint = isMine ? null : (hints && hints.has(k) ? hints.get(k) : 0);
    revealed[k] = {isMine:isMine, hint:hint};
    if(animate===false){ scaleMap[k]=1; } else { bounce(k); }
  }
  function revealCell(gx,gy){
    var k = ptKey(gx,gy);
    if(revealed.hasOwnProperty(k)) return;
    markRevealed(gx,gy,true);
    var px = api.gx2px(gx), py = api.gy2px(gy);
    var xPct=(px/api.cssW)*100, yPct=(py/api.cssH)*100;
    var isMine = minesSet.has(k);
    if(isMine){ FX.mineParticles(api.wrap, xPct, yPct); }
    if(opts.onReveal) opts.onReveal(gx,gy,isMine,revealed[k].hint);
  }
  if(hidden && boardSpec.preReveal){
    boardSpec.preReveal.forEach(function(pt){ markRevealed(pt[0], pt[1], false); });
  }
  if(!hidden){
    minesSet.forEach(function(k){ revealed[k] = {isMine:true, hint:null}; scaleMap[k]=1; });
  }

  function redraw(){
    drawGridBase(api.ctx, api);
    for(var x=0;x<N;x++){ for(var y=0;y<N;y++){
      if(hasHomeGoal && ((x===start[0]&&y===start[1]) || (x===goal[0]&&y===goal[1]))) continue;
      var k = ptKey(x,y);
      if(!revealed.hasOwnProperty(k)) drawNeutralDot(api.ctx, api, [x,y]);
    }}
    if(confirmedPath) drawPathLine(api.ctx, api, confirmedPath, '#f5a623', 4);
    Object.keys(revealed).forEach(function(k){
      var r = revealed[k];
      var pt = keyToPt(+k);
      var sc = scaleMap.hasOwnProperty(k) ? scaleMap[k] : 1;
      /* 출발/도착 교점의 공개 표시는 그 위에 항상 그려지는 집·로봇 아이콘에 완전히 가려진다
         (path판 사전공개 시드가 항상 출발점이라 매 판마다 발생 — major-1). 그 교점만 대각선
         오프셋으로 그려 아이콘과 겹치지 않게 한다. */
      var dx=0, dy=0;
      if(hasHomeGoal && pt[0]===start[0] && pt[1]===start[1]){ dx=api.cellPx*0.5; dy=-api.cellPx*0.35; }
      else if(hasHomeGoal && pt[0]===goal[0] && pt[1]===goal[1]){ dx=-api.cellPx*0.5; dy=api.cellPx*0.35; }
      if(r.isMine) drawRevealMark(api.ctx, api, pt, true, sc, dx, dy);
      else drawHintNumberMark(api.ctx, api, pt, r.hint, sc, dx, dy);
    });
    if(hasHomeGoal){ drawHome(api.ctx, api, start, false); drawHome(api.ctx, api, goal, true); }
    if(opts.extraDraw) opts.extraDraw(api.ctx, api);
    if(robotPos){
      var rp = [api.gx2px(robotPos[0]), api.gy2px(robotPos[1])];
      drawRobot(api.ctx, api, rp[0], rp[1], robotSquash);
    }
    drawCursorRing(api.ctx, api, api.getCursor());
  }
  redraw();
  return {
    api: api, redraw: redraw, reveal: revealCell, revealed: revealed,
    setConfirmedPath: function(path){ confirmedPath=path; redraw(); },
    setRobotPos: function(pt, squash){ robotPos=pt; robotSquash=squash||0; redraw(); },
    getRobotPos: function(){ return robotPos; },
    start:start, goal:goal
  };
}

/* DeduceBoard(mountHintBoard, hidden=true) 공개 결과의 SR 낭독 문구(G3-03).
   보드 인접 statusEl(aria-live=polite)의 textContent를 교체하는 방식이라, 연타해도
   직전 낭독이 최신 문구로 덮여써서 마지막 결과만 남는다(스팸 방지 자연 충족). */
function hintRevealMsg(gx,gy,isMine,hint){
  return isMine ? ('('+gx+', '+gy+') 칸은 지뢰예요.') : ('('+gx+', '+gy+') 칸 힌트 숫자 '+hint+'.');
}

/* xy/func판(§1.5·§1.6): connectPath(x=0..N-1 점열) 전체가 지뢰를 피하는지만 확인한다(고정 출발/도착 없음). */
function evaluatePointsPath(minesSet, pts){
  var full = connectPath(pts);
  for(var i=0;i<full.length;i++){
    if(minesSet.has(ptKey(full[i][0], full[i][1]))){
      return {success:false, hitIndex:i, fullPath:full.slice(0,i+1)};
    }
  }
  return {success:true, hitIndex:-1, fullPath:full};
}

/* ---- 좌표지목(coordpick) 정찰 예산 카운터·게이트(§B-4, 재설계) ----
   "지뢰 M개 · 정찰 남음 B−p" 카운터를 패널에 붙이고(aria-live, 헤더처럼 항상 보임),
   보드의 onCellActivate로 꽂아 예산 안에서만 새 칸을 연다(소진 시 토스트, 무반응).
   기존 칸 재탭은 mountHintBoard의 reveal 자체가 무반응(회차 이월 없음)이라 그대로 통과시킨다. */
function mountProbeCounter(panelArea, mineCount, budget){
  var minePill = el('span', {class:'stat-pill'}, '지뢰 ' + mineCount + '개');
  var budgetPill = el('span', {class:'stat-pill'});
  var row = el('div', {class:'rl-stat-row', 'aria-live':'polite'}, [minePill, budgetPill]);
  panelArea.appendChild(row);
  var probesUsed = 0;
  function left(){ return Math.max(0, budget - probesUsed); }
  function render(){ budgetPill.textContent = '정찰 남음 ' + left() + '번'; }
  render();
  return { left: left, use: function(){ probesUsed++; render(); } };
}
/* getBoard()는 mountHintBoard의 반환값을 나중에(첫 탭 이후) 읽는 지연 접근자다 — 이 게이트
   객체는 mountHintBoard 호출의 opts로 넘겨야 해서, board 변수가 아직 할당되기 전에 만들어진다. */
function makeCoordPickProbeGate(getBoard, counter){
  return function(gx, gy){
    var board = getBoard();
    var k = ptKey(gx, gy);
    if(board.revealed.hasOwnProperty(k)) return;
    if(counter.left() <= 0){ toast('정찰 기회를 다 썼어요 — 지금까지 정보로 추측해 보세요.'); return; }
    counter.use();
    board.reveal(gx, gy);
  };
}

/* ============================================================
   8) SUPERVISED — 지도학습 3스테이지(직접조종·y표·함수)
   ============================================================ */
var STAGE_RULE_TEXT = {
  1: '각 위치에서 지뢰를 피할 올바른 방향을 로봇에게 알려주세요.',
  2: '지뢰를 피하기 위해 각 x값에서 지뢰가 없는 올바른 y값을 입력해서 무사히 집에 갈 수 있게 하세요.',
  3: '로봇이 도착하기 위한 올바른 y=f(x)를 알려 주세요.'
};
var STAGE_TITLE = { 1:'1) 직접 조종', 2:'2) 올바른 y값 알려주기', 3:'3) 올바른 함수 알려주기' };
/* 개정 §1.1: 바닐라 스테이지당 3판(9판 총). 구 34판 램프(10/12/12)를 대체한다. */
var STAGE_TIER_COUNT = { 1:3, 2:3, 3:3 };
var STAGE3_TYPE_LABEL = { const:'직선', linear:'대각선', quadratic:'포물선' };

function stageProgress(stageNum){ return STATE.screen('s5').supervised[stageNum]; }
function tierUnlocked(stageNum, tier){
  if(tier===1) return true;
  var prog = stageProgress(stageNum);
  return !!prog.cleared[tier-1];
}
function tierStars(stageNum, tier){ var prog=stageProgress(stageNum); return prog.stars[tier]||0; }
function markTierCleared(stageNum, tier, stars){
  var prog = stageProgress(stageNum);
  prog.cleared[tier] = true;
  prog.stars[tier] = Math.max(prog.stars[tier]||0, stars);
  STATE.save();
}
function starsForAttempt(retryCount){
  if(retryCount<=0) return 3;
  if(retryCount<=2) return 2;
  return 1;
}
/* 스테이지3 판 구분(§C1) = 함수 종류. 판 선택 타일에 함수 종류 라벨을 붙인다. */
function stageTileSubLabel(stageNum, tier){
  if(stageNum!==3) return null;
  return STAGE3_TYPE_LABEL[STAGE3_TYPE_BY[tier-1]] || null;
}

function renderStageSelectGrid(container, stageNum, onPick){
  var wrap = el('div', {class:'stage-select'});
  var grid = el('div', {class:'stage-grid', role:'group', 'aria-label': STAGE_TITLE[stageNum]+' 판 선택'});
  var count = STAGE_TIER_COUNT[stageNum];
  for(var t=1; t<=count; t++){
    (function(t){
      var unlocked = tierUnlocked(stageNum, t);
      var stars = tierStars(stageNum, t);
      var cleared = stageProgress(stageNum).cleared[t];
      var sub = stageTileSubLabel(stageNum, t);
      var tile = el('button', {
        type:'button',
        class:'stage-tile' + (cleared?' cleared':'') + (unlocked?'':' locked'),
        disabled: unlocked?null:'disabled',
        'aria-label': stageNum+'-'+t+'판' + (sub?(', '+sub):'') + (cleared?(', 클리어, 별 '+stars+'개'):(unlocked?'':', 잠김'))
      });
      tile.appendChild(el('span',{class:'stage-id'}, stageNum+'-'+t));
      if(sub) tile.appendChild(el('span',{class:'stage-kind-label'}, sub));
      tile.appendChild(el('span',{class:'stars'}, cleared ? '★'.repeat(stars)+'☆'.repeat(3-stars) : (unlocked?'':'🔒')));
      tile.addEventListener('click', function(){ onPick(t); });
      grid.appendChild(tile);
    })(t);
  }
  wrap.appendChild(grid);
  container.appendChild(wrap);
  return wrap;
}

/* ---- 지뢰찾기(deduce)·좌표지목(coordpick) 진행 저장(§C4: 게이팅 무관, 상태 v2 필드 기사용) ---- */
function modeProgress(mode){ return STATE.screen('s5')[mode]; }
function markModeCleared(mode, idx, stars){
  var prog = modeProgress(mode);
  prog.cleared[idx] = true;
  prog.stars[idx] = Math.max(prog.stars[idx]||0, stars);
  STATE.save();
}
function tileKindLabel(cfg){
  if(cfg.kind==='path') return '경로';
  if(cfg.kind==='xy') return '좌표(x·y)';
  return '함수·' + (STAGE3_TYPE_LABEL[cfg.ftype] || cfg.ftype);
}
function renderDeduceCoordGrid(container, mode, onPick){
  var wrap = el('div', {class:'stage-select'});
  var label = mode==='deduce' ? '지뢰찾기' : '좌표 지목';
  var grid = el('div', {class:'stage-grid', role:'group', 'aria-label': label+' 판 선택'});
  var configs = mode==='deduce' ? DEDUCE_CONFIGS : COORDPICK_CONFIGS;
  var prog = modeProgress(mode);
  configs.forEach(function(cfg, i){
    var stars = prog.stars[i]||0;
    var cleared = !!prog.cleared[i];
    var sub = tileKindLabel(cfg);
    var tile = el('button', {
      type:'button', class:'stage-tile' + (cleared?' cleared':''),
      'aria-label': (i+1)+'판, '+sub + (cleared?(', 클리어, 별 '+stars+'개'):'')
    });
    tile.appendChild(el('span',{class:'stage-id'}, String(i+1)));
    tile.appendChild(el('span',{class:'stage-kind-label'}, sub));
    tile.appendChild(el('span',{class:'stars'}, cleared ? '★'.repeat(stars)+'☆'.repeat(3-stars) : ''));
    tile.addEventListener('click', function(){ onPick(i); });
    grid.appendChild(tile);
  });
  wrap.appendChild(grid);
  container.appendChild(wrap);
  return wrap;
}
/* 스테이지3 목표 제시 규칙카드 — 원문(STAGE_RULE_TEXT[3]) 보존, y=f(x) 구간만 KaTeX로 표시(G2-C §9) */
function appendStageRuleCard(container, stageNum){
  var ruleCard = el('div', {class:'rule-card'});
  ruleCard.appendChild(el('b',{},'목표 제시: '));
  if(stageNum===3){
    ruleCard.appendChild(document.createTextNode('로봇이 도착하기 위한 올바른 '));
    ruleCard.appendChild(el('span',{'data-katex':'y=f(x)'}));
    ruleCard.appendChild(document.createTextNode('를 알려 주세요.'));
  } else {
    ruleCard.appendChild(document.createTextNode(STAGE_RULE_TEXT[stageNum]));
  }
  container.appendChild(ruleCard);
}
/* 함수 계수 표시(스테이지3·deduce/coordpick 함수판 공용) */
function fmtCoef(v){ return (Math.round(v*100)/100).toString(); }
function fmtFuncTermTex(coef, texVar){
  if(coef===0) return null;
  var abs = Math.abs(coef);
  var body = (abs===1 && texVar) ? texVar : (fmtCoef(abs) + texVar);
  return {neg: coef<0, body: body};
}
function funcExprTex(a,b,c){
  var terms = [fmtFuncTermTex(a,'x^2'), fmtFuncTermTex(b,'x'), fmtFuncTermTex(c,'')].filter(function(t){ return t; });
  if(terms.length===0) return 'y=0';
  var out = (terms[0].neg?'-':'') + terms[0].body;
  for(var i=1;i<terms.length;i++){ out += (terms[i].neg?'-':'+') + terms[i].body; }
  return 'y=' + out;
}

function mountStage1Play(boardArea, panelArea, tier, onCleared){
  var p = stage1Tier(tier);
  var level = genStage1Level(p.N, p.mines, 1000+tier, 0.7);
  var retryCount = 0;
  var statusEl = el('div', {class:'board-status', 'aria-live':'polite'}, '출발 전 교점을 눌러 지뢰를 미리 살펴보세요.');
  panelArea.appendChild(statusEl);
  var board = mountMineBoard(boardArea, level, {
    cellPx: computeSquareCellPx(boardArea, p.N),
    ariaLabel: (p.N)+'칸 보드. 교점을 눌러 지뢰인지 안전한지 확인합니다.'
  });
  var running = false;
  var arrowUI = mountArrowQueue(panelArea, function(queue){
    if(running) return;
    running = true;
    var res = executeCommands(level.N, level.mines, level.start, level.goal, queue);
    statusEl.textContent = '로봇이 이동합니다…';
    animateRobotAlongPath(res.trace, {
      stepMs: 120,
      onFrame: function(from,to,t){
        var px = api_lerp(board.api.gx2px(from[0]), board.api.gx2px(to[0]), t);
        var py = api_lerp(board.api.gy2px(from[1]), board.api.gy2px(to[1]), t);
        board.redraw();
        drawRobot(board.api.ctx, board.api, px, py, t);
      },
      onLand: function(pt){ board.setRobotPos(pt, 0); },
      mineAt: function(pt){ return level.mines.has(ptKey(pt[0],pt[1])); },
      onMineHit: function(){
        board.reveal(board.getRobotPos()[0], board.getRobotPos()[1]);
        retryCount++;
        statusEl.textContent = '지뢰를 밟았어요! 다시 시도해보세요. (재시도 ' + retryCount + '회)';
        setTimeout(function(){
          board.setRobotPos(level.start, 0);
          running = false;
        }, 500);
      },
      onDone: function(){
        if(res.success){
          statusEl.textContent = '도착 성공!';
          var stars = starsForAttempt(retryCount);
          board.setConfirmedPath(res.trace);
          FX.confetti(board.api.wrap, {xPct:90, yPct:10, count:28});
          markTierCleared(1, tier, stars);
          if(onCleared) onCleared(stars);
        } else {
          statusEl.textContent = '아직 도착하지 못했어요. 명령을 수정해보세요.';
          setTimeout(function(){ board.setRobotPos(level.start,0); running=false; }, 300);
        }
      }
    });
  }, function(){ statusEl.textContent = '명령을 다시 구성해보세요.'; });
  return { getLevel:function(){ return level; } };
}
function api_lerp(a,b,t){ return a+(b-a)*t; }

function mountArrowQueue(container, onRun, onClear){
  var queue = [];
  var wrap = el('div', {class:'screen-block'});
  wrap.appendChild(el('div', {class:'muted'}, '화살표 카드를 눌러(또는 드래그해) 이동 명령을 순서대로 쌓으세요.'));
  var cardsRow = el('div', {class:'arrow-card-row'});
  var order = [0,2,1,3]; /* → ↑ ← ↓ 순서로 보여주기 */
  order.forEach(function(d){
    var btn = el('button', {type:'button', class:'arrow-card', draggable:'true', 'aria-label': dirName(d)+' 명령 추가'}, dirSymbol(d));
    btn.addEventListener('click', function(){ queue.push(d); renderQueue(); FX.pop(btn); });
    btn.addEventListener('dragstart', function(e){ e.dataTransfer.setData('text/plain', String(d)); });
    cardsRow.appendChild(btn);
  });
  cardsRow.addEventListener('keydown', function(e){
    var map = {ArrowRight:0, ArrowLeft:1, ArrowUp:2, ArrowDown:3};
    if(map[e.key]!=null){ e.preventDefault(); queue.push(map[e.key]); renderQueue(); }
  });
  var track = el('div', {class:'queue-track', 'aria-label':'명령 목록. 칩을 누르면 그 칩을 지웁니다.'});
  track.addEventListener('dragover', function(e){ e.preventDefault(); });
  track.addEventListener('drop', function(e){ e.preventDefault(); var d=+e.dataTransfer.getData('text/plain'); if(!isNaN(d)){ queue.push(d); renderQueue(); FX.pop(track); } });
  function renderQueue(focusIdx){
    track.innerHTML='';
    if(queue.length===0){
      track.appendChild(el('span',{class:'queue-empty'},'아직 명령이 없어요'));
      /* 마지막 칩을 지워 목록이 비면 focus가 innerHTML='' 재작성으로 body에 떨어진다(G3-11) —
         남을 칩이 없으니 track 자신에게 잠깐 포커스를 준다. */
      if(typeof focusIdx === 'number'){
        if(!track.hasAttribute('tabindex')) track.setAttribute('tabindex','-1');
        track.focus({preventScroll:true});
      }
      return;
    }
    var chips = [];
    queue.forEach(function(d,idx){
      var chip = el('button', {type:'button', class:'queue-chip', 'aria-label':(idx+1)+'번째 명령 '+dirName(d)+', 눌러서 삭제'}, dirSymbol(d));
      chip.addEventListener('click', function(){ queue.splice(idx,1); renderQueue(idx); });
      track.appendChild(chip);
      chips.push(chip);
    });
    /* 삭제 후 그 자리로 슬라이드해 들어온 다음 칩(없으면 마지막 칩)에 포커스를 되돌린다(G3-11). */
    if(typeof focusIdx === 'number') chips[Math.min(focusIdx, chips.length-1)].focus({preventScroll:true});
  }
  renderQueue();
  var btnRow = el('div', {class:'btn-row', style:{marginTop:'8px'}});
  var runBtn = el('button', {type:'button', class:'btn btn-primary btn-sm'}, '▶ 실행');
  var clearBtn = el('button', {type:'button', class:'btn btn-secondary btn-sm'}, '명령 초기화');
  runBtn.addEventListener('click', function(){ if(queue.length) onRun(queue.slice()); });
  clearBtn.addEventListener('click', function(){ queue=[]; renderQueue(); if(onClear) onClear(); });
  btnRow.appendChild(runBtn); btnRow.appendChild(clearBtn);
  wrap.appendChild(cardsRow); wrap.appendChild(track); wrap.appendChild(btnRow);
  container.appendChild(wrap);
  return { getQueue:function(){ return queue.slice(); }, clear:function(){ queue=[]; renderQueue(); } };
}

function evaluateCheckpointPath(level, points){
  var full = connectPath([level.start].concat(points, [level.goal]));
  for(var i=1;i<full.length;i++){
    if(level.mines.has(ptKey(full[i][0], full[i][1]))){
      return {success:false, hitIndex:i, fullPath:full.slice(0,i+1)};
    }
  }
  return {success:true, hitIndex:-1, fullPath:full};
}

function mountStage2Play(boardArea, panelArea, tier, onCleared){
  var p = stage2Tier(tier);
  var level = genStage2Level(p.N, p.cols, p.mines, 2000+tier);
  var retryCount = 0;
  var statusEl = el('div', {class:'board-status', 'aria-live':'polite'}, '출발 전 교점을 눌러 지뢰를 미리 살펴보세요.');
  panelArea.appendChild(statusEl);
  var board = mountMineBoard(boardArea, level, {
    cellPx: computeSquareCellPx(boardArea, p.N),
    ariaLabel: p.N+'칸 보드. 교점을 눌러 지뢰인지 안전한지 확인합니다.'
  });

  var tableWrap = el('div', {class:'xy-wrap'});
  var table = el('table', {class:'xy-table'});
  var rowX = el('tr', {}); rowX.appendChild(el('th',{}, el('span',{'data-katex':'x'})));
  level.xs.forEach(function(x){ rowX.appendChild(el('td',{}, String(x))); });
  var rowY = el('tr', {}); rowY.appendChild(el('th',{}, el('span',{'data-katex':'y'})));
  var inputs = [];
  level.xs.forEach(function(x, idx){
    var td = el('td', {});
    var inp = el('input', {type:'number', class:'xy-input', 'aria-label':'x='+x+'일 때 안전한 y', inputmode:'numeric'});
    inp.addEventListener('change', function(){ checkOne(idx, inp); refreshRunEnabled(); });
    td.appendChild(inp); rowY.appendChild(td); inputs.push(inp);
  });
  table.appendChild(rowX); table.appendChild(rowY);
  tableWrap.appendChild(table);
  panelArea.appendChild(tableWrap);
  function checkOne(idx, inp){
    var v = inp.value.trim();
    if(v===''){ inp.classList.remove('correct','wrong'); return; }
    var num = parseInt(v,10);
    var correctY = level.checkpoints[idx][1];
    if(num===correctY){ inp.classList.remove('wrong'); inp.classList.add('correct'); FX.pop(inp); }
    else { inp.classList.remove('correct'); inp.classList.add('wrong'); }
  }
  var btnRow = el('div', {class:'btn-row', style:{margin:'8px 0'}});
  var runBtn = el('button', {type:'button', class:'btn btn-primary btn-sm', disabled:'disabled'}, '▶ 로봇 출발');
  btnRow.appendChild(runBtn);
  panelArea.appendChild(btnRow);
  function refreshRunEnabled(){
    var allFilled = inputs.every(function(i){ return i.value.trim()!==''; });
    setDisabled(runBtn, !allFilled);
  }
  var running=false;
  runBtn.addEventListener('click', function(){
    if(running) return;
    running = true;
    var pts = inputs.map(function(inp, idx){ return [level.xs[idx], parseInt(inp.value,10)]; });
    var evalRes = evaluateCheckpointPath(level, pts);
    statusEl.textContent = '로봇이 이동합니다…';
    animateRobotAlongPath(evalRes.fullPath, {
      stepMs: 90,
      onFrame: function(from,to,t){
        var px = api_lerp(board.api.gx2px(from[0]), board.api.gx2px(to[0]), t);
        var py = api_lerp(board.api.gy2px(from[1]), board.api.gy2px(to[1]), t);
        board.redraw(); drawRobot(board.api.ctx, board.api, px, py, t);
      },
      onLand: function(pt){ board.setRobotPos(pt, 0); },
      mineAt: function(){ return false; },
      onDone: function(){
        if(evalRes.success){
          statusEl.textContent = '도착 성공!';
          inputs.forEach(function(inp,idx){ checkOne(idx, inp); });
          var stars = starsForAttempt(retryCount);
          board.setConfirmedPath(evalRes.fullPath);
          FX.confetti(board.api.wrap, {xPct:90, yPct:10, count:28});
          markTierCleared(2, tier, stars);
          if(onCleared) onCleared(stars);
        } else {
          var hitPt = evalRes.fullPath[evalRes.fullPath.length-1];
          board.reveal(hitPt[0], hitPt[1]);
          retryCount++;
          statusEl.textContent = '지뢰를 밟았어요! y값을 다시 입력해보세요. (재시도 ' + retryCount + '회)';
          setTimeout(function(){ board.setRobotPos(level.start,0); running=false; }, 500);
        }
      }
    });
  });
  return { getLevel:function(){ return level; } };
}

/* 개정 §1.1: 3판 = 직선(상수, tier1)·대각선(일차, tier2)·포물선(이차, tier3). tier가 곧 최대 차수. */
function funcMaxDegreeForTier(tier){ return tier-1; }
function mountStage3Play(boardArea, panelArea, tier, onCleared){
  var p = stage3Tier(tier);
  var level = genStage3Level(p.N, p.type, p.mines, STAGE3_SEED_BY[tier-1]);
  var retryCount = 0;
  var maxDeg = funcMaxDegreeForTier(tier);
  var statusEl = el('div', {class:'board-status', 'aria-live':'polite'}, '출발 전 교점을 눌러 지뢰를 미리 살펴보세요.');
  panelArea.appendChild(statusEl);

  /* coef/degree는 보드 최초 redraw(extraDraw가 즉시 호출됨)보다 먼저 값이 있어야 한다 */
  var coef = {a:0, b:0, c: Math.floor(p.N/2)};
  var degree = 0; /* 0=상수 1=일차 2=이차 */

  var board = mountMineBoard(boardArea, level, {
    cellPx: computeSquareCellPx(boardArea, p.N),
    ariaLabel: p.N+'칸 보드. 교점을 눌러 지뢰인지 안전한지 확인합니다.',
    extraDraw: function(ctx, api){ drawFuncPreview(ctx, api); }
  });

  var panel = el('div', {class:'func-panel'});
  panel.appendChild(el('div', {class:'func-formula-label'}, [document.createTextNode('함수 형태: '), el('span',{'data-katex':'f(x)=ax^2+bx+c'})]));
  var typeOptions = [{value:0,label:'상수'},{value:1,label:'일차'},{value:2,label:'이차'}].filter(function(o){ return o.value<=maxDeg; });
  panel.appendChild(Components.SegToggle({
    ariaLabel:'함수 종류', value:degree, options:typeOptions,
    onChange:function(v){ degree=v; if(degree<2) coef.a=0; if(degree<1) coef.b=0; renderCoefRows(); updatePreview(); }
  }));
  var coefArea = el('div', {});
  panel.appendChild(coefArea);
  var exprEl = el('div', {class:'func-expr', style:{marginTop:'8px'}});
  var exprMath = el('span', {'data-katex':''});
  exprEl.appendChild(exprMath);
  panel.appendChild(exprEl);
  panelArea.appendChild(panel);

  function stepper(label, key, lo, hi, step, deco){
    var row = el('div', {class:'coef-row'});
    row.appendChild(el('span',{class:'coef-label'}, label));
    var group = el('div', {class:'stepper-group'});
    var minus = el('button', {type:'button', class:'stepper-btn', 'aria-label':label+' 줄이기'}, '−');
    var valSpan = el('span', {class:'stepper-val'}, fmtCoef(coef[key]));
    var plus = el('button', {type:'button', class:'stepper-btn', 'aria-label':label+' 늘리기'}, '+');
    function set(v){
      v = Math.round(v/step)*step;
      v = Math.max(lo, Math.min(hi, v));
      coef[key] = Math.round(v*1000)/1000;
      valSpan.textContent = fmtCoef(coef[key]);
      updatePreview();
    }
    minus.addEventListener('click', function(){ set(coef[key]-step); FX.pop(valSpan); });
    plus.addEventListener('click', function(){ set(coef[key]+step); FX.pop(valSpan); });
    group.appendChild(minus); group.appendChild(valSpan); group.appendChild(plus);
    row.appendChild(group);
    return row;
  }
  function renderCoefRows(){
    coefArea.innerHTML='';
    if(degree>=2) coefArea.appendChild(stepper('x² 계수 a', 'a', -2, 2, 0.1));
    if(degree>=1) coefArea.appendChild(stepper('x 계수 b', 'b', -(2*(p.N-1)), 2*(p.N-1), 0.5));
    coefArea.appendChild(stepper('상수 c', 'c', -(2*(p.N-1)), 2*(p.N-1), 1));
  }
  renderCoefRows();

  function currentPoints(){
    var pts=[]; var anyOOB=false;
    for(var x=0;x<level.N;x++){
      var y = evalF(coef.a, coef.b, coef.c, x);
      if(y<0 || y>level.N-1) anyOOB=true;
      pts.push([x, Math.max(0,Math.min(level.N-1,y))]);
    }
    return {pts:pts, anyOOB:anyOOB};
  }
  function drawFuncPreview(ctx, api){
    var r = currentPoints();
    drawPathLine(ctx, api, r.pts, r.anyOOB ? 'rgba(229,72,77,.55)' : 'rgba(245,166,35,.55)', 2.5);
  }
  function updatePreview(){
    exprMath.setAttribute('data-katex', funcExprTex(coef.a, coef.b, coef.c));
    renderMath(exprEl);
    board.redraw();
    if(currentPoints().anyOOB){ statusEl.textContent = '이 함수는 보드를 벗어나요. 계수를 조절해보세요.'; }
    else if(statusEl.textContent.indexOf('벗어나요')>=0){ statusEl.textContent='출발 전 교점을 눌러 지뢰를 미리 살펴보세요.'; }
  }
  updatePreview();

  var btnRow = el('div', {class:'btn-row', style:{margin:'8px 0'}});
  var runBtn = el('button', {type:'button', class:'btn btn-primary btn-sm'}, '▶ 이 함수로 출발');
  btnRow.appendChild(runBtn);
  panelArea.appendChild(btnRow);
  var running=false;
  runBtn.addEventListener('click', function(){
    if(running) return;
    var r = currentPoints();
    running = true;
    var evalRes = evaluateCheckpointPath(level, r.pts);
    statusEl.textContent = '로봇이 이동합니다…';
    animateRobotAlongPath(evalRes.fullPath, {
      stepMs: 70,
      onFrame: function(from,to,t){
        var px = api_lerp(board.api.gx2px(from[0]), board.api.gx2px(to[0]), t);
        var py = api_lerp(board.api.gy2px(from[1]), board.api.gy2px(to[1]), t);
        board.redraw(); drawFuncPreview(board.api.ctx, board.api); drawRobot(board.api.ctx, board.api, px, py, t);
      },
      onLand: function(pt){ board.setRobotPos(pt,0); },
      mineAt: function(){ return false; },
      onDone: function(){
        /* OOB 주행 허용(수정요청_S5-우회봉쇄-OOB주행-로봇집표시_v1 §3 D-B): 발사 자체는 항상
           가능(위 anyOOB 차단 제거). 승리는 (지뢰 없음)&&(!anyOOB)일 때만 — 보드를 벗어난 채
           생존 완주해도 비클리어로 안내하고 재도전 상태로 되돌린다. */
        if(evalRes.success && !r.anyOOB){
          statusEl.textContent = '도착 성공!';
          var stars = starsForAttempt(retryCount);
          board.setConfirmedPath(evalRes.fullPath);
          FX.confetti(board.api.wrap, {xPct:90, yPct:10, count:28});
          markTierCleared(3, tier, stars);
          if(onCleared) onCleared(stars);
        } else if(evalRes.success && r.anyOOB){
          statusEl.textContent = '끝까지 살아남았어요! 그런데 함수가 보드를 벗어나 있어요 — 보드 안에 담기게 계수를 조절해 보세요.';
          setTimeout(function(){ board.setRobotPos(level.start,0); running=false; }, 500);
        } else {
          var hitPt = evalRes.fullPath[evalRes.fullPath.length-1];
          board.reveal(hitPt[0], hitPt[1]);
          retryCount++;
          statusEl.textContent = '지뢰를 밟았어요! 함수를 다시 조절해보세요. (재시도 ' + retryCount + '회)';
          setTimeout(function(){ board.setRobotPos(level.start,0); running=false; }, 500);
        }
      }
    });
  });
  return { getLevel:function(){ return level; } };
}

/* ---- 지뢰찾기(deduce)·좌표지목(coordpick) 판 진행(G2-C §4·§5·§6, 심화·선택) ---- */

/* deduce 경로판: 숨은 지뢰 + 4이웃 힌트. 답 표현 = ArrowQueue(바닐라 스테이지1과 동일 메커니즘 재사용). */
function mountDeducePathPlay(boardArea, panelArea, boardSpec, onCleared){
  var N = boardSpec.N, minesSet = boardSpec.mines;
  var start=[0,0], goal=[N-1,N-1];
  var statusEl = el('div', {class:'board-status', 'aria-live':'polite'}, '교점을 눌러 지뢰를 추리한 뒤, 화살표로 안전한 길을 알려주세요.');
  panelArea.appendChild(statusEl);
  panelArea.appendChild(el('div', {class:'rule-card'}, '숫자 = 그 교점의 상하좌우 이웃 중 지뢰 개수'));
  var board = mountHintBoard(boardArea, {N:N, mines:minesSet, kind:'path', hidden:true, preReveal:boardSpec.preReveal}, {
    cellPx: computeSquareCellPx(boardArea, N),
    ariaLabel: N+'칸 보드. 교점을 눌러 지뢰인지 안전한지 확인합니다.',
    onReveal: function(gx,gy,isMine,hint){ statusEl.textContent = hintRevealMsg(gx,gy,isMine,hint); }
  });
  var retryCount=0, running=false;
  mountArrowQueue(panelArea, function(queue){
    if(running) return;
    running = true;
    var res = executeCommands(N, minesSet, start, goal, queue);
    statusEl.textContent = '로봇이 이동합니다…';
    board.setRobotPos(start, 0);
    animateRobotAlongPath(res.trace, {
      stepMs: 120,
      onFrame: function(from,to,t){
        var px = api_lerp(board.api.gx2px(from[0]), board.api.gx2px(to[0]), t);
        var py = api_lerp(board.api.gy2px(from[1]), board.api.gy2px(to[1]), t);
        board.redraw(); drawRobot(board.api.ctx, board.api, px, py, t);
      },
      onLand: function(pt){ board.setRobotPos(pt, 0); },
      mineAt: function(pt){ return minesSet.has(ptKey(pt[0],pt[1])); },
      onMineHit: function(){
        board.reveal(board.getRobotPos()[0], board.getRobotPos()[1]);
        retryCount++;
        statusEl.textContent = '지뢰를 밟았어요! 다시 시도해보세요. (재시도 ' + retryCount + '회)';
        setTimeout(function(){ board.setRobotPos(start,0); running=false; }, 500);
      },
      onDone: function(){
        if(res.success){
          statusEl.textContent = '도착 성공!';
          var stars = starsForAttempt(retryCount);
          board.setConfirmedPath(res.trace);
          FX.confetti(board.api.wrap, {xPct:90, yPct:10, count:28});
          markModeCleared('deduce', boardSpec.idx, stars);
          if(onCleared) onCleared(stars);
        } else {
          statusEl.textContent = '아직 도착하지 못했어요. 명령을 수정해보세요.';
          setTimeout(function(){ board.setRobotPos(start,0); running=false; }, 300);
        }
      }
    });
  }, function(){ statusEl.textContent = '명령을 다시 구성해보세요.'; });
}

/* coordpick 경로판(재설계, §B): 지뢰 전부 숨김. 정찰(칸 열기, 예산 게이트)로 정보를 모으고,
   답 제출은 지뢰찾기 경로판과 같은 화살표 명령 큐(ArrowQueue·executeCommands)로 한다 — 지뢰가
   안 보이므로 옛 coordpick처럼 보드를 직접 클릭해 지뢰 칸을 걸러내며 경로를 그릴 수 없다(클릭
   시점엔 지뢰 여부를 모른다). 정찰 예산과 무관하게 언제든 제출 가능(§B-1), 오답이면 밟은
   지뢰 칸만 공개(전체 공개 금지). */
function mountCoordPickPathPlay(boardArea, panelArea, boardSpec, onCleared){
  var N = boardSpec.N, minesSet = boardSpec.mines;
  var start=[0,0], goal=[N-1,N-1];
  var statusEl = el('div', {class:'board-status', 'aria-live':'polite'},
    '정찰(칸 열기)로 정보를 모으고, 화살표로 안전한 길을 알려주세요.');
  panelArea.appendChild(statusEl);
  panelArea.appendChild(el('div', {class:'rule-card'}, '숫자 = 그 교점의 상하좌우 이웃 중 지뢰 개수'));
  var counter = mountProbeCounter(panelArea, minesSet.size, boardSpec.budget);
  var board;
  board = mountHintBoard(boardArea, {N:N, mines:minesSet, kind:'path', hidden:true, preReveal:null}, {
    cellPx: computeSquareCellPx(boardArea, N),
    ariaLabel: N+'칸 보드. 정찰 예산 안에서 교점을 눌러 지뢰인지 안전한지 확인합니다.',
    onCellActivate: makeCoordPickProbeGate(function(){ return board; }, counter),
    onReveal: function(gx,gy,isMine,hint){ statusEl.textContent = hintRevealMsg(gx,gy,isMine,hint); }
  });
  var retryCount=0, running=false;
  mountArrowQueue(panelArea, function(queue){
    if(running) return;
    running = true;
    var res = executeCommands(N, minesSet, start, goal, queue);
    statusEl.textContent = '로봇이 이동합니다…';
    board.setRobotPos(start, 0);
    animateRobotAlongPath(res.trace, {
      stepMs: 120,
      onFrame: function(from,to,t){
        var px = api_lerp(board.api.gx2px(from[0]), board.api.gx2px(to[0]), t);
        var py = api_lerp(board.api.gy2px(from[1]), board.api.gy2px(to[1]), t);
        board.redraw(); drawRobot(board.api.ctx, board.api, px, py, t);
      },
      onLand: function(pt){ board.setRobotPos(pt, 0); },
      mineAt: function(pt){ return minesSet.has(ptKey(pt[0],pt[1])); },
      onMineHit: function(){
        board.reveal(board.getRobotPos()[0], board.getRobotPos()[1]);
        retryCount++;
        statusEl.textContent = '지뢰를 밟았어요! 다시 시도해보세요. (재시도 ' + retryCount + '회)';
        setTimeout(function(){ board.setRobotPos(start,0); running=false; }, 500);
      },
      onDone: function(){
        if(res.success){
          statusEl.textContent = '도착 성공!';
          var stars = starsForAttempt(retryCount);
          board.setConfirmedPath(res.trace);
          FX.confetti(board.api.wrap, {xPct:90, yPct:10, count:28});
          markModeCleared('coordpick', boardSpec.idx, stars);
          if(onCleared) onCleared(stars);
        } else {
          statusEl.textContent = '아직 도착하지 못했어요. 명령을 수정해보세요.';
          setTimeout(function(){ board.setRobotPos(start,0); running=false; }, 300);
        }
      }
    });
  }, function(){ statusEl.textContent = '명령을 다시 구성해보세요.'; });
}

/* xy판(deduce·coordpick 공용): x=0..N-1 전체 열 표(§1.5). deduce는 예산 없이 자유롭게 정찰,
   coordpick은 정찰 예산 게이트(§B-4, 재설계 — 보드는 이제 둘 다 hidden:true로 통일). */
function mountXYFullPlay(boardArea, panelArea, boardSpec, mode, onCleared){
  var N = boardSpec.N, minesSet = boardSpec.mines;
  var statusEl = el('div', {class:'board-status', 'aria-live':'polite'},
    mode==='deduce' ? '교점을 눌러 지뢰를 추리한 뒤, 각 x의 안전한 y값을 표에 입력하세요.' : '정찰(칸 열기)로 정보를 모으고, 각 x의 안전한 y값을 표에 입력하세요.');
  panelArea.appendChild(statusEl);
  panelArea.appendChild(el('div', {class:'rule-card'}, '숫자 = 그 교점의 상하좌우 이웃 중 지뢰 개수'));
  var counter = (mode==='coordpick') ? mountProbeCounter(panelArea, minesSet.size, boardSpec.budget) : null;
  /* 로봇(x=0)·집(x=N-1) 프리뷰 연동(수정요청_S5-우회봉쇄-OOB주행-로봇집표시_v1 §3 D-C-2).
     클램프는 아래 runBtn 발사 로직과 동일 규칙, 빈 값은 표시하지 않는다. */
  function clampY(v){ return Math.max(0, Math.min(N-1, parseInt(v,10)||0)); }
  function updateRobotPreview(){
    if(running) return;
    var v0 = inputs[0].value.trim();
    board.setRobotPos(v0==='' ? null : [0, clampY(v0)], 0);
  }
  var board;
  board = mountHintBoard(boardArea, {N:N, mines:minesSet, kind:'xy', hidden:true, preReveal: boardSpec.preReveal}, {
    cellPx: computeSquareCellPx(boardArea, N),
    ariaLabel: N+'칸 보드.' + (mode==='deduce' ? ' 교점을 눌러 지뢰인지 안전한지 확인합니다.' : ' 정찰 예산 안에서 교점을 눌러 지뢰인지 안전한지 확인합니다.'),
    onCellActivate: counter ? makeCoordPickProbeGate(function(){ return board; }, counter) : null,
    onReveal: function(gx,gy,isMine,hint){ statusEl.textContent = hintRevealMsg(gx,gy,isMine,hint); },
    extraDraw: function(ctx, api){
      if(!inputs || inputs.length<N) return;
      var vN = inputs[N-1].value.trim();
      if(vN!=='') drawHome(ctx, api, [N-1, clampY(vN)], true);
    }
  });
  panelArea.appendChild(el('div', {class:'func-formula-label'}, [document.createTextNode('표에 채우는 좌표: '), el('span',{'data-katex':'(x, y)'})]));
  var tableWrap = el('div', {class:'xy-wrap'});
  var table = el('table', {class:'xy-table'});
  var rowX = el('tr', {}); rowX.appendChild(el('th',{}, el('span',{'data-katex':'x'})));
  var rowY = el('tr', {}); rowY.appendChild(el('th',{}, el('span',{'data-katex':'y'})));
  var inputs = [];
  for(var x=0; x<N; x++){
    rowX.appendChild(el('td', {}, String(x)));
    var td = el('td', {});
    var inp = el('input', {type:'number', class:'xy-input', 'aria-label':'x='+x+'일 때 안전한 y', inputmode:'numeric'});
    inp.addEventListener('input', function(){ refreshRunEnabled(); updateRobotPreview(); });
    td.appendChild(inp); rowY.appendChild(td); inputs.push(inp);
  }
  table.appendChild(rowX); table.appendChild(rowY);
  tableWrap.appendChild(table);
  panelArea.appendChild(tableWrap);
  var btnRow = el('div', {class:'btn-row', style:{margin:'8px 0'}});
  var runBtn = el('button', {type:'button', class:'btn btn-primary btn-sm', disabled:'disabled'}, '▶ 로봇 출발');
  btnRow.appendChild(runBtn);
  panelArea.appendChild(btnRow);
  function refreshRunEnabled(){
    var allFilled = inputs.every(function(i){ return i.value.trim()!==''; });
    setDisabled(runBtn, !allFilled);
  }
  var retryCount=0, running=false;
  runBtn.addEventListener('click', function(){
    if(running) return;
    running = true;
    var pts = inputs.map(function(inp, idx){ return [idx, Math.max(0, Math.min(N-1, parseInt(inp.value,10)||0))]; });
    var evalRes = evaluatePointsPath(minesSet, pts);
    statusEl.textContent = '로봇이 이동합니다…';
    board.setRobotPos(evalRes.fullPath[0], 0);
    animateRobotAlongPath(evalRes.fullPath, {
      stepMs: 90,
      onFrame: function(from,to,t){
        var px = api_lerp(board.api.gx2px(from[0]), board.api.gx2px(to[0]), t);
        var py = api_lerp(board.api.gy2px(from[1]), board.api.gy2px(to[1]), t);
        board.redraw(); drawRobot(board.api.ctx, board.api, px, py, t);
      },
      onLand: function(pt){ board.setRobotPos(pt, 0); },
      mineAt: function(){ return false; },
      onDone: function(){
        if(evalRes.success){
          statusEl.textContent = '도착 성공!';
          var stars = starsForAttempt(retryCount);
          board.setConfirmedPath(evalRes.fullPath);
          FX.confetti(board.api.wrap, {xPct:90, yPct:10, count:28});
          markModeCleared(mode, boardSpec.idx, stars);
          /* running을 여기서 되돌리지 않는다(G3-08) — path/deduce판과 동일하게 성공 후 재실행을
             막아, 재클릭으로 onCleared(별점+버튼 행)가 패널에 중복 축적되는 걸 막는다. */
          if(onCleared) onCleared(stars);
        } else {
          var hitPt = evalRes.fullPath[evalRes.fullPath.length-1];
          board.reveal(hitPt[0], hitPt[1]);
          retryCount++;
          statusEl.textContent = '지뢰를 밟았어요! y값을 다시 입력해보세요. (재시도 ' + retryCount + '회)';
          setTimeout(function(){ running=false; }, 500);
        }
      }
    });
  });
}

/* func판(deduce·coordpick 공용): FunctionInput(스테이지3 계열 재사용) + GraphOverlay(extraDraw).
   coordpick은 정찰 예산 게이트(§B-4, 재설계 — 보드는 이제 둘 다 hidden:true로 통일). */
function mountFuncPlay(boardArea, panelArea, boardSpec, mode, onCleared){
  var N = boardSpec.N, minesSet = boardSpec.mines;
  var statusEl = el('div', {class:'board-status', 'aria-live':'polite'},
    mode==='deduce' ? '교점을 눌러 지뢰를 추리한 뒤, 지뢰를 피하는 함수를 만들어보세요.' : '정찰(칸 열기)로 정보를 모으고, 지뢰를 피하는 함수를 만들어보세요.');
  panelArea.appendChild(statusEl);
  panelArea.appendChild(el('div', {class:'rule-card'}, '숫자 = 그 교점의 상하좌우 이웃 중 지뢰 개수'));
  var counter = (mode==='coordpick') ? mountProbeCounter(panelArea, minesSet.size, boardSpec.budget) : null;

  var coef = {a:0, b:0, c: Math.floor(N/2)};
  var degree = 0;
  var board;
  board = mountHintBoard(boardArea, {N:N, mines:minesSet, kind:boardSpec.kind, hidden:true, preReveal: boardSpec.preReveal}, {
    cellPx: computeSquareCellPx(boardArea, N),
    ariaLabel: N+'칸 보드.' + (mode==='deduce' ? ' 교점을 눌러 지뢰인지 안전한지 확인합니다.' : ' 정찰 예산 안에서 교점을 눌러 지뢰인지 안전한지 확인합니다.'),
    onCellActivate: counter ? makeCoordPickProbeGate(function(){ return board; }, counter) : null,
    onReveal: function(gx,gy,isMine,hint){ statusEl.textContent = hintRevealMsg(gx,gy,isMine,hint); },
    extraDraw: function(ctx, api){ drawFuncPreview(ctx, api); }
  });

  var panel = el('div', {class:'func-panel'});
  panel.appendChild(el('div', {class:'func-formula-label'}, [document.createTextNode('함수 형태: '), el('span',{'data-katex':'f(x)=ax^2+bx+c'})]));
  panel.appendChild(Components.SegToggle({
    ariaLabel:'함수 종류', value:degree,
    options:[{value:0,label:'상수'},{value:1,label:'일차'},{value:2,label:'이차'}],
    onChange:function(v){ degree=v; if(degree<2) coef.a=0; if(degree<1) coef.b=0; renderCoefRows(); updatePreview(); }
  }));
  var coefArea = el('div', {});
  panel.appendChild(coefArea);
  var exprEl = el('div', {class:'func-expr', style:{marginTop:'8px'}});
  var exprMath = el('span', {'data-katex':''});
  exprEl.appendChild(exprMath);
  panel.appendChild(exprEl);
  panelArea.appendChild(panel);

  function stepper(label, key, lo, hi, step){
    var row = el('div', {class:'coef-row'});
    row.appendChild(el('span',{class:'coef-label'}, label));
    var group = el('div', {class:'stepper-group'});
    var minus = el('button', {type:'button', class:'stepper-btn', 'aria-label':label+' 줄이기'}, '−');
    var valSpan = el('span', {class:'stepper-val'}, fmtCoef(coef[key]));
    var plus = el('button', {type:'button', class:'stepper-btn', 'aria-label':label+' 늘리기'}, '+');
    function set(v){
      v = Math.round(v/step)*step;
      v = Math.max(lo, Math.min(hi, v));
      coef[key] = Math.round(v*1000)/1000;
      valSpan.textContent = fmtCoef(coef[key]);
      updatePreview();
    }
    minus.addEventListener('click', function(){ set(coef[key]-step); FX.pop(valSpan); });
    plus.addEventListener('click', function(){ set(coef[key]+step); FX.pop(valSpan); });
    group.appendChild(minus); group.appendChild(valSpan); group.appendChild(plus);
    row.appendChild(group);
    return row;
  }
  function renderCoefRows(){
    coefArea.innerHTML='';
    if(degree>=2) coefArea.appendChild(stepper('x² 계수 a', 'a', -2, 2, 0.1));
    if(degree>=1) coefArea.appendChild(stepper('x 계수 b', 'b', -(2*(N-1)), 2*(N-1), 0.5));
    coefArea.appendChild(stepper('상수 c', 'c', -(2*(N-1)), 2*(N-1), 1));
  }
  renderCoefRows();

  function currentPoints(){
    var pts=[], anyOOB=false;
    for(var x=0;x<N;x++){
      var y = evalF(coef.a, coef.b, coef.c, x);
      if(y<0 || y>N-1) anyOOB=true;
      pts.push([x, Math.max(0,Math.min(N-1,y))]);
    }
    return {pts:pts, anyOOB:anyOOB};
  }
  function drawFuncPreview(ctx, api){
    var r = currentPoints();
    drawPathLine(ctx, api, r.pts, r.anyOOB ? 'rgba(229,72,77,.55)' : 'rgba(245,166,35,.55)', 2.5);
    /* 집(N-1,f(N-1)) 프리뷰 연동(수정요청_S5-우회봉쇄-OOB주행-로봇집표시_v1 §3 D-C-1), 계수 추종 */
    drawHome(ctx, api, r.pts[N-1], true);
  }
  function updatePreview(){
    exprMath.setAttribute('data-katex', funcExprTex(coef.a, coef.b, coef.c));
    renderMath(exprEl);
    var r = currentPoints();
    /* 로봇(0,f(0)) 상주·계수 추종(§3 D-C-1) — 주행 중에는 setRobotPos로 개입하지 않는다(§3 D-C-3) */
    if(!running) board.setRobotPos(r.pts[0], 0);
    board.redraw();
    var idleMsg = mode==='deduce' ? '교점을 눌러 지뢰를 추리한 뒤, 지뢰를 피하는 함수를 만들어보세요.' : '정찰(칸 열기)로 정보를 모으고, 지뢰를 피하는 함수를 만들어보세요.';
    if(r.anyOOB){ statusEl.textContent = '이 함수는 보드를 벗어나요. 계수를 조절해보세요.'; }
    else if(statusEl.textContent.indexOf('벗어나요')>=0){ statusEl.textContent = idleMsg; }
  }
  updatePreview();

  var btnRow = el('div', {class:'btn-row', style:{margin:'8px 0'}});
  var runBtn = el('button', {type:'button', class:'btn btn-primary btn-sm'}, '▶ 이 함수로 출발');
  btnRow.appendChild(runBtn);
  panelArea.appendChild(btnRow);
  var retryCount=0, running=false;
  runBtn.addEventListener('click', function(){
    if(running) return;
    var r = currentPoints();
    running = true;
    var evalRes = evaluatePointsPath(minesSet, r.pts);
    statusEl.textContent = '로봇이 이동합니다…';
    board.setRobotPos(evalRes.fullPath[0], 0);
    animateRobotAlongPath(evalRes.fullPath, {
      stepMs: 70,
      onFrame: function(from,to,t){
        var px = api_lerp(board.api.gx2px(from[0]), board.api.gx2px(to[0]), t);
        var py = api_lerp(board.api.gy2px(from[1]), board.api.gy2px(to[1]), t);
        board.redraw(); drawFuncPreview(board.api.ctx, board.api); drawRobot(board.api.ctx, board.api, px, py, t);
      },
      onLand: function(pt){ board.setRobotPos(pt,0); },
      mineAt: function(){ return false; },
      onDone: function(){
        /* OOB 주행 허용(§3 D-B): 발사 자체는 항상 가능(위 anyOOB 차단 제거). 승리는
           (지뢰 없음)&&(!anyOOB)일 때만 — 벗어난 채 생존 완주하면 비클리어 안내 후 재도전. */
        if(evalRes.success && !r.anyOOB){
          statusEl.textContent = '도착 성공!';
          var stars = starsForAttempt(retryCount);
          board.setConfirmedPath(evalRes.fullPath);
          FX.confetti(board.api.wrap, {xPct:90, yPct:10, count:28});
          markModeCleared(mode, boardSpec.idx, stars);
          /* running을 여기서 되돌리지 않는다(G3-08) — path/deduce판과 동일하게 성공 후 재실행을
             막아, 재클릭으로 onCleared(별점+버튼 행)가 패널에 중복 축적되는 걸 막는다. */
          if(onCleared) onCleared(stars);
        } else if(evalRes.success && r.anyOOB){
          statusEl.textContent = '끝까지 살아남았어요! 그런데 함수가 보드를 벗어나 있어요 — 보드 안에 담기게 계수를 조절해 보세요.';
          running=false;
        } else {
          var hitPt = evalRes.fullPath[evalRes.fullPath.length-1];
          board.reveal(hitPt[0], hitPt[1]);
          retryCount++;
          statusEl.textContent = '지뢰를 밟았어요! 함수를 다시 조절해보세요. (재시도 ' + retryCount + '회)';
          setTimeout(function(){ running=false; }, 500);
        }
      }
    });
  });
}

/* ============================================================
   9) RL — 강화학습 2스테이지(감상 시뮬 · 만들기)
   ============================================================ */
function bestDirAndStrength(wMap, pt, N){
  var dirs = validDirs(pt, N);
  var vals = dirs.map(function(d){ var k=wKey(pt,d); return wMap.has(k)?wMap.get(k):0; });
  var maxV = Math.max.apply(null, vals);
  if(maxV<=0.01) return null;
  var bestIdx = dirs[vals.indexOf(maxV)];
  return {dir:bestIdx, strength:Math.max(0,Math.min(1,maxV/6))};
}
function drawConfidenceOverlay(ctx, api, level, wMap){
  if(!wMap) return;
  for(var x=0;x<level.N;x++){ for(var y=0;y<level.N;y++){
    var pt=[x,y];
    if(level.mines.has(ptKey(x,y))) continue;
    if(x===level.goal[0]&&y===level.goal[1]) continue;
    var bd = bestDirAndStrength(wMap, pt, level.N);
    if(bd) drawConfidenceArrow(ctx, api, pt, bd.dir, bd.strength);
  }}
}

function mountRLWatch(boardArea, panelArea, presetKey, onWatchedOnce){
  var cfg = RL_PRESETS[presetKey];
  var rlState = STATE.screen('s5').rl;
  var regenIdx = rlState.watchRegen[presetKey] || 0;
  var level = makeRLLevel(presetKey, regenIdx);
  var trainSeed = rlTrainSeedFor(presetKey, regenIdx);
  var result = trainRL(level.N, level.mines, level.start, level.goal, trainSeed);
  var playCap = Math.min(result.episodes.length, (result.firstSuccessEp==null ? result.episodes.length : result.firstSuccessEp+8));

  /* "원리:" 카드는 mountRLSection이 패널 상단에 1회만 렌더한다(감상/만들기 공통,
     수정요청_RL정돈-좌표지목추론_v1 §A-3 — 구 mountRLSection의 "체험 모드예요" 카드와의 중복 제거). */
  var statusEl = el('div', {class:'board-status', 'aria-live':'polite'}, cfg.label+' 유형: ▶재생을 누르면 로봇이 스스로 길을 찾는 과정을 볼 수 있어요.');
  panelArea.appendChild(statusEl);

  var board = mountMineBoard(boardArea, level, {
    cellPx: computeSquareCellPx(boardArea, level.N),
    ariaLabel: cfg.label+' 프리셋 보드',
    onReveal: function(){},
    extraDraw: function(ctx, api){ if(currentSnapshot) drawConfidenceOverlay(ctx, api, level, currentSnapshot); }
  });
  var currentSnapshot = null;
  var epIdx = 0, playing = false, speed = 1, retryCount = 0;
  /* 프리셋·새판마다 에피소드 수·길이가 다를 수 있어, 전체 재생이 항상 몇 초 안에 끝나도록 스텝시간을 역산해둔다 */
  var basePacedStepMs = computePacedStepMs(result.episodes, playCap, 7000, 15, 140);

  function playEpisode(idx){
    var snap = result.episodes[idx];
    currentSnapshot = snap.wSnapshot;
    statusEl.textContent = '에피소드 ' + (idx+1) + ' / ' + playCap + (snap.hitMine ? ' — 지뢰에 부딪혔어요' : (snap.reachedGoal ? ' — 도착!' : ' — 진행 중'));
    board.redraw();
    var stepMs = Math.max(12, basePacedStepMs/speed);
    animateRobotAlongPath(snap.trace, {
      stepMs: stepMs,
      onFrame: function(from,to,t){
        var px = api_lerp(board.api.gx2px(from[0]), board.api.gx2px(to[0]), t);
        var py = api_lerp(board.api.gy2px(from[1]), board.api.gy2px(to[1]), t);
        board.redraw(); drawRobot(board.api.ctx, board.api, px, py, t);
      },
      onLand: function(pt){ board.setRobotPos(pt, 0); },
      onDone: function(){
        if(snap.hitMine){
          var last = snap.trace[snap.trace.length-1];
          board.reveal(last[0], last[1]);
          retryCount++;
          setTimeout(function(){ board.setRobotPos(level.start,0); advance(); }, 220/speed);
        } else if(snap.reachedGoal){
          board.setConfirmedPath(snap.trace);
          FX.confetti(board.api.wrap, {xPct:88, yPct:12, count:16});
          setTimeout(function(){ board.setRobotPos(level.start,0); advance(); }, 480/speed);
        } else {
          setTimeout(function(){ board.setRobotPos(level.start,0); advance(); }, 120/speed);
        }
      }
    });
  }
  function advance(){
    epIdx++;
    if(!playing || epIdx>=playCap){ playing=false; finishWatch(); return; }
    playEpisode(epIdx);
  }
  function finishWatch(){
    currentSnapshot = result.w;
    board.redraw();
    if(result.finalOk){
      board.setConfirmedPath(result.finalTraj);
      board.setRobotPos(level.goal, 0);
      FX.confetti(board.api.wrap, {xPct:88, yPct:12, count:30});
      statusEl.textContent = '로봇이 스스로 안전 경로를 찾았어요! (재시도 ' + retryCount + '회 만에 성공)';
    } else {
      statusEl.textContent = '이번엔 아직 완전히 찾지 못했어요. 다시 재생해보세요.';
    }
    markRLWatched(presetKey);
    if(onWatchedOnce) onWatchedOnce();
  }

  var toolbar = el('div', {class:'rl-toolbar'});
  var playBtn = el('button', {type:'button', class:'btn btn-primary btn-sm'}, '▶ 재생');
  var speedBtn = el('button', {type:'button', class:'btn btn-secondary btn-sm'}, '배속 ×1');
  var newBtn = el('button', {type:'button', class:'btn btn-secondary btn-sm'}, '새 판 가져오기');
  playBtn.addEventListener('click', function(){
    if(playing) return;
    playing = true; epIdx = 0; retryCount = 0;
    board.setConfirmedPath(null); board.setRobotPos(level.start, 0);
    playEpisode(0);
  });
  speedBtn.addEventListener('click', function(){ speed = (speed===1) ? 10 : 1; speedBtn.textContent = '배속 ×'+speed; });
  newBtn.addEventListener('click', function(){
    rlState.watchRegen[presetKey] = regenIdx+1;
    STATE.save();
    ROUTER.refresh();
  });
  toolbar.appendChild(playBtn); toolbar.appendChild(speedBtn); toolbar.appendChild(newBtn);
  panelArea.appendChild(toolbar);
}

function mountRLBuild(boardArea, panelArea, onBuiltSolved){
  var N=9, start=[0,0], goal=[N-1,N-1];
  var s5 = STATE.screen('s5');
  var saved = s5.rl.builtPath;
  var drawn = (saved && saved.length) ? saved.map(function(p){ return p.slice(); }) : [start.slice()];
  var connected = false, mines = null, solving = false;

  panelArea.appendChild(el('div', {class:'rule-card'},
    '학생이 직접 안전한 경로를 그리고, 나머지 자리는 자동으로 지뢰가 됩니다. 경로는 출발부터 도착까지 끊김 없이 이어져야 합니다.'));
  var statusEl = el('div', {class:'board-status', 'aria-live':'polite'},
    '출발에서 도착까지 인접한 교점을 순서대로 눌러 경로를 그리세요. 마지막 점을 다시 누르면 한 칸 지웁니다.');
  panelArea.appendChild(statusEl);

  var boardWrap = el('div', {class:'grid-board-wrap'});
  var canvas = el('canvas', {tabindex:'0', 'aria-label': N+'칸 보드. 인접한 교점을 순서대로 눌러 경로를 그립니다. Backspace로 마지막 칸 삭제.'});
  boardWrap.appendChild(canvas);
  boardArea.appendChild(boardWrap);
  var cellPx = computeSquareCellPx(boardArea, N), pad=30, cssW=pad*2+(N-1)*cellPx, cssH=pad*2+(N-1)*cellPx;
  var ctx = setupCanvasHiDPI(canvas, cssW, cssH);
  function gx2px(gx){ return pad+gx*cellPx; }
  function gy2px(gy){ return cssH-pad-gy*cellPx; }
  var apiLike = {gx2px:gx2px, gy2px:gy2px, cellPx:cellPx, N:N, cssW:cssW, cssH:cssH};
  var cursor = start.slice();
  var robotPos = start.slice(), robotSquash = 0;
  var confirmedPath = null;

  function persist(){ s5.rl.builtPath = drawn.map(function(p){ return p.slice(); }); STATE.save(); }

  function handlePick(gx,gy){
    if(connected) return;
    var last = drawn[drawn.length-1];
    if(gx===last[0] && gy===last[1]){
      if(drawn.length>1){ drawn.pop(); persist(); redraw(); }
      return;
    }
    if(Math.abs(gx-last[0])+Math.abs(gy-last[1]) !== 1){
      FX.shake(boardWrap);
      statusEl.textContent = '바로 옆(위/아래/왼쪽/오른쪽) 교점만 이을 수 있어요.';
      return;
    }
    if(drawn.some(function(p){ return p[0]===gx && p[1]===gy; })){
      statusEl.textContent = '이미 지나온 교점이에요. 다른 방향으로 이어보세요.';
      FX.shake(boardWrap);
      return;
    }
    drawn.push([gx,gy]);
    persist();
    statusEl.textContent = (gx===goal[0]&&gy===goal[1]) ? '도착까지 이었어요! "연결 확인"을 눌러보세요.' : '경로를 잇는 중… (' + drawn.length + '칸)';
    redraw();
  }
  canvas.addEventListener('pointerdown', function(e){
    canvas.focus();
    var rect = canvas.getBoundingClientRect();
    var scaleX=cssW/rect.width, scaleY=cssH/rect.height;
    var px=(e.clientX-rect.left)*scaleX, py=(e.clientY-rect.top)*scaleY;
    var g = pixelToGrid(px,py,pad,cssH-pad,cellPx);
    if(inBounds(g[0],g[1],N)){ cursor=g; handlePick(g[0],g[1]); }
  });
  canvas.addEventListener('keydown', function(e){
    var moved=false;
    if(e.key==='ArrowRight'){ cursor[0]=Math.min(N-1,cursor[0]+1); moved=true; }
    else if(e.key==='ArrowLeft'){ cursor[0]=Math.max(0,cursor[0]-1); moved=true; }
    else if(e.key==='ArrowUp'){ cursor[1]=Math.min(N-1,cursor[1]+1); moved=true; }
    else if(e.key==='ArrowDown'){ cursor[1]=Math.max(0,cursor[1]-1); moved=true; }
    else if(e.key==='Enter' || e.key===' '){ e.preventDefault(); handlePick(cursor[0],cursor[1]); return; }
    else if(e.key==='Backspace'){ e.preventDefault(); if(drawn.length>1){ drawn.pop(); persist(); redraw(); } return; }
    if(moved){ e.preventDefault(); redraw(); }
  });

  function redraw(){
    drawGridBase(ctx, apiLike);
    drawPathLine(ctx, apiLike, drawn, confirmedPath ? '#f5a62355' : '#f5a623', 3.5);
    if(confirmedPath) drawPathLine(ctx, apiLike, confirmedPath, '#f5a623', 4);
    if(mines){
      for(var x=0;x<N;x++){ for(var y=0;y<N;y++){
        if((x===start[0]&&y===start[1]) || (x===goal[0]&&y===goal[1])) continue;
        if(mines.has(ptKey(x,y))) drawRevealMark(ctx, apiLike, [x,y], true);
      }}
    }
    drawHome(ctx, apiLike, start, false);
    drawHome(ctx, apiLike, goal, true);
    var rp = [gx2px(robotPos[0]), gy2px(robotPos[1])];
    drawRobot(ctx, apiLike, rp[0], rp[1], robotSquash);
    drawCursorRing(ctx, apiLike, cursor);
  }
  redraw();

  var btnRow = el('div', {class:'btn-row', style:{margin:'8px 0'}});
  var checkBtn = el('button', {type:'button', class:'btn btn-primary btn-sm'}, '연결 확인');
  var resetBtn = el('button', {type:'button', class:'btn btn-secondary btn-sm'}, '다시 그리기');
  btnRow.appendChild(checkBtn); btnRow.appendChild(resetBtn);
  panelArea.appendChild(btnRow);
  var solveArea = el('div', {class:'screen-block'});
  panelArea.appendChild(solveArea);

  function makeMinesFor(pathPts){
    var pathSet = new Set(pathPts.map(function(p){ return ptKey(p[0],p[1]); }));
    var rng = mulberry32(12345); /* 만들기 지뢰 배치: 고정 시드(재현성) */
    return placeMines(N, pathSet, Math.round(N*N*0.22), rng);
  }
  function mountSolveButton(){
    solveArea.innerHTML='';
    var solveBtn = el('button', {type:'button', class:'btn btn-primary btn-sm'}, '▶ 로봇 풀이 보기');
    solveArea.appendChild(solveBtn);
    solveBtn.addEventListener('click', function(){
      if(solving) return;
      solving = true;
      confirmedPath = null;
      var result = trainRL(N, mines, start, goal, 777);
      var playCap = Math.min(result.episodes.length, (result.firstSuccessEp==null ? result.episodes.length : result.firstSuccessEp+6));
      /* 학생이 그린 판은 길이를 예측할 수 없으므로, 전체 재생이 항상 몇 초 안에 끝나도록 스텝시간을 역산 */
      var pacedStepMs = computePacedStepMs(result.episodes, playCap, 6000, 12, 110);
      var epIdx2 = 0;
      function playNext(){
        if(epIdx2>=playCap){
          robotPos = start.slice(); robotSquash=0;
          if(result.finalOk){
            confirmedPath = result.finalTraj;
            statusEl.textContent = '로봇이 스스로 안전 경로를 찾았어요!';
            FX.confetti(solveArea, {xPct:50, yPct:20, count:26});
          } else {
            statusEl.textContent = '이번엔 로봇이 아직 다 찾지 못했어요. 다시 시도해보세요.';
          }
          redraw();
          solving = false;
          s5.rl.builtCount = (s5.rl.builtCount||0)+1; STATE.save(); refreshNav();
          if(onBuiltSolved) onBuiltSolved();
          return;
        }
        var snap = result.episodes[epIdx2];
        animateRobotAlongPath(snap.trace, {
          stepMs: pacedStepMs,
          onFrame: function(from,to,t){
            robotPos = from; robotSquash = t; redraw();
            var px=api_lerp(gx2px(from[0]),gx2px(to[0]),t), py=api_lerp(gy2px(from[1]),gy2px(to[1]),t);
            drawRobot(ctx, apiLike, px, py, t);
          },
          onLand: function(pt){ robotPos=pt; robotSquash=0; },
          onDone: function(){ epIdx2++; setTimeout(playNext, snap.reachedGoal?260:Math.min(80,pacedStepMs)); }
        });
      }
      playNext();
    });
  }
  function tryConnect(){
    var ok = isPathConnected(drawn, start, goal);
    if(!ok){
      FX.shake(boardWrap);
      statusEl.textContent = '아직 출발에서 도착까지 끊김 없이 이어지지 않았어요.';
      return;
    }
    connected = true;
    mines = makeMinesFor(drawn);
    redraw();
    statusEl.textContent = '연결됐어요! 나머지 칸이 지뢰가 됐어요. 로봇이 강화학습으로 풀어보게 해볼까요?';
    FX.pop(boardWrap);
    mountSolveButton();
  }
  checkBtn.addEventListener('click', tryConnect);
  resetBtn.addEventListener('click', function(){
    drawn=[start.slice()]; connected=false; mines=null; confirmedPath=null; solveArea.innerHTML='';
    persist(); redraw();
    statusEl.textContent = '출발에서 도착까지 교점을 순서대로 눌러 안전한 경로를 그리세요.';
  });

  if(drawn.length>1 && isPathConnected(drawn, start, goal)){ tryConnect(); }
}

   10) CLUSTER — 비지도 군집 미니 (화면6)

function mountClusterScatter(container, opts){
  opts = opts || {};
  var pts = genClusterData();
  var W=520, H=380, padc=34;
  /* G3-05: 800×640 등 낮은 뷰포트에서 고정 H=380 캔버스가 제목·설명·(호출부가 캔버스 아래에
     이미 붙인) 요소와 합쳐 1뷰포트를 넘친다(A1 위반, 실측 282px). CLUSTER 로직(kmeans·
     genClusterData·데이터 매핑 xMin~yMax)은 손대지 않고, 렌더 픽셀 높이만 남는 세로 여유에
     맞춰 반응형으로 줄인다. 호출부는 캔버스 아래에 올 요소까지 이미 .view-pane에 붙인 뒤 이
     함수를 호출해야 한다(§S5 blocking-1과 동일 패턴 — clientWidth/Height 실측 전 문서에 부착). */
  var pane = container.closest('.view-pane');
  /* pane.scrollHeight는 쓸 수 없다 — scrollHeight는 clientHeight보다 작아질 수 없게 하한이
     걸려 있어(스펙), 콘텐츠가 pane보다 짧아도(지금 host=0일 때처럼) 그냥 clientHeight와
     같은 값을 돌려줘 "남는 여유"를 읽을 수 없다. 대신 host의 부모(screen, 높이 auto·안 잘림)의
     실제 렌더 높이를 getBoundingClientRect로 재 — 지금까지 쌓인 콘텐츠(제목·설명·host=0·
     호출부가 미리 붙인 요소)의 참값이다. */
  if(pane && container.parentElement){
    var screenEl = container.parentElement;
    var paneCS = window.getComputedStyle(pane);
    var padV = (parseFloat(paneCS.paddingTop)||0) + (parseFloat(paneCS.paddingBottom)||0);
    var screenH = screenEl.getBoundingClientRect().height;
    /* 이 host가 채워질 때 아직 DOM에 없는 조각들의 실측 상한을 미리 뺀다(800×640 실측 보정):
       이 함수가 곧 붙일 .cluster-toolbar(38px 한 줄 + 상하 margin 8+8) + 그 아래 gap +
       canvas 인라인 여백(~4px) + 라우터가 mount 이후에 붙이는 .step-dots(7px+margin-bottom
       12px) — 개별 항목 합보다 넉넉히 잡아 잔여 오버플로를 없앤다. */
    var RESERVE_BELOW = 108;
    var budget = pane.clientHeight - padV - screenH - RESERVE_BELOW;
    /* 하한 160 — 검토_공통심사 V·A5: 하한 110에서는 극저 뷰포트에서 작도영역이 42px까지
       줄어 산점도 축 눈금(padc=34) 대비 그릴 영역이 너무 얇아진다. 이 하한에도 못 미치면
       (초극단 뷰포트) .view-pane의 overflow-y:auto 안전밸브로 넘어간다(제거 금지, §CSS 69행 주석). */
    if(budget > 0) H = Math.max(160, Math.min(H, Math.floor(budget)));
  }
  var xMin=0, xMax=6.7, yMin=3.3, yMax=10.7;
  function toPx(p){ return [padc + (p.x-xMin)/(xMax-xMin)*(W-2*padc), H-padc - (p.y-yMin)/(yMax-yMin)*(H-2*padc)]; }
  function toData(px,py){ return { x: xMin+(px-padc)/(W-2*padc)*(xMax-xMin), y: yMin+(H-padc-py)/(H-2*padc)*(yMax-yMin) }; }

  var wrap = el('div', {class:'grid-board-wrap cluster-canvas-wrap'});
  var canvas = el('canvas', {tabindex:'0', 'aria-label':'하루 게임시간과 수면시간 산점도. 화살표로 원의 중심을 옮기고 +/- 로 반지름을 조절, Enter로 원 그리기, Backspace로 마지막 원 지우기.'});
  wrap.appendChild(canvas);
  container.appendChild(wrap);
  var ctx = setupCanvasHiDPI(canvas, W, H);

  var s6 = STATE.screen('s6');
  var circles = (s6.circles||[]).map(function(c){ return {x:c.x,y:c.y,r:c.r}; });
  var cursor = {x:3.3, y:7, r:1.2};
  var autoResult = null;

  function persist(){ s6.circles = circles.map(function(c){ return {x:c.x,y:c.y,r:c.r}; }); STATE.save(); }

  function draw(){
    ctx.clearRect(0,0,W,H);
    ctx.fillStyle='#fffaf0'; ctx.fillRect(0,0,W,H);
    ctx.strokeStyle='#d7deea'; ctx.lineWidth=1; ctx.strokeRect(padc,padc,W-2*padc,H-2*padc);
    ctx.fillStyle='#6a6a6a'; ctx.font="12px 'Inter','Malgun Gothic',sans-serif";
    ctx.textAlign='center'; ctx.fillText('하루 게임 시간(시간) →', W/2, H-8);
    ctx.save(); ctx.translate(14,H/2); ctx.rotate(-Math.PI/2); ctx.textAlign='center'; ctx.fillText('수면 시간(시간) →',0,0); ctx.restore();

    ctx.strokeStyle='#2f6df0'; ctx.lineWidth=2;
    circles.forEach(function(c){
      var center = toPx(c);
      var rpx = c.r/(xMax-xMin)*(W-2*padc);
      ctx.beginPath(); ctx.arc(center[0],center[1],rpx,0,Math.PI*2); ctx.stroke();
    });
    if(!connectedAuto()){
      var cc = toPx(cursor);
      var rpx2 = cursor.r/(xMax-xMin)*(W-2*padc);
      ctx.save(); ctx.setLineDash([4,3]); ctx.strokeStyle='#8957e5'; ctx.lineWidth=2;
      ctx.beginPath(); ctx.arc(cc[0],cc[1],rpx2,0,Math.PI*2); ctx.stroke(); ctx.restore();
    }
    var palette = ['#ff4d8b','#1a6f5c','#e8b94a'];
    var revealCount = autoResult ? autoResult.revealCount : 0;
    pts.forEach(function(p, idx){
      var xy = toPx(p);
      ctx.beginPath(); ctx.arc(xy[0],xy[1],5,0,Math.PI*2);
      ctx.fillStyle = (autoResult && idx<revealCount) ? palette[autoResult.assign[idx]%palette.length] : '#3a3a3a';
      ctx.fill();
    });
    if(autoResult && revealCount>0){
      var t = revealCount/pts.length;
      autoResult.centroids.forEach(function(c,ci){
        var xy = toPx({x:c[0],y:c[1]});
        ctx.save(); ctx.globalAlpha=t; ctx.strokeStyle=palette[ci%palette.length]; ctx.lineWidth=3;
        ctx.beginPath(); ctx.moveTo(xy[0]-9,xy[1]); ctx.lineTo(xy[0]+9,xy[1]); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(xy[0],xy[1]-9); ctx.lineTo(xy[0],xy[1]+9); ctx.stroke();
        ctx.restore();
      });
    }
  }
  function connectedAuto(){ return !!autoResult; }
  draw();

  var dragging=false;
  function evPt(e){
    var rect = canvas.getBoundingClientRect();
    var scaleX=W/rect.width, scaleY=H/rect.height;
    return toData((e.clientX-rect.left)*scaleX, (e.clientY-rect.top)*scaleY);
  }
  canvas.addEventListener('pointerdown', function(e){
    canvas.focus();
    var d = evPt(e);
    cursor.x=d.x; cursor.y=d.y; cursor.r=0.3; dragging=true; draw();
  });
  canvas.addEventListener('pointermove', function(e){
    if(!dragging) return;
    var d = evPt(e);
    var dx=d.x-cursor.x, dy=d.y-cursor.y;
    cursor.r = Math.max(0.3, Math.sqrt(dx*dx+dy*dy));
    draw();
  });
  function commitCircle(){
    circles.push({x:cursor.x,y:cursor.y,r:cursor.r});
    persist(); FX.pop(wrap); draw();
    if(opts.onCircleDrawn) opts.onCircleDrawn(circles.length);
  }
  canvas.addEventListener('pointerup', function(){ if(dragging){ dragging=false; commitCircle(); } });
  canvas.addEventListener('keydown', function(e){
    var moved=false;
    if(e.key==='ArrowRight'){ cursor.x=Math.min(xMax,cursor.x+0.2); moved=true; }
    else if(e.key==='ArrowLeft'){ cursor.x=Math.max(xMin,cursor.x-0.2); moved=true; }
    else if(e.key==='ArrowUp'){ cursor.y=Math.min(yMax,cursor.y+0.2); moved=true; }
    else if(e.key==='ArrowDown'){ cursor.y=Math.max(yMin,cursor.y-0.2); moved=true; }
    else if(e.key==='+' || e.key==='='){ cursor.r=Math.min(3,cursor.r+0.15); moved=true; }
    else if(e.key==='-'){ cursor.r=Math.max(0.3,cursor.r-0.15); moved=true; }
    else if(e.key==='Enter'){ e.preventDefault(); commitCircle(); return; }
    else if(e.key==='Backspace'){ e.preventDefault(); if(circles.length){ circles.pop(); persist(); draw(); } return; }
    if(moved){ e.preventDefault(); draw(); }
  });

  var toolbar = el('div', {class:'cluster-toolbar'});
  var undoBtn = el('button', {type:'button', class:'btn btn-secondary btn-sm'}, '방금 그린 원 지우기');
  var autoBtn = el('button', {type:'button', class:'btn btn-primary btn-sm'}, '[컴퓨터 무리 찾기]');
  undoBtn.addEventListener('click', function(){ if(circles.length){ circles.pop(); persist(); draw(); } });
  function runAuto(instant){
    var r = kmeans(pts, CLUSTER_CONFIG.k, CLUSTER_CONFIG.kmeansSeed);
    autoResult = {assign:r.assign, centroids:r.centroids, revealCount: instant?pts.length:0};
    s6.autoRun = true; STATE.save();
    if(!instant && !FX.reducedMotion){
      FX.tween({ duration:700, easing:FX.easeOutCubic,
        onUpdate:function(t){ autoResult.revealCount = Math.round(t*pts.length); draw(); },
        onDone:function(){ autoResult.revealCount = pts.length; draw(); } });
    } else { draw(); }
  }
  autoBtn.addEventListener('click', function(){
    runAuto(false); FX.pop(wrap);
    if(opts.onAutoRun) opts.onAutoRun();
  });
  toolbar.appendChild(undoBtn); toolbar.appendChild(autoBtn);
  container.appendChild(toolbar);

  if(s6.autoRun){ runAuto(true); }

  return { getCircleCount:function(){ return circles.length; }, hasAutoRun:function(){ return !!autoResult; } };
}

/* ============================================================
   11) SCREENS — 화면 정의(빌더), 원문 문구 그대로
