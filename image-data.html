    var mgrid = gridForMath(grid);
    var wrap = el('div', {class:'num-table-wrap'});
    if(cellPx){
      wrap.style.setProperty('--cell-px', cellPx+'px');
      wrap.style.setProperty('--cell-font', Math.round(cellPx*0.45)+'px');
    }
    var table = el('table', {class:'num-table' + (mode==='channel' ? ' num-table-channel' : '')});
    mgrid.forEach(function(row, i){
      var tr = el('tr', {});
      row.forEach(function(c, j){
        var td = el('td', {'data-i':String(i), 'data-j':String(j)});
        if(mode === 'channel'){
          var v = c[channel];
          td.style.background = channel==='r' ? 'rgb('+v+',235,235)' : channel==='g' ? 'rgb(235,'+v+',235)' : 'rgb(235,235,'+v+')';
          td.textContent = String(v);
        } else {
          td.style.background = 'rgb('+c.r+','+c.g+','+c.b+')';
          if(mode === 'numbers'){
            /* 세 자리 숫자를 한 줄에 쉼표로 나열하면 8~9px에서 읽기 어려워 세 줄로 쌓는다 */
            td.appendChild(el('span', {}, String(c.r)));
            td.appendChild(el('br'));
            td.appendChild(el('span', {}, String(c.g)));
            td.appendChild(el('br'));
            td.appendChild(el('span', {}, String(c.b)));
            td.style.color = (c.r+c.g+c.b)/3 < 128 ? '#fff' : '#0a0a0a';
          }
        }
        tr.appendChild(td);
      });
      table.appendChild(tr);
    });
    wrap.appendChild(table);
    return wrap;
  }

  /* ---------- S3-1 / S3-4 ImageData 샘플 생성 + 반전(레퍼런스2 패턴, 선형반전 1종) ---------- */
  function sampleColorWheel(w,h){
    var c = document.createElement('canvas'); c.width=w; c.height=h;
    var ctx = c.getContext('2d');
    ctx.fillStyle = '#fffaf0'; ctx.fillRect(0,0,w,h);
    var cx=w/2, cy=h/2, R=Math.min(w,h)/2-4;
    var img = ctx.getImageData(0,0,w,h), d = img.data;
    for(var py=0;py<h;py++){
      for(var px=0;px<w;px++){
        var dx=px-cx, dy=py-cy, r=Math.hypot(dx,dy);
        var idx=(py*w+px)*4;
        if(r<=R){
          var ang = Math.atan2(dy,dx)*180/Math.PI; if(ang<0) ang+=360;
          var rgb = COLOR.hsv2rgb(ang, Math.min(1,r/R), 1);
          d[idx]=rgb[0]*255; d[idx+1]=rgb[1]*255; d[idx+2]=rgb[2]*255; d[idx+3]=255;
        }
      }
    }
    ctx.putImageData(img,0,0);
    return ctx.getImageData(0,0,w,h);
  }
  function sampleRainbow(w,h){
    var c = document.createElement('canvas'); c.width=w; c.height=h;
    var ctx = c.getContext('2d');
    var g = ctx.createLinearGradient(0,0,w,0);
    ['#ff0000','#ff8800','#ffee00','#33cc33','#00bbbb','#2255ee','#8833cc'].forEach(function(col,i,arr){ g.addColorStop(i/(arr.length-1), col); });
    ctx.fillStyle=g; ctx.fillRect(0,0,w,h);
    return ctx.getImageData(0,0,w,h);
  }
  function sampleGray(w,h){
    var c = document.createElement('canvas'); c.width=w; c.height=h;
    var ctx = c.getContext('2d');
    var g = ctx.createLinearGradient(0,0,w,0);
    g.addColorStop(0,'#000'); g.addColorStop(1,'#fff');
    ctx.fillStyle=g; ctx.fillRect(0,0,w,h);
    return ctx.getImageData(0,0,w,h);
  }
  function sampleMyCharacter(w,h){
    var grid = gridForMath(STATE.data.pixelArt.grid);
    var c = document.createElement('canvas'); c.width=w; c.height=h;
    var ctx = c.getContext('2d');
    var cell = Math.floor(Math.min(w,h)/16);
    var ox = Math.floor((w-cell*16)/2), oy = Math.floor((h-cell*16)/2);
    ctx.fillStyle = '#fffaf0'; ctx.fillRect(0,0,w,h);
    grid.forEach(function(row,i){ row.forEach(function(px,j){
      ctx.fillStyle = 'rgb('+px.r+','+px.g+','+px.b+')';
      ctx.fillRect(ox+j*cell, oy+i*cell, cell, cell);
    }); });
    return ctx.getImageData(0,0,w,h);
  }
  function invertImageData(src){
    var out = new ImageData(src.width, src.height);
    var s = src.data, d = out.data;
    for(var i=0;i<s.length;i+=4){
      d[i]=COLOR.invertValue(s[i]); d[i+1]=COLOR.invertValue(s[i+1]); d[i+2]=COLOR.invertValue(s[i+2]); d[i+3]=s[i+3];
    }
    return out;
  }
  function complementImageData(src){
    var out = new ImageData(src.width, src.height);
    var s = src.data, d = out.data;
    for(var i=0;i<s.length;i+=4){
      var comp = COLOR.complementRGB255(s[i], s[i+1], s[i+2]);
      d[i]=comp.r; d[i+1]=comp.g; d[i+2]=comp.b; d[i+3]=s[i+3];
    }
    return out;
  }

  /* 스포이드(v2 §B 화면10 ⓑ, I13 대상) — 칠한 칸은 그 색, 빈 칸/범위 밖은 null. */
  function pickColor(grid, i, j){
    if(i<0||i>=16||j<0||j>=16) return null;
    var c = grid[i][j];
    return c ? {r:c.r, g:c.g, b:c.b} : null;
  }

  return {
    emptyGrid16: emptyGrid16, gridForMath: gridForMath, countPainted: countPainted,
    APPLE_GRID: APPLE_GRID, TEMPLATE_MASK: TEMPLATE_MASK, TEMPLATE_MASKS: TEMPLATE_MASKS,
    renderGridToCanvas: renderGridToCanvas, downloadGridAsPNG: downloadGridAsPNG,
    buildNumTable: buildNumTable, pickColor: pickColor,
    sampleColorWheel: sampleColorWheel, sampleRainbow: sampleRainbow, sampleGray: sampleGray, sampleMyCharacter: sampleMyCharacter,
    invertImageData: invertImageData, complementImageData: complementImageData
  };
})();

/* ============================================================
   6b) TETRIS — 행렬 테트리스(S2-5). 보드 10x16(§12.1-8), 0/1 행렬.
   회전 = COLOR.rotateCW(전치 후 각 행 역순), 9.4.
   ============================================================ */
var TETRIS = (function(){
  var COLS=10, ROWS=16, CELL=28;
  var PIECES = {
    I:[[1,1,1,1]], O:[[1,1],[1,1]], T:[[0,1,0],[1,1,1]],
    S:[[0,1,1],[1,1,0]], Z:[[1,1,0],[0,1,1]], J:[[1,0,0],[1,1,1]], L:[[0,0,1],[1,1,1]]
  };
  var KEYS = Object.keys(PIECES);

  function newGame(){
    var board = [];
    for(var i=0;i<ROWS;i++){ board.push(new Array(COLS).fill(0)); }
    return {board:board, piece:null, shape:null, row:0, col:0, linesCleared:0, over:false};
  }
  function spawn(g){
    var key = KEYS[Math.floor(Math.random()*KEYS.length)];
    g.shape = key;
    g.piece = PIECES[key].map(function(row){ return row.slice(); });
    g.col = Math.floor((COLS-g.piece[0].length)/2);
    g.row = 0;
    if(collide(g, g.piece, g.row, g.col)){ g.over = true; }
  }
  function collide(g, piece, row, col){
    for(var i=0;i<piece.length;i++){
      for(var j=0;j<piece[0].length;j++){
        if(!piece[i][j]) continue;
        var r=row+i, c=col+j;
        if(r<0||r>=ROWS||c<0||c>=COLS) return true;
        if(g.board[r][c]) return true;
      }
    }
    return false;
  }
  function move(g, dc){
    if(g.over) return false;
    if(!collide(g, g.piece, g.row, g.col+dc)){ g.col += dc; return true; }
    return false;
  }
  function rotate(g){
    if(g.over) return false;
    var rotated = COLOR.rotateCW(g.piece);
    var newCol = g.col;
    /* 회전 후 보드 밖으로 나가면 살짝 밀어넣는다(벽 킥 단순화) */
    if(newCol + rotated[0].length > COLS) newCol = COLS - rotated[0].length;
    if(newCol < 0) newCol = 0;
    if(!collide(g, rotated, g.row, newCol)){ g.piece = rotated; g.col = newCol; return true; }
    return false;
  }
  function softDrop(g){
    if(g.over) return false;
    if(!collide(g, g.piece, g.row+1, g.col)){ g.row += 1; return true; }
    lock(g);
    return false;
  }
  function hardDropStep(g){ return softDrop(g); }
  function lock(g){
    g.piece.forEach(function(row,i){ row.forEach(function(v,j){
      if(v){ g.board[g.row+i][g.col+j] = 1; }
    }); });
    var cleared = 0;
    for(var r=ROWS-1;r>=0;r--){
      if(g.board[r].every(function(v){ return v===1; })){
        g.board.splice(r,1);
        g.board.unshift(new Array(COLS).fill(0));
        cleared++; r++;
      }
    }
    g.linesCleared += cleared;
    spawn(g);
  }
  function render(canvas, g){
    canvas.width = COLS*CELL; canvas.height = ROWS*CELL;
    var ctx = canvas.getContext('2d');
    ctx.fillStyle = '#fffaf0'; ctx.fillRect(0,0,canvas.width,canvas.height);
    var display = g.board.map(function(row){ return row.slice(); });
    if(g.piece && !g.over){
      g.piece.forEach(function(row,i){ row.forEach(function(v,j){
        if(v) display[g.row+i][g.col+j] = 2; /* 2 = 낙하 중인 블록(구분 표시) */
      }); });
    }
    ctx.font = (CELL*0.55)+'px '+getComputedStyle(document.body).fontFamily;
    ctx.textAlign='center'; ctx.textBaseline='middle';
    for(var r=0;r<ROWS;r++){
      for(var c=0;c<COLS;c++){
        var v = display[r][c];
        /* v2 §B 화면13 ⓓ: 낙하 중인 칸(v===2) = 검정 칠+흰 글자로 쌓인 칸(크림 배경+검정 글자)과
           뚜렷이 구분한다(지시 그대로). */
        if(v===2){ ctx.fillStyle = '#0a0a0a'; ctx.fillRect(c*CELL, r*CELL, CELL, CELL); }
        ctx.strokeStyle = 'rgba(20,20,20,.10)';
        ctx.strokeRect(c*CELL+0.5, r*CELL+0.5, CELL-1, CELL-1);
        ctx.fillStyle = v===2 ? '#ffffff' : '#0a0a0a';
        ctx.fillText(v?'1':'0', c*CELL+CELL/2, r*CELL+CELL/2+1);
      }
    }
  }
  function pieceMiniText(shape){
    return shape.map(function(row){ return row.join(' '); }).join('\n');
  }
  return {
    COLS:COLS, ROWS:ROWS,
    newGame:newGame, spawn:spawn, move:move, rotate:rotate, softDrop:softDrop, hardDropStep:hardDropStep,
    render:render, pieceMiniText:pieceMiniText
  };
})();

/* ============================================================
   8) SCREENS — 화면별 정의(빌더 함수). 원문 문구 상수 포함.
   ============================================================ */

/* 여러 화면이 공유하는 정리 훅 등록(3D dispose·COLORBUS 구독 해지 등). D-1★: 예전에는
   ROUTER._unmount 전역 누적 체인이었으나, 새 엔진은 다음 pane을 먼저 마운트한 뒤(위
   mountCurrentView) 이전 pane을 나중에 치우므로, 전역 체인 방식은 "이전 pane 제거 직전"에
   발화해도 방금 도착한 새 화면의 dispose까지 함께 터뜨려버린다. 그래서 cleanup을 pane별
   배열로 분리한다: 지금 마운트 중인 pane(_mountingPane)에만 쌓아두고, 그 pane이 실제로
   DOM에서 제거되는 순간(fireCleanup, transitionTo·_rebuild)에만 태운다. */
function registerUnmount(fn){
  (_mountingPane._cleanup || (_mountingPane._cleanup=[])).push(fn);
}

/* 전역 색상 선택기 공유 상태(state.color) 버스 — 화면 간 동기화(5.3) */
var COLORBUS = {
  listeners: [],
  set: function(r,g,b){
    STATE.data.color = {r:COLOR.clampRound(r), g:COLOR.clampRound(g), b:COLOR.clampRound(b)};
    STATE.save();
    var c = STATE.data.color;
    COLORBUS.listeners.forEach(function(fn){ fn(c); });
  },
  get: function(){ return STATE.data.color; },
  subscribe: function(fn){ COLORBUS.listeners.push(fn); },
  unsubscribe: function(fn){ var i=COLORBUS.listeners.indexOf(fn); if(i>=0) COLORBUS.listeners.splice(i,1); }
};

/* 순서쌍 (r,\,g,\,b) TeX 문자열(A3 KaTeX 대상 — P1-4 리빌 픽커 표기용). */
function pairTex(r,g,b){ return '(' + r + ',\\,' + g + ',\\,' + b + ')'; }

/* RGB 색상 선택기(스와치 + R/G/B 슬라이더 + 프리셋). P1-2·P1-4·P2-2·P2-3·S3-2·S3-3가 공유.
   opts.showPair: 순서쌍 (r,\,g,\,b) KaTeX 표기 여부(P1-4 전용, 그 외 화면은 R,G,B 값만=false).
   opts.big: 대형 스와치(.swatch-box-lg, P1-2·P1-4 전용) — 미지정이면 기존 64px 스와치(P2-2 등 불변).
   opts.compact: opts.big일 때만 유효(A1) — .swatch-box-compact 추가로 52dvh를 30dvh로 압축.
   P1-2 step1·P1-4 step5 전용. 미지정이면 기존 52dvh 그대로(P1-3 step3는 buildColorPicker를
   쓰지 않는 독립 호출이라 애초에 영향 없음).
   opts.swatchSize: !opts.big일 때만 유효, 'md'=96px(개정 P2-B2 P2-2 전용, 그 외 화면은 미지정=64px).
   opts.swatchHost/opts.controlHost: 스와치와 슬라이더+프리셋을 각각 다른 컨테이너에 나눠 배치
   (2단 구성, P1-2·P1-4). 지정하지 않으면 기존처럼 둘 다 container 하나에 순서대로 쌓인다(기존 호출 불변). */
function buildColorPicker(container, opts){
  opts = opts || {};
  var swatchHost = opts.swatchHost || container;
  var controlHost = opts.controlHost || container;
  var swWrap = el('div', {});
  swatchHost.appendChild(swWrap);
  function renderSwatch(){
    swWrap.innerHTML = '';
    var c = COLORBUS.get();
    if(opts.big){
      var box = el('div', {class:'swatch-box-lg' + (opts.compact ? ' swatch-box-compact' : '')});
      box.style.background = 'rgb('+c.r+','+c.g+','+c.b+')';
      swWrap.appendChild(box);
    } else {
      swWrap.appendChild(Components.Swatch({r:c.r,g:c.g,b:c.b, size: opts.swatchSize}));
    }
    if(opts.showPair){
      var pair = Components.Formula(pairTex(c.r,c.g,c.b));
      pair.classList.add('formula-lg');
      swWrap.appendChild(pair);
      renderMath(swWrap);
    }
  }
  renderSwatch();
  var sliders = {};
  [['r','R (빨강)','var(--cR)','linear-gradient(90deg,#200,#e5484d)'],
   ['g','G (초록)','var(--cG)','linear-gradient(90deg,#020,#2ea043)'],
   ['b','B (파랑)','var(--cB)','linear-gradient(90deg,#002,#1f6feb)']].forEach(function(row){
    var ch=row[0];
    var s = Components.ChannelSlider({
      label:row[1], dotColor:row[2], min:0, max:255, value:COLORBUS.get()[ch], trackBg:row[3],
      onInput:function(v){ var c=COLORBUS.get(); var next={r:c.r,g:c.g,b:c.b}; next[ch]=v; COLORBUS.set(next.r,next.g,next.b); }
    });
    sliders[ch]=s;
    controlHost.appendChild(s);
  });
  controlHost.appendChild(Components.PresetSwatches({onPick:function(r,g,b){ COLORBUS.set(r,g,b); }}));
  function onExternalChange(c){
    renderSwatch();
    sliders.r.setValue(c.r); sliders.g.setValue(c.g); sliders.b.setValue(c.b);
  }
  COLORBUS.subscribe(onExternalChange);
  registerUnmount(function(){ COLORBUS.unsubscribe(onExternalChange); });
}

/* P1-5 전용 미니 좌표평면(구현: "아는 것 확인" 조작, 검증 대상 수학 아님) */
function buildMiniPlane(container, onPlace, initial){
  var svgNS='http://www.w3.org/2000/svg';
  var wrap = el('div', {class:'mini-plane', style:{padding:'12px', maxWidth:'240px', margin:'10px 0'}});
  var svg = document.createElementNS(svgNS,'svg');
  svg.setAttribute('viewBox','-4.5 -4.5 9 9'); svg.setAttribute('width','220'); svg.setAttribute('height','220');
  svg.setAttribute('role','img'); svg.setAttribute('aria-label','좌표평면. 클릭하거나 방향키로 점을 놓아보세요.');
  svg.setAttribute('tabindex','0');
  function axisLine(x1,y1,x2,y2){
    var l=document.createElementNS(svgNS,'line');
    l.setAttribute('x1',x1);l.setAttribute('y1',y1);l.setAttribute('x2',x2);l.setAttribute('y2',y2);
    l.setAttribute('stroke','#8a8a8a'); l.setAttribute('stroke-width','0.08');
    return l;
  }
  svg.appendChild(axisLine(-4.5,0,4.5,0));
  svg.appendChild(axisLine(0,-4.5,0,4.5));
  var dot = document.createElementNS(svgNS,'circle');
  dot.setAttribute('r','0.24'); dot.setAttribute('fill','#1d54c9'); dot.setAttribute('display', initial?'':'none');
  svg.appendChild(dot);
  wrap.appendChild(svg);
  var readout = el('div', {class:'muted', style:{marginTop:'6px', fontFamily:'var(--font-mono)'}}, initial ? ('점 (' + initial.x + ', ' + initial.y + ')') : '평면 위를 클릭하거나, 포커스 후 방향키로 점을 찍어보세요');
  wrap.appendChild(readout);
  var current = initial || {x:0,y:0};
  if(initial){ dot.setAttribute('cx', initial.x); dot.setAttribute('cy', -initial.y); }
  function place(x,y){
    x = Math.max(-4, Math.min(4, Math.round(x)));
    y = Math.max(-4, Math.min(4, Math.round(y)));
    current = {x:x,y:y};
    dot.setAttribute('cx', x); dot.setAttribute('cy', -y); dot.setAttribute('display','');
    readout.textContent = '점 (' + x + ', ' + y + ')';
    onPlace(current);
  }
  svg.addEventListener('pointerdown', function(e){
    var r = svg.getBoundingClientRect();
    var px = (e.clientX-r.left)/r.width*9-4.5;
    var py = -((e.clientY-r.top)/r.height*9-4.5);
    place(px,py);
  });
  svg.addEventListener('keydown', function(e){
    var x=current.x, y=current.y;
    if(e.key==='ArrowLeft'){ x--; } else if(e.key==='ArrowRight'){ x++; }
    else if(e.key==='ArrowUp'){ y++; } else if(e.key==='ArrowDown'){ y--; }
    else { return; }
    e.preventDefault();
    place(x,y);
  });
  container.appendChild(wrap);
}

/* step3 가산혼합 벤 믹서 캔버스: R·G·B 세 원을 globalCompositeOperation='lighter'로 겹쳐 그린다.
   ★M-3(하드): 각 원은 항상 alpha=1(불투명) 고정 — 슬라이더는 fillStyle의 채널 값만 바꾼다.
   그래야 겹침 결과가 채널별 가산(clampRound 전 min(255,합))과 정확히 일치한다(__IMG.mixLighter와
   동일 산술 — I4가 실제 렌더를 지배). DOM 밖에서는 호출되지 않고(mount/redraw 내부 전용), 이
   함수 정의 자체는 top-level에서 canvas를 만들지 않으므로 최소 목(SECTION 8)에서도 안전하다. */
function drawMixerCanvas(canvas, r, g, b){
  var ctx = canvas.getContext('2d');
  var W = canvas.width, H = canvas.height;
  var R = Math.min(W,H) * 0.32;
  var cx1=W*0.5, cy1=H*0.32, cx2=W*0.34, cy2=H*0.66, cx3=W*0.66, cy3=H*0.66;
  ctx.globalCompositeOperation = 'source-over';
  ctx.fillStyle = '#000';
  ctx.fillRect(0,0,W,H);
  ctx.strokeStyle = 'rgba(255,255,255,.28)';
  ctx.lineWidth = 1.5;
  [[cx1,cy1],[cx2,cy2],[cx3,cy3]].forEach(function(c){
    ctx.beginPath(); ctx.arc(c[0],c[1],R+2,0,Math.PI*2); ctx.stroke();
  });
  ctx.globalCompositeOperation = 'lighter';
  ctx.fillStyle = 'rgb(' + r + ',0,0)';
  ctx.beginPath(); ctx.arc(cx1,cy1,R,0,Math.PI*2); ctx.fill();
  ctx.fillStyle = 'rgb(0,' + g + ',0)';
  ctx.beginPath(); ctx.arc(cx2,cy2,R,0,Math.PI*2); ctx.fill();
  ctx.fillStyle = 'rgb(0,0,' + b + ')';
  ctx.beginPath(); ctx.arc(cx3,cy3,R,0,Math.PI*2); ctx.fill();
  ctx.globalCompositeOperation = 'source-over';
}

   바뀌지 않는다 — 이 함수는 구조(step 분해)와 연출(파티클 버스트+자동 진행)만 더한다. */
function p2_1QuizStep(item){
  return {
    mount: function(container){
      var st = STATE.screen('P2-1');
      var screen = el('div', {class:'screen'});
      screen.appendChild(el('div', {class:'screen-eyebrow'}, '섹션1 · 파트2 · 색을 공간에 나타낼 수 있을까?'));
      screen.appendChild(el('h1', {class:'screen-title'}, '지난 학습 돌아보기'));

      var explainBox = el('div', {class:'reveal-block'});
      explainBox.appendChild(el('p', {class:'muted', html:item.explain}));
      /* item.explain은 q3(F3② KaTeX화)만 <span data-katex> 마크업을 포함한다 — announce(라이브
         리전, textContent)에는 마크업이 그대로 읽히면 안 되므로 태그를 벗겨 평문만 전달한다. */
      /* SR 낭독용 평문: 빈 data-katex 스팬은 태그만 벗기면 순서쌍이 통째로 사라지므로,
         tex 내용((255,\,0,\,0) 등)을 읽을 수 있는 텍스트로 복원한 뒤 나머지 태그를 벗긴다. */
      var explainPlain = item.explain
        .replace(/<span data-katex="([^"]*)"><\/span>/g, function(_m, tex){ return tex.replace(/\\,/g, ' ').replace(/\\/g, ''); })
        .replace(/<[^>]*>/g, '');
      if(st.quiz[item.key] === item.answerKey) explainBox.classList.add('show');

      /* 정답 연출[초안 §E-4]: 카드 팝+파티클 버스트+해설 카드 -> 약 900ms 후 자동 다음 문항.
         reduced-motion이면 자동 전환 대신 게이트가 풀린 하단 '다음' 버튼으로 진행한다.
         advanceTimer는 registerUnmount로 즉시(동기) 등록 — _mountingPane은 mount() 콜스택
         동안만 유효해서, setTimeout 콜백 안에서 나중에 registerUnmount를 부르면 안 된다.
         burstCancel도 같은 이유로 mount 시점에 미리 등록해두고(P4 잔여②), onCorrect(비동기
         클릭 콜백)에서는 canvasBurst가 돌려준 취소 함수를 그 변수에 대입만 한다. */
      var advanceTimer = null;
      var burstCancel = null;
      registerUnmount(function(){
        if(advanceTimer) clearTimeout(advanceTimer);
        if(burstCancel) burstCancel();
      });

      var quizEl = Components.Quiz3({
        question:item.question, options:item.options, answerKey:item.answerKey, initial: st.quiz[item.key],
        onCorrect:function(k){
          st.quiz[item.key]=k; STATE.save();
          explainBox.classList.add('show');
          FX.pop(explainBox);
          burstCancel = FX.canvasBurst(quizEl);
          refreshNav();

/* HSV 원판 점 배치(v2 §B 화면8 ⓐ, I11 대상) — 160px 좌표계(cx=cy=80, R=76)를 %로 환산하는
   순수 함수. 기존엔 점(dot)을 이 160px 좌표를 그대로 px로 찍었는데(api.place), 래퍼(CSS)는
   180px라 1.125배 확대 표시되어 최대 19.5px 어긋났다(원인: 원판 캔버스=160px 좌표계 vs
   래퍼=180px). 비율(%)로 두면 래퍼 크기가 무엇이든(반응형이어도) 정의상 정합한다.
   window.__IMG.wheelDotPos로도 노출된다(아래 __IMG 블록, 검증용). */
var HUE_WHEEL_SIZE = 160, HUE_WHEEL_CX = 80, HUE_WHEEL_CY = 80, HUE_WHEEL_R = 76;
function wheelDotPos(h, s){
  var rad = s * HUE_WHEEL_R;
  var th = h * Math.PI / 180;
  var x = HUE_WHEEL_CX + rad * Math.cos(th);
  var y = HUE_WHEEL_CY - rad * Math.sin(th);
  return { xPct: x / HUE_WHEEL_SIZE * 100, yPct: y / HUE_WHEEL_SIZE * 100 };
}

/* P2-3 전용 색상환(H)+채도(S) 원판 피커. 단일 화면 전용이라 Components 표에 넣지 않는다. */
function buildHueWheel(container){
  var wrap = el('div', {class:'hue-wheel-wrap', tabindex:'0', role:'slider', 'aria-label':'색상(H)·채도(S) 선택 원판. 방향키로도 조절할 수 있어요.'});
  var canvas = el('canvas', {width:'160',height:'160'});
  wrap.appendChild(canvas);
  var dot = el('div', {class:'hue-wheel-dot'});
  wrap.appendChild(dot);
  container.appendChild(wrap);
  var ctx = canvas.getContext('2d');
  var cx=HUE_WHEEL_CX, cy=HUE_WHEEL_CY, R=HUE_WHEEL_R;
  var img = ctx.createImageData(160,160);
  for(var y=0;y<160;y++){
    for(var x=0;x<160;x++){
      var dx=x-cx, dy=y-cy, r=Math.hypot(dx,dy), idx=(y*160+x)*4;
      if(r<=R){
        var ang=Math.atan2(-dy,dx)*180/Math.PI; if(ang<0) ang+=360;
        var rgb=COLOR.hsv2rgb(ang, Math.min(1,r/R), 1);
        img.data[idx]=rgb[0]*255; img.data[idx+1]=rgb[1]*255; img.data[idx+2]=rgb[2]*255; img.data[idx+3]=255;
      }
    }
  }
  ctx.putImageData(img,0,0);
  var api = {};
  api.place = function(h,s){
    var p = wheelDotPos(h,s);
    dot.style.left = p.xPct+'%'; dot.style.top = p.yPct+'%';
  };
  var pickCb=null, keyCb=null;
  api.onPick = function(fn){ pickCb=fn; };
  api.onKeyAdjust = function(fn){ keyCb=fn; };
  function fromClient(clientX, clientY){
    var r = canvas.getBoundingClientRect();
    var px=(clientX-r.left)/r.width*160-cx, py=(clientY-r.top)/r.height*160-cy;
    var rad=Math.min(R, Math.hypot(px,py));
    var ang=Math.atan2(-py,px)*180/Math.PI; if(ang<0) ang+=360;
    if(pickCb) pickCb(ang, rad/R);
  }
  var dragging=false;
  wrap.addEventListener('pointerdown', function(e){ dragging=true; fromClient(e.clientX,e.clientY); try{wrap.setPointerCapture(e.pointerId);}catch(err){} });
  wrap.addEventListener('pointermove', function(e){ if(dragging) fromClient(e.clientX,e.clientY); });
  wrap.addEventListener('pointerup', function(){ dragging=false; });
  wrap.addEventListener('keydown', function(e){
    if(!keyCb) return;
    if(e.key==='ArrowLeft'){ keyCb(-10,0); e.preventDefault(); }
    else if(e.key==='ArrowRight'){ keyCb(10,0); e.preventDefault(); }
    else if(e.key==='ArrowUp'){ keyCb(0,0.05); e.preventDefault(); }
    else if(e.key==='ArrowDown'){ keyCb(0,-0.05); e.preventDefault(); }
  });
  return api;
}

          rgbCol.appendChild(rgbRow);
          var c0 = COLORBUS.get();
          var rSlider = Components.ChannelSlider({label:'R (빨강)', dotColor:'var(--cR)', min:0,max:255,value:c0.r, trackBg:'linear-gradient(90deg,#200,#e5484d)', onInput:function(v){ lastSource='rgb'; var c=COLORBUS.get(); COLORBUS.set(v,c.g,c.b); }});
          var gSlider = Components.ChannelSlider({label:'G (초록)', dotColor:'var(--cG)', min:0,max:255,value:c0.g, trackBg:'linear-gradient(90deg,#020,#2ea043)', onInput:function(v){ lastSource='rgb'; var c=COLORBUS.get(); COLORBUS.set(c.r,v,c.b); }});
          var bSlider = Components.ChannelSlider({label:'B (파랑)', dotColor:'var(--cB)', min:0,max:255,value:c0.b, trackBg:'linear-gradient(90deg,#002,#1f6feb)', onInput:function(v){ lastSource='rgb'; var c=COLORBUS.get(); COLORBUS.set(c.r,c.g,v); }});
          sliderHost.appendChild(rSlider); sliderHost.appendChild(gSlider); sliderHost.appendChild(bSlider);
          left.appendChild(rgbCol);

          var hsvCol = el('div', {class:'card-hairline'});
          hsvCol.appendChild(el('h3', {}, '오른쪽: HSV로 만들기'));
          var wheel = buildHueWheel(hsvCol);
          var vSlider = Components.ChannelSlider({
            label:'V (명도)', min:0, max:100, value:92, trackBg:'linear-gradient(90deg,#111,#eee)',
            valueLabel:function(v){ return v+'%'; },
            onInput:function(v){ lastSource='hsv'; applyHSV(hs.h, hs.s, v/100); }
          });
          hsvCol.appendChild(vSlider);
          right.appendChild(hsvCol);

          function applyHSV(h,s,v){
            hs.h=h; hs.s=s;
            var rgb = COLOR.hsv2rgb(h,s,v);
            COLORBUS.set(Math.round(rgb[0]*255), Math.round(rgb[1]*255), Math.round(rgb[2]*255));
          }
          wheel.onPick(function(h,s){ lastSource='hsv'; applyHSV(h, s, Number(vSlider._input.value)/100); });
          wheel.onKeyAdjust(function(dh,ds){
            lastSource='hsv';
            var nh=((hs.h+dh)%360+360)%360, ns=Math.max(0,Math.min(1,hs.s+ds));
            applyHSV(nh, ns, Number(vSlider._input.value)/100);
          });

          function renderSwatch(c){
            swatchHost.innerHTML = '';
            swatchHost.appendChild(Components.Swatch({r:c.r,g:c.g,b:c.b, size:'xl'}));
            swatchHost.appendChild(Components.Formula(pairTex(c.r,c.g,c.b)));
            renderMath(swatchHost);
          }

          var target = {r:135,g:206,b:235}, TOL = 20;
          function checkSky(c){
            var near = Math.abs(c.r-target.r)<=TOL && Math.abs(c.g-target.g)<=TOL && Math.abs(c.b-target.b)<=TOL;
            if(near){
              if(lastSource==='rgb') st.missionRGB = true; else st.missionHSV = true;
              STATE.save(); missions.refresh({rgb:st.missionRGB, hsv:st.missionHSV}); refreshNav();
            }
          }

          function onChange(c){
            renderSwatch(c);
            rSlider.setValue(c.r); gSlider.setValue(c.g); bSlider.setValue(c.b);
            var v = COLOR.rgb2hsv(c.r/255,c.g/255,c.b/255);
            if(v.s>1e-3) hs.h=v.h;
            hs.s=v.s;
            wheel.place(hs.h, hs.s);
            vSlider.setValue(Math.round(v.v*100));
            checkSky(c);
          }
          COLORBUS.subscribe(onChange);
          registerUnmount(function(){ COLORBUS.unsubscribe(onChange); });
          onChange(COLORBUS.get());
          missions.refresh({rgb:st.missionRGB, hsv:st.missionHSV});

          /* H(실측 75px): 미션 블록을 그리드 아래가 아니라 우측 열(HSV 카드 아래, 좌측 열보다
             ~87px 짧은 쪽)로 넣어 화면 총 세로를 회수한다 — 문구·판정·refresh 로직 무변경. */
          right.appendChild(el('h3', {style:{marginTop:'var(--sp-md)'}}, '미션: 하늘색을 만들어 보세요'));
          right.appendChild(missions.el);

          container.appendChild(screen);
        },
        isComplete: function(){ var s = STATE.screen('P2-3'); return !!s.missionRGB && !!s.missionHSV; }
      },
      { /* step3: 3D 큐브 ↔ 원기둥 -- v2 §B 화면8 step3: 무대 승격(화면7=P2-2급, 좌 무대/우 컨트롤)
           + 미션 신설(M1 조작·M2 관찰->3지선다) + 게이트 신설. A5 다크·A6 키패드 삭제 적용. */
        mount: function(container){
          var st = STATE.screen('P2-3');
          var screen = el('div', {class:'screen'});
          screen.appendChild(el('div', {class:'screen-eyebrow'}, '섹션1 · 파트2 · 색을 공간에 나타낼 수 있을까?'));
          screen.appendChild(el('h1', {class:'screen-title'}, 'HSV 색공간: 무엇이 다를까'));

          var grid = el('div', {class:'stage-grid'});
          var left = el('div', {class:'stage-left p22-stage-col p23-stage-col'});
          var right = el('div', {class:'stage-right'});
          grid.appendChild(left); grid.appendChild(right);
          screen.appendChild(grid);

          /* HSV 슬라이더 행(수정요청 무대높이-HSV슬라이더 v1 §2) -- 이 공간(원기둥)의 좌표
             H·S·V를 직접 조작하는 컨트롤(P2-2 step2의 .p22-picker-row 배치 문법 재사용).
             마커 이동은 기존 COLORBUS -> onColor3d -> applyMorph 경로 그대로 탄다 -- 이 블록은
             좌표를 COLORBUS로 밀어 넣기만 한다(applyMorph 등은 손대지 않는다). */
          screen.appendChild(el('p', {class:'muted', style:{margin:'var(--sp-md) 0 0'}},
            'H·S·V 슬라이더로 색 점을 움직여 보세요 — 원기둥에서 H는 빙 돌고(각도), S는 중심에서 바깥으로(반지름), V는 아래위로(높이) 움직여요.'));

          var hsvRow = el('div', {class:'p22-picker-row p23-hsv-row'});
          var swatchHost = el('div', {});

          var hsLoc = {h:0, s:0};                 /* 자기 원천 상태 -- 퇴화(rgb2hsv) 시 유실 방지 */
          var selfEcho = false;                   /* 자기 발신 세트의 동기 에코 표시 -- 에코에서 hsLoc를
                                                     반올림 정수로 재유도하면 H가 ±0.12° 표류해 최종
                                                     RGB가 오라클과 1 어긋난다(실측). 외부 변경만 재유도. */
          function applyFromSliders(){
            var rgb = COLOR.hsv2rgb(hsLoc.h, hsLoc.s, Number(vSlider._input.value)/100);
            selfEcho = true;
            COLORBUS.set(Math.round(rgb[0]*255), Math.round(rgb[1]*255), Math.round(rgb[2]*255));
          }
          var hSlider = Components.ChannelSlider({
            label:'H (색상)', min:0, max:360, step:1, value:0,
            trackBg:'linear-gradient(90deg,#f00,#ff0 17%,#0f0 33%,#0ff 50%,#00f 67%,#f0f 83%,#f00)',
            valueLabel:function(v){ return v+'°'; },
            onInput:function(v){ hsLoc.h=v; applyFromSliders(); }
          });
          var sSlider = Components.ChannelSlider({
            label:'S (채도)', min:0, max:100, step:1, value:0,
            trackBg:'linear-gradient(90deg,hsl(0,0%,80%),hsl(0,100%,50%))',
            valueLabel:function(v){ return v+'%'; },
            onInput:function(v){ hsLoc.s=v/100; applyFromSliders(); }
          });
          var vSlider = Components.ChannelSlider({
            label:'V (명도)', min:0, max:100, step:1, value:0,
            trackBg:'linear-gradient(90deg,#111,#eee)',
            valueLabel:function(v){ return v+'%'; },
            onInput:function(v){ applyFromSliders(); }
          });
          hsvRow.appendChild(swatchHost);
          hsvRow.appendChild(hSlider);
          hsvRow.appendChild(sSlider);
          hsvRow.appendChild(vSlider);
          screen.appendChild(hsvRow);

          function syncPicker(c){                 /* COLORBUS 구독자(신규, 별도 등록) */
            var hv = COLOR.rgb2hsv(c.r/255, c.g/255, c.b/255);
            if(selfEcho){ selfEcho = false; }     /* 자기 에코: hsLoc는 슬라이더 정확값 그대로 둔다 */
            else {
              if(hv.s > 1e-3) hsLoc.h = hv.h;    /* 무채색이면 H 유지 */
              if(hv.v > 1e-3) hsLoc.s = hv.s;    /* 검정이면 S 유지 */
            }
            hSlider.setValue(Math.round(hsLoc.h));
            sSlider.setValue(Math.round(hsLoc.s*100));
            vSlider.setValue(Math.round(hv.v*100));
            sSlider._input.style.background = 'linear-gradient(90deg,hsl('+Math.round(hsLoc.h)+',0%,80%),hsl('+Math.round(hsLoc.h)+',100%,50%))';
            swatchHost.innerHTML = '';
            swatchHost.appendChild(Components.Swatch({r:c.r, g:c.g, b:c.b, size:'md'}));
          }
          COLORBUS.subscribe(syncPicker);
          registerUnmount(function(){ COLORBUS.unsubscribe(syncPicker); });
          syncPicker(COLORBUS.get());            /* 마운트 초기화(hsLoc 초기 유도 포함) */

          left.appendChild(el('h3', {}, '3D로 보기: 큐브 ↔ 원기둥'));
          var stageHost = el('div', {class:'p22-stage-fill'}); /* v1 §3: 무대 stretch 체인 전달 */
          left.appendChild(stageHost);

          var webglOK = ENGINE_3D.detectWebGL();
          var stage=null, marker=null, cube=null, cyl=null, cloud=null, morphT=0, fb=null;
          var grayMarkers = [], grayAxisLine = null;

          /* 미션1(조작): morphT>=0.99 도달 판정. mission-list-tight로 P2-2와 같은 압축 간격
             적용(화면7과 같은 문법, 우측 열 높이도 P2-2와 비슷하게 맞춘다). */
          var missions3d = Components.MissionList({items:[
            {id:'m1', text:'모양 전환 슬라이더를 끝까지 밀어 원기둥으로 바꿔보세요'}
          ]});
          missions3d.el.classList.add('mission-list-tight');

          var morphSlider = Components.ChannelSlider({
            label:'모양 전환', min:0, max:100, value:0, valueLabel:function(v){ return v<15?'RGB 큐브':(v>85?'HSV 원기둥':'전환 중'); },
            onInput:function(v){
              morphT=v/100; applyMorph();
              if(morphT >= 0.99 && !st.missions3d.m1){
                st.missions3d.m1 = true; STATE.save();
                missions3d.refresh(st.missions3d); refreshNav();
              }
            }
          });

          /* 회색(무채색) 강조 마커 위치 -- posCube/posCyl을 morphT로 선형보간(buildMorphCloud와
             같은 산술, cylinderPos는 I9에서 이미 검증됨). 세로 중심축 라인도 같은 morphT로
             페이드인해, 큐브 뷰(t=0)에서는 안 보이다가 원기둥 뷰(t=1)에서 뚜렷해진다. */
          function updateGrayMarkers(){
            for(var idx=0; idx<grayMarkers.length; idx++){
              var v = Math.round(idx/10*255);
              var pc = COLOR.rgbToPos(v,v,v,ENGINE_3D.S);
              var pcyl = ENGINE_3D.cylinderPos(0,0,v/255,ENGINE_3D.S);
              grayMarkers[idx].setPos(
                pc.x+(pcyl.x-pc.x)*morphT, pc.y+(pcyl.y-pc.y)*morphT, pc.z+(pcyl.z-pc.z)*morphT
              );
            }
            if(grayAxisLine) grayAxisLine.line.material.opacity = grayMarkers.length ? 0.85*morphT : 0;
          }

          function applyMorph(){
            var c = COLORBUS.get();
            if(webglOK){
              cube.edgeLines.forEach(function(l){ l.material.opacity = 0.7*(1-morphT); });
              cube.axisLine.material.opacity = 0.9*(1-morphT*0.5);
              cyl.setOpacity(morphT);
              cloud.setMorph(morphT);
              var v = COLOR.rgb2hsv(c.r/255,c.g/255,c.b/255);
              var p0 = COLOR.rgbToPos(c.r,c.g,c.b,ENGINE_3D.S);
              var p1 = ENGINE_3D.cylinderPos(v.h, v.s, v.v, ENGINE_3D.S);
              marker.setPos(p0.x+(p1.x-p0.x)*morphT, p0.y+(p1.y-p0.y)*morphT, p0.z+(p1.z-p0.z)*morphT);
              marker.setColor(c.r,c.g,c.b);
              updateGrayMarkers();
            } else if(fb){ fb.refresh(); }
          }
          if(webglOK){
            stage = ENGINE_3D.createStage(stageHost, {ariaLabel:'HSV 3D 뷰. 큐브와 원기둥 사이를 슬라이더로 전환합니다. 아래 H·S·V 슬라이더로 색 점을 움직일 수 있어요.'});
            cube = ENGINE_3D.buildCubeSkeleton(stage.scene, ENGINE_3D.S);
            cyl = ENGINE_3D.buildCylinderWireframe(stage.scene, ENGINE_3D.S);
            cloud = ENGINE_3D.buildMorphCloud(stage.scene, POINT_N);
            marker = ENGINE_3D.makeMarker(stage.scene, 0.11);
            grayAxisLine = ENGINE_3D.makeLine(stage.scene, 0x6f9bff, 0);
            grayAxisLine.setEndpoints({x:0,y:-ENGINE_3D.S/2,z:0}, {x:0,y:ENGINE_3D.S/2,z:0});
            registerUnmount(function(){ stage.dispose(); });
          } else {
            fb = ENGINE_3D.buildFallback(stageHost, function(){ return COLORBUS.get(); });
          }

          right.appendChild(el('h3', {style:{marginTop:'var(--sp-sm)', marginBottom:'8px'}}, '탐험 미션'));
          right.appendChild(missions3d.el);
          right.appendChild(morphSlider);

          /* 미션2(관찰->3지선다, P2-2 m4와 같은 문법): 미션 항목 안에 버튼 내장 -> 관찰 -> 3지선다. */
          var m2Row = el('li', {class:'mission-item mission-item-m4'});
          var m2Body = el('div', {class:'mission-m4-body'});
          m2Body.appendChild(el('div', {}, P2_3_M2_QUIZ.question));
          var grayBtn = el('button', {type:'button', class:'btn btn-secondary btn-sm'}, '회색 점들 켜보기');
          var m2QuizWrap = el('div', {class:'reveal-block'});
          m2Body.appendChild(grayBtn);
          m2Body.appendChild(m2QuizWrap);
          m2Row.appendChild(el('span', {class:'mission-check', 'aria-hidden':'true'}, '✓'));
          m2Row.appendChild(m2Body);
          missions3d.el.appendChild(m2Row);

          function refreshM2(){
            var done = !!st.missions3d.m2;
            m2Row.classList.toggle('done', done);
            m2Row.setAttribute('aria-label', P2_3_M2_QUIZ.question + ' ' + (done?'완료':'미완료'));
          }
          function appendM2Explain(){
            if(m2QuizWrap.querySelector('.m2-explain')) return;
            m2QuizWrap.appendChild(el('p', {class:'muted m2-explain', style:{marginTop:'6px'}},
              'RGB 큐브에선 대각선, HSV 원기둥에선 가운데 축 — 표현(좌표)이 달라지면 모여 있는 모양도 달라져요.'));
          }
          function showGray3D(){
            if(!webglOK || grayMarkers.length) return;
            for(var k=0;k<=10;k++){ grayMarkers.push(ENGINE_3D.makeMarker(stage.scene, 0.045)); }
            updateGrayMarkers();
          }
          function revealM2Quiz(){
            if(!m2QuizWrap.querySelector('.quiz3-block')){
              var q = Components.Quiz3({
                question: P2_3_M2_QUIZ.question,
                options: P2_3_M2_QUIZ.options,
                answerKey: P2_3_M2_QUIZ.answerKey,
                initial: st.m3dQuiz,
                onCorrect:function(k){
                  st.m3dQuiz = k; st.missions3d.m2 = true; STATE.save();
                  appendM2Explain();
                  refreshM2(); refreshNav();
                }
              });
              m2QuizWrap.insertBefore(q, m2QuizWrap.firstChild);
            }
            m2QuizWrap.classList.add('show');
          }
          grayBtn.addEventListener('click', function(){
            showGray3D();
            if(!webglOK) toast('이 기기에서는 3D로 볼 수 없지만, 무채색은 채도(S)가 0인 색이에요.');
            setDisabled(grayBtn, true);
            grayBtn.textContent = '회색 점 표시됨';
            revealM2Quiz();
            FX.pop(m2QuizWrap);
          });
          if(st.m3dQuiz){ /* 재방문 복원 -- 정답을 이미 맞힌 경우만(§C I12 대상) 연출 없이 재현 */
            showGray3D();
            setDisabled(grayBtn, true);
            grayBtn.textContent = '회색 점 표시됨';
            revealM2Quiz();
            appendM2Explain();
          }
          refreshM2();

          applyMorph();
          var onColor3d = function(){ applyMorph(); };
          COLORBUS.subscribe(onColor3d);
          registerUnmount(function(){ COLORBUS.unsubscribe(onColor3d); });
          missions3d.refresh(st.missions3d);

          container.appendChild(screen);
        },
        isComplete: function(){
          var m = STATE.screen('P2-3').missions3d;
          return !!(m && m.m1 && m.m2);
        }
      },
      { /* step4: 소감 + 정리 */
        mount: function(container){
          var screen = el('div', {class:'screen'});
          screen.appendChild(el('div', {class:'screen-eyebrow'}, '섹션1 · 파트2 · 색을 공간에 나타낼 수 있을까?'));
          screen.appendChild(el('h1', {class:'screen-title'}, 'HSV 색공간: 무엇이 다를까'));
          screen.appendChild(Components.ThoughtBox({
            screenId:'P2-3', key:'thoughtFeel', labelText:'어느 쪽이 편했나요?', placeholder:'생각을 적어보세요',
            onChange:function(){ refreshNav(); }
          }));
          screen.appendChild(Components.SummaryCard({color:'lavender', body:'같은 색도 표현 방식(좌표)에 따라 다른 세 수가 돼요. 목적에 맞는 표현을 고르는 것도 수학이에요.'}));
          container.appendChild(screen);
        },
        isComplete: function(){ return (STATE.screen('P2-3').thoughtFeel||'').trim().length>0; }
      }
    ]
  };
}

/* ---- 섹션2 — 어떻게 칠할까? ---- */

function buildS2_1(){
  return {
    steps: [
      { /* step1: 질문 + 생각칸 */
        mount: function(container){
          var screen = el('div', {class:'screen'});
          screen.appendChild(el('div', {class:'screen-eyebrow'}, '섹션2 · 어떻게 칠할까?'));
          screen.appendChild(el('h1', {class:'screen-title'}, '사진을 아주 크게 확대하면 무엇이 보일까요?'));
          screen.appendChild(Components.ThoughtBox({screenId:'S2-1', key:'thought', labelText:'생각을 적어보세요', placeholder:'생각을 적어보세요'}));
          container.appendChild(screen);
        },
        isComplete: function(){ return (STATE.screen('S2-1').thought||'').trim().length>0; }
      },
      { /* step2: 확대 슬라이더 -> "픽셀!" */
        mount: function(container){
          var st = STATE.screen('S2-1');
          var screen = el('div', {class:'screen'});
          screen.appendChild(el('div', {class:'screen-eyebrow'}, '섹션2 · 어떻게 칠할까?'));
          screen.appendChild(el('h1', {class:'screen-title'}, '사진을 아주 크게 확대하면 무엇이 보일까요?'));

          var wrap = el('div', {class:'pixel-canvas-wrap', style:{width:'80px', margin:'12px 0'}});
          var canvas = el('canvas', {role:'img', 'aria-label':'예시 사진(사과). 슬라이더로 확대해보세요.'});
          wrap.appendChild(canvas);
          screen.appendChild(wrap);
          ENGINE_PX.renderGridToCanvas(canvas, ENGINE_PX.APPLE_GRID, 1, {});

          var revealPixel = el('div', {class:'reveal-block'});
          revealPixel.appendChild(el('p', {}, '픽셀!'));

          screen.appendChild(Components.ChannelSlider({
            label:'확대', min:80, max:420, value:80, step:10, valueLabel:function(v){ return Math.round(v/80*100)+'%'; },
            onInput:function(v){
              wrap.style.width = v+'px';
              if(v >= 280){ revealPixel.classList.add('show'); if(!st.zoomTouched){ st.zoomTouched=true; STATE.save(); refreshNav(); } }
            }
          }));
          screen.appendChild(revealPixel);
          if(st.zoomTouched){ revealPixel.classList.add('show'); }

          container.appendChild(screen);
        },
        isComplete: function(){ return !!STATE.screen('S2-1').zoomTouched; }
      },
      { /* step3: 정리 */
        mount: function(container){
          var screen = el('div', {class:'screen'});
          screen.appendChild(el('div', {class:'screen-eyebrow'}, '섹션2 · 어떻게 칠할까?'));
          screen.appendChild(el('h1', {class:'screen-title'}, '사진을 아주 크게 확대하면 무엇이 보일까요?'));
          screen.appendChild(Components.SummaryCard({color:'teal', title:'정리', body:'<b>픽셀</b> = 이미지의 최소 단위. <b>해상도</b> = 가로 픽셀 수 × 세로 픽셀 수예요.'}));
          container.appendChild(screen);

          function paintAt(clientX, clientY){
            var r = canvas.getBoundingClientRect();
            var cell = r.width/16;
            var j = Math.floor((clientX-r.left)/cell), i = Math.floor((clientY-r.top)/cell);
            if(i<0||i>=16||j<0||j>=16) return;
            if(dropping){
              var picked = ENGINE_PX.pickColor(grid, i, j);

                if(!toldEmptyPick){ toast('빈 칸이에요 — 칠해진 칸을 골라보세요'); toldEmptyPick = true; }

              return;

            STATE.save();
            redraw();
            refreshNav();
          }
          var painting = false;
          canvas.addEventListener('pointerdown', function(e){ painting=true; paintAt(e.clientX,e.clientY); try{canvas.setPointerCapture(e.pointerId);}catch(err){} });
          canvas.addEventListener('pointermove', function(e){ if(painting && !dropping) paintAt(e.clientX,e.clientY); });
          canvas.addEventListener('pointerup', function(){ painting=false; });
          canvas.addEventListener('pointercancel', function(){ painting=false; });

          container.appendChild(screen);

/* S2-3 표 셀 크기 뷰포트 역산(v2 §B 화면11 ⓐ) — 표 wrap의 실제 부착 위치를 기준으로 남은
   폭·높이 중 작은 쪽에서 16으로 나눠 셀 픽셀 크기를 구한다(하한 22·상한 32px). 표 위 요소들의
   높이를 낱낱이 예측하지 않고 실측(getBoundingClientRect)으로 대체해, step-dots·KaTeX 렌더 등
   마운트 후에 추가되는 높이도 자동 반영된다(호출부가 requestAnimationFrame으로 감싼다). */
function computeTableCellPx(wrapEl, paneEl){
  var wrapRect = wrapEl.getBoundingClientRect();
  var paneRect = paneEl.getBoundingClientRect();
  var availW = wrapRect.width;
  /* 여유폭 16->8px(라이브 실측: step2에서 하한 22px 클램프로 11px 초과 — wrapRect.top은 설명 줄
     등 위쪽 요소를 이미 실측 반영하므로, 남은 원인은 여유폭 자체가 경계값을 넘긴 것. 8px로
     줄여 그만큼 가용높이를 늘린다. */
  var availH = paneRect.bottom - wrapRect.top - 8;
  var raw = Math.floor(Math.min(availW, availH) / 16);
  return Math.max(22, Math.min(32, raw));
}

      { /* step2: 숫자 뷰(원자료 표 -- KaTeX 제외, A3 경계) -- v2 §B 화면11 ⓐⓑⓓ: 뷰포트 역산
           셀 크기 + 숫자 의미 설명 + 픽셀 확대 카드(전체 조망 + 탭 정밀 읽기 2단 구성) */
        mount: function(container){

          /* 여백 축소(라이브 실측 11px 초과 대응 — 표 바로 위 요소라 남는 높이에 직접 영향) */
          var descP = el('p', {class:'muted', style:{margin:'0 0 2px'}});

          var mode = 'plain', cellPx = 26, selI = null, selJ = null;

          function renderDetail(){
            detail.innerHTML = '';

              detail.appendChild(el('p', {class:'muted'}, '칸을 탭(또는 마우스 올리기)하면 그 픽셀 값이 여기 크게 보여요.'));

          function markSelectedCell(){

            if(td) td.classList.add('num-td-sel');
          }
          function selectCell(i,j){ selI=i; selJ=j; renderDetail(); markSelectedCell(); }
          function cellFromEvent(e){
            var td = e.target.closest('td');
            if(!td || !td.hasAttribute('data-i')) return null;

var S2_4_TRANSFORMS = [
  /* tex/note(개정 P2-C·D-6 KaTeX화): 수식은 tex(Components.Formula)로, 괄호 안 한글 설명은
     note(일반 텍스트)로 병기(A3). 원문 formula 문자열의 정보는 그대로 tex+note로 나뉘어 보존된다.
     수식이 없는 순수 한글 설명(flipv·scaleup·scaledown)은 기존 formula 그대로 유지(KaTeX 대상 아님). */
  /* accumulate(v2 §B 화면12): 밝게/어둡게만 연타 누적(±1) — 그 외 변환은 accumulate 없음(=원본
     기준 1회, 현행 그대로). apply/tex/note는 accumulate가 없을 때만 쓰이고, 누적 화면 표시는
     buildS2_4의 brightFormulaTex(n)이 별도로 만든다. */
  {id:'bright', label:'밝게 (+20)', tex:"R' = R+20,\\quad G' = G+20,\\quad B' = B+20", note:'(255를 넘으면 255)', apply:function(g){ return COLOR.brightenGrid(g, 20); }, accumulate:1},
  {id:'dark', label:'어둡게 (-20)', tex:"R' = R-20,\\quad G' = G-20,\\quad B' = B-20", note:'(0보다 작아지면 0)', apply:function(g){ return COLOR.brightenGrid(g, -20); }, accumulate:-1},
  {id:'scalar', label:'색 진하게 (×1.5)', tex:"R' = R\\times1.5,\\quad G' = G\\times1.5,\\quad B' = B\\times1.5", note:'(255를 넘으면 255)', apply:function(g){ return COLOR.scalarGrid(g, 1.5); }},
  {id:'invert', label:'반전(네거티브)', tex:"R' = 255-R,\\quad G' = 255-G,\\quad B' = 255-B", apply:function(g){ return COLOR.invertGrid(g); }},
  {id:'fliph', label:'좌우 반전', tex:'A[i][j] \\to A[i][W-1-j]', note:'(열 순서를 뒤집기)', apply:function(g){ return COLOR.flipHGrid(g); }},
  {id:'flipv', label:'상하 반전', formula:'행 순서를 뒤집기', apply:function(g){ return COLOR.flipVGrid(g); }},
  {id:'transpose', label:'전치', tex:"A^{\\mathsf T}[j][i] = A[i][j]", note:'(대각선으로 뒤집힘)', apply:function(g){ return COLOR.transposeGrid(g); }},
  {id:'scaleup', label:'확대 ×2', formula:'픽셀 1개를 2×2로 복제(최근접) — 계단현상 관찰', apply:function(g){ return COLOR.scaleUp2Grid(g); }, resize:true},
  {id:'scaledown', label:'축소 ½', formula:'2×2 블록을 채널별로 평균 내어 1칸으로', apply:function(g){ return COLOR.scaleDown2Grid(g); }, resize:true}
];
/* v2 §B 화면12: 밝게/어둡게 누적 수식 텍스트 — n(부호 있는 누적 회수)을 그대로 대입해
   "R' = R+20×n" 형태로 보여준다(요청서 문구 그대로, I14 대상). */
function brightFormulaTex(n){
  return "R' = R+20\\times "+n+",\\quad G' = G+20\\times "+n+",\\quad B' = B+20\\times "+n;
}
/* 포화 관찰(§B 화면12): 결과 그리드에 cap(255 또는 0)에 닿은 성분이 하나라도 있는지. */
function anyChannelSaturated(grid, cap){
  for(var i=0;i<grid.length;i++){
    for(var j=0;j<grid[i].length;j++){
      var c = grid[i][j];
      if(c.r===cap || c.g===cap || c.b===cap) return true;
    }
  }
  return false;
}

function buildS2_4(){
  return {
    mount: function(container){
      var st = STATE.screen('S2-4');
      var baseGrid = ENGINE_PX.gridForMath(STATE.data.pixelArt.grid);
      var screen = el('div', {class:'screen'});
      screen.appendChild(el('div', {class:'screen-eyebrow'}, '섹션2 · 어떻게 칠할까?'));
      screen.appendChild(el('h1', {class:'screen-title'}, '이미지 변환 실험실'));
      screen.appendChild(el('p', {class:'muted'}, '내 캐릭터에 버튼을 눌러 변환을 적용해보세요. 결과를 본 다음 수식을 확인할 수 있어요.'));

      var stage = el('div', {class:'stage-grid'});
      var left = el('div', {class:'stage-left'});
      var right = el('div', {class:'stage-right'});
      stage.appendChild(left); stage.appendChild(right);
      screen.appendChild(stage);

      /* maxWidth 압축(A1, 620→300): 결과물이 정사각형(16x16)이라 width:100%;height:auto인
         SplitCompare 캔버스가 이 값 그대로 세로 높이가 되어, 2단 그리드의 넓은 좌측 열에서
         노트북 1뷰포트를 크게 넘쳤다(판정·문구 불변, 표시 크기만 축소). */
      var resultHost = el('div', {style:{maxWidth:'300px'}});
      var formulaHost = el('div', {class:'reveal-block'});
      left.appendChild(resultHost);

      function drawGridOnCtx(ctx, grid, cellPx){
        var tmp = document.createElement('canvas');
        ENGINE_PX.renderGridToCanvas(tmp, grid, cellPx, {});
        ctx.clearRect(0,0,tmp.width,tmp.height);
        ctx.drawImage(tmp,0,0);
      }
      function showSameSize(resultGrid){
        resultHost.innerHTML = '';
        var split = Components.SplitCompare({
          width: 16*PX_CELL, height:16*PX_CELL, leftLabel:'원본', rightLabel:'결과',
          drawLeft:function(ctx){ drawGridOnCtx(ctx, baseGrid, PX_CELL); },
          drawRight:function(ctx){ drawGridOnCtx(ctx, resultGrid, PX_CELL); }
        });
        resultHost.appendChild(split.el);
      }
      function showResized(resultGrid){
        resultHost.innerHTML = '';
        var pair = el('div', {style:{display:'flex', gap:'16px', flexWrap:'wrap', alignItems:'flex-end', overflowX:'auto'}});
        /* maxWidth+height:auto(A1): 확대 변환은 원본보다 큰 네이티브 캔버스를 만들어(예: 32x32)
           크기 제한이 없으면 세로로 매우 커진다 — 비율 유지한 채 표시 크기만 축소. */
        var c1 = el('canvas', {'aria-label':'원본', style:{maxWidth:'150px', height:'auto', display:'block'}});
        var c2 = el('canvas', {'aria-label':'결과', style:{maxWidth:'150px', height:'auto', display:'block'}});
        ENGINE_PX.renderGridToCanvas(c1, baseGrid, PX_CELL, {});
        ENGINE_PX.renderGridToCanvas(c2, resultGrid, PX_CELL, {});
        pair.appendChild(el('div', {}, [el('div',{class:'muted'},'원본 16×16'), c1]));
        pair.appendChild(el('div', {}, [el('div',{class:'muted'},'결과 '+resultGrid.length+'×'+resultGrid[0].length), c2]));
        resultHost.appendChild(pair);
      }
      showSameSize(baseGrid);

      /* v2 §B 화면12: 밝게/어둡게 연타 누적(공유 카운터 brightN, +1/-1). 결과는 항상
         brightenGrid(원본, 20*brightN) 단일 연산(§C I14 대상, 연산 순서 무관성은 clampRound
         포화 때문에 성립하지 않아 "원본에 20n 1회 적용" 방식으로 통일해 검증 가능성을 확보한다).
         다른 변환 버튼을 누르면 브라이트 카운터가 0으로 리셋된다(그 변환은 늘 원본 기준). */
      var brightN = 0;
      var satMsgHost = el('div', {class:'muted', style:{marginTop:'6px'}});

      var btnRow = el('div', {class:'transform-btns'});
      var btnEls = {};
      S2_4_TRANSFORMS.forEach(function(t){
        var b = el('button', {type:'button', class:'transform-btn'}, t.label);
        b.addEventListener('click', function(){
          Object.keys(btnEls).forEach(function(k){ btnEls[k].classList.toggle('applied', k===t.id); });
          var result, tex, note;
          if(t.accumulate){
            brightN += t.accumulate;
            result = COLOR.brightenGrid(baseGrid, 20*brightN);
            tex = brightFormulaTex(brightN);
            note = t.note;
          } else {
            brightN = 0;
            result = t.apply(baseGrid);
            tex = t.tex; note = t.note;
          }
          if(t.resize) showResized(result); else showSameSize(result);
          formulaHost.innerHTML = '';
          if(tex){
            formulaHost.appendChild(Components.Formula(tex));
            if(note) formulaHost.appendChild(el('div', {class:'muted', style:{marginTop:'4px'}}, note));
          } else {
            formulaHost.appendChild(el('div', {class:'formula-card'}, t.formula));
          }
          formulaHost.classList.add('show');
          renderMath(formulaHost);
          /* 포화 관찰 문구(§B 화면12 초안) — 밝게 방향(accumulate===1) 누적 중 255 성분이
             생기거나 3회 이상이면 안내. 다른 버튼(어둡게 포함)을 누르면 문구를 지운다. */
          satMsgHost.textContent = (t.accumulate===1 && (anyChannelSaturated(result,255) || brightN>=3))
            ? '계속 눌러도 더 안 밝아지는 칸이 있어요. 255에서 멈추기 때문이에요(포화) — 왜 255일까요?'
            : '';
          if(!st.applied[t.id]){ st.applied[t.id]=true; STATE.save(); refreshNav(); }
        });
        btnEls[t.id]=b;
        btnRow.appendChild(b);
      });
      right.appendChild(btnRow);
      right.appendChild(formulaHost);
      right.appendChild(satMsgHost);

      var resetBtn = el('button', {type:'button', class:'btn btn-secondary btn-sm', style:{marginTop:'8px'}}, '원본으로 되돌리기');
      resetBtn.addEventListener('click', function(){
        Object.keys(btnEls).forEach(function(k){ btnEls[k].classList.remove('applied'); });
        brightN = 0;
        showSameSize(baseGrid);
        formulaHost.classList.remove('show');
        satMsgHost.textContent = '';
      });
      right.appendChild(resetBtn);

      screen.appendChild(el('p', {class:'muted', style:{marginTop:'var(--sp-sm)'}}, '유의: 회전 변환은 이번 학습 범위에 없어요. 회전의 재미는 다음 화면의 행렬 테트리스가 대신해요.'));
      container.appendChild(screen);
    },
    isComplete: function(){ return Object.keys(STATE.screen('S2-4').applied).length >= 3; }
  };
}

/* v2 §B 화면13 ⓒ: 동시 소거 줄 수 -> 점수(그 외 0). I15 대상 순수 함수. */
function scoreForLines(n){
  var TABLE = {1:100, 2:300, 3:500, 4:800};
  return TABLE[n] || 0;
}

function buildS2_5(){
  return {
    mount: function(container){
      var st = STATE.screen('S2-5');
      /* v2 ⓒ "시작 전에는 기록 없음" — 마운트마다 보드가 새로 시작되므로(옛 상태를 이어받지
         않음) 점수도 항상 0에서 다시 센다. linesCleared(누적 게이트)는 건드리지 않는다. */
      st.score = 0; STATE.save();
      var screen = el('div', {class:'screen'});
      screen.appendChild(el('div', {class:'screen-eyebrow'}, '섹션2 · 어떻게 칠할까? · 선택 활동'));
      screen.appendChild(el('h1', {class:'screen-title'}, '행렬 테트리스'));
      screen.appendChild(el('p', {class:'muted'}, '흰 배경에 검은 글씨로 0이 채워진 맵 위로, 1로 이뤄진 블록이 내려와요. 한 줄이 모두 1이 되면 사라져요.'));

      var wrap = el('div', {class:'tetris-wrap'});
      screen.appendChild(wrap);
      var boardWrap = el('div', {class:'pixel-canvas-wrap tetris-board', style:{maxWidth:'280px'}});
      var canvas = el('canvas', {role:'img', 'aria-label':'행렬 테트리스 보드, 10칸 x 16칸'});
      boardWrap.appendChild(canvas);
      /* v2 ⓐⓑ: 보드 위 오버레이(시작 전/게임 끝) — 공용 요소 1개를 재사용한다. */
      var overlay = el('div', {class:'tetris-overlay'});
      boardWrap.appendChild(overlay);
      wrap.appendChild(boardWrap);

      var side = el('div', {class:'tetris-side'});
      var scoreMsg = el('p', {});
      var linesMsg = el('p', {});
      side.appendChild(scoreMsg);
      side.appendChild(linesMsg);
      side.appendChild(el('p', {}, '회전 = 전치 후 좌우 반전(시계방향 90도)'));
      var miniBefore = el('div', {class:'piece-mini'});
      var miniAfter = el('div', {class:'piece-mini'});
      side.appendChild(el('div', {class:'muted'}, '현재 블록'));
      side.appendChild(miniBefore);
      side.appendChild(el('div', {class:'muted'}, '회전하면?'));
      side.appendChild(miniAfter);

      var controls = el('div', {class:'tetris-controls'});
      var leftBtn = el('button', {type:'button', class:'tt-left', 'aria-label':'왼쪽으로 이동'}, '◀');
      var rotBtn = el('button', {type:'button', class:'tt-rotate', 'aria-label':'회전'}, '⟳');
      var rightBtn = el('button', {type:'button', class:'tt-right', 'aria-label':'오른쪽으로 이동'}, '▶');
      var downBtn = el('button', {type:'button', class:'tt-down', 'aria-label':'아래로 내리기'}, '▼');
      [leftBtn,rotBtn,rightBtn,downBtn].forEach(function(b){ controls.appendChild(b); });
      side.appendChild(controls);
      var skipBtn = el('button', {type:'button', class:'btn btn-secondary btn-sm', style:{marginTop:'10px'}}, '건너뛰기(선택 활동)');
      side.appendChild(skipBtn);
      wrap.appendChild(side);

      var g = TETRIS.newGame();
      var started = false, timer = null, prevGLines = 0;

      function refresh(){
        TETRIS.render(canvas, g);
        if(g.piece){
          miniBefore.textContent = TETRIS.pieceMiniText(g.piece);
          miniAfter.textContent = TETRIS.pieceMiniText(COLOR.rotateCW(g.piece));
        } else {
          miniBefore.textContent = ''; miniAfter.textContent = '';
        }
        /* 이번 softDrop(틱/버튼/키) 한 번에 몇 줄이 지워졌는지(delta)로 점수를 매기고
           (scoreForLines), 게이트 카운터(st.linesCleared)는 누적한다(재시작해도 유지, §C I15③). */
        var delta = g.linesCleared - prevGLines;
        if(delta > 0){
          st.linesCleared += delta;
          st.score = (st.score||0) + scoreForLines(delta);
          STATE.save();
          refreshNav();
        }
        prevGLines = g.linesCleared;
        linesMsg.textContent = '소거한 줄: ' + g.linesCleared;
        scoreMsg.textContent = '점수: ' + (st.score||0) + '점';
      }

      function renderStartOverlay(){
        overlay.innerHTML = '';
        overlay.appendChild(el('p', {}, '준비되면 시작하세요!'));
        var startBtn = el('button', {type:'button', class:'btn btn-primary'}, '게임 시작');
        startBtn.addEventListener('click', startGame);
        overlay.appendChild(startBtn);
        overlay.classList.add('show');
      }
      function renderGameOverOverlay(){
        overlay.innerHTML = '';
        overlay.appendChild(el('p', {}, '게임 끝! 점수 ' + (st.score||0) + '점 · 소거 ' + g.linesCleared + '줄'));
        var again = el('button', {type:'button', class:'btn btn-primary'}, '다시 시작');
        again.addEventListener('click', restartGame);
        overlay.appendChild(again);
        overlay.classList.add('show');
        announce('게임 끝. 점수 ' + (st.score||0) + '점, 소거 ' + g.linesCleared + '줄. 다시 시작할 수 있어요.');
      }
      function tick(){
        TETRIS.softDrop(g);
        refresh();
        if(g.over){ clearInterval(timer); timer = null; renderGameOverOverlay(); }
      }
      function startGame(){
        if(started) return;
        started = true;
        overlay.classList.remove('show');
        TETRIS.spawn(g);
        refresh();
        timer = setInterval(tick, 800);
      }
      function restartGame(){
        /* v2 §C I15③: 재시작 시 점수 0·보드 초기화, linesCleared(게이트)는 그대로 유지한다
           (st.linesCleared를 여기서 건드리지 않는다). */
        g = TETRIS.newGame();
        prevGLines = 0;
        st.score = 0; STATE.save();
        overlay.classList.remove('show');
        started = true;
        TETRIS.spawn(g);
        refresh();
        timer = setInterval(tick, 800);
      }

      refresh();
      renderStartOverlay();
      registerUnmount(function(){ if(timer) clearInterval(timer); });

      leftBtn.addEventListener('click', function(){ TETRIS.move(g,-1); refresh(); });
      rightBtn.addEventListener('click', function(){ TETRIS.move(g,1); refresh(); });
      rotBtn.addEventListener('click', function(){ TETRIS.rotate(g); refresh(); });
      downBtn.addEventListener('click', function(){ TETRIS.softDrop(g); refresh(); });
      function onKey(e){
        /* v2 §B 화면13 ⓔ: 게임 진행 중(시작됨·오버 아님·스킵 안 함)에만 방향키를 가로챈다.
           그 외에는 아무 것도 하지 않아(전파 계속), 전역 ←→ 내비(boot())가 정상 동작한다. */
        if(!started || g.over || st.skipped) return;
        if(e.key==='ArrowLeft'){ TETRIS.move(g,-1); refresh(); e.preventDefault(); }
        else if(e.key==='ArrowRight'){ TETRIS.move(g,1); refresh(); e.preventDefault(); }
        else if(e.key==='ArrowUp'){ TETRIS.rotate(g); refresh(); e.preventDefault(); }
        else if(e.key==='ArrowDown'){ TETRIS.softDrop(g); refresh(); e.preventDefault(); }
      }
      /* capture 단계(3번째 인자 true)로 등록: 전역 ←→ 화면내비 핸들러(boot(), bubble 단계)보다
         먼저 실행되어 e.preventDefault()를 걸어둬야, 테트리스 조작 중 화면이 같이 넘어가버리는
         충돌을 막는다(게임 진행 중일 때만 — 위 가드). */
      document.addEventListener('keydown', onKey, true);
      registerUnmount(function(){ document.removeEventListener('keydown', onKey, true); });

      skipBtn.addEventListener('click', function(){
        if(!st.skipped){ st.skipped=true; STATE.save(); refreshNav(); }
        toast('건너뛰었어요. 다음으로 넘어갈 수 있어요.');
      });

      container.appendChild(screen);
    },
    isComplete: function(){
      var st = STATE.screen('S2-5');
      return st.linesCleared >= 1 || !!st.skipped;
    }
  };
}

function s2_6QuizStep(item){
  return {
    mount: function(container){
      var st = STATE.screen('S2-6');
      var screen = el('div', {class:'screen'});
      screen.appendChild(el('div', {class:'screen-eyebrow'}, '섹션2 · 정리'));

/* v2 §B 화면16 ⓓ·화면17: 변환 진행 캡션 -- t(진행도)·mode(선형/보색)에 따라 문구를 고른다.
   순수 함수(문자열만 생성, 3D 씬은 건드리지 않는다). buildS3_2·s3_3ModeStep이 공유한다. */
function invertStageCaption(mode, t){
  if(mode === 'comp'){
    if(t<=0) return '이번엔 밝기는 두고 색상만 돌려요.';
    if(t>=1) return '도착! 색상만 반대로, 밝기는 그대로예요.';
    return '회색 기둥(축)을 중심으로 색상이 180° 회전 중 — 검정·흰색·회색은 제자리!';
  }
  if(t<=0) return '각 색이 자기 자리에 있어요. 재생을 눌러보세요.';
  if(t>=1) return '도착! 검정↔흰색, 빨강↔청록색이 서로 자리를 바꿨어요.';
  return '모든 점이 정중앙 (128, 128, 128)을 지나 반대편으로 이동 중!';
}
/* 심볼릭 수식(요청서 §B 문자열 그대로, 고정)은 formula-card 1회만 렌더하고, "선택 색 값 대입
   실시간"은 별도 평문 줄로 분리한다(표기 정확성 보존 — 심볼과 대입값을 섞어 짓지 않는다). */
function invertFormulaTex(mode){
  return mode==='comp' ? '(h,\\,s,\\,v) \\to (h+180^\\circ,\\;s,\\,v)' : "(r,\\,g,\\,b) \\to (255-r,\\;255-g,\\;255-b)";
}
function invertSubstituteText(mode, c){
  if(mode==='comp'){
    var hsv = COLOR.rgb2hsv(c.r/255,c.g/255,c.b/255);
    var h = Math.round(hsv.h), h2 = Math.round((h+180)%360);
    return '지금 선택한 색의 색상(H): ' + h + '° → ' + h2 + '°';
  }
  return '지금 선택한 색: (' + c.r+', '+c.g+', '+c.b + ') → (' + (255-c.r)+', '+(255-c.g)+', '+(255-c.b) + ')';
}

function buildS3_2(){
  return {
    steps: [
      { /* step1: 질문 + 무대(재생) -- v2 §B 화면16: A5 다크·A6 키패드 삭제·POINT_N 통일·마커
           드래그·변환 캡션+수식·반전 종류 배지 */
        mount: function(container){
          var st = STATE.screen('S3-2');
          var screen = el('div', {class:'screen'});
          screen.appendChild(el('div', {class:'screen-eyebrow'}, '섹션3 · 색 반전 실험실 · 핵심'));
          screen.appendChild(el('h1', {class:'screen-title'}, '이 반전을, 색공간에서 보면 무슨 일이 일어날까요?'));

          var grid = el('div', {class:'stage-grid stage-grid--keep2'});
          /* s3-stage-col(v2 재작성 — 높이를 vh로 직접 통제해 폭은 넓게 쓴다, 위 CSS 참고).

          var left = el('div', {class:'stage-left s3-stage-col'});
          var right = el('div', {class:'stage-right'});
          grid.appendChild(left); grid.appendChild(right);
          screen.appendChild(grid);

          buildColorPicker(right, {showPair:false});

          var S = ENGINE_3D.S;
          var webglOK = ENGINE_3D.detectWebGL();
          var stage=null, cloud=null, markerA=null, markerB=null, connector=null, fb=null;
          var t=0, playing=0;
          var tSlider = Components.ChannelSlider({
            label:'변환 진행', min:0, max:100, value:0, valueLabel:function(v){ return v+'%'; },
            onInput:function(v){ t=v/100; playing=0; applyT(); }
          });
          var captionP = el('p', {class:'muted'});
          var formulaHost = el('div', {});
          var subText = el('div', {class:'muted', style:{fontFamily:'var(--font-mono)', fontSize:'13px'}});

          function applyT(){
            var c = COLORBUS.get();
            if(webglOK){
              cloud.items.forEach(function(it,i){
                var p0x=(it.r/255-0.5)*S, p0y=(it.g/255-0.5)*S, p0z=(it.b/255-0.5)*S;
                cloud.posAttr.array[i*3]=p0x*(1-2*t); cloud.posAttr.array[i*3+1]=p0y*(1-2*t); cloud.posAttr.array[i*3+2]=p0z*(1-2*t);
              });
              cloud.posAttr.needsUpdate = true;
              var pA = COLOR.rgbToPos(c.r,c.g,c.b,S);
              var inv = COLOR.invertRGB255(c.r,c.g,c.b);
              var pB = COLOR.rgbToPos(inv.r,inv.g,inv.b,S);
              markerA.setPos(pA.x,pA.y,pA.z); markerA.setColor(c.r,c.g,c.b);
              markerB.setPos(pB.x,pB.y,pB.z); markerB.setColor(inv.r,inv.g,inv.b);
              connector.setEndpoints(pA, pB);
            } else if(fb){ fb.refresh(); }
            tSlider.setValue(Math.round(t*100));
            captionP.textContent = invertStageCaption('linear', t);
            subText.textContent = invertSubstituteText('linear', c);
          }

          if(webglOK){
            /* G-v2-5 채택(2026-07-20): 마커 드래그 발견성 힌트를 HUD에 노출(WebGL 경로 한정 — 폴백은 createStage 미호출) */
            stage = ENGINE_3D.createStage(left, {ariaLabel:'반전의 색공간 시각화. 점들이 중심을 지나 반대편으로 이동합니다. 흰 점을 드래그해 색을 바꿀 수 있어요.',
              hudText:'<b>드래그</b> 회전 · <b>휠/두 손가락</b> 확대·축소<br>점을 잡아 끌면 다른 색으로 실험할 수 있어요'});
            ENGINE_3D.buildCubeSkeleton(stage.scene, S);
            cloud = ENGINE_3D.buildPointCloud(stage.scene, POINT_N, S, {size:0.05, opacity:0.55});
            connector = ENGINE_3D.makeLine(stage.scene, 0xffffff, 0.65);
            markerA = ENGINE_3D.makeMarker(stage.scene, 0.1);
            markerB = ENGINE_3D.makeMarker(stage.scene, 0.1);
            /* v2 §B 화면16 ⓒ: 시작점 마커 드래그(9.1 역매핑, P2-2와 동일). 빈 곳 드래그는
               기존 규칙대로 궤도 회전(createStage 내부, 변경 없음). */
            stage.draggable = {mesh:markerA.mesh, S:S, onChange:function(r,g,b){ COLORBUS.set(r,g,b); }};
            stage.wrap.appendChild(el('span', {class:'gl-badge'}, '선형 반전')); /* ⓔ */
            stage.onFrame = function(){
              if(playing){
                t = Math.max(0, Math.min(1, t+playing*0.012));
                if(t>=1||t<=0){ playing=0; if(t>=1 && !st.played){ st.played=true; STATE.save(); refreshNav(); } }
                applyT();
              }
            };
            registerUnmount(function(){ stage.dispose(); });
          } else {
            fb = ENGINE_3D.buildFallback(left, function(){ return COLORBUS.get(); });
          }

          var playBtn = el('button', {type:'button', class:'btn btn-primary btn-sm'}, '▶ 재생');

          playBtn.addEventListener('click', function(){
            if(!webglOK || FX.reducedMotion){
              t = 1; applyT();
              if(!st.played){ st.played=true; STATE.save(); refreshNav(); }
              return;
            }
            if(t>=0.999) t=0;
            playing=1;
          });
          backBtn.addEventListener('click', function(){ playing=-1; });
          var playRow = el('div', {class:'btn-row'});
          playRow.appendChild(playBtn); playRow.appendChild(backBtn);
          left.appendChild(playRow);
          left.appendChild(tSlider);
          left.appendChild(captionP);
          formulaHost.appendChild(Components.Formula(invertFormulaTex('linear')));
          left.appendChild(formulaHost);
          left.appendChild(subText);

          applyT();
          var onColor = function(){ applyT(); };
          COLORBUS.subscribe(onColor);
          registerUnmount(function(){ COLORBUS.unsubscribe(onColor); });

          container.appendChild(screen);
        },
        isComplete: function(){ return !!STATE.screen('S3-2').played; }
      },
      { /* step2: 정리 */
        mount: function(container){
          var screen = el('div', {class:'screen'});
          screen.appendChild(el('div', {class:'screen-eyebrow'}, '섹션3 · 색 반전 실험실 · 핵심'));
          screen.appendChild(el('h1', {class:'screen-title'}, '이 반전을, 색공간에서 보면 무슨 일이 일어날까요?'));
          screen.appendChild(el('p', {class:'muted'}, '빨강 자리의 점이 청록색 자리로 갔어요. 검정은 흰색으로!'));
          screen.appendChild(Components.SummaryCard({color:'peach', title:'정리', body:'각 성분에서 255를 빼는 건, 색공간에서 <b>정중앙을 기준으로 반대편</b>으로 보내는 것(점대칭)이에요.'}));
          container.appendChild(screen);
        }
      }
    ]
  };
}

/* 3D 반전 무대(선형/보색 고정 1종) — 개정 P2-C: 기존 SegToggle로 화면 하나에서 전환하던 것을
   step1(선형 전용)·step2(보색 전용)로 분리한다. mode는 이 함수 호출 시 고정되고(토글 없음),
   이 함수는 buildS3_3 전용 로컬 헬퍼라 다른 화면과 공유하지 않는다(다른 화면 코드 불변). */
/* v2 §B 화면17: 화면16과 같은 패키지(A5 다크·A6 키패드 삭제·POINT_N 통일·마커 드래그·
   변환 캡션+수식·반전 종류 배지)를 mode별(선형/보색)로 적용한다. */
function s3_3ModeStep(mode){
  return {
    mount: function(container){
      var st = STATE.screen('S3-3');
      var screen = el('div', {class:'screen'});
      screen.appendChild(el('div', {class:'screen-eyebrow'}, '섹션3 · 색 반전 실험실'));
      screen.appendChild(el('h1', {class:'screen-title'}, "빨강의 반대는 청록색이라 했죠. 그런데 밝기는 그대로 두고 '반대 색'만 얻고 싶다면?"));

      var grid = el('div', {class:'stage-grid stage-grid--keep2'});
      /* s3-stage-col(v2 재작성 — 높이를 vh로 직접 통제해 폭은 넓게 쓴다, 위 CSS 참고).
         --keep2(H): 태블릿 세로에서도 2단 유지. */
      var left = el('div', {class:'stage-left s3-stage-col'});
      var right = el('div', {class:'stage-right'});
      grid.appendChild(left); grid.appendChild(right);
      screen.appendChild(grid);

      buildColorPicker(right, {showPair:false});

      var S = ENGINE_3D.S;
      function posAt(r,g,b,tt){
        if(mode==='linear'){
          var x=(r/255-0.5)*S, y=(g/255-0.5)*S, z=(b/255-0.5)*S;
          return {x:x*(1-2*tt), y:y*(1-2*tt), z:z*(1-2*tt)};
        }
        var hsv = COLOR.rgb2hsv(r/255,g/255,b/255);
        var h2 = (hsv.h + 180*tt) % 360;
        var rgb2 = COLOR.hsv2rgb(h2, hsv.s, hsv.v);
        return COLOR.rgbToPos(rgb2[0]*255, rgb2[1]*255, rgb2[2]*255, S);
      }
      function endColorAt(r,g,b){ return mode==='linear' ? COLOR.invertRGB255(r,g,b) : COLOR.complementRGB255(r,g,b); }

      var webglOK = ENGINE_3D.detectWebGL();
      var stage=null, cloud=null, markerA=null, markerB=null, connector=null, fb=null;
      var t=0, playing=0;
      var tSlider = Components.ChannelSlider({
        label:'변환 진행', min:0, max:100, value:0, valueLabel:function(v){ return v+'%'; },
        onInput:function(v){ t=v/100; playing=0; applyT(); }
      });
      var captionP = el('p', {class:'muted'});
      var formulaHost = el('div', {});
      var subText = el('div', {class:'muted', style:{fontFamily:'var(--font-mono)', fontSize:'13px'}});

      function applyT(){
        var c = COLORBUS.get();
        if(webglOK){
          cloud.items.forEach(function(it,i){
            var p = posAt(it.r,it.g,it.b,t);
            cloud.posAttr.array[i*3]=p.x; cloud.posAttr.array[i*3+1]=p.y; cloud.posAttr.array[i*3+2]=p.z;
          });
          cloud.posAttr.needsUpdate = true;
          var pA = COLOR.rgbToPos(c.r,c.g,c.b,S);
          var pB = posAt(c.r,c.g,c.b,1);
          var endC = endColorAt(c.r,c.g,c.b);
          markerA.setPos(pA.x,pA.y,pA.z); markerA.setColor(c.r,c.g,c.b);
          markerB.setPos(pB.x,pB.y,pB.z); markerB.setColor(endC.r,endC.g,endC.b);
          connector.setEndpoints(pA, pB);
        } else if(fb){ fb.refresh(); }
        tSlider.setValue(Math.round(t*100));
        captionP.textContent = invertStageCaption(mode, t);
        subText.textContent = invertSubstituteText(mode, c);
      }

      if(webglOK){
        /* G-v2-5 채택(2026-07-20): 마커 드래그 발견성 힌트 — 화면16과 동일 문구 */
        stage = ENGINE_3D.createStage(left, {ariaLabel: (mode==='linear' ? '선형 반전 색공간 시각화.' : '보색 반전 색공간 시각화.') + ' 흰 점을 드래그해 색을 바꿀 수 있어요.',
          hudText:'<b>드래그</b> 회전 · <b>휠/두 손가락</b> 확대·축소<br>점을 잡아 끌면 다른 색으로 실험할 수 있어요'});
        ENGINE_3D.buildCubeSkeleton(stage.scene, S);
        cloud = ENGINE_3D.buildPointCloud(stage.scene, POINT_N, S, {size:0.05, opacity:0.55});
        connector = ENGINE_3D.makeLine(stage.scene, 0xffffff, 0.65);
        markerA = ENGINE_3D.makeMarker(stage.scene, 0.1);
        markerB = ENGINE_3D.makeMarker(stage.scene, 0.1);
        /* v2 §B 화면17 ⓒ: 시작점 마커 드래그(9.1 역매핑, P2-2·화면16과 동일). */
        stage.draggable = {mesh:markerA.mesh, S:S, onChange:function(r,g,b){ COLORBUS.set(r,g,b); }};
        stage.wrap.appendChild(el('span', {class:'gl-badge'}, mode==='linear' ? '선형 반전' : '보색 반전')); /* ⓔ */
        stage.onFrame = function(){
          if(playing){
            t = Math.max(0, Math.min(1, t+playing*0.012));
            if(t>=1||t<=0){
              playing=0;
              if(t>=1){ if(mode==='linear'){ st.playedLinear=true; } else { st.playedComp=true; } STATE.save(); refreshNav(); }
            }
            applyT();
          }
        };
        registerUnmount(function(){ stage.dispose(); });
      } else {
        fb = ENGINE_3D.buildFallback(left, function(){ return COLORBUS.get(); });
      }

      var playBtn = el('button', {type:'button', class:'btn btn-primary btn-sm'}, '▶ 재생');
      var backBtn = el('button', {type:'button', class:'btn btn-secondary btn-sm'}, '◀ 되돌리기');
      playBtn.addEventListener('click', function(){
        if(!webglOK || FX.reducedMotion){
          t = 1; applyT();
          if(mode==='linear'){ st.playedLinear=true; } else { st.playedComp=true; }
          STATE.save(); refreshNav();
          return;
        }
        if(t>=0.999) t=0;
        playing=1;
      });
      backBtn.addEventListener('click', function(){ playing=-1; });
      var playRow = el('div', {class:'btn-row'});
      playRow.appendChild(playBtn); playRow.appendChild(backBtn);
      left.appendChild(playRow);
      left.appendChild(tSlider);
      left.appendChild(captionP);
      formulaHost.appendChild(Components.Formula(invertFormulaTex(mode)));
      left.appendChild(formulaHost);
      left.appendChild(subText);

      applyT();
      var onColor = function(){ applyT(); };
      COLORBUS.subscribe(onColor);
      registerUnmount(function(){ COLORBUS.unsubscribe(onColor); });

      container.appendChild(screen);
    },
    isComplete: function(){
      var st = STATE.screen('S3-3');
      return mode==='linear' ? !!st.playedLinear : !!st.playedComp;
    }
  };
}

function buildS3_3(){

    steps: [
      s3_3ModeStep('linear'),
      s3_3ModeStep('comp'),
      { /* step3: 이미지로 비교 + 정리 */
        mount: function(container){
          var screen = el('div', {class:'screen'});
          screen.appendChild(el('div', {class:'screen-eyebrow'}, '섹션3 · 색 반전 실험실'));
          screen.appendChild(el('h1', {class:'screen-title'}, "빨강의 반대는 청록색이라 했죠. 그런데 밝기는 그대로 두고 '반대 색'만 얻고 싶다면?"));

          var mode = 'linear';

            ariaLabel:'반전 방식', value:mode,

          function updateImageCompare(){

          screen.appendChild(Components.SummaryCard({color:'lavender', body:'선형 반전은 검정↔흰색까지 바뀌지만, 보색 반전은 검정·흰색·회색이 그대로예요.'}));

          MASCOT.bubble(screen, '오늘 정말 잘했어! 색과 이미지가 전부 숫자였다니, 신기하지?', {tone:'cheer'});

var SCREENS = {
  'P1-1': buildP1_1(), 'P1-2': buildP1_2(), 'P1-3': buildP1_3(), 'P1-4': buildP1_4(), 'P1-5': buildP1_5(),
  'P2-1': buildP2_1(), 'P2-2': buildP2_2(), 'P2-3': buildP2_3(),
  'S2-1': buildS2_1(), 'S2-2': buildS2_2(), 'S2-3': buildS2_3(), 'S2-4': buildS2_4(), 'S2-5': buildS2_5(), 'S2-6': buildS2_6(),
  'S3-1': buildS3_1(), 'S3-2': buildS3_2(), 'S3-3': buildS3_3(), 'S3-4': buildS3_4()
};

/* ============================================================
   __IMG — 순수 검증 노출(개정 P2-B1: stepDefs·mixLighter). window.__COLOR와 마찬가지로
   DOM/THREE/katex 미접근, 정의·호출 모두 순수 함수(verify_img.py I1·I4 대상).
   ============================================================ */
window.__IMG = window.__IMG || {};
/* 화면별 step 수 런타임 introspection(요청서 §B 대조용, I1). SCREENS가 이미 구성된 뒤에만
   호출된다는 전제(모듈 로드 완료 후) — 정의 자체는 DOM 미접근. */
window.__IMG.stepDefs = function(){
  var out = {};
  SCREEN_DEFS.forEach(function(d){
    var mod = SCREENS[d.id];
    out[d.id] = { steps: (mod && mod.steps && mod.steps.length) ? mod.steps.length : 1 };
  });
  return out;
};
/* P1-4 step3 벤 믹서 합성의 순수 재현: circles=[{r,g,b}, ...] 각 원의 채널 기여 -> 채널별
   min(255,합) 후 clampRound. Canvas 'lighter'(alpha=1 고정, 실제 step3 렌더)와 동일 산술(M-3). */
window.__IMG.mixLighter = function(circles){
  var sr=0, sg=0, sb=0;
  (circles||[]).forEach(function(c){
    sr += (c && c.r) || 0;
    sg += (c && c.g) || 0;
    sb += (c && c.b) || 0;
  });
  return {
    r: COLOR.clampRound(Math.min(255, sr)),
    g: COLOR.clampRound(Math.min(255, sg)),
    b: COLOR.clampRound(Math.min(255, sb))
  };
};
/* P2-2 점구름(개정 P2-B2, D-4 DRY·I3 대상) — ENGINE_3D.cloudItems를 그대로 재노출한다(분기 없음).
   buildPointCloud(P2-2 마운트 경로)가 바로 이 배열을 소비해 THREE.Points를 만들므로, 여기서
   검증하는 산술이 실제 렌더와 항상 같다. 정의·호출 모두 DOM/THREE 미접근(순수). */
window.__IMG.cloudItems = ENGINE_3D.cloudItems;
/* P2-3 step3 모프 점구름(F1, I9 대상) — ENGINE_3D.morphCloudItems를 그대로 재노출(분기 없음).
   buildMorphCloud가 바로 이 배열을 소비하므로 검증 산술이 실제 렌더와 항상 같다(순수 함수). */
window.__IMG.morphCloudItems = ENGINE_3D.morphCloudItems;
/* P2-2 미션 판정 데이터(I2) — 8꼭짓점 매칭 좌표(현행 판정과 같은 기준)·m4 3지선다(정답 인덱스는
   P2_2_M4_QUIZ.answerKey로부터 계산해 유일하게 하나만 정답임을 보장). */
window.__IMG.missionSpec = function(){
  var vertices = ENGINE_3D.CUBE_VERTS.map(function(v,i){
    return { name: ENGINE_3D.VERTEX_NAMES[i], r:v[0]*255, g:v[1]*255, b:v[2]*255 };
  });
  return {
    vertices: vertices,
    m4: {
      question: P2_2_M4_QUIZ.question,
      options: P2_2_M4_QUIZ.options.map(function(o){ return o.label; }),
      answerIndex: P2_2_M4_QUIZ.options.map(function(o){ return o.key; }).indexOf(P2_2_M4_QUIZ.answerKey)
    }
  };
};
/* 무채색 근접 판정(선택 보강 §E-2용 순수 노출) — r·g·b 중 최댓값과 최솟값의 차가 tol 이하면 참. */
window.__IMG.isGrayNear = function(r,g,b,tol){
  var mx = Math.max(r,g,b), mn = Math.min(r,g,b);
  return (mx-mn) <= tol;
};
/* v2 확장 노출(I11~I15 대상) — 전부 정의·호출 모두 DOM/THREE 미접근(순수), 실제 화면이
   소비하는 것과 같은 함수/데이터를 그대로 재노출한다(분기 없음). */
window.__IMG.wheelDotPos = wheelDotPos; /* I11: HSV 원판 점 배치(§B 화면8 ⓐ) */
/* P2-3 step3 미션2 판정 데이터(I12) — missionSpec(P2-2 m4)과 같은 형태. */
window.__IMG.missionSpec3d = function(){
  return {
    m2: {
      question: P2_3_M2_QUIZ.question,
      options: P2_3_M2_QUIZ.options.map(function(o){ return o.label; }),
      answerIndex: P2_3_M2_QUIZ.options.map(function(o){ return o.key; }).indexOf(P2_3_M2_QUIZ.answerKey)
    }
  };
};
window.__IMG.templateMasks = function(){ return ENGINE_PX.TEMPLATE_MASKS; }; /* I13: S2-2 도안 4종(§B 화면10 ⓐ) */
window.__IMG.pickColor = ENGINE_PX.pickColor;          /* I13: S2-2 스포이드(§B 화면10 ⓑ) */
window.__IMG.scoreForLines = scoreForLines;             /* I15: S2-5 점수(§B 화면13 ⓒ) */
window.__IMG.tetrisNewGame = TETRIS.newGame;            /* I15: "시작 전 무기록" 상태 전이 확인용 */

/* ============================================================
   9) TEACHER — 교사 패널(제목 5탭 또는 Alt+R)
   ============================================================ */
var TEACHER = {
  tapCount: 0,
  tapTimer: null,
  init: function(){
    var titleBtn = document.getElementById('appTitleBtn');
    titleBtn.addEventListener('click', function(){
      TEACHER.tapCount++;
      clearTimeout(TEACHER.tapTimer);
      TEACHER.tapTimer = setTimeout(function(){ TEACHER.tapCount = 0; }, 2500);
      if(TEACHER.tapCount >= 5){ TEACHER.tapCount = 0; TEACHER.open(); }
    });
    document.addEventListener('keydown', function(e){
      if(e.altKey && (e.key==='r' || e.key==='R')){ TEACHER.open(); }
      if(e.key === 'Escape'){ TEACHER.close(); }
    });
    document.getElementById('teacherCloseBtn').addEventListener('click', TEACHER.close);
    document.getElementById('teacherResetBtn').addEventListener('click', function(){
      var area = document.getElementById('teacherConfirmArea');
      area.textContent = '';
      var box = el('div', {class:'card-hairline', style:{marginTop:'10px'}});
      box.appendChild(el('p', {style:{margin:'0 0 10px'}}, '이 기기의 학습 기록을 모두 지우고 처음부터 시작할까요? (다음 회차 준비용)'));
      var row = el('div', {class:'btn-row'});
      var yes = el('button', {type:'button', class:'btn btn-primary'}, '예, 초기화');
      yes.addEventListener('click', function(){
        STATE.reset();
        ROUTER.go('P1-1', {silent:true});
        TEACHER.close();
        toast('초기화되었습니다.');
      });
      var no = el('button', {type:'button', class:'btn btn-secondary'}, '아니오');
      no.addEventListener('click', function(){ area.textContent = ''; });
      row.appendChild(yes); row.appendChild(no);
      box.appendChild(row);
      area.appendChild(box);
    });
  },
  open: function(){
    document.getElementById('teacherPanel').classList.add('open');
    document.getElementById('teacherConfirmArea').textContent = '';
  },
  close: function(){
    document.getElementById('teacherPanel').classList.remove('open');
  }
};

/* ============================================================
   10) BOOT
   ============================================================ */
function boot(){
  STATE.load();
  ROUTER.screenEl = document.getElementById('screenRoot');
  MASCOT.mountMini();
  TEACHER.init();
  document.getElementById('prevBtn').addEventListener('click', function(){ ROUTER.prev(); });
  document.getElementById('nextBtn').addEventListener('click', function(){ ROUTER.next(); });
  /* ←→ 화면·step 내비(A4/D-9). 입력 요소(입력칸·선택상자·슬라이더 포함 모든 input)에
     포커스가 있거나 IME 조합 중이면 무시하고, 이미 다른 위젯(SplitCompare 손잡이·미니 좌표평면·
     색상환·테트리스 등, capture 단계로 먼저 반응)이 이 키를 처리했다면(e.defaultPrevented)도
     무시한다 — 그래야 그 위젯들의 기존 방향키 조작과 화면 이동이 겹치지 않는다. */
  document.addEventListener('keydown', function(e){
    if(e.isComposing || e.keyCode === 229) return;
    if(e.key !== 'ArrowLeft' && e.key !== 'ArrowRight') return;
    var tag = document.activeElement && document.activeElement.tagName;
    if(tag==='INPUT' || tag==='TEXTAREA' || tag==='SELECT') return;
    if(e.defaultPrevented) return;
    if(e.key === 'ArrowLeft'){ ROUTER.prev(); } else { ROUTER.next(); }
  });
  ROUTER.render();
}

if(document.readyState === 'loading'){
  document.addEventListener('DOMContentLoaded', boot);
} else {
  boot();
}

})();
