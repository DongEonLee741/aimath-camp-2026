<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>이미지 데이터 처리 — 컴퓨터는 어떻게 사진을 볼까?</title>
<link rel="stylesheet" href="katex/katex.min.css">
<style>
/* ============================================================
   디자인 토큰 (DESIGN-clay.md 상속 + 명세 6.2 시맨틱 색 유지·대비보정)
   ============================================================ */
:root{
  --primary:#0a0a0a; --primary-active:#1f1f1f; --primary-disabled:#e5e5e5;
  --ink:#0a0a0a; --body-c:#3a3a3a; --body-strong:#1a1a1a;
  --muted:#6a6a6a; --muted-soft:#9a9a9a;
  --hairline:#e5e5e5; --hairline-soft:#f0f0f0;
  --canvas:#fffaf0; --surface-soft:#faf5e8; --surface-card:#f5f0e0; --surface-strong:#ebe6d6;
  --on-primary:#ffffff;
  --brand-pink:#ff4d8b; --brand-teal:#1a3a3a; --brand-lavender:#b8a4ed;
  --brand-peach:#ffb084; --brand-ochre:#e8b94a; --brand-mint:#a4d4c5; --brand-coral:#ff6b5a;
  /* v2 A5: 3D 무대 전용 다크 배경(명세 3.3 예외 — 무대 내부만, §E-5 기본값 #0a0a0a=--primary와 동값이나
     의미가 다른 별도 토큰으로 둔다. 페이지 액자·WebGL 폴백은 이 토큰을 쓰지 않는다). */
  --stage-dark:#0a0a0a;

  --r-xs:6px; --r-sm:8px; --r-md:12px; --r-lg:16px; --r-xl:24px; --r-pill:9999px;
  --sp-xxs:4px; --sp-xs:8px; --sp-sm:12px; --sp-md:16px; --sp-lg:24px; --sp-xl:32px; --sp-xxl:48px; --sp-section:96px;

  /* 이 학습지 시맨틱 색(명세 6.2 값 유지). --accent만 대비 보정(4.42:1 -> 6.38:1,
     텍스트/포커스링 전용, 주 버튼은 Clay --primary 사용 — 형제 학습지와 동일 관례).
     --good/--warn/--cR/--cG/--cB는 명세 원값 그대로 두되(칠·보더·장식 전용),
     본문 텍스트로 쓸 때는 대비용 -text 변형을 별도로 둔다. */
  --accent:#1d54c9;      /* 명세 --accent(#2f6df0) 대비보정, 6.38:1 */
  --good:#2ea043;        /* 명세 유지값(3.24:1, 텍스트 아님: 칠/보더/점) */
  --good-text:#1e7a34;   /* 정답 텍스트 전용, 5.19:1 */
  --warn:#d98324;        /* 명세 유지값(2.79:1, 텍스트 아님: 칠/보더) */
  --warn-text:#8a4a12;   /* 재시도 텍스트 전용, 6.58:1 */
  --cR:#e5484d; --cG:#2ea043; --cB:#1f6feb;  /* 채널색(명세 유지값). 텍스트는 항상 글자 R/G/B 병기 */

  --font-body:'Inter',-apple-system,BlinkMacSystemFont,'Apple SD Gothic Neo','Segoe UI','Malgun Gothic',Roboto,sans-serif;
  --font-mono:'SF Mono',ui-monospace,'Consolas','D2Coding',monospace;
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;height:100%;overflow:hidden;}
body{
  background:var(--canvas); color:var(--body-c); font-family:var(--font-body);
  font-size:16px; line-height:1.55; -webkit-text-size-adjust:100%;
}
h1,h2,h3{ color:var(--ink); font-weight:500; letter-spacing:-0.02em; margin:0 0 var(--sp-sm); }
h1{font-size:26px; line-height:1.15;}
h2{font-size:20px; line-height:1.2;}
h3{font-size:16px; line-height:1.3;}
p{margin:0 0 var(--sp-sm);}
button{font-family:inherit;}
table{border-collapse:separate;border-spacing:0;}
.sr-only{position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap;border:0;}
:focus-visible{outline:3px solid var(--accent); outline-offset:2px;}

/* ---------- 앱 셸 (1뷰포트: header·screen-root·bottom-nav 3단 flex column, text-data.html 이식) ---------- */
.app-shell{max-width:1120px;margin:0 auto;height:100vh;height:100dvh;display:flex;flex-direction:column;padding:0 var(--sp-md);}
.app-header{flex:none;background:var(--canvas);z-index:20;padding:var(--sp-sm) 0;border-bottom:1px solid var(--hairline);}
.header-top{display:flex;align-items:center;justify-content:space-between;gap:var(--sp-sm);}
.app-title-btn{background:none;border:none;padding:2px 4px;cursor:pointer;text-align:left;font:inherit;}
.app-title{font-size:14px;font-weight:600;color:var(--ink);letter-spacing:-0.01em;}
.section-tag{font-size:12px;color:var(--muted);font-weight:600;letter-spacing:0.02em;}
.mascot-mini{width:34px;height:34px;flex:none;border-radius:50%;overflow:hidden;background:var(--brand-lavender);display:flex;align-items:center;justify-content:center;}
.mascot-mini img{width:100%;height:100%;object-fit:cover;display:block;}
.mascot-mini.mascot-fallback::after{content:'✦';font-size:16px;color:var(--ink);}
.progress-track{display:flex;gap:4px;margin-top:var(--sp-xs);}
.progress-seg{flex:1;height:6px;border-radius:var(--r-pill);background:var(--hairline);overflow:hidden;position:relative;}
.progress-seg .fill{position:absolute;inset:0;background:var(--ink);width:0%;transition:width .25s ease;}
.progress-seg.section-done .fill{background:var(--good);}

/* ---------- 화면 공통 ---------- */
.screen-root{flex:1;min-height:0;position:relative;overflow:hidden;outline:none;}
/* ---------- 서브 슬라이드 스테이지(text-data.html 1뷰포트 셸 이식, A1 개정): 화면 전환 pane.
   pane은 항상 절대배치(position:absolute; inset:0)로 겹쳐 놓이고 overflow-y:auto로 내부
   스크롤만 받는다 — 페이지 스크롤은 생기지 않는다(A1). 전환은 가로 슬라이드+페이드(A2 사양:
   약 280ms·easeInOutQuad에 준하는 cubic-bezier·prefers-reduced-motion 시 즉시 전환). ---------- */
.view-pane{position:absolute; inset:0; height:100%; padding:var(--sp-lg) 0; overflow-y:auto; transition:transform .28s cubic-bezier(.455,.03,.515,.955), opacity .28s cubic-bezier(.455,.03,.515,.955);}
.view-pane.pane-active{transform:translateX(0);opacity:1;}
.view-pane.pane-enter-right{transform:translateX(48px);opacity:0;}
.view-pane.pane-enter-left{transform:translateX(-48px);opacity:0;}
.view-pane.pane-exit-left{transform:translateX(-48px);opacity:0;}
.view-pane.pane-exit-right{transform:translateX(48px);opacity:0;}
.view-pane.pane-enter-right,.view-pane.pane-enter-left,.view-pane.pane-exit-left,.view-pane.pane-exit-right{pointer-events:none;}
.step-dots{display:flex;gap:6px;justify-content:center;margin:0 0 var(--sp-sm);}
.step-dot{width:7px;height:7px;border-radius:50%;background:var(--hairline);}
.step-dot.active{background:var(--ink);width:18px;border-radius:var(--r-pill);}
.screen{animation:screenIn .28s ease both;}
@keyframes screenIn{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:none;}}
.screen-eyebrow{font-size:13px;font-weight:600;color:var(--muted);letter-spacing:0.02em;margin-bottom:4px;}
.screen-title{margin-bottom:var(--sp-sm);}
.screen-prompt{font-size:17px;color:var(--body-strong);background:var(--surface-soft);border-radius:var(--r-lg);padding:var(--sp-md);margin-bottom:var(--sp-md);}
.screen-block{margin-bottom:var(--sp-lg);}
.muted{color:var(--muted);font-size:14px;}
/* [hidden]은 author CSS에 질 수 있어 쓰지 않는다 — 확실히 이기는 클래스로 단계적 노출을 다룬다 */
.reveal-block{display:none;}
.reveal-block.show{display:block;}
.mini-plane{background:var(--canvas);border:1px solid var(--hairline);border-radius:var(--r-lg);}
.hl-word{background:rgba(29,84,201,.12);color:var(--accent);font-weight:800;padding:0 4px;border-radius:4px;}

/* ---------- 버튼 ---------- */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;min-height:44px;padding:10px 20px;border-radius:var(--r-md);font-size:14px;font-weight:600;border:1px solid transparent;cursor:pointer;touch-action:manipulation;}
.btn-primary{background:var(--primary);color:var(--on-primary);}
.btn-primary:hover{background:var(--primary-active);}
.btn-primary:disabled{background:var(--primary-disabled);color:var(--muted);cursor:not-allowed;}
.btn-secondary{background:var(--canvas);color:var(--ink);border-color:var(--hairline);}
.btn-secondary:hover{border-color:var(--ink);}
.btn-secondary.active{background:var(--ink);color:var(--on-primary);}
.btn-ghost{background:transparent;color:var(--ink);border-color:transparent;}
.btn-sm{min-height:44px;padding:6px 14px;font-size:13px;}
.btn-row{display:flex;flex-wrap:wrap;gap:var(--sp-xs);align-items:center;}
.btn-icon{min-width:44px;padding:8px;}

/* ---------- 카드 ---------- */
.card{border-radius:var(--r-xl);padding:var(--sp-lg);}
.card-title{font-size:14px;font-weight:700;margin-bottom:6px;opacity:.85;}
.card-body{font-size:16px;font-weight:600;}
.card-cream{background:var(--surface-card);color:var(--ink);}
.card-pink{background:var(--brand-pink);color:var(--ink);}
.card-teal{background:var(--brand-teal);color:var(--on-primary);}
.card-lavender{background:var(--brand-lavender);color:var(--ink);}
.card-peach{background:var(--brand-peach);color:var(--ink);}
.card-ochre{background:var(--brand-ochre);color:var(--ink);}
.card-hairline{background:var(--canvas);border:1px solid var(--hairline);border-radius:var(--r-lg);padding:var(--sp-md);}

/* ---------- 생각칸 ---------- */
.thought-box{background:var(--surface-soft);border-radius:var(--r-lg);padding:var(--sp-md);margin:var(--sp-md) 0;}
.thought-label{display:block;font-size:13px;font-weight:700;color:var(--body-strong);margin-bottom:6px;}
.thought-input{width:100%;min-height:64px;border:1px solid var(--hairline);border-radius:var(--r-md);padding:10px 12px;font:inherit;font-size:15px;resize:vertical;background:var(--canvas);color:var(--ink);}
.thought-input:focus{border-color:var(--accent);}

/* ---------- 칩 / 세그토글 ---------- */
.chips-row{display:flex;flex-wrap:wrap;gap:8px;margin:8px 0;}
.chip{min-height:44px;padding:8px 16px;border-radius:var(--r-pill);border:1px solid var(--hairline);background:var(--canvas);color:var(--body-c);font-size:14px;font-weight:600;cursor:pointer;}
.chip.active{background:var(--ink);color:var(--on-primary);border-color:var(--ink);}
.seg-toggle{display:inline-flex;background:var(--surface-strong);border-radius:var(--r-pill);padding:4px;gap:2px;flex-wrap:wrap;}
.seg-btn{min-height:44px;padding:6px 16px;border-radius:var(--r-pill);border:none;background:transparent;color:var(--muted);font-size:13px;font-weight:700;cursor:pointer;}
.seg-btn.active{background:var(--ink);color:var(--on-primary);}

/* ---------- 마스코트 ---------- */
.mascot-row{display:flex;align-items:flex-start;gap:10px;margin:var(--sp-sm) 0;}
.mascot-avatar{width:48px;height:48px;border-radius:50%;overflow:hidden;flex:none;background:var(--brand-lavender);display:flex;align-items:center;justify-content:center;font-size:22px;color:var(--ink);position:relative;}
.mascot-avatar img{width:100%;height:100%;object-fit:cover;display:block;}
.mascot-avatar.mascot-fallback::after{content:'✦';}
/* 루미 축하 반응(P2-1 완료 슬라이드) — 안테나 전구가 반짝이는 CSS 장식. 이미지 로드 여부와
   무관한 별도 오버레이 점이라 mascot-fallback(이미지 404)과도 함께 동작한다.
   prefers-reduced-motion은 전역 규칙(파일 하단 media 쿼리)이 animation-duration을 눌러 정지시킨다. */
.mascot-avatar.mascot-celebrate::after{
  content:''; position:absolute; left:50%; top:1px; width:7px; height:7px; margin-left:-3.5px;
  border-radius:50%; background:#ffd94a; box-shadow:0 0 6px 2px rgba(255,217,74,.85);
  animation:antennaBlink 1.1s ease-in-out infinite;
}
@keyframes antennaBlink{0%,100%{opacity:.4;box-shadow:0 0 3px 1px rgba(255,217,74,.5);}50%{opacity:1;box-shadow:0 0 8px 3px rgba(255,217,74,.95);}}
.mascot-bubble{background:var(--canvas);border:1px solid var(--hairline);border-radius:var(--r-lg);border-top-left-radius:4px;padding:10px 14px;font-size:14px;color:var(--body-strong);max-width:560px;}
.mascot-bubble.tone-cheer{background:#eef6ec;border-color:var(--good);}

/* ---------- 넥스트 티저 / 토스트 ---------- */
.next-tease{display:flex;align-items:center;gap:8px;background:var(--surface-card);border-radius:var(--r-pill);padding:10px 18px;font-weight:700;color:var(--body-strong);width:fit-content;margin-top:var(--sp-sm);}
.toast{position:fixed;left:50%;bottom:88px;transform:translateX(-50%);background:var(--ink);color:#fff;padding:10px 18px;border-radius:var(--r-pill);font-size:14px;z-index:60;max-width:90vw;text-align:center;}
.toast:empty{display:none;}

/* ---------- 하단 내비 (1뷰포트: app-shell 내부 flex 아이템 — fixed 오버레이 아님) ---------- */
.bottom-nav{flex:none;background:var(--canvas);border-top:1px solid var(--hairline);padding:10px var(--sp-md);display:flex;align-items:center;justify-content:space-between;gap:var(--sp-sm);z-index:30;}
.nav-status{font-size:12px;color:var(--muted);}

/* ---------- 교사 패널 ---------- */
.teacher-panel{display:none;position:fixed;inset:0;background:rgba(10,10,10,.5);z-index:80;align-items:center;justify-content:center;padding:var(--sp-md);}
.teacher-panel.open{display:flex;}
.teacher-card{background:var(--canvas);border-radius:var(--r-xl);padding:var(--sp-xl);max-width:420px;width:100%;}

/* ---------- 게임필(간단) ---------- */
.fx-pop{animation:fxPop .32s cubic-bezier(.34,1.56,.64,1);}
@keyframes fxPop{0%{transform:scale(1);}45%{transform:scale(1.16);}100%{transform:scale(1);}}
.fx-shake{animation:shakeX .4s ease;}
@keyframes shakeX{0%,100%{transform:translateX(0);}20%{transform:translateX(-5px);}40%{transform:translateX(5px);}60%{transform:translateX(-4px);}80%{transform:translateX(4px);}}

/* ---------- 퀴즈 ---------- */
.quiz3-block{background:var(--surface-soft);border-radius:var(--r-lg);padding:var(--sp-md);margin:var(--sp-sm) 0;}
.quiz3-question{font-weight:700;color:var(--body-strong);margin-bottom:8px;}
.quiz3-options{display:flex;gap:8px;flex-wrap:wrap;}
.quiz3-opt{min-height:44px;padding:8px 16px;border-radius:var(--r-md);border:2px solid var(--hairline);background:var(--canvas);font-weight:600;cursor:pointer;}
.quiz3-opt.correct{border-color:var(--good);background:rgba(46,160,67,.12);color:var(--good-text);}
.quiz3-opt.wrong{border-color:var(--warn);animation:shakeX .4s ease;}
.quiz3-opt:disabled{cursor:default;}

/* ---------- 미션 리스트 ---------- */
.mission-list{list-style:none;margin:var(--sp-sm) 0;padding:0;display:flex;flex-direction:column;gap:8px;}
.mission-item{display:flex;align-items:flex-start;gap:10px;background:var(--surface-soft);border-radius:var(--r-md);padding:10px 14px;font-size:14px;color:var(--body-c);}
.mission-item.done{background:#eef6ec;color:var(--good-text);font-weight:700;}
.mission-check{flex:none;width:22px;height:22px;border-radius:50%;border:2px solid var(--hairline);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:800;color:transparent;}
.mission-item.done .mission-check{background:var(--good);border-color:var(--good);color:#fff;}
.mission-hint{display:block;font-size:12px;color:var(--muted);margin-top:2px;}
/* P2-2 전용 압축(개정 P2-B2 ⑤, 1뷰포트 재배치) — 다른 화면(P2-3)의 MissionList는 이 클래스를
   받지 않으므로 기본 .mission-list/.mission-item 간격은 그대로 유지된다. */
.mission-list.mission-list-tight{gap:4px;margin:8px 0;}
.mission-list-tight .mission-item{padding:6px 10px;font-size:13px;}
/* P2-2 미션4(개정 §B②) — 버튼+3지선다를 담는 확장 항목. 체크아이콘은 기존 .mission-item
   레이아웃(flex, align-items:flex-start) 그대로 상단 정렬되고, 본문만 세로로 쌓인다. */
.mission-m4-body{flex:1;min-width:0;display:flex;flex-direction:column;gap:6px;}

/* ---------- 색 견본 / 슬라이더 ---------- */
.swatch-row{display:flex;gap:14px;align-items:center;margin:10px 0;}
.swatch-box{width:64px;height:64px;border-radius:var(--r-lg);border:1px solid var(--hairline);flex:none;box-shadow:0 1px 3px rgba(20,30,50,.1);}
/* P2-2 전용 확대(개정 §B④, 약 1.5배=64*1.5=96px) — Components.Swatch({size:'md'}) 호출 시만 추가.
   다른 화면(P1-3 등)의 기본 64px .swatch-box는 그대로 유지된다. */
.swatch-box.swatch-box-md{width:96px;height:96px;}
/* v2 §B 화면8 step2 ⓑ·화면11 ⓓ 공용 대형 스와치(초안 120~140px 중 128px) — P2-3 RGB 칸,
   S2-3 픽셀 확대 카드가 함께 쓴다(size:'xl'). */
.swatch-box.swatch-box-xl{width:128px;height:128px;}
.swatch-caption{font-family:var(--font-mono);font-size:13px;color:var(--body-c);line-height:1.7;}
.channel-slider{margin:12px 0;}
.channel-slider .cs-lab{display:flex;align-items:center;gap:8px;font-size:13px;font-weight:700;margin-bottom:5px;}
.channel-slider .cs-dot{width:12px;height:12px;border-radius:50%;flex:none;}
.channel-slider .cs-val{margin-left:auto;font-family:var(--font-mono);color:var(--muted);font-weight:600;}
/* margin:2px 0 -- UA 기본 margin(좌우 2px)이 width:100%와 겹쳐 모든 슬라이더가 부모보다 4px
   넓어지던 가로 오버플로(pane 가로 스크롤바) 근본 해소(무대높이-HSV슬라이더 v1 §3-B 실측). */
input[type=range]{-webkit-appearance:none;appearance:none;width:100%;height:8px;border-radius:8px;cursor:pointer;background:var(--hairline-soft);min-height:28px;margin:2px 0;}
/* 위 규칙의 태그+속성 선택자가 전역 :focus-visible보다 우선순위가 높아 outline:none을 쓰면
   키보드 포커스 링이 사라진다(접근성 위반) -- 여기서 명시적으로 다시 켜둔다. */
input[type=range]:focus-visible{outline:3px solid var(--accent);outline-offset:3px;}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:24px;height:24px;border-radius:50%;background:#fff;border:2px solid var(--ink);box-shadow:0 1px 4px rgba(0,0,0,.3);cursor:pointer;margin-top:-8px;}
input[type=range]::-moz-range-thumb{width:22px;height:22px;border-radius:50%;background:#fff;border:2px solid var(--ink);cursor:pointer;}
input[type=range]::-moz-range-track{height:8px;border-radius:8px;background:var(--hairline-soft);}

.presets-row{display:flex;flex-wrap:wrap;gap:8px;margin:8px 0;}
.preset-btn{width:44px;height:44px;border-radius:var(--r-sm);border:1px solid rgba(0,0,0,.15);cursor:pointer;padding:0;}
.preset-btn:hover{transform:scale(1.08);}

/* v2 §B 화면8 step2 ⓑ: RGB 칸 = 대형 스와치 | 슬라이더 세로 3개 가로 2단(슬라이더 트랙이
   옆 열 폭만큼 짧아진다). */
.p23-rgb-row{display:flex;gap:var(--sp-md);align-items:flex-start;}
.p23-rgb-row .swatch-row{margin:0;flex:none;}
.p23-rgb-sliders{flex:1;min-width:0;}
.p23-rgb-sliders .channel-slider{margin:0 0 10px;}

/* ---------- 2단 무대 레이아웃(3D·픽셀 캔버스 화면) ---------- */
.stage-grid{display:grid;grid-template-columns:1fr 360px;gap:var(--sp-lg);align-items:start;margin:var(--sp-md) 0;}
.stage-left{min-width:0;}
.stage-right{min-width:0;}
@media(max-width:940px){ .stage-grid{grid-template-columns:1fr;} }

/* ---------- 대형 스와치·믹서(개정 P2-B1: P1-2·P1-3·P1-4 공유) ---------- */
.swatch-box-lg{width:100%;height:52vh;height:52dvh;max-height:460px;min-height:200px;border-radius:var(--r-xl);border:1px solid var(--hairline);box-shadow:0 1px 4px rgba(20,30,50,.14);}
@media(max-width:940px){ .swatch-box-lg{height:26vh;height:26dvh;max-height:220px;min-height:140px;} }
/* P1-2 step1·P1-4 step5 전용 압축(A1, 노트북 1뷰포트 대응) — Components.buildColorPicker({big:true,
   compact:true}) 호출 시만 추가 클래스가 붙는다. P1-3 step3의 독립 .swatch-box-lg(52dvh)는 이 클래스가
   없어 불변(다른 화면 손대지 않음). 모바일(≤940px)은 기존 26dvh 그대로 유지한다. */
.swatch-box-lg.swatch-box-compact{height:30vh;height:30dvh;}
@media(max-width:940px){ .swatch-box-lg.swatch-box-compact{height:26vh;height:26dvh;} }
.swatch-pair-row{display:flex;gap:var(--sp-lg);justify-content:center;align-items:stretch;flex-wrap:wrap;margin:var(--sp-md) 0;}
.swatch-pair-item{display:flex;flex-direction:column;align-items:center;gap:8px;flex:1 1 200px;max-width:280px;}
.swatch-pair-box{width:100%;aspect-ratio:1/1;border-radius:var(--r-xl);border:1px solid var(--hairline);box-shadow:0 1px 4px rgba(20,30,50,.14);}
.swatch-pair-label{font-size:14px;font-weight:700;color:var(--body-strong);text-align:center;}
.formula-card.formula-lg{font-size:26px;text-align:center;}
/* max-width(A1): width:100%뿐이면 2단 그리드의 넓은 1fr 좌측 열 폭까지 그대로 늘어나
   360x300 비율상 세로가 노트북 1뷰포트를 넘친다 — 폭을 눌러 높이를 통제한다. */
.mixer-wrap{background:#000;border:1px solid var(--hairline);border-radius:var(--r-lg);overflow:hidden;line-height:0;max-width:420px;}
.mixer-wrap canvas{display:block;width:100%;height:auto;}
.p14-intro-row{display:flex;gap:28px;justify-content:center;align-items:center;margin:var(--sp-xl) 0;flex-wrap:wrap;}
.p14-intro-circle{width:84px;height:84px;border-radius:50%;box-shadow:0 4px 14px rgba(0,0,0,.18);animation:p14CircleIn .5s cubic-bezier(.34,1.56,.64,1) both;}
.p14-intro-circle.ch-r{background:var(--cR);animation-delay:.05s;}
.p14-intro-circle.ch-g{background:var(--cG);animation-delay:.2s;}
.p14-intro-circle.ch-b{background:var(--cB);animation-delay:.35s;}
@keyframes p14CircleIn{from{opacity:0;transform:scale(.4);}to{opacity:1;transform:scale(1);}}
.p14-align-row{display:flex;gap:var(--sp-md);justify-content:center;align-items:center;margin:var(--sp-xl) 0;flex-wrap:wrap;}
.p14-align-chip{font-family:var(--font-mono);font-size:30px;font-weight:800;padding:14px 22px;border-radius:var(--r-lg);background:var(--surface-card);transition:transform .5s cubic-bezier(.34,1.56,.64,1),opacity .5s ease;}
.p14-align-chip.ch-r{color:var(--cR);}
.p14-align-chip.ch-g{color:#1f7a30;}
.p14-align-chip.ch-b{color:var(--cB);}

/* ---------- 3D 무대 (v2 A5: 다크 스테이지 — 무대 내부만 검정, 페이지 액자는 화이트 불변) ---------- */
.gl-wrap{position:relative;background:var(--stage-dark);border:1px solid var(--hairline);border-radius:var(--r-lg);overflow:hidden;aspect-ratio:4/3;touch-action:none;}
.gl-wrap canvas{display:block;width:100%;height:100%;cursor:grab;touch-action:none;}
.gl-wrap canvas:active{cursor:grabbing;}
/* WebGL 폴백(2D 안내 패널)은 다크화 대상에서 제외 — 화이트 계열 유지(A5·G-v2-4) */
.gl-wrap.gl-fallback{background:var(--surface-soft);}
.gl-hud{position:absolute;left:10px;bottom:8px;font-size:11px;color:#fff;background:rgba(0,0,0,.6);padding:4px 9px;border-radius:var(--r-sm);pointer-events:none;line-height:1.6;}
.gl-viewbtns{position:absolute;top:8px;right:8px;display:flex;gap:6px;}
.gl-viewbtns button{font-size:11px;color:#fff;background:rgba(0,0,0,.6);border:1px solid rgba(255,255,255,.35);border-radius:var(--r-sm);padding:6px 9px;cursor:pointer;min-height:44px;}
/* v2 A6: 회전 십자 키패드 전면 삭제 — 무대 canvas 포커스+방향키로 대체(ENGINE_3D.createStage).
   반전 종류 배지(v2 §B 화면16 ⓔ)도 같은 다크 칩 스타일을 쓴다. */
.gl-badge{position:absolute;top:8px;left:8px;font-size:11px;font-weight:700;color:#fff;background:rgba(0,0,0,.6);padding:4px 10px;border-radius:var(--r-pill);pointer-events:none;}
.gl-fallback{padding:var(--sp-lg);text-align:center;color:var(--body-c);}
.gl-fallback .diagram{margin:0 auto var(--sp-sm);}
.gl-readout{font-family:var(--font-mono);font-size:13px;color:var(--body-c);background:var(--canvas);border:1px solid var(--hairline);border-radius:var(--r-md);padding:10px 12px;margin-top:8px;}
/* P2-2·P2-3(step3) 공유 무대 높이(개정 §B⑤ → 무대높이-HSV슬라이더 v1 §3 실측 확정) — 바닥은
   기존 44dvh 직접 지정(신선 상태 1뷰포트 그대로), 여기에 stretch를 더해 우측 열(미션·퀴즈
   열림)이 더 길어진 상태에서는 무대가 그리드 행 높이까지 자라 아래 빈 공간을 채운다(행 높이는
   우측 열이 이미 정한 값이라 pane 오버플로 비용 0 — 실측: P2-2 퀴즈 열림 시 우측 537 vs 무대
   352). .stage-grid가 align-items:start라 align-self로 개별 stretch. P2-3 step3 무대는
   stageHost(.p22-stage-fill) 안에 있어 flex 체인으로 전달한다. S3-2·S3-3은 별도
   .s3-stage-col(하단 컨텐츠가 좌측 열에 길게 붙는 다른 구조). */
.p22-stage-col{align-self:stretch;display:flex;flex-direction:column;}
.p22-stage-col > .gl-wrap{flex:1 1 auto;}
.p22-stage-col .p22-stage-fill{flex:1 1 auto;min-height:0;display:flex;flex-direction:column;}
.p22-stage-col .p22-stage-fill > .gl-wrap{flex:1 1 auto;}
.p22-stage-col .gl-wrap{aspect-ratio:auto;height:44vh;height:44dvh;max-height:560px;min-height:220px;}
@media(max-width:940px){ .p22-stage-col .gl-wrap{height:34vh;height:34dvh;max-height:320px;min-height:200px;} }
/* P2-3 step3 전용(v1 §3): 태블릿 1단 스택은 세로 여유가 커(실측 슬랙 257) 캡만 상향
   (HSV 행 신설분 반영 실측으로 410 확정 — 430은 19px 초과였음). */
@media(max-width:940px){ .p23-stage-col .gl-wrap{max-height:410px;} }
/* P2-3 step3 노트북(v1 §3): HSV 슬라이더 행 신설로 하단이 생겨 바닥 44dvh로는 29px 초과(실측)
   — 창 높이 적응 calc로 전환(@800 313px·오버플로 0, 큰 창에선 더 큼). 태블릿에선 위 캡 430이
   지배(calc가 캡을 초과). 소스 순서상 이 규칙이 p22 공유 높이(base·media)보다 뒤라 우선. */
.p23-stage-col .gl-wrap{height:calc(100vh - 487px);height:calc(100dvh - 487px);}
/* P2-2 전용: 색상 선택기(스와치+슬라이더+프리셋)를 무대/미션 2단 아래 가로 압축 행으로 배치
   (A1 P2-2①) — 기존에는 미션 리스트와 같은 우측 열에 세로로 쌓여 그 열 높이가 무대보다
   훨씬 커졌었다(grid 높이 = max가 아니라 사실상 sum처럼 동작). 색상 선택기를 별도 행으로
   분리하고, 그 안에서도 스와치+슬라이더를 가로로 나란히 배치해 세로 공간을 압축한다. */
.p22-picker-row{display:flex;flex-wrap:wrap;align-items:flex-start;gap:var(--sp-md);margin:var(--sp-md) 0 0;}
.p22-picker-row .swatch-row{margin:0;}
.p22-picker-row .channel-slider{margin:0;flex:1 1 160px;}
.p22-picker-row .presets-row{margin:0;flex:1 1 100%;}
/* S3-2·S3-3 전용(v2 §B 화면16 ⓐ → 무대높이-HSV슬라이더 v1 §3-B 실측 확정): 이 계열은 좌측
   열에 재생/되돌리기·변환 슬라이더·수식·readout이 무대 아래로 길게 붙는 구조라 stretch가
   아니라 높이 직접 지정이 맞다. 무대 있는 3개 step(S3-2 s1·S3-3 s1·s2)의 하단 구성이 동일함을
   실측으로 확인(1280×800 슬랙 53 공통)해, 창 높이에 자동 적응하는 calc로 확정 —
   @800 245px(여유 16) / @900 345 / 태블릿 820×1180은 캡 440(슬랙 411~441 내). */
.s3-stage-col .gl-wrap{aspect-ratio:auto;height:calc(100vh - 555px);height:calc(100dvh - 555px);max-height:560px;min-height:170px;}
@media(max-width:940px){ .s3-stage-col .gl-wrap{max-height:440px;min-height:150px;} }
/* H(2026-07-19 전수 실측): 태블릿 세로에서 stage-grid가 1단으로 쌓이면 무대·픽셀캔버스가 전폭으로
   커져 pane 내부 스크롤이 커진다(S3-3 418·S3-2 389·S2-2 122·P2-3 52px 실측) — 해당 화면(--keep2)은
   700px 이상 폭에서 2단을 유지해 세로를 통제한다. 700px 미만 극좁은 화면만 기존 1단 폴백. */
@media(max-width:940px) and (min-width:700px){
  .stage-grid--keep2{grid-template-columns:minmax(0,1fr) 340px;}
}
/* H: P1-4 '빨강 도전' 비교 스와치 — 노트북(높이<=820px)에서 280px 정사각 2개가 세로를 넘친다
   (실측 109px). 이 행만 압축(다른 swatch-pair 사용처는 무변경). */
@media(max-height:820px){
  .swatch-pair-row--fit .swatch-pair-item{max-width:170px;}
}
/* H: S2-2 픽셀 캔버스(그리기·프리뷰) — 노트북(높이<=820px)에서 400px 정사각이 실측 55px 넘침.
   paintAt이 rect 비율 기반이라 표시 축소는 히트에 무영향. */
.s22-wrap{max-width:400px;}
@media(max-height:820px){ .s22-wrap{max-width:340px;} }

/* ---------- 픽셀 그리드 / 팔레트 ---------- */
.pixel-canvas-wrap{border:1px solid var(--hairline);border-radius:var(--r-lg);background:var(--canvas);overflow:hidden;touch-action:none;line-height:0;}
.pixel-canvas-wrap canvas{display:block;width:100%;height:auto;image-rendering:pixelated;cursor:crosshair;}
.palette-row{display:flex;flex-wrap:wrap;gap:8px;margin:10px 0;}
.palette-swatch{width:44px;height:44px;border-radius:var(--r-sm);border:2px solid var(--hairline);cursor:pointer;padding:0;}
.palette-swatch.active{border-color:var(--ink);box-shadow:0 0 0 2px var(--canvas), 0 0 0 4px var(--ink);}
.palette-eraser{width:44px;height:44px;border-radius:var(--r-sm);border:2px dashed var(--muted);background:repeating-linear-gradient(45deg,#fff,#fff 4px,#eee 4px,#eee 8px);cursor:pointer;}
.palette-eraser.active{border-color:var(--ink);border-style:solid;}

/* ---------- 숫자 뷰 / 채널 분해 표 (v2 §B 화면11 ⓐⓒ: 뷰포트 역산 셀 크기) ----------
   overflow/max-height를 걷어내 16x16 전체가 스크롤 없이 한 화면에 들어가게 하고, 셀 크기는
   JS(computeTableCellPx)가 --cell-px로 세팅한다(하한 22·상한 32px). 채널 분해(숫자 1개라
   여유 있음)만 셀 크기의 ~45%로 폰트를 키운다(ⓒ) — 숫자 뷰(3줄)는 9px 그대로 두고 ⓓ 픽셀
   확대 카드로 보완한다. */
.num-table-wrap{border:1px solid var(--hairline);border-radius:var(--r-lg);margin:var(--sp-sm) 0;}
.num-table{border-collapse:collapse;}
.num-table td{width:var(--cell-px,38px);height:var(--cell-px,38px);text-align:center;font-family:var(--font-mono);font-size:9px;line-height:1.05;border:1px solid var(--hairline-soft);white-space:nowrap;padding:0;cursor:pointer;}
.num-table.num-table-channel td{font-size:var(--cell-font,12px);}
.num-table td.num-td-sel{box-shadow:inset 0 0 0 2px var(--accent);}
.s23-row{display:flex;gap:var(--sp-md);align-items:flex-start;flex-wrap:wrap;}
.s23-detail{flex:none;width:160px;}
.s23-detail .swatch-caption{margin-top:8px;}

/* ---------- 변환 실험실 / 집중비교(SplitCompare) ---------- */
.split-wrap{position:relative;width:100%;background:var(--surface-soft);border-radius:var(--r-lg);overflow:hidden;border:1px solid var(--hairline);touch-action:none;user-select:none;}
.split-wrap canvas{display:block;width:100%;height:auto;image-rendering:pixelated;}
.split-divider{position:absolute;top:0;bottom:0;width:3px;background:#fff;box-shadow:0 0 0 1px rgba(0,0,0,.25);cursor:ew-resize;touch-action:none;}
.split-divider::after{content:'';position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:38px;height:38px;border-radius:50%;background:#fff;box-shadow:0 2px 8px rgba(0,0,0,.35);}
.split-divider::before{content:'⇆';position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);z-index:2;color:var(--ink);font-size:16px;font-weight:900;}
.split-tag{position:absolute;top:10px;font-family:var(--font-mono);font-size:11px;background:rgba(10,10,10,.62);padding:4px 9px;border-radius:6px;color:#fff;}
.split-tag.l{left:10px;} .split-tag.r{right:10px;}

/* ---------- 변환 버튼 / 수식 카드 ---------- */
.transform-btns{display:flex;flex-wrap:wrap;gap:8px;margin:10px 0;}
.transform-btn{min-height:44px;padding:9px 14px;border-radius:var(--r-md);border:1px solid var(--hairline);background:var(--canvas);color:var(--body-c);font-size:13px;font-weight:700;cursor:pointer;}
.transform-btn.applied{border-color:var(--ink);background:var(--surface-strong);color:var(--ink);}
.formula-card{font-family:var(--font-mono);font-size:14px;background:var(--surface-strong);border-radius:var(--r-md);padding:12px 14px;margin:10px 0;color:var(--ink);}

/* ---------- 테트리스 ---------- */
.tetris-wrap{display:flex;gap:var(--sp-lg);flex-wrap:wrap;align-items:flex-start;}
.tetris-board{border:1px solid var(--hairline);border-radius:var(--r-md);background:var(--canvas);position:relative;}
/* v2 §B 화면13 ⓐⓑ: 시작 전/게임 끝 오버레이(보드 위) — 공용 1개 요소를 재사용한다. */
.tetris-overlay{display:none;position:absolute;inset:0;flex-direction:column;align-items:center;justify-content:center;gap:10px;background:rgba(255,250,240,.94);text-align:center;padding:var(--sp-md);}
.tetris-overlay.show{display:flex;}
.tetris-overlay p{margin:0;font-weight:700;color:var(--body-strong);}
.tetris-side{min-width:180px;font-family:var(--font-mono);font-size:12px;color:var(--body-c);}
.tetris-controls{display:grid;grid-template-columns:repeat(3,52px);grid-template-rows:repeat(2,52px);gap:6px;margin-top:10px;}
.tetris-controls button{border:1px solid var(--hairline);background:var(--canvas);border-radius:var(--r-sm);cursor:pointer;font-size:17px;min-height:44px;min-width:44px;}
.tt-left{grid-column:1;grid-row:2;} .tt-rotate{grid-column:2;grid-row:1;} .tt-right{grid-column:3;grid-row:2;} .tt-down{grid-column:2;grid-row:2;}
.piece-mini{font-family:var(--font-mono);font-size:16px;line-height:1.15;background:var(--surface-soft);border-radius:var(--r-sm);padding:8px;margin:8px 0;white-space:pre;}

/* ---------- 색상환(휠) ---------- */
.hue-wheel-wrap{position:relative;width:180px;height:180px;margin:0 auto;touch-action:none;}
.hue-wheel-wrap canvas{display:block;width:100%;height:100%;border-radius:50%;}
.hue-wheel-dot{position:absolute;width:16px;height:16px;border-radius:50%;border:2px solid #fff;box-shadow:0 0 0 1px rgba(0,0,0,.4);pointer-events:none;transform:translate(-50%,-50%);}

@media (prefers-reduced-motion: reduce){
  *{animation-duration:.001s !important; transition-duration:.001s !important;}
}
@media (max-width:600px){
  .app-shell{padding:0 var(--sp-sm);}
  h1{font-size:22px;}
  .stage-grid{gap:var(--sp-md);}
}
</style>
</head>
<body>
<div class="app-shell">
  <header class="app-header">
    <div class="header-top">
      <button type="button" class="app-title-btn" id="appTitleBtn" aria-label="이미지 데이터 처리 학습지, 다섯 번 누르면 교사 패널">
        <span class="app-title" id="appTitle">이미지 데이터 처리 — 컴퓨터는 어떻게 사진을 볼까?</span>
      </button>
      <span class="mascot-mini" id="mascotMini" aria-hidden="true"></span>
    </div>
    <div class="section-tag" id="sectionTag">섹션1 · 색의 데이터</div>
    <div class="progress-track" id="progressTrack"></div>
  </header>
  <main class="screen-root" id="screenRoot" tabindex="-1"></main>
  <nav class="bottom-nav">
    <button type="button" class="btn btn-secondary" id="prevBtn">이전</button>
    <span class="nav-status" id="navStatus" aria-live="off">1 / 18</span>
    <button type="button" class="btn btn-primary" id="nextBtn">다음</button>
  </nav>
</div>

<div class="teacher-panel" id="teacherPanel">
  <div class="teacher-card" role="dialog" aria-modal="true" aria-labelledby="teacherTitle">
    <h2 id="teacherTitle">교사 패널</h2>
    <p class="muted">이 학습지의 저장 데이터(aimath26_img_ 네임스페이스)만 초기화합니다. 다른 학습지에는 영향이 없습니다.</p>
    <div id="teacherConfirmArea"></div>
    <div class="btn-row" style="margin-top:var(--sp-md);">
      <button type="button" class="btn btn-primary" id="teacherResetBtn">전체 초기화</button>
      <button type="button" class="btn btn-secondary" id="teacherCloseBtn">닫기</button>
    </div>
  </div>
</div>

<div class="toast" id="toast" role="status" aria-live="polite"></div>
<div class="sr-only" id="liveRegion" aria-live="polite"></div>

<script src="three.min.js"></script>
<script src="katex/katex.min.js"></script>
<script>
(function(){
'use strict';

/* ============================================================
   1) STATE — 전역 상태 + localStorage (네임스페이스 aimath26_img_)
   ============================================================ */
var STORAGE_KEY = 'aimath26_img_state';
var NS_PREFIX = 'aimath26_img_';

function mergeDefaults(def, saved){
  if(Array.isArray(def)){
    return Array.isArray(saved) ? saved : def.slice();
  }
  if(def && typeof def === 'object'){
    var keys = Object.keys(def);
    if(keys.length === 0){
      return (saved && typeof saved === 'object' && !Array.isArray(saved)) ? saved : {};
    }
    var out = {};
    for(var k in def){ out[k] = mergeDefaults(def[k], saved ? saved[k] : undefined); }
    return out;
  }
  return saved !== undefined ? saved : def;
}

function emptyPixelGrid(){
  var g = [];
  for(var i=0;i<16;i++){ var row=[]; for(var j=0;j<16;j++){ row.push(null); } g.push(row); }
  return g;
}

function DEFAULT_STATE(){
  return {
    version: 2,
    screenId: 'P1-1',
    color: { r:230, g:126, b:34 },
    /* v2: templateId 추가(§B 화면10 ⓐ, 도안 4종 중 선택) — mergeDefaults가 구버전 상태를 자동 승급. */
    pixelArt: { grid: emptyPixelGrid(), mode:'free', customColor:{r:230,g:126,b:34}, templateId:'circle' },
    screens: {
      'P1-1': { step:0, thought:'' },
      'P1-2': { step:0, thought:'' },
      'P1-3': { step:0, thought:'', sliderTouched:false },
      'P1-4': { step:0, redTouched:false, redConfirmed:false, mixerTouched:false },
      'P1-5': { step:0, pointPlaced:false },
      'P2-1': { step:0, quiz:{q1:null,q2:null,q3:null} },
      'P2-2': { step:0, missions:{m1:false,m2:false,m3:false,m4:false}, visited:{}, m4quiz:null, grayShown:false },
      /* v2: missions3d/m3dQuiz 추가(§B 화면8 step3, M1 조작·M2 3지선다) */
      'P2-3': { step:0, thoughtIntro:'', missionRGB:false, missionHSV:false, thoughtFeel:'', missions3d:{m1:false,m2:false}, m3dQuiz:null },
      'S2-1': { step:0, thought:'', zoomTouched:false },
      'S2-2': { step:0 },
      'S2-3': { step:0, thought:'', numViewSeen:false, channelViewSeen:false },
      'S2-4': { step:0, applied:{} },
      /* v2: score 추가(§B 화면13 ⓒ, 교사 초기화로 리셋) */
      'S2-5': { step:0, linesCleared:0, skipped:false, score:0 },
      'S2-6': { step:0, quiz:{q1:null,q2:null,q3:null} },
      'S3-1': { step:0, thought:'', dragged:false, predictConfirmed:false },
      'S3-2': { step:0, played:false },
      'S3-3': { step:0, playedLinear:false, playedComp:false },
      'S3-4': { step:0, thought:'', savedInverted:false }
    }
  };
}

var STATE = {
  data: null,
  load: function(){
    var loaded = null;
    try{
      var raw = localStorage.getItem(STORAGE_KEY);
      if(raw) loaded = JSON.parse(raw);
    }catch(e){ loaded = null; }
    this.data = mergeDefaults(DEFAULT_STATE(), loaded);
    if(ROUTER.index(this.data.screenId) < 0) this.data.screenId = 'P1-1'; /* 오염된 screenId 가드(P4 N1) */
    this.save();
  },
  save: function(){
    try{ localStorage.setItem(STORAGE_KEY, JSON.stringify(this.data)); }catch(e){}
  },
  reset: function(){
    try{
      var keys = Object.keys(localStorage);
      for(var i=0;i<keys.length;i++){ if(keys[i].indexOf(NS_PREFIX) === 0) localStorage.removeItem(keys[i]); }
    }catch(e){}
    this.data = DEFAULT_STATE();
    this.save();
  },
  screen: function(id){ return this.data.screens[id]; }
};

/* ============================================================
   7) COLOR — 순수 함수 (명세 9장, 검증 대상, window.__COLOR로 노출)
   자체완결: DOM·three.js에 의존하지 않는다.
   ============================================================ */
var COLOR = {
  clampRound: function(x){ return Math.min(255, Math.max(0, Math.round(x))); },

  /* 9.2 RGB<->HSV. r,g,b in [0,1] -> {h:[0,360), s:[0,1], v:[0,1]} */
  rgb2hsv: function(r,g,b){
    var mx=Math.max(r,g,b), mn=Math.min(r,g,b), d=mx-mn;
    var v=mx, s = mx===0 ? 0 : d/mx, h=0;
    if(d===0){ h=0; }
    else if(mx===r){ h=((g-b)/d)%6; }
    else if(mx===g){ h=(b-r)/d+2; }
    else { h=(r-g)/d+4; }
    h*=60; if(h<0) h+=360;
    return {h:h,s:s,v:v};
  },
  /* h:[0,360) s,v:[0,1] -> [r,g,b] each in [0,1] */
  hsv2rgb: function(h,s,v){
    var c=v*s, x=c*(1-Math.abs((h/60)%2-1)), m=v-c;
    var r1,g1,b1;
    if(h<60){ r1=c;g1=x;b1=0; }
    else if(h<120){ r1=x;g1=c;b1=0; }
    else if(h<180){ r1=0;g1=c;b1=x; }
    else if(h<240){ r1=0;g1=x;b1=c; }
    else if(h<300){ r1=x;g1=0;b1=c; }
    else { r1=c;g1=0;b1=x; }
    return [r1+m, g1+m, b1+m];
  },

  /* 9.1 RGB(0~255) <-> 3D 좌표(정육면체 중심 원점, 한 변 S) */
  rgbToPos: function(r,g,b,S){
    var nr=r/255, ng=g/255, nb=b/255;
    return {x:(nr-0.5)*S, y:(ng-0.5)*S, z:(nb-0.5)*S};
  },
  posToRgb: function(x,y,z,S){
    var nr=x/S+0.5, ng=y/S+0.5, nb=z/S+0.5;
    nr=Math.min(1,Math.max(0,nr)); ng=Math.min(1,Math.max(0,ng)); nb=Math.min(1,Math.max(0,nb));
    return {r:COLOR.clampRound(nr*255), g:COLOR.clampRound(ng*255), b:COLOR.clampRound(nb*255)};
  },

  /* 9.3 픽셀 연산(원자 단위) */
  brightenValue: function(v,delta){ return COLOR.clampRound(v+delta); },
  scalarValue: function(v,k){ return COLOR.clampRound(v*k); },
  invertValue: function(v){ return 255-v; },

  /* 9.3 구조 연산(내용 무관, 임의 크기 그리드) */
  transposeGrid: function(grid){
    var m=grid.length, n=m?grid[0].length:0, out=[];
    for(var j=0;j<n;j++){ var row=[]; for(var i=0;i<m;i++){ row.push(grid[i][j]); } out.push(row); }
    return out;
  },
  flipHGrid: function(grid){ return grid.map(function(row){ return row.slice().reverse(); }); },
  flipVGrid: function(grid){ return grid.slice().reverse(); },
  /* 9.4 테트리스 회전 = 전치 후 각 행 역순(시계방향 90도) */
  rotateCW: function(mat){ return COLOR.flipHGrid(COLOR.transposeGrid(mat)); },

  /* 9.3 픽셀 그리드 연산({r,g,b} 셀 2D배열) */
  brightenGrid: function(grid,delta){
    return grid.map(function(row){ return row.map(function(c){
      return {r:COLOR.brightenValue(c.r,delta), g:COLOR.brightenValue(c.g,delta), b:COLOR.brightenValue(c.b,delta)};
    }); });
  },
  scalarGrid: function(grid,k){
    return grid.map(function(row){ return row.map(function(c){
      return {r:COLOR.scalarValue(c.r,k), g:COLOR.scalarValue(c.g,k), b:COLOR.scalarValue(c.b,k)};
    }); });
  },
  invertGrid: function(grid){
    return grid.map(function(row){ return row.map(function(c){
      return {r:COLOR.invertValue(c.r), g:COLOR.invertValue(c.g), b:COLOR.invertValue(c.b)};
    }); });
  },
  /* 확대x2(최근접 복제, 계단현상) */
  scaleUp2Grid: function(grid){
    var out=[];
    grid.forEach(function(row){
      var newrow=[];
      row.forEach(function(c){ newrow.push({r:c.r,g:c.g,b:c.b}); newrow.push({r:c.r,g:c.g,b:c.b}); });
      out.push(newrow);
      out.push(newrow.map(function(c){ return {r:c.r,g:c.g,b:c.b}; }));
    });
    return out;
  },
  /* 축소1/2(2x2 블록 채널별 평균) */
  scaleDown2Grid: function(grid){
    var h=grid.length, w=h?grid[0].length:0, out=[];
    for(var i=0;i<h;i+=2){
      var row=[];
      for(var j=0;j<w;j+=2){
        var a=grid[i][j], b2=grid[i][j+1], c=grid[i+1][j], d=grid[i+1][j+1];
        row.push({
          r:COLOR.clampRound((a.r+b2.r+c.r+d.r)/4),
          g:COLOR.clampRound((a.g+b2.g+c.g+d.g)/4),
          b:COLOR.clampRound((a.b+b2.b+c.b+d.b)/4)
        });
      }
      out.push(row);
    }
    return out;
  },

  /* 9.5 반전 */
  invertRGB255: function(r,g,b){ return {r:255-r, g:255-g, b:255-b}; },
  complementRGB255: function(r,g,b){
    var hsv=COLOR.rgb2hsv(r/255,g/255,b/255);
    var h2=(hsv.h+180)%360;
    var rgb2=COLOR.hsv2rgb(h2,hsv.s,hsv.v);
    return {r:COLOR.clampRound(rgb2[0]*255), g:COLOR.clampRound(rgb2[1]*255), b:COLOR.clampRound(rgb2[2]*255)};
  }
};
window.__COLOR = COLOR;

/* ============================================================
   2) ROUTER — 화면 목록·이동·진행바
   ============================================================ */
var SCREEN_DEFS = [
  {id:'P1-1', section:1, label:'색은 무엇으로?'},
  {id:'P1-2', section:1, label:'RGB 색상 선택기'},
  {id:'P1-3', section:1, label:'색을 데이터로(밝기)'},
  {id:'P1-4', section:1, label:'어떻게 섞나 → 순서쌍'},
  {id:'P1-5', section:1, label:'2차원, 3차원'},
  {id:'P2-1', section:1, label:'지난 학습 돌아보기'},
  {id:'P2-2', section:1, label:'3D RGB 색공간'},
  {id:'P2-3', section:1, label:'HSV 색공간'},
  {id:'S2-1', section:2, label:'사진 확대 → 픽셀'},
  {id:'S2-2', section:2, label:'픽셀아트 캐릭터'},
  {id:'S2-3', section:2, label:'어떻게 저장되나'},
  {id:'S2-4', section:2, label:'이미지 변환 실험실'},
  {id:'S2-5', section:2, label:'행렬 테트리스'},
  {id:'S2-6', section:2, label:'정리 퀴즈'},
  {id:'S3-1', section:3, label:'반전이란?'},
  {id:'S3-2', section:3, label:'색공간으로 보기'},
  {id:'S3-3', section:3, label:'보색 반전과 비교'},
  {id:'S3-4', section:3, label:'정리 + 마무리'}
];
var SECTION_LABEL = {1:'섹션1 · 색의 데이터', 2:'섹션2 · 어떻게 칠할까?', 3:'섹션3 · 색 반전 실험실'};

/* ---- KaTeX 렌더 헬퍼: [data-katex] 전부에 수식을 그린다. katex 미로드 시 원문 텍스트로 폴백.
   여러 화면(P1-3·P1-4·S2-4·S3-1 등)이 data-katex/Components.Formula를 사용한다. ---- */
function renderMath(root){
  if(!root || !root.querySelectorAll) return;
  var nodes = root.querySelectorAll('[data-katex]');
  for(var i=0;i<nodes.length;i++){
    var node = nodes[i];
    var tex = node.getAttribute('data-katex') || '';
    if(typeof katex === 'undefined'){
      node.textContent = tex;
      continue;
    }
    try{ katex.render(tex, node, {throwOnError:false}); }
    catch(e){ node.textContent = tex; }
  }
}

/* ---- 서브 슬라이드 엔진 헬퍼: SCREENS[id].steps(배열)가 있으면 그 위에서 step 단위로,
   없으면(이번 단계는 18화면 전부 이 경우) 화면 단위로 그대로 이동을 통일 처리한다. ---- */
function currentMod(){ return SCREENS[STATE.data.screenId]; }
function stepCountOf(mod){ return (mod && mod.steps && mod.steps.length) ? mod.steps.length : 0; }
function currentStepIdx(){
  var mod = currentMod();
  var n = stepCountOf(mod);
  if(!n) return 0;
  var st = STATE.screen(STATE.data.screenId);
  var idx = (st && typeof st.step === 'number') ? st.step : 0;
  if(idx < 0) idx = 0;
  if(idx > n-1) idx = n-1;
  return idx;
}
/* mountCurrentView가 mount 직전 설정 -- registerUnmount(D-1★)가 "지금 마운트 중인 pane"을
   알아내는 유일한 통로. mount 호출은 항상 동기적이므로(3D·타이머 설정도 mount 안에서 동기 실행)
   이 값은 각 mount() 콜스택 동안만 유효하고, 호출이 끝나면 바로 null로 되돌린다. */
var _mountingPane = null;
function mountCurrentView(pane){
  var mod = currentMod();
  if(!mod) return mod;
  var n = stepCountOf(mod);
  _mountingPane = pane;
  if(n){
    var idx = currentStepIdx();
    mod.steps[idx].mount(pane);
    renderStepDots(pane, mod, idx);
  } else {
    mod.mount(pane);
  }
  _mountingPane = null;
  renderMath(pane);
  return mod;
}
function renderStepDots(pane, mod, idx){
  if(!mod.steps || mod.steps.length<2) return;
  var row = el('div', {class:'step-dots'});
  for(var i=0;i<mod.steps.length;i++){
    row.appendChild(el('span', {class:'step-dot'+(i===idx?' active':''), 'aria-hidden':'true'}));
  }
  row.appendChild(el('span', {class:'sr-only'}, (idx+1) + ' / ' + mod.steps.length + ' 단계'));
  pane.insertBefore(row, pane.firstChild);
}
function focusView(pane){
  var heading = pane.querySelector('h1, h2');
  var target = heading || pane;
  if(!target.hasAttribute('tabindex')) target.setAttribute('tabindex', '-1');
  target.focus({preventScroll:true});
}
/* refresh()(같은 화면 내 재구성) 전용 포커스 착지: 제목으로 강탈하지 않고 호출부가 지정한
   조작 원점(selector)이 있으면 그곳, 없으면 새로 그려진 영역의 첫 컨트롤로 되돌린다. */
function focusFirstControl(pane, selector){
  var target = selector ? pane.querySelector(selector) : null;
  if(!target){
    target = pane.querySelector('button:not([disabled]), a[href], input:not([disabled]), select:not([disabled]), textarea:not([disabled]), [tabindex]:not([tabindex="-1"])');
  }
  if(!target){ focusView(pane); return; }
  target.focus({preventScroll:true});
}
function announceViewChange(def){
  var mod = currentMod();
  var n = stepCountOf(mod);
  if(n){ announce(def.label + ' 화면, ' + (currentStepIdx()+1) + ' / ' + n + ' 단계'); }
  else { announce(def.label + ' 화면'); }
}
/* pane별 정리 훅 발화(D-1★): registerUnmount가 쌓아둔 cleanup을, 그 pane이 DOM에서
   제거되는 순간에만 1회 태운다(transitionTo의 oldPane.remove() 직전 · _rebuild의
   innerHTML 비우기 직전). 방금 도착한 새 pane은 절대 건드리지 않는다. */
function fireCleanup(pane){
  if(pane && pane._cleanup){
    pane._cleanup.forEach(function(fn){ try{ fn(); }catch(e){} });
    pane._cleanup = null;
  }
}

var ROUTER = {
  screenEl: null,
  activePane: null,
  _transitioning: false,
  _transitionTimer: null,
  index: function(id){ for(var i=0;i<SCREEN_DEFS.length;i++){ if(SCREEN_DEFS[i].id===id) return i; } return -1; },
  stepCount: function(mod){ return stepCountOf(mod); },
  go: function(id, opts){
    opts = opts || {};
    if(this.index(id) < 0 || this._transitioning) return;
    var curMod = currentMod();
    if(curMod && curMod.onStepExit && id !== STATE.data.screenId) curMod.onStepExit(currentStepIdx());
    var mod = SCREENS[id];
    var tgtState = STATE.data.screens[id];
    var n = stepCountOf(mod);
    if(n){
      if(opts.enterStep === 'last') tgtState.step = n-1;
      else if(opts.enterStep === 'first') tgtState.step = 0;
      else if(typeof tgtState.step !== 'number' || tgtState.step<0 || tgtState.step>=n) tgtState.step = 0;
    }
    STATE.data.screenId = id;
    STATE.save();
    this.transitionTo(opts.dir || 'next', {silent: opts.silent});
  },
  canGoNext: function(){
    var mod = currentMod();
    if(!mod) return true;
    var n = stepCountOf(mod);
    if(n){
      var step = mod.steps[currentStepIdx()];
      return step && typeof step.isComplete === 'function' ? !!step.isComplete() : true;
    }
    return typeof mod.isComplete === 'function' ? !!mod.isComplete() : true;
  },
  next: function(){
    if(this._transitioning) return;
    var mod = currentMod();
    var n = stepCountOf(mod);
    if(n){
      var stAll = STATE.screen(STATE.data.screenId);
      var idx = (typeof stAll.step === 'number') ? stAll.step : 0;
      if(idx < n-1){
        if(!this.canGoNext()) return;
        if(mod.onStepExit) mod.onStepExit(idx);
        stAll.step = idx+1;
        STATE.save();
        this.transitionTo('next', {});
        return;
      }
    }
    if(!this.canGoNext()) return;
    if(mod && mod.onStepExit) mod.onStepExit(currentStepIdx());
    var i = this.index(STATE.data.screenId);
    if(i < SCREEN_DEFS.length-1){ this.go(SCREEN_DEFS[i+1].id, {dir:'next', enterStep:'first'}); return; }
    /* 마지막 화면·마지막 단계에서 '완료' 클릭은 더 이동할 곳이 없어 그대로면 무반응이었다.
       종료 피드백(토스트+SR 안내)을 준다. */
    toast('학습을 마쳤어요!');
    announce('학습을 마쳤어요.');
  },
  prev: function(){
    if(this._transitioning) return;
    var mod = currentMod();
    var n = stepCountOf(mod);
    if(n){
      var stAll = STATE.screen(STATE.data.screenId);
      var idx = (typeof stAll.step === 'number') ? stAll.step : 0;
      if(idx > 0){
        if(mod.onStepExit) mod.onStepExit(idx);
        stAll.step = idx-1;
        STATE.save();
        this.transitionTo('prev', {});
        return;
      }
    }
    var i = this.index(STATE.data.screenId);
    if(i>0){
      if(mod && mod.onStepExit) mod.onStepExit(currentStepIdx());
      this.go(SCREEN_DEFS[i-1].id, {dir:'prev', enterStep:'last'});
    }
  },
  refresh: function(focusSelector){
    /* 화면·step을 새로 이동하지 않고 같은 위치를 다시 그려야 할 때 -- 전환 애니메이션 없이 즉시 교체. */
    this._rebuild();
    focusFirstControl(this.activePane, focusSelector);
  },
  render: function(){
    /* 최초 부팅·교사 리셋 등: 전환 애니메이션 없이 현재 위치를 그대로 그리고 제목에 포커스한다 */
    this._rebuild();
    focusView(this.activePane);
  },
  _rebuild: function(){
    /* render()·refresh() 공용 재그리기. 대기 중인 전환 타이머가 있으면 취소해 스테일 activePane
       참조·pane 누수를 막는다. 현재 activePane은 지우기 직전에 cleanup을 태운다(D-1★). */
    if(this._transitionTimer){ clearTimeout(this._transitionTimer); this._transitionTimer = null; }
    this._transitioning = false;
    fireCleanup(this.activePane);
    var i = this.index(STATE.data.screenId);
    var def = SCREEN_DEFS[i];
    this.screenEl.innerHTML = '';
    var pane = el('div', {class:'view-pane pane-active'});
    this.screenEl.appendChild(pane);
    mountCurrentView(pane);
    this.activePane = pane;
    renderProgress(i, def);
    renderNav(i);
  },
  transitionTo: function(dir, opts){
    opts = opts || {};
    var self = this;
    var i = this.index(STATE.data.screenId);
    var def = SCREEN_DEFS[i];
    var oldPane = this.activePane;
    var newPane = el('div', {class:'view-pane'});
    this.screenEl.appendChild(newPane);
    mountCurrentView(newPane);
    renderProgress(i, def);
    renderNav(i);
    if(FX.reducedMotion){
      if(oldPane){ fireCleanup(oldPane); oldPane.remove(); }
      newPane.classList.add('pane-active');
      this.activePane = newPane;
      focusView(newPane);
      if(!opts.silent) announceViewChange(def);
      return;
    }
    var enterCls = dir==='prev' ? 'pane-enter-left' : 'pane-enter-right';
    var exitCls = dir==='prev' ? 'pane-exit-right' : 'pane-exit-left';
    self._transitioning = true;
    newPane.classList.add(enterCls);
    void newPane.offsetWidth; /* 강제 리플로우로 진입 시작 상태를 확정한 뒤, 다음 프레임에 목표 상태로 전환한다(FLIP 기법) */
    if(oldPane) oldPane.classList.add(exitCls);
    requestAnimationFrame(function(){
      newPane.classList.remove(enterCls);
      newPane.classList.add('pane-active');
    });
    if(self._transitionTimer){ clearTimeout(self._transitionTimer); }
    self._transitionTimer = setTimeout(function(){
      self._transitionTimer = null;
      if(oldPane){ fireCleanup(oldPane); oldPane.remove(); }
      self.activePane = newPane;
      self._transitioning = false;
      focusView(newPane);
      if(!opts.silent) announceViewChange(def);
    }, 300);
  }
};

function renderProgress(i, def){
  document.getElementById('sectionTag').textContent = SECTION_LABEL[def.section];
  var track = document.getElementById('progressTrack');
  track.innerHTML = '';
  SCREEN_DEFS.forEach(function(s, idx){
    var seg = document.createElement('span');
    seg.className = 'progress-seg' + (idx < i ? ' section-done' : '');
    var fill = document.createElement('span');
    fill.className = 'fill';
    fill.style.width = (idx <= i ? '100%' : '0%');
    seg.appendChild(fill);
    track.appendChild(seg);
  });
}

var _lastGateEnabled = null; /* 게이팅 상태 전환 감지용(같은 상태에서 재렌더될 때 announce 반복 방지) */
function renderNav(i){
  var prevBtn = document.getElementById('prevBtn');
  var nextBtn = document.getElementById('nextBtn');
  var status = document.getElementById('navStatus');
  var mod = SCREENS[SCREEN_DEFS[i].id];
  var n = stepCountOf(mod);
  var stepIdx = n ? currentStepIdx() : 0;
  var atFirstStep = !n || stepIdx===0;
  var atLastStep = !n || stepIdx===n-1;
  prevBtn.style.visibility = (i>0 || !atFirstStep) ? 'visible' : 'hidden';
  var isLast = (i === SCREEN_DEFS.length-1) && atLastStep;
  nextBtn.textContent = isLast ? '완료' : '다음';
  var enabled = ROUTER.canGoNext();
  /* 마지막 화면·마지막 step도 게이팅 규칙 동일 적용(완료 버튼이 실제 완료 여부를 보여준다).
     ROUTER.next()가 마지막 위치에서는 어차피 이동하지 않으므로 활성화돼도 안전하다. */
  setDisabled(nextBtn, !enabled);
  var stepTxt = n>1 ? (' · ' + (stepIdx+1) + '/' + n + '단계') : '';
  var gateTxt = enabled ? '' : ' · 아직 완료되지 않았어요';
  status.textContent = (i+1) + ' / ' + SCREEN_DEFS.length + ' · ' + SCREEN_DEFS[i].label + stepTxt + gateTxt;
  if(!enabled && _lastGateEnabled !== false){ announce('다음으로 넘어가려면 이 화면을 먼저 완료하세요.'); }
  _lastGateEnabled = enabled;
}

function refreshNav(){
  var i = ROUTER.index(STATE.data.screenId);
  renderNav(i);
}

/* ============================================================
   3) COMPONENTS — 상속 컴포넌트 팩토리
   ============================================================ */
function el(tag, attrs, children){
  var e = document.createElement(tag);
  if(attrs){
    for(var k in attrs){
      var v = attrs[k];
      if(v == null) continue;
      if(k === 'class') e.className = v;
      else if(k === 'html') e.innerHTML = v; /* html: 정적 문자열 전용 — 사용자 입력·외부 데이터 주입 금지(§G8) */
      else if(k.indexOf('on') === 0 && typeof v === 'function') e.addEventListener(k.slice(2), v);
      else if(k === 'style' && typeof v === 'object'){ for(var sk in v) e.style[sk] = v[sk]; }
      else e.setAttribute(k, v);
    }
  }
  if(children){
    (Array.isArray(children) ? children : [children]).forEach(function(c){
      if(c == null) return;
      e.appendChild(typeof c === 'string' ? document.createTextNode(c) : c);
    });
  }
  return e;
}

function setDisabled(btn, disabled){
  var hadFocus = document.activeElement === btn;
  btn.disabled = disabled;
  if(disabled && hadFocus){
    var root = document.getElementById('screenRoot');
    if(root) root.focus({preventScroll:true});
  }
}

function announce(msg){
  var lr = document.getElementById('liveRegion');
  if(lr) lr.textContent = msg;
}

var toastTimer = null;
function toast(msg){
  var t = document.getElementById('toast');
  if(!t) return;
  t.textContent = msg;
  clearTimeout(toastTimer);
  toastTimer = setTimeout(function(){ t.textContent = ''; }, 2400);
}

  SplitCompare: function(opts){
    /* opts:{width,height,drawLeft(ctx,w,h),drawRight(ctx,w,h),leftLabel,rightLabel,onDrag}
       원본/결과를 손잡이로 드래그해 비교(레퍼런스2 재사용, 마우스+터치+키보드). */
    var W = opts.width, H = opts.height;
    var wrap = el('div', {class:'split-wrap'});
    var canvas = el('canvas', {width:String(W), height:String(H), role:'img', 'aria-label': (opts.leftLabel||'원본')+' / '+(opts.rightLabel||'결과')+' 비교'});
    wrap.appendChild(canvas);
    wrap.appendChild(el('span', {class:'split-tag l'}, opts.leftLabel || '원본'));
    wrap.appendChild(el('span', {class:'split-tag r'}, opts.rightLabel || '결과'));
    var divider = el('div', {class:'split-divider', tabindex:'0', role:'slider', 'aria-label':'비교 경계', 'aria-valuemin':'0', 'aria-valuemax':'100', 'aria-valuenow':'50'});
    divider.style.left = '50%';
    wrap.appendChild(divider);

    var ctx = canvas.getContext('2d');
    var leftCanvas = document.createElement('canvas'); leftCanvas.width=W; leftCanvas.height=H;
    var rightCanvas = document.createElement('canvas'); rightCanvas.width=W; rightCanvas.height=H;
    var frac = 0.5;

    function drawComposite(){
      var splitX = Math.round(W*frac);
      ctx.clearRect(0,0,W,H);
      ctx.drawImage(leftCanvas,0,0);
      ctx.save(); ctx.beginPath(); ctx.rect(splitX,0,W-splitX,H); ctx.clip();
      ctx.drawImage(rightCanvas,0,0);
      ctx.restore();
    }
    function redraw(){
      opts.drawLeft(leftCanvas.getContext('2d'), W, H);
      opts.drawRight(rightCanvas.getContext('2d'), W, H);
      drawComposite();
    }
    function setFrac(f){
      frac = Math.max(0, Math.min(1, f));
      divider.style.left = (frac*100)+'%';
      divider.setAttribute('aria-valuenow', String(Math.round(frac*100)));
      drawComposite();
      if(opts.onDrag) opts.onDrag(frac);
    }
    function fracFromClientX(clientX){
      var r = wrap.getBoundingClientRect();
      return (clientX - r.left) / r.width;
    }
    var dragging = false;
    function pd(e){
      dragging=true;
      try{ canvas.setPointerCapture(e.pointerId); }catch(err){}
      setFrac(fracFromClientX(e.clientX));
      e.preventDefault();
    }
    function pm(e){ if(dragging) setFrac(fracFromClientX(e.clientX)); }
    function pu(){ dragging=false; }
    divider.addEventListener('pointerdown', pd);
    canvas.addEventListener('pointerdown', pd);
    window.addEventListener('pointermove', pm);
    window.addEventListener('pointerup', pu);
    /* window 리스너 cleanup(P4 N2) — SplitCompare가 mount() 콜스택 중에 만들어질 때만
       (_mountingPane 유효) registerUnmount로 정리를 건다. S2-4/S3-1/S3-3처럼 버튼 클릭 등
       비동기 콜백 안에서 다시 그려질 때는 _mountingPane이 null이라 등록을 건너뛴다 —
       그 경우도 최초(mount 시점) 호출 1회분은 이미 등록돼 있어 화면 전환 시 정리된다. */
    if(_mountingPane){
      registerUnmount(function(){
        window.removeEventListener('pointermove', pm);
        window.removeEventListener('pointerup', pu);
      });
    }
    divider.addEventListener('keydown', function(e){
      if(e.key==='ArrowLeft'){ setFrac(frac-0.05); e.preventDefault(); }
      else if(e.key==='ArrowRight'){ setFrac(frac+0.05); e.preventDefault(); }
    });

    redraw();
    return {el:wrap, redraw:redraw, setFrac:setFrac};
  }
};

/* ============================================================
   5) FX — 최소 게임필(팝/셰이크), 라이브러리 없이 자체 구현
   ============================================================ */
var FX = {
  reducedMotion: (function(){
    try{ return window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches; }catch(e){ return false; }
  })(),
  easeInOutQuad: function(t){ return t<0.5 ? 2*t*t : 1-Math.pow(-2*t+2,2)/2; },
  pop: function(node){
    if(!node || FX.reducedMotion) return;
    node.classList.remove('fx-pop'); void node.offsetWidth;
    node.classList.add('fx-pop');
  },
  shake: function(node){
    if(!node || FX.reducedMotion) return;
    node.classList.remove('fx-shake'); void node.offsetWidth;
    node.classList.add('fx-shake');
  },
  /* Canvas 2D 파티클 버스트(개정 P2-B2 §B P2-1 — 정답 연출 강화, 라이브러리 없이 rAF 직접 구현).
     text-data.html의 동일 이름 함수(형제 학습지 house style)를 그대로 이식했다: anchorEl 중심에서
     잠깐 터졌다 사라지는 고정(position:fixed) 캔버스 1개를 만들고 끝나면 스스로 제거한다.
     정의부는 DOM에 전혀 접근하지 않고(top-level 안전), 호출 시(퀴즈 정답 시)에만 실행된다. */
  canvasBurst: function(anchorEl, opts){
    if(FX.reducedMotion || !anchorEl) return;
    opts = opts || {};
    var colors = opts.colors || ['#2ea043','#1d54c9','#e8b94a','#ff4d8b'];
    var rect = anchorEl.getBoundingClientRect();
    var size = 180;
    var canvas = document.createElement('canvas');
    var dpr = window.devicePixelRatio || 1;
    canvas.width = size*dpr; canvas.height = size*dpr;
    canvas.style.position = 'fixed';
    canvas.style.left = (rect.left + rect.width/2 - size/2) + 'px';
    canvas.style.top = (rect.top + rect.height/2 - size/2) + 'px';
    canvas.style.width = size + 'px'; canvas.style.height = size + 'px';
    canvas.style.pointerEvents = 'none';
    canvas.style.zIndex = '70';
    document.body.appendChild(canvas);
    var ctx = canvas.getContext('2d');
    ctx.setTransform(dpr,0,0,dpr,0,0);
    var n = opts.count || 16;
    var parts = [];
    for(var i=0;i<n;i++){
      var angle = Math.random()*Math.PI*2, speed = 1.2 + Math.random()*2.0;
      parts.push({vx:Math.cos(angle)*speed, vy:Math.sin(angle)*speed - 1.2, color: colors[i % colors.length]});

     cloudItems가 모듈 상수 CUBE_S로 계산한다(항상 같은 값 — 분기 없이 단일 소스, D-4 DRY). */
  function buildPointCloud(scene, n, S, opts){
    opts = opts || {};
    var size = opts.size!=null ? opts.size : 0.075;
    var opacity = opts.opacity!=null ? opts.opacity : 0.92;
    var cItems = cloudItems(n);
    var count = cItems.length;
    var posArr = new Float32Array(count*3);
    var colArr = new Float32Array(count*3);
    var flatItems = new Array(count);
    cItems.forEach(function(it,idx){
      posArr[idx*3]=it.pos.x; posArr[idx*3+1]=it.pos.y; posArr[idx*3+2]=it.pos.z;
      colArr[idx*3]=it.color.r/255; colArr[idx*3+1]=it.color.g/255; colArr[idx*3+2]=it.color.b/255;
      flatItems[idx] = {r:it.color.r, g:it.color.g, b:it.color.b};
    });
    var geo = new THREE.BufferGeometry();
    geo.setAttribute('position', new THREE.BufferAttribute(posArr,3));
    geo.setAttribute('color', new THREE.BufferAttribute(colArr,3));
    var mat = new THREE.PointsMaterial({size:size, vertexColors:true, transparent:true, opacity:opacity, sizeAttenuation:true});
    var points = new THREE.Points(geo, mat);
    scene.add(points);
    /* items는 기존 형태({r,g,b} 평면 배열)로 반환해 S3-2·S3-3의 cloud.items[i].r 등 기존
       접근 방식을 그대로 보존한다(그 두 화면은 이번 개정 범위 밖 — 건드리지 않음). */
    return {points:points, items:flatItems, posAttr:geo.getAttribute('position')};
  }

  /* morphCloudItems(F1) 소비 — P2-3 step3 큐브↔원기둥 모프 점구름. buildPointCloud와 달리 점마다
     posCube·posCyl 두 좌표를 들고 있어 setMorph(t)로 그 사이를 선형 보간한다(posAttr needsUpdate).
     기존 buildPointCloud·cloudItems·그 호출부(S3-2·S3-3·P2-2)는 무변경. */
  function buildMorphCloud(scene, n, opts){
    opts = opts || {};
    var size = opts.size!=null ? opts.size : 0.05;
    var opacity = opts.opacity!=null ? opts.opacity : 0.55;
    var mItems = morphCloudItems(n);
    var count = mItems.length;
    var posArr = new Float32Array(count*3);
    var colArr = new Float32Array(count*3);
    mItems.forEach(function(it,idx){
      posArr[idx*3]=it.posCube.x; posArr[idx*3+1]=it.posCube.y; posArr[idx*3+2]=it.posCube.z;
      colArr[idx*3]=it.color.r/255; colArr[idx*3+1]=it.color.g/255; colArr[idx*3+2]=it.color.b/255;
    });
    var geo = new THREE.BufferGeometry();
    geo.setAttribute('position', new THREE.BufferAttribute(posArr,3));
    geo.setAttribute('color', new THREE.BufferAttribute(colArr,3));
    var mat = new THREE.PointsMaterial({size:size, vertexColors:true, transparent:true, opacity:opacity, sizeAttenuation:true});
    var points = new THREE.Points(geo, mat);
    scene.add(points);
    var posAttr = geo.getAttribute('position');
    return {
      points:points,
      setMorph:function(t){
        for(var idx=0; idx<count; idx++){
          var it = mItems[idx];
          posAttr.array[idx*3]   = it.posCube.x + (it.posCyl.x-it.posCube.x)*t;
          posAttr.array[idx*3+1] = it.posCube.y + (it.posCyl.y-it.posCube.y)*t;
          posAttr.array[idx*3+2] = it.posCube.z + (it.posCyl.z-it.posCube.z)*t;
        }
        posAttr.needsUpdate = true;
      }
    };
  }

  /* HSV 원기둥(간략화, 12.1-7): 반지름=채도(S), 높이=명도(V), 각도=색상(H) */
  function cylinderPos(h,s,v,S){
    var rad = s*(S/2);
    var th = h*Math.PI/180;
    return {x:rad*Math.cos(th), y:(v-0.5)*S, z:-rad*Math.sin(th)};
  }
  /* v2 A5 연쇄: 원기둥 와이어 0x1d54c9->0x6f9bff(다크 배경 대비 상향, 초안값). */
  function buildCylinderWireframe(scene, S){
    var group = new THREE.Group();
    var segs = 40;
    function ring(y, r){
      var pts = [];
      for(var i=0;i<=segs;i++){ var a=i/segs*Math.PI*2; pts.push(new THREE.Vector3(r*Math.cos(a), y, -r*Math.sin(a))); }
      return new THREE.Line(new THREE.BufferGeometry().setFromPoints(pts), new THREE.LineBasicMaterial({color:0x6f9bff, transparent:true, opacity:0}));
    }
    var lines = [ring(S/2,S/2), ring(-S/2,S/2)];
    var vCount = 8;
    for(var i=0;i<vCount;i++){
      var a = i/vCount*Math.PI*2, x=S/2*Math.cos(a), z=-S/2*Math.sin(a);
      lines.push(new THREE.Line(new THREE.BufferGeometry().setFromPoints([
        new THREE.Vector3(x,-S/2,z), new THREE.Vector3(x,S/2,z)
      ]), new THREE.LineBasicMaterial({color:0x6f9bff, transparent:true, opacity:0})));
    }
    lines.forEach(function(l){ group.add(l); });
    scene.add(group);
    return { group:group, lines:lines, setOpacity:function(op){ this.lines.forEach(function(l){ l.material.opacity = op*0.6; }); } };
  }

  /* ---------- WebGL 미지원 폴백: 3D만 정적 대체(좌표 표기), 2D 색상선택기는 그대로 ---------- */
  function buildFallback(hostEl, getRGB){
    var wrap = el('div', {class:'gl-wrap gl-fallback'});
    wrap.style.aspectRatio = 'auto';
    wrap.appendChild(el('p', {}, '이 기기(브라우저)는 3D 그래픽(WebGL)을 지원하지 않아요. 대신 좌표를 숫자로 보여줄게요. 아래 색상 선택기는 그대로 사용할 수 있어요.'));
    var svgNS = 'http://www.w3.org/2000/svg';
    var svg = document.createElementNS(svgNS,'svg');
    svg.setAttribute('viewBox','0 0 160 140'); svg.setAttribute('width','160'); svg.setAttribute('height','140'); svg.setAttribute('class','diagram');
    svg.setAttribute('aria-hidden','true');
    var pts = {A:[30,40],B:[120,40],C:[140,60],D:[50,60],E:[30,100],F:[120,100],G:[140,120],H:[50,120]};
    var edges = [['A','B'],['B','C'],['C','D'],['D','A'],['E','F'],['F','G'],['G','H'],['H','E'],['A','E'],['B','F'],['C','G'],['D','H']];
    edges.forEach(function(pair){
      var p1=pts[pair[0]], p2=pts[pair[1]];
      var line = document.createElementNS(svgNS,'line');
      line.setAttribute('x1',p1[0]); line.setAttribute('y1',p1[1]); line.setAttribute('x2',p2[0]); line.setAttribute('y2',p2[1]);
      line.setAttribute('stroke','#c9b98a'); line.setAttribute('stroke-width','1.4');
      svg.appendChild(line);
    });
    var diag = document.createElementNS(svgNS,'line');
    diag.setAttribute('x1',pts.A[0]); diag.setAttribute('y1',pts.A[1]); diag.setAttribute('x2',pts.G[0]); diag.setAttribute('y2',pts.G[1]);
    diag.setAttribute('stroke','#8a8a8a'); diag.setAttribute('stroke-width','1.4'); diag.setAttribute('stroke-dasharray','3,3');
    svg.appendChild(diag);
    var dot = document.createElementNS(svgNS,'circle');
    dot.setAttribute('r','5'); dot.setAttribute('stroke','#1a1a1a'); dot.setAttribute('stroke-width','1.4');
    svg.appendChild(dot);
    wrap.appendChild(svg);
    var readout = el('div', {class:'gl-readout'});
    wrap.appendChild(readout);
    hostEl.appendChild(wrap);
    function refresh(){
      var c = getRGB();
      var p = COLOR.rgbToPos(c.r,c.g,c.b,CUBE_S);
      var nx = (p.x/CUBE_S+0.5), ny = (p.y/CUBE_S+0.5);
      var px = pts.D[0] + (pts.C[0]-pts.D[0])*nx;
      var py = pts.D[1] + (pts.H[1]-pts.D[1])*(1-ny);
      dot.setAttribute('cx', px); dot.setAttribute('cy', py);
      dot.setAttribute('fill', 'rgb('+c.r+','+c.g+','+c.b+')');
      readout.innerHTML = 'RGB(' + c.r+', '+c.g+', '+c.b + ')  →  좌표 <span data-katex="(' + p.x.toFixed(2)+',\\,'+p.y.toFixed(2)+',\\,'+p.z.toFixed(2)+')"></span>';
      renderMath(readout);
    }
    refresh();
    return {el:wrap, refresh:refresh};
  }

  return {
    S: CUBE_S,
    VERTEX_NAMES: VERTEX_NAMES,
    CUBE_VERTS: CUBE_VERTS,
    detectWebGL: detectWebGL,
    createStage: createStage,
    buildCubeSkeleton: buildCubeSkeleton,
    buildAxisLabels: buildAxisLabels,
    buildVertexMarkers: buildVertexMarkers,
    buildVertexHitSpheres: buildVertexHitSpheres,
    makeMarker: makeMarker,
    makeLine: makeLine,
    buildPointCloud: buildPointCloud,
    cloudItems: cloudItems,
    morphCloudItems: morphCloudItems,
    buildMorphCloud: buildMorphCloud,
    cylinderPos: cylinderPos,
    buildCylinderWireframe: buildCylinderWireframe,
    buildFallback: buildFallback
  };
})();

/* ============================================================
   6) ENGINE_PX — Canvas 픽셀(픽셀아트·숫자뷰·채널분해·변환·테트리스·이미지반전)
   레퍼런스2(색반전_실험실.html)의 ImageData 픽셀별 처리·오프스크린 캔버스
   패턴을 재사용하되, 반전은 교과서 선형반전(255-v) 1종 코어만 남긴다.
   ============================================================ */
var PX_CELL = 18; /* 변환 실험실 표시 셀 픽셀 크기(px) */

var ENGINE_PX = (function(){
  /* ---------- 격자 유틸 ---------- */
  function emptyGrid16(){ return emptyPixelGrid(); }
  /* 빈 칸(null)은 흰색(255,255,255)으로 간주하고 계산한다(수학 연산은 항상 구체적인 값 위에서). */
  function gridForMath(grid){
    return grid.map(function(row){ return row.map(function(c){ return c ? {r:c.r,g:c.g,b:c.b} : {r:255,g:255,b:255}; }); });
  }
  function countPainted(grid){
    var n = 0;
    grid.forEach(function(row){ row.forEach(function(c){ if(c) n++; }); });
    return n;
  }

  /* ---------- S2-1 예시 사진(자체 생성 도트풍 사과, 20x20, 저작권 안전) ---------- */
  function buildAppleGrid(){
    var N=20, grid=[], cx=9.5, cy=10.6, rx=7.6, ry=7.1;
    for(var i=0;i<N;i++){
      var row=[];
      for(var j=0;j<N;j++){
        var dx=(j-cx)/rx, dy=(i-cy)/ry, d=dx*dx+dy*dy;
        var topDent = (i<5) && Math.abs(j-cx)<2.1;
        var cell = null;
        if(d<=1 && !topDent){
          cell = (dx>0.15 && dy>0.1) ? {r:168,g:38,b:38} : {r:214,g:64,b:56};
        }
        row.push(cell);
      }
      grid.push(row);
    }
    grid[2][9]={r:107,g:68,b:35}; grid[3][9]={r:107,g:68,b:35}; grid[2][10]={r:107,g:68,b:35};
    grid[2][11]={r:79,g:157,b:79}; grid[3][11]={r:79,g:157,b:79}; grid[2][12]={r:79,g:157,b:79};
    return grid;
  }
  var APPLE_GRID = buildAppleGrid();

  /* ---------- S2-2 도안 모드 밑그림 4종(v2 §B 화면10 ⓐ) — 전부 코드 생성(에셋 불필요) 16x16
     불리언 마스크. 좌표 관례: 그리드 인덱스 j,i를 그대로 좌표로 쓴다(+0.5 오프셋 없음) — 그래야
     중심 cx=7.5 기준 좌우가 대칭이다(dx(j)=j-7.5, dx(15-j)=-dx(j), dx^2은 같음). ---------- */
  function buildRoundTemplateMask(){
    var N=16, mask=[], cx=7.5, cy=7.5, r=6.4;
    for(var i=0;i<N;i++){
      var row=[];
      for(var j=0;j<N;j++){ var dx=j-cx, dy=i-cy; row.push(dx*dx+dy*dy<=r*r); }
      mask.push(row);
    }
    return mask;
  }
  /* 하트: 표준 하트 음함수 (x^2+y^2-1)^3 - x^2*y^3 <= 0 (위쪽 두 봉우리, 아래쪽 뾰족점). */
  function buildHeartTemplateMask(){
    var N=16, mask=[], cx=7.5, scaleX=6.0, scaleY=5.6, cyTop=6.3;
    for(var i=0;i<N;i++){
      var row=[];
      for(var j=0;j<N;j++){
        var x=(j-cx)/scaleX, y=(cyTop-i)/scaleY;
        var f = Math.pow(x*x+y*y-1,3) - x*x*y*y*y;
        row.push(f<=0);
      }
      mask.push(row);
    }
    return mask;
  }
  function pointInPolygon(px,py,pts){
    var inside=false;
    for(var i=0,j=pts.length-1;i<pts.length;j=i++){
      var xi=pts[i][0], yi=pts[i][1], xj=pts[j][0], yj=pts[j][1];
      var hit = ((yi>py)!==(yj>py)) && (px < (xj-xi)*(py-yi)/(yj-yi)+xi);
      if(hit) inside=!inside;
    }
    return inside;
  }
  /* 별: 정오각별(5개 바깥 꼭짓점+5개 안쪽 꼭짓점) 다각형에 대해 각 칸 중심이 안에 있는지 판정. */
  function buildStarTemplateMask(){
    var N=16, cx=7.5, cy=7.3, outerR=7.2, innerR=outerR*0.42, pts=[];
    for(var k=0;k<10;k++){
      var ang = -Math.PI/2 + k*Math.PI/5, rr = (k%2===0)?outerR:innerR;
      pts.push([cx+rr*Math.cos(ang), cy+rr*Math.sin(ang)]);
    }
    var mask=[];
    for(var i=0;i<N;i++){ var row=[]; for(var j=0;j<N;j++){ row.push(pointInPolygon(j,i,pts)); } mask.push(row); }
    return mask;
  }
  /* 루미(로봇 실루엣): 안테나+눈 2개가 뚫린 머리+몸통 사각 블록. 좌우 대칭. */
  function buildRobotTemplateMask(){
    var N=16, mask=[];
    for(var i=0;i<N;i++){
      var row=[];
      for(var j=0;j<N;j++){
        var v=false;
        if(i===0 && (j===7||j===8)) v=true;             /* 안테나 끝 */
        else if(i===1 && (j===7||j===8)) v=true;         /* 안테나 대 */
        else if(i>=2 && i<=8 && j>=3 && j<=12){           /* 머리 */
          v=true;
          if(i>=4 && i<=5 && ((j>=5&&j<=6)||(j>=9&&j<=10))) v=false; /* 눈(칠하지 않음) */
        }
        else if(i>=9 && i<=14 && j>=5 && j<=10) v=true;   /* 몸통 */
        row.push(v);
      }
      mask.push(row);
    }
    return mask;
  }
  var TEMPLATE_MASK = buildRoundTemplateMask();
  var TEMPLATE_MASKS = { circle:TEMPLATE_MASK, heart:buildHeartTemplateMask(), star:buildStarTemplateMask(), lumi:buildRobotTemplateMask() };

  /* ---------- Canvas에 격자 그리기(페인트/숫자뷰/변환결과 공용) ---------- */
  function renderGridToCanvas(canvas, grid, cellPx, opts){
    opts = opts || {};
    var rows = grid.length, cols = grid[0].length;
    canvas.width = cols*cellPx; canvas.height = rows*cellPx;
    var ctx = canvas.getContext('2d');
    ctx.clearRect(0,0,canvas.width,canvas.height);
    for(var i=0;i<rows;i++){
      for(var j=0;j<cols;j++){
        var c = grid[i][j];
        if(c){
          ctx.fillStyle = 'rgb('+c.r+','+c.g+','+c.b+')';
          ctx.fillRect(j*cellPx, i*cellPx, cellPx, cellPx);
        } else {
          ctx.fillStyle = '#fffaf0';
          ctx.fillRect(j*cellPx, i*cellPx, cellPx, cellPx);
          if(opts.template && opts.template[i] && opts.template[i][j]){
            ctx.fillStyle = 'rgba(29,84,201,.14)';
            ctx.fillRect(j*cellPx, i*cellPx, cellPx, cellPx);
          }
        }
        ctx.strokeStyle = 'rgba(20,20,20,.08)';
        ctx.strokeRect(j*cellPx+0.5, i*cellPx+0.5, cellPx-1, cellPx-1);
      }
    }
  }

  /* PNG 내보내기: 네이티브 해상도(칸당 1px)로 그려 toDataURL, 클라이언트 다운로드(외부 전송 없음) */
  function downloadGridAsPNG(grid, filename){
    var tmp = document.createElement('canvas');
    renderGridToCanvas(tmp, grid, 16, {});
    var a = document.createElement('a');
    a.href = tmp.toDataURL('image/png');

    document.body.appendChild(a);

    a.remove();

  /* cellPx(옵션, v2 §B 화면11 ⓐⓒ): 표 wrap에 --cell-px로 세팅 -- CSS(.num-table td)가 이 값으로
     칸 크기를 그린다(뷰포트 역산은 S2-3 마운트 코드가 computeTableCellPx로 계산). channel
     모드는 셀 크기의 ~45%로 --cell-font도 세팅한다(ⓒ). data-i/data-j는 탭 상호작용(ⓓ 픽셀
     확대 카드)이 좌표를 읽을 수 있게 모든 모드에 공통으로 붙인다. */
  function buildNumTable(grid, mode, channel, cellPx){
