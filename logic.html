      var pos = localPos(e);
      if(deleteMode){
        var delId = hitBody(pos.x, pos.y);
        if(delId && delId !== 'OUT') removeNode(delId);
        return;
      }
      var pr = hitPort(pos.x, pos.y);
      if(armed && pr && pr.kind==='in'){
        connect(armed.nodeId, pr.nodeId, pr.portIdx);
        armed = null; pdStart = null;
        return;
      }
      if(pr && pr.kind==='out'){
        dragging = {kind:'wire', fromId:pr.nodeId, curX:pos.x, curY:pos.y};
        pdStart = {x:pos.x, y:pos.y};
        armed = null;
        drawCanvas();
        return;
      }
      if(armed){ armed = null; drawCanvas(); }
      var bodyId = hitBody(pos.x, pos.y);
      if(bodyId){
        var n = byId(bodyId);
        dragging = {kind:'node', nodeId:bodyId, offX:pos.x-n.x, offY:pos.y-n.y, moved:false};
        pdStart = {x:pos.x, y:pos.y};
      }
    });
    canvas.addEventListener('pointermove', function(e){
      if(!dragging) return;
      var pos = localPos(e);
      if(dragging.kind === 'wire'){ dragging.curX = pos.x; dragging.curY = pos.y; drawCanvas(); }
      else if(dragging.kind === 'node'){
        var n = byId(dragging.nodeId);
        var nx = pos.x-dragging.offX, ny = pos.y-dragging.offY;
        if(Math.abs(nx-n.x) > 2 || Math.abs(ny-n.y) > 2) dragging.moved = true;
        n.x = Math.max(SBOX_W/2+4, Math.min(cssW-SBOX_W/2-4, nx));
        n.y = Math.max(SBOX_H/2+4, Math.min(cssH-SBOX_H/2-4, ny));
        drawCanvas();
      }
    });
    canvas.addEventListener('pointerup', function(e){
      var pos = localPos(e);
      if(dragging && dragging.kind === 'wire'){
        var target = hitPort(pos.x, pos.y);
        var moveDist = pdStart ? sbDist(pos.x,pos.y,pdStart.x,pdStart.y) : 999;
        if(target && target.kind === 'in'){
          connect(dragging.fromId, target.nodeId, target.portIdx);
        } else if(moveDist < 6){
          armed = {nodeId: dragging.fromId};
          toast('연결할 입력 포트를 탭하세요.');
        }
        dragging = null;
        drawCanvas();
        return;
      }
      if(dragging && dragging.kind === 'node'){
        var moveDist2 = pdStart ? sbDist(pos.x,pos.y,pdStart.x,pdStart.y) : 999;
        if(!dragging.moved && moveDist2 < 6){
          var n = byId(dragging.nodeId);
          if(n.type === 'IN') toggleInput(n.id);
        } else {
          saveAndRebuild();
        }
        dragging = null;
        drawCanvas();
      }
    });

    renderAll();
  }
};

/* ============================================================
   9.5) PUZZLE — L6·L9 회로 만들기 스테이지 공용 보드 (개정 §B L6/L9): 팔레트에서 게이트를
   꺼내 자유 배치 + 커스텀 배선(SANDBOX와 같은 드래그/탭-탭 상호작용·wouldCreateCycle 재사용)
   + "채점하기" 버튼. 구 BUILD(고정 배선+슬롯 순환+즉시 자동채점)를 대체한다. 채점 전에는
   목표(진리표/식)만 보이고 현재 회로와의 비교표는 숨겨진다 — 채점 버튼을 눌러야
   gradeCircuit()으로 완전성(미연결 포트 없음)을 먼저 확인하고, 통과하면 행별 O/X
   비교표(TRUTH.renderCompareTable, 9.3 그대로 재사용)를 보여준다.
   ============================================================ */
var PUZZLE = {
  /* cfg: {board(영속 {nodes,nextNum}), inputIds, palette, nodeCap, targetKind:'table'|'expr',
           targetCircuit, exprDisplay, progress({cleared,stars,attempts}), onCleared} */
  render: function(container, cfg){
    var board = cfg.board;
    if(!board.nodes){ board.nodes = initPuzzleNodes(cfg.inputIds); board.nextNum = 1; STATE.save(); }
    var nodes = board.nodes;
    var deleteMode = false;

    var wrap = el('div', {class:'sandbox-wrap', style:{flex:'1', minHeight:'0'}});
    var layout = el('div', {class:'game-layout'});
    var boardArea = el('div', {class:'game-board-area', style:{flexDirection:'column', gap:'8px'}});
    var panelArea = el('div', {class:'game-panel-area'});

    var toolbar = el('div', {class:'sandbox-toolbar'});
    cfg.palette.forEach(function(t){
      var b = el('button', {type:'button', class:'btn btn-secondary btn-sm'}, '+ ' + GATE_KOREAN[t] + '(' + t + ')');
      b.addEventListener('click', function(){ addGate(t); });
      toolbar.appendChild(b);
    });
    var delBtn = el('button', {type:'button', class:'btn btn-secondary btn-sm', 'aria-pressed':'false'}, '🗑 삭제');
    delBtn.addEventListener('click', function(){
      deleteMode = !deleteMode;
      delBtn.setAttribute('aria-pressed', deleteMode ? 'true' : 'false');
      delBtn.classList.toggle('btn-primary', deleteMode);
      delBtn.classList.toggle('btn-secondary', !deleteMode);
      delBtn.textContent = deleteMode ? '🗑 삭제 모드 (다시 눌러 종료)' : '🗑 삭제';
      delCursor.reset();
      if(deleteMode){ canvas.focus(); toast('지울 게이트를 보드에서 탭하거나, 화살표로 고르고 Enter를 누르세요.'); }
      else toast('삭제 모드를 종료했어요.');
      drawCanvas();
    });
    toolbar.appendChild(delBtn);
    boardArea.appendChild(toolbar);

    var canvasWrapEl = el('div', {class:'sandbox-canvas-wrap'});
    var canvas = el('canvas', {tabindex:'0', 'aria-label':'회로 조립판. 팔레트에서 게이트를 꺼내 옮기고 포트를 드래그하거나 탭-탭으로 연결하세요. 삭제 모드가 아니면 화살표로 스위치를 고르고 Enter나 Space로 토글할 수 있습니다. 입력·출력은 이미 놓여 있고 지울 수 없습니다.'});
    canvasWrapEl.appendChild(canvas);
    boardArea.appendChild(canvasWrapEl);
    var cssW = 420, cssH = 420; /* 정사각 보드(A1 원칙) */
    var ctx = setupCanvasHiDPI(canvas, cssW, cssH);

    var targetHost = el('div', {class:'build-target'});
    panelArea.appendChild(targetHost);
    var resultHost = el('div', {});
    panelArea.appendChild(resultHost);
    var gradeBtn = el('button', {type:'button', class:'btn btn-primary'}, '채점하기');
    var gradeMsg = el('p', {class:'muted', style:{minHeight:'20px'}, 'aria-live':'polite'}, '');
    panelArea.appendChild(gradeBtn);
    panelArea.appendChild(gradeMsg);

    layout.appendChild(boardArea);
    layout.appendChild(panelArea);
    wrap.appendChild(layout);
    container.appendChild(wrap);
    /* LIVE-1: 이 시점엔 root(=이 컨테이너)가 아직 문서에 붙지 않은 경우가 있다(L6/L7가
       showStage/SANDBOX.render를 부모의 root.appendChild(s) 전에 호출) — clientHeight가 0으로
       측정돼 축소가 스킵된다. setTimeout(0)으로 현재 동기 호출 스택(부모의 appendChild 포함)이
       끝난 뒤로 미루면 실측이 정확하다 — 백그라운드 탭에서도 rAF처럼 억제되지 않는다. */
    setTimeout(function(){ fitSquareBoardCss(canvas, boardArea, cssW, toolbar.offsetHeight + 8); }, 0);

    var armed = null;
    var dragging = null;
    var pdStart = null;

    function byId(id){ for(var i=0;i<nodes.length;i++){ if(nodes[i].id===id) return nodes[i]; } return null; }
    function toCircuit(){
      return {
        nodes: nodes.map(function(n){ return {id:n.id, type:n.type, inputs:n.inputs.slice()}; }),
        inputs: cfg.inputIds.slice(),
        output: 'OUT'
      };
    }
    function switchValsFromNodes(){ var sw={}; nodes.forEach(function(n){ if(n.type==='IN') sw[n.id]=n.value; }); return sw; }
    function gateNodeCount(){ return nodes.filter(function(n){ return n.type!=='IN' && n.type!=='OUT'; }).length; }
    function isFixedNode(id){ return id==='OUT' || cfg.inputIds.indexOf(id) >= 0; }

    function targetOut(bits){
      var sw = {}; cfg.inputIds.forEach(function(id,i){ sw[id]=bits[i]; });
      return CIRCUIT.evaluate(cfg.targetCircuit, sw)[cfg.targetCircuit.output];
    }
    function renderTargetHost(){
      targetHost.innerHTML = '';
      if(cfg.targetKind === 'expr'){
        targetHost.appendChild(el('div', {class:'card-title'}, '목표 식 — 이 식과 똑같아지도록 배선해 보세요'));
        targetHost.appendChild(el('div', {class:'build-target-expr'}, cfg.exprDisplay));
      } else {
        targetHost.appendChild(el('div', {class:'card-title'}, '목표 — 이런 출력이 나오게 만들어 보세요'));
        TRUTH.renderDisplayTable(targetHost, cfg.inputIds, targetOut);
      }
    }
    renderTargetHost();

    function addGate(type){
      if(gateNodeCount() >= cfg.nodeCap){ toast('게이트는 최대 ' + cfg.nodeCap + '개까지예요.'); return; }
      var arity = GATE_ARITY[type];
      var id = 'N' + (board.nextNum++);
      var gc = gateNodeCount();
      var gx = 180 + (gc % 2) * 100;
      var gy = 40 + Math.floor(gc / 2) * 90;
      var ins = []; for(var i=0;i<arity;i++) ins.push(null);
      nodes.push({id:id, type:type, inputs:ins, x:gx, y:gy});
      saveAndRebuild();
    }
    function removeNode(id){
      if(isFixedNode(id)) return; /* 입력·출력은 고정 — 삭제 대상은 학생이 꺼낸 게이트뿐 */
      nodes = nodes.filter(function(n){ return n.id !== id; });
      nodes.forEach(function(n){ n.inputs = n.inputs.map(function(x){ return x===id ? null : x; }); });
      board.nodes = nodes;
      saveAndRebuild();
    }
    function toggleInput(id){ var n = byId(id); n.value = n.value ? 0 : 1; saveAndRebuild(); }
    function connect(fromId, toId, portIdx){
      if(fromId === toId) return false;
      var toNode = byId(toId);
      if(!toNode) return false;
      var arity = GATE_ARITY[toNode.type];
      if(portIdx == null || portIdx >= arity) return false;
      if(wouldCreateCycle(toCircuit(), {from:fromId, to:toId})){ toast('연결하면 회로가 순환해요. 다른 곳에 연결해 보세요.'); return false; }
      toNode.inputs[portIdx] = fromId;
      saveAndRebuild();
      FX.pop(canvasWrapEl); /* LG3-05: 확정 통통 모션(§1-5) */
      return true;
    }
    function saveAndRebuild(){ board.nodes = nodes; STATE.save(); renderAll(); }
    /* 삭제 모드 키보드 커서(§0-3 준수) — 입력·출력은 고정이라 게이트 노드만 순회 대상. */
    var delCursor = attachDeleteCursor(canvas, {
      isActive: function(){ return deleteMode; },
      listIds: function(){ return nodes.filter(function(n){ return !isFixedNode(n.id); }).map(function(n){ return n.id; }); },
      onSelect: function(id){ drawCanvas(); announce('삭제 커서: ' + id + '. Enter로 삭제, 화살표로 이동.'); },
      onDelete: function(id){ announce(id + ' 삭제됨.'); removeNode(id); }
    });
    /* 스위치 토글 키보드 커서(§0-3 준수, LG3-01) — 삭제 모드가 아닐 때만 활성. */
    var switchCursor = attachSwitchCursor(canvas, {
      isActive: function(){ return !deleteMode; },
      listIds: function(){ return cfg.inputIds.slice(); },
      onSelect: function(id){ drawCanvas(); announce('스위치 커서: ' + id + '. Enter나 Space로 토글, 화살표로 이동.'); },
      onToggle: function(id){ toggleInput(id); }
    });
    var canvasFocused = false;
    canvas.addEventListener('focus', function(){ canvasFocused = true; drawCanvas(); });
    canvas.addEventListener('blur', function(){ canvasFocused = false; drawCanvas(); });

    function hitPort(x,y){
      for(var i=0;i<nodes.length;i++){
        var n = nodes[i];
        if(n.type !== 'OUT'){
          var op = sbOutPortPos(n);
          if(op && sbDist(x,y,op.x,op.y) <= 11) return {nodeId:n.id, kind:'out'};
        }
        var arity = GATE_ARITY[n.type];
        for(var k=0;k<arity;k++){
          var ip = sbInPortPos(n,k);
          if(sbDist(x,y,ip.x,ip.y) <= 11) return {nodeId:n.id, kind:'in', portIdx:k};
        }
      }
      return null;
    }
    function hitBody(x,y){
      for(var i=nodes.length-1;i>=0;i--){
        var n = nodes[i];
        if(Math.abs(x-n.x) <= SBOX_W/2 && Math.abs(y-n.y) <= SBOX_H/2) return n.id;
      }
      return null;
    }
    function localPos(e){
      var rect = canvas.getBoundingClientRect();
      /* LIVE-1: 저높이 뷰포트에서 fitSquareBoardCss가 canvas CSS 표시 크기를 줄이므로
         (내부 논리 좌표 cssW/cssH는 그대로), rect가 그보다 작으면 그 비율만큼 되돌린다. */
      var scaleX = rect.width ? cssW/rect.width : 1, scaleY = rect.height ? cssH/rect.height : 1;
      return {x: (e.clientX-rect.left)*scaleX, y: (e.clientY-rect.top)*scaleY};
    }

    function drawCanvas(){
      var circuit = toCircuit();
      var values = {};
      try{ values = CIRCUIT.evaluate(circuit, switchValsFromNodes()); }catch(e){ values = {}; }
      ctx.clearRect(0,0,cssW,cssH);
      nodes.forEach(function(n){
        n.inputs.forEach(function(srcId, idx){
          if(srcId==null) return;
          var src = byId(srcId);
          if(!src) return;
          var op = sbOutPortPos(src);
          var ip = sbInPortPos(n, idx);
          drawWire(ctx, op.x, op.y, ip.x, ip.y, values[srcId]===1);
        });
      });
      if(dragging && dragging.kind === 'wire'){
        var src = byId(dragging.fromId);
        var op = sbOutPortPos(src);
        /* LG3-05: 드래그 중 프리뷰도 확정 배선과 같은 지그재그 산식(직선 → 번개형 점선). */
        var pdx = dragging.curX-op.x, pdy = dragging.curY-op.y;
        var plen = Math.sqrt(pdx*pdx+pdy*pdy) || 1;
        var pnx = -pdy/plen, pny = pdx/plen, pamp = Math.min(10, plen*0.18);
        var pm1x = op.x+pdx*0.35+pnx*pamp, pm1y = op.y+pdy*0.35+pny*pamp;
        var pm2x = op.x+pdx*0.65-pnx*pamp, pm2y = op.y+pdy*0.65-pny*pamp;
        ctx.save(); ctx.setLineDash([4,4]); ctx.strokeStyle = '#2f6df0'; ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.moveTo(op.x, op.y); ctx.lineTo(pm1x,pm1y); ctx.lineTo(pm2x,pm2y); ctx.lineTo(dragging.curX, dragging.curY);
        ctx.stroke();
        ctx.restore();
      }
      nodes.forEach(function(n){
        if(n.type === 'IN') drawSbInput(ctx, n, values[n.id]===1);
        else if(n.type === 'OUT') drawSbOutput(ctx, n, values.OUT===1);
        else drawSbGate(ctx, n, values[n.id]===1, !!(armed && armed.nodeId===n.id));
      });
      if(deleteMode) drawDeleteCursorRing(ctx, byId(delCursor.getCursorId()));
      else if(canvasFocused) drawSwitchCursorRing(ctx, byId(switchCursor.getCursorId()));
    }
    function renderAll(){ drawCanvas(); }

    function runGrade(){
      var circuit = toCircuit();
      var res = gradeCircuit(circuit);
      resultHost.innerHTML = '';
      if(!res.ok){
        gradeMsg.textContent = '아직 연결 안 된 곳이 있어요. 모든 포트를 이어 주세요.';
        return;
      }
      var compareRes = TRUTH.renderCompareTable(resultHost, cfg.inputIds, targetOut, function(bits){
        var sw = {}; cfg.inputIds.forEach(function(id,i){ sw[id]=bits[i]; });
        return CIRCUIT.evaluate(circuit, sw).OUT;
      });
      cfg.progress.attempts = (cfg.progress.attempts||0) + 1;
      STATE.save();
      if(compareRes.allMatch){
        gradeMsg.textContent = '정확해요! 목표와 똑같아요.';
        if(!cfg.progress.cleared){
          cfg.progress.cleared = true;
          cfg.progress.stars = cfg.progress.attempts<=1 ? 3 : (cfg.progress.attempts<=2 ? 2 : 1);
          STATE.save();
          FX.pop(canvasWrapEl);
          FX.confetti(wrap);
          if(cfg.onCleared) cfg.onCleared();
        }
      } else {
        gradeMsg.textContent = '아직 목표와 달라요(빨간 줄). 배선을 다시 살펴보세요.';
      }
    }
    gradeBtn.addEventListener('click', runGrade);

    canvas.addEventListener('pointerdown', function(e){
      /* LIVE-2: PLUG(:~2291)와 동일하게 try/catch로 감싼다 — 비활성 pointerId(합성 이벤트·일부
         펜/터치 엣지)에서 예외가 나면 캡처 실패만 무시하고 핸들러는 계속 진행해야 한다. */
      try{ canvas.setPointerCapture(e.pointerId); }catch(err){}
      var pos = localPos(e);
      if(deleteMode){
        var delId = hitBody(pos.x, pos.y);
        if(delId && !isFixedNode(delId)) removeNode(delId);
        return;
      }
      var pr = hitPort(pos.x, pos.y);
      if(armed && pr && pr.kind==='in'){
        connect(armed.nodeId, pr.nodeId, pr.portIdx);
        armed = null; pdStart = null;
        return;
      }
      if(pr && pr.kind==='out'){
        dragging = {kind:'wire', fromId:pr.nodeId, curX:pos.x, curY:pos.y};
        pdStart = {x:pos.x, y:pos.y};
        armed = null;
        drawCanvas();
        return;
      }
      if(armed){ armed = null; drawCanvas(); }
      var bodyId = hitBody(pos.x, pos.y);
      if(bodyId){
        var n = byId(bodyId);
        dragging = {kind:'node', nodeId:bodyId, offX:pos.x-n.x, offY:pos.y-n.y, moved:false};
        pdStart = {x:pos.x, y:pos.y};
      }
    });
    canvas.addEventListener('pointermove', function(e){
      if(!dragging) return;
      var pos = localPos(e);
      if(dragging.kind === 'wire'){ dragging.curX = pos.x; dragging.curY = pos.y; drawCanvas(); }
      else if(dragging.kind === 'node'){
        var n = byId(dragging.nodeId);
        var nx = pos.x-dragging.offX, ny = pos.y-dragging.offY;
        if(Math.abs(nx-n.x) > 2 || Math.abs(ny-n.y) > 2) dragging.moved = true;
        n.x = Math.max(SBOX_W/2+4, Math.min(cssW-SBOX_W/2-4, nx));
        n.y = Math.max(SBOX_H/2+4, Math.min(cssH-SBOX_H/2-4, ny));
        drawCanvas();
      }
    });
    canvas.addEventListener('pointerup', function(e){
      var pos = localPos(e);
      if(dragging && dragging.kind === 'wire'){
        var target = hitPort(pos.x, pos.y);
        var moveDist = pdStart ? sbDist(pos.x,pos.y,pdStart.x,pdStart.y) : 999;
        if(target && target.kind === 'in'){
          connect(dragging.fromId, target.nodeId, target.portIdx);
        } else if(moveDist < 6){
          armed = {nodeId: dragging.fromId};
          toast('연결할 입력 포트를 탭하세요.');
        }
        dragging = null;
        drawCanvas();
        return;
      }
      if(dragging && dragging.kind === 'node'){
        var moveDist2 = pdStart ? sbDist(pos.x,pos.y,pdStart.x,pdStart.y) : 999;
        if(!dragging.moved && moveDist2 < 6){
          var n = byId(dragging.nodeId);
          if(n.type === 'IN') toggleInput(n.id);
        } else {
          saveAndRebuild();
        }
        dragging = null;
        drawCanvas();
      }
    });

    renderAll();
  }
};

/* ============================================================
   10.5) PLUG — A4 공용 끼우기 컴포넌트 (개정 §A4, L7형 통일): L2~L4·L8의 "좌측 DOM 스위치 +
   이미 연결된 회로"를 대체. 미리 놓인 게이트(자유 배치 아님) + 스위치 1~2개를 학생이
   드래그 또는 탭-탭으로 끼운 뒤 토글한다. 게이트→출력 램프는 이미 고정 배선되어 있어
   (개념 도입 단계는 조작 부담을 낮춘다 — §A4 이유) 학생 과제는 "스위치→게이트 입력"
   연결뿐이다. SANDBOX·PUZZLE과 같은 캔버스 노드 모델이라 스위치 토글·배선 모두 포인터로
   조작하고, 키보드는 attachSwitchCursor(화살표+Enter/Space)로 토글을 지원한다(배선 자체는
   §0-3 예외 대상 그대로 포인터 전용). 연결 상태는 이 화면을 벗어나면 초기화되는 비영속
   상태(각 게이트가 어느 스위치와 연결되든 AND/OR/XOR는 대칭이라 정오답이 없으므로 저장할
   필요가 없다).
   ============================================================ */
function PLUG_render(container, opts){
  /* opts: {inputs:[{id,tag,desc}], gateType, values:{id:0/1}, onToggle(id,v), onConnected()} */
  var arity = GATE_ARITY[opts.gateType];
  var ins = opts.inputs.slice(0, arity);
  var values = {};
  ins.forEach(function(inp){ values[inp.id] = (opts.values && opts.values[inp.id]) || 0; });
  var connections = new Array(arity).fill(null); /* idx -> switchId */

  /* 노드(내부 배열, STATE 비영속 — AND/OR/XOR는 어느 스위치가 어느 포트든 대칭이라 정오답이
     없으므로 저장하지 않는다, 기존과 동일). IN×arity·게이트 1개·OUT은 좌표 고정 초기값이고
     드래그로 옮길 수 있다(전 노드 공통). */
  var inNodes = ins.map(function(inp, i){
    var y = arity === 1 ? 125 : (i===0 ? 74 : 176);
    return {id: inp.id, tag: inp.tag, desc: inp.desc, type:'IN', x: 64, y: y};
  });
  var gateNode = {type: opts.gateType, x: 230, y: 125, inputs: connections};
  var outNode = {x: 352, y: 125};

  var canvasWrap = el('div', {class:'sandbox-canvas-wrap', style:{maxWidth:'440px', margin:'0 auto'}});
  var canvas = el('canvas', {tabindex:'0', 'aria-label':'끼우기 보드. 화살표 키로 스위치를 고르고 Enter나 Space로 켜고 끌 수 있어요. 스위치의 동그라미를 게이트 입력까지 드래그하거나 탭-탭으로 연결하고, 블록은 손가락이나 마우스로 옮길 수 있어요.'});
  canvas.style.touchAction = 'none'; /* 배선·블록 드래그가 터치 팬 제스처에 끊기지 않게(attachBoardNodeDrag와 동일) */
  canvasWrap.appendChild(canvas);
  container.appendChild(canvasWrap);
  var cssW = 420, cssH = 250; /* 1뷰포트 여유: 병합 화면(보드+진리표)이 노트북 높이에 들어오게 압축 */
  var ctx = setupCanvasHiDPI(canvas, cssW, cssH);
  container.appendChild(el('p', {class:'muted', style:{fontSize:'13px'}}, '스위치 오른쪽 동그라미(출력)를 게이트 왼쪽 동그라미(입력)까지 드래그하거나, 동그라미를 탭한 뒤 게이트 입력을 탭해서 연결하세요. 스위치를 탭하면 0/1이 바뀌고, 블록은 끌어서 옮길 수 있어요.'));

  function inById(id){ for(var i=0;i<inNodes.length;i++){ if(inNodes[i].id===id) return inNodes[i]; } return null; }
  function computeOut(){
    if(connections.some(function(c){ return c==null; })) return null;
    var args = connections.map(function(id){ return values[id]; });
    return GATE_FN[opts.gateType](args);
  }
  function announceOut(){
    var out = computeOut();
    announce('출력 ' + (out==null ? '아직 정해지지 않음' : out));
  }
  function toggleSwitch(id){
    values[id] = values[id] ? 0 : 1;
    if(opts.onToggle) opts.onToggle(id, values[id]);
    drawCanvas();
    announceOut();
  }
  function connect(switchId, portIdx){
    for(var i=0;i<connections.length;i++){ if(connections[i]===switchId) connections[i]=null; }
    var wasFull = connections.every(function(c){ return c!=null; });
    connections[portIdx] = switchId;
    var nowFull = connections.every(function(c){ return c!=null; });
    drawCanvas();
    /* 연결 사실+출력을 한 문장으로 — 전역 라이브 리전이라 연속 announce는 뒤 것만 낭독된다 */
    var out = computeOut();
    announce('스위치 ' + switchId + ' 연결. 출력 ' + (out==null ? '아직 정해지지 않음' : out));
    if(!wasFull && nowFull){
      FX.pop(canvasWrap);
      if(opts.onConnected) opts.onConnected();
    }
  }

  var armed = null; /* armed = 탭-탭 대기 중인 switchId, 없으면 null */
  var dragging = null; /* {kind:'wire', fromId, curX, curY} | {kind:'node', node, offX, offY, moved} */
  var pdStart = null;

  function hitInOutPort(x,y){
    for(var i=0;i<inNodes.length;i++){
      var n = inNodes[i];
      var op = cbOutPortPos(n);
      if(sbDist(x,y,op.x,op.y) <= 11) return n.id;
    }
    return null;
  }
  function hitGateInPort(x,y){
    for(var k=0;k<arity;k++){
      var ip = sbInPortPos(gateNode,k);
      if(sbDist(x,y,ip.x,ip.y) <= 11) return k;
    }
    return null;
  }
  function hitBody(x,y){
    if(Math.abs(x-gateNode.x)<=SBOX_W/2 && Math.abs(y-gateNode.y)<=SBOX_H/2) return gateNode;
    if(Math.abs(x-outNode.x)<=SBOX_W/2 && Math.abs(y-outNode.y)<=SBOX_H/2) return outNode;
    for(var i=0;i<inNodes.length;i++){
      var n = inNodes[i];
      if(Math.abs(x-n.x)<=CB_IN_W/2 && Math.abs(y-n.y)<=CB_IN_H/2) return n;
    }
    return null;
  }
  function localPos(e){
    var rect = canvas.getBoundingClientRect();
    var scaleX = rect.width ? cssW/rect.width : 1, scaleY = rect.height ? cssH/rect.height : 1;
    return {x:(e.clientX-rect.left)*scaleX, y:(e.clientY-rect.top)*scaleY};
  }

  var canvasFocused = false;
  canvas.addEventListener('focus', function(){ canvasFocused = true; drawCanvas(); });
  canvas.addEventListener('blur', function(){ canvasFocused = false; drawCanvas(); });
  var switchCursor = attachSwitchCursor(canvas, {
    isActive: function(){ return true; },
    listIds: function(){ return ins.map(function(inp){ return inp.id; }); },
    onSelect: function(id){ drawCanvas(); announce('스위치 커서: ' + id + '. Enter나 Space로 토글, 화살표로 이동.'); },
    onToggle: function(id){ toggleSwitch(id); }
  });

  /* drawOutLamp: drawSbOutput(SANDBOX·PUZZLE 공용)과 같은 스타일이되, 미연결(out==null) 상태를
     '?'로 표시하는 3상 버전 — 게이트 입력이 다 안 채워졌을 때가 있는 PLUG 전용이라 공용 헬퍼는
     그대로 두고 여기서만 확장한다(AC-7). */
  function drawOutLamp(x, y, out){
    ctx.save();
    ctx.beginPath(); ctx.arc(x, y, 20, 0, Math.PI*2);
    ctx.fillStyle = out===1 ? '#f5a623' : '#e8e4d8'; ctx.fill();
    ctx.lineWidth = 2; ctx.strokeStyle = out===1 ? '#c97f0b' : '#98a2b1'; ctx.stroke();
    ctx.fillStyle = out===1 ? '#5a3c05' : '#5c6570'; ctx.font = "800 13px 'Inter','Malgun Gothic',sans-serif";
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText(out==null ? '?' : String(out), x, y);
    ctx.font = "600 10px 'Inter','Malgun Gothic',sans-serif"; ctx.fillStyle = '#3a3a3a';
    ctx.fillText('출력', x, y+32);
    ctx.restore();
  }
  function drawCanvas(){
    var out = computeOut();
    ctx.clearRect(0,0,cssW,cssH);
    connections.forEach(function(switchId, idx){
      if(switchId == null) return;
      var srcN = inById(switchId);
      if(!srcN) return;
      var a = cbOutPortPos(srcN), b = sbInPortPos(gateNode, idx);
      drawWire(ctx, a.x, a.y, b.x, b.y, values[switchId]===1);
    });
    var gOut = sbOutPortPos(gateNode);
    drawWire(ctx, gOut.x, gOut.y, outNode.x-20, outNode.y, out===1); /* 게이트→OUT 상시 고정 연결(학생 조작 불가) */
    if(dragging && dragging.kind === 'wire'){
      var srcN2 = inById(dragging.fromId);
      var op = cbOutPortPos(srcN2);
      var pdx = dragging.curX-op.x, pdy = dragging.curY-op.y;
      var plen = Math.sqrt(pdx*pdx+pdy*pdy) || 1;
      var pnx = -pdy/plen, pny = pdx/plen, pamp = Math.min(10, plen*0.18);
      var pm1x = op.x+pdx*0.35+pnx*pamp, pm1y = op.y+pdy*0.35+pny*pamp;
      var pm2x = op.x+pdx*0.65-pnx*pamp, pm2y = op.y+pdy*0.65-pny*pamp;
      ctx.save(); ctx.setLineDash([4,4]); ctx.strokeStyle = '#2f6df0'; ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(op.x, op.y); ctx.lineTo(pm1x,pm1y); ctx.lineTo(pm2x,pm2y); ctx.lineTo(dragging.curX, dragging.curY);
      ctx.stroke();
      ctx.restore();
    }
    inNodes.forEach(function(n){
      drawCbInput(ctx, n.x, n.y, {id:n.tag, value: values[n.id], desc: n.desc, lit: values[n.id]===1});
    });
    drawSbGate(ctx, gateNode, out===1, armed!=null);
    drawOutLamp(outNode.x, outNode.y, out);
    if(canvasFocused) drawSwitchCursorRing(ctx, inById(switchCursor.getCursorId()), CB_IN_W, CB_IN_H);
  }

  canvas.addEventListener('pointerdown', function(e){
    try{ canvas.setPointerCapture(e.pointerId); }catch(err){}
    var pos = localPos(e);
    var gp = hitGateInPort(pos.x, pos.y);
    if(armed && gp != null){
      connect(armed, gp);
      armed = null; pdStart = null;
      return;
    }
    var swId = hitInOutPort(pos.x, pos.y);
    if(swId != null){
      dragging = {kind:'wire', fromId:swId, curX:pos.x, curY:pos.y};
      pdStart = {x:pos.x, y:pos.y};
      armed = null;
      drawCanvas();
      return;
    }
    if(armed){ armed = null; drawCanvas(); }
    var n = hitBody(pos.x, pos.y);
    if(n){
      dragging = {kind:'node', node:n, offX:pos.x-n.x, offY:pos.y-n.y, moved:false};
      pdStart = {x:pos.x, y:pos.y};
    }
  });
  canvas.addEventListener('pointermove', function(e){
    if(!dragging) return;
    var pos = localPos(e);
    if(dragging.kind === 'wire'){ dragging.curX = pos.x; dragging.curY = pos.y; drawCanvas(); }
    else if(dragging.kind === 'node'){
      var n = dragging.node;
      var nx = pos.x-dragging.offX, ny = pos.y-dragging.offY;
      if(Math.abs(nx-n.x) > 2 || Math.abs(ny-n.y) > 2) dragging.moved = true;
      var halfW = n.type==='IN' ? CB_IN_W/2 : SBOX_W/2, halfH = n.type==='IN' ? CB_IN_H/2 : SBOX_H/2;
      n.x = Math.max(halfW, Math.min(cssW-halfW, nx));
      n.y = Math.max(halfH, Math.min(cssH-halfH, ny));
      drawCanvas();
    }
  });
  canvas.addEventListener('pointerup', function(e){
    var pos = localPos(e);
    if(dragging && dragging.kind === 'wire'){
      var targetIdx = hitGateInPort(pos.x, pos.y);
      var moveDist = pdStart ? sbDist(pos.x,pos.y,pdStart.x,pdStart.y) : 999;
      if(targetIdx != null){
        connect(dragging.fromId, targetIdx);
      } else if(moveDist < 6){
        armed = dragging.fromId;
        toast('연결할 게이트 입력 포트를 탭하세요.');
      }
      dragging = null;
      drawCanvas();
      return;
    }
    if(dragging && dragging.kind === 'node'){
      var moveDist2 = pdStart ? sbDist(pos.x,pos.y,pdStart.x,pdStart.y) : 999;
      if(!dragging.moved && moveDist2 < 6 && dragging.node.type === 'IN'){
        toggleSwitch(dragging.node.id);
      }
      dragging = null;
      drawCanvas();
    }
  });

  drawCanvas();
  return {isConnected: function(){ return connections.every(function(c){ return c!=null; }); }};
}

/* ============================================================
   11) SEP — 좌표평면 선형분리 뷰 (AND/OR/XOR 4점 + 학생 직선)
   ============================================================ */
/* G2-B 개정 §B L10: 자유 SegToggle(AND/OR/XOR 임의 선택) 대신 op이 step별로 고정된다
   (step2=AND, step3=OR, step4=XOR). 직선 조절(스테퍼+캔버스 키보드)·판정 로직(lineParams·
   checkSeparation, 무변경)은 그대로 유지. */
var SEP = {
  render: function(container, opts){
    var st = opts.progress;
    var op = opts.op;
    st.op = op;
    var wrap = el('div', {class:'sep-wrap'});

    var statusHost = el('div', {class:'chips-row', style:{margin:'4px 0 8px'}});
    wrap.appendChild(statusHost);

    var layout = el('div', {class:'game-layout', style:{minHeight:'300px'}});
    var boardArea = el('div', {class:'game-board-area'});
    var panelArea = el('div', {class:'game-panel-area'});

    var canvasWrap = el('div', {class:'sandbox-canvas-wrap', style:{maxWidth:'300px'}});
    var canvas = el('canvas', {tabindex:'0', 'aria-label':'좌표평면. 화살표 키로 직선의 각도와 위치를 조절하세요.'});
    canvasWrap.appendChild(canvas);
    boardArea.appendChild(canvasWrap);
    var cssW = 300, cssH = 300;
    var ctx = setupCanvasHiDPI(canvas, cssW, cssH);

    var controls = el('div', {class:'sep-controls'});
    function stepperGroup(labelText, onDec, onInc){
      var g = el('div', {class:'stepper-group'});
      var dec = el('button', {type:'button', class:'stepper-btn', 'aria-label':labelText + ' 줄이기'}, '−');
      dec.addEventListener('click', onDec);
      /* LG3-13: 각도·위치 값이 버튼이든 캔버스 화살표든 바뀔 때(refreshStatus가 textContent만
         교체) 낭독되지 않았다 — 라벨 자체를 live region으로 만들면 두 입력 경로 모두 자동 커버. */
      var lab = el('span', {class:'stepper-label', 'aria-live':'polite', 'aria-atomic':'true'}, labelText);
      var inc = el('button', {type:'button', class:'stepper-btn', 'aria-label':labelText + ' 늘리기'}, '+');
      inc.addEventListener('click', onInc);
      g.appendChild(dec); g.appendChild(lab); g.appendChild(inc);
      return g;
    }
    var angleStepper = stepperGroup('각도', function(){ st.theta = (st.theta - 5 + 180) % 180; STATE.save(); refreshAll(); }, function(){ st.theta = (st.theta + 5) % 180; STATE.save(); refreshAll(); });
    var offsetStepper = stepperGroup('위치', function(){ st.offset = Math.max(-0.95, +(st.offset - 0.05).toFixed(2)); STATE.save(); refreshAll(); }, function(){ st.offset = Math.min(0.95, +(st.offset + 0.05).toFixed(2)); STATE.save(); refreshAll(); });
    controls.appendChild(angleStepper);
    controls.appendChild(offsetStepper);
    panelArea.appendChild(controls);
    panelArea.appendChild(el('p', {class:'muted', style:{fontSize:'13px'}}, '캔버스에 포커스한 뒤 ← →로 각도, ↑ ↓로 위치를 조절할 수도 있어요.'));

    var checkBtn = el('button', {type:'button', class:'btn btn-primary', style:{marginTop:'6px'}}, '분리 확인');
    panelArea.appendChild(checkBtn);
    var feedback = el('div', {class:'mascot-bubble', style:{marginTop:'10px'}, 'aria-live':'polite'}, '직선을 움직여서 파란 점과 빨간 점을 나눠 보세요.');
    panelArea.appendChild(feedback);

    layout.appendChild(boardArea);
    layout.appendChild(panelArea);
    wrap.appendChild(layout);
    container.appendChild(wrap);

    function labelsFor(){ return SEP_POINTS.map(function(p){ return GATE_FN[op]([p[0], p[1]]); }); }
    function toPixel(x,y){
      var margin = 40, scale = cssW - margin*2;
      return {x: margin + x*scale, y: cssH - margin - y*scale};
    }
    function drawPlane(){
      ctx.clearRect(0,0,cssW,cssH);
      ctx.save();
      ctx.strokeStyle = '#c9c2ac'; ctx.lineWidth = 1.5;
      var o = toPixel(-0.15,0), xEnd = toPixel(1.2,0), yStart = toPixel(0,-0.15), yEnd = toPixel(0,1.2);
      ctx.beginPath(); ctx.moveTo(o.x,o.y); ctx.lineTo(xEnd.x,xEnd.y); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(yStart.x,yStart.y); ctx.lineTo(yEnd.x,yEnd.y); ctx.stroke();
      ctx.fillStyle = '#6a6a6a'; ctx.font = "600 12px 'Inter','Malgun Gothic',sans-serif";
      ctx.fillText('A', xEnd.x-8, xEnd.y+16);
      ctx.fillText('B', yEnd.x-16, yEnd.y+6);
      ctx.restore();

      var theta = st.theta * Math.PI/180;
      var nx = -Math.sin(theta), ny = Math.cos(theta);
      var px0 = 0.5 + st.offset*nx, py0 = 0.5 + st.offset*ny;
      var dx = Math.cos(theta), dy = Math.sin(theta);
      var p1 = toPixel(px0-dx*1.5, py0-dy*1.5);
      var p2 = toPixel(px0+dx*1.5, py0+dy*1.5);
      ctx.save();
      ctx.strokeStyle = '#2f6df0'; ctx.lineWidth = 3;
      ctx.beginPath(); ctx.moveTo(p1.x,p1.y); ctx.lineTo(p2.x,p2.y); ctx.stroke();
      ctx.restore();

      var labels = labelsFor();
      SEP_POINTS.forEach(function(p, i){
        var px = toPixel(p[0], p[1]);
        var lab = labels[i];
        ctx.save();
        ctx.beginPath(); ctx.arc(px.x, px.y, 15, 0, Math.PI*2);
        ctx.fillStyle = lab===1 ? '#2f6df0' : '#e5484d';
        ctx.fill();
        ctx.lineWidth = 2; ctx.strokeStyle = '#ffffff'; ctx.stroke();
        ctx.fillStyle = '#ffffff'; ctx.font = "800 13px 'Inter',sans-serif"; ctx.textAlign='center'; ctx.textBaseline='middle';
        ctx.fillText(String(lab), px.x, px.y+1);
        ctx.restore();
        ctx.save();
        ctx.fillStyle = '#3a3a3a'; ctx.font = "500 11px 'Inter','Malgun Gothic',sans-serif"; ctx.textAlign='center';
        ctx.fillText('(' + p[0] + ',' + p[1] + ')', px.x, px.y-22);
        ctx.restore();
      });
    }
    function refreshStatus(){
      statusHost.innerHTML = '';
      var done = st.achieved[op];
      var opLabel = op + (op==='XOR' ? ' 시도' : ' 분리');
      statusHost.appendChild(el('span', {class:'chip' + (done?' active':'')}, opLabel + (done?' ✓':'')));
      if(op==='XOR' && st.tries.XOR.length){
        statusHost.appendChild(el('span', {class:'chip'}, '실패 ' + st.tries.XOR.length + '/3'));
      }
      angleStepper.querySelector('.stepper-label').textContent = '각도 ' + st.theta + '°';
      offsetStepper.querySelector('.stepper-label').textContent = '위치 ' + st.offset.toFixed(2);
    }
    function refreshAll(){ drawPlane(); refreshStatus(); if(opts.onChange) opts.onChange(); }

    checkBtn.addEventListener('click', function(){
      var lp = lineParams(st.theta, st.offset);
      var labels = labelsFor();
      var ok = checkSeparation(lp.a, lp.b, lp.c, SEP_POINTS, labels);
      if(op === 'XOR'){
        /* F3: XOR은 수학적으로 항상 분리 실패 — 매 클릭이 "실패 시도"다. {theta,offset} 기록
           (연산별 최근 8개, 중복 제거) → C4 게이트(시도 N=3 미만이면 달성 플래그 안 섬). */
        var wasAchieved = st.achieved.XOR;
        recordSepFail(st, 'XOR', st.theta, st.offset);
        var n = st.tries.XOR.length;
        if(!wasAchieved && xorSepDone(n, 3)) st.achieved.XOR = true;
        STATE.save();
        FX.shake(canvasWrap);
        feedback.textContent = st.achieved.XOR
          ? '어? 안 나뉘네... 이제 왜 그런지 살펴볼게요.'
          : ('어? 안 나뉘네요 (' + n + '/3번째 시도). 다른 각도·위치로 더 시도해 보세요.');
        feedback.className = 'mascot-bubble';
        refreshAll();
        if(!wasAchieved && st.achieved.XOR && opts.onAchieved) opts.onAchieved();
        return;
      }
      if(ok){
        var already = st.achieved[op];
        st.achieved[op] = true; STATE.save();
        FX.pop(canvasWrap);
        feedback.textContent = op + ' 분리 성공! 직선 하나로 잘 나뉘었어요.';
        feedback.className = 'mascot-bubble tone-cheer';
        refreshAll();
        if(!already && opts.onAchieved) opts.onAchieved();
      } else {
        /* LG3-08: F3 기록 스키마(tries={AND:[],OR:[],XOR:[]})는 연산별인데 XOR 분기만 기록해
           AND/OR가 죽은 필드였다. 소비처는 여전히 XOR뿐이지만 명세 문면(연산별 최근 8개)과
           맞춘다 — 상한·중복 제거는 recordSepFail이 그대로 처리. */
        recordSepFail(st, op, st.theta, st.offset);
        STATE.save();
        FX.shake(canvasWrap);
        feedback.textContent = '아직이에요. 각도와 위치를 조절해서 다시 시도해 보세요.';
        feedback.className = 'mascot-bubble';
        refreshAll();
      }
    });
    canvas.addEventListener('keydown', function(e){
      if(e.key === 'ArrowRight'){ e.preventDefault(); st.theta = (st.theta+5)%180; STATE.save(); refreshAll(); }
      else if(e.key === 'ArrowLeft'){ e.preventDefault(); st.theta = (st.theta-5+180)%180; STATE.save(); refreshAll(); }
      else if(e.key === 'ArrowUp'){ e.preventDefault(); st.offset = Math.min(0.95, +(st.offset+0.05).toFixed(2)); STATE.save(); refreshAll(); }
      else if(e.key === 'ArrowDown'){ e.preventDefault(); st.offset = Math.max(-0.95, +(st.offset-0.05).toFixed(2)); STATE.save(); refreshAll(); }
    });

    refreshAll();
    if(opts.popOnMount) FX.pop(canvasWrap); /* step3(OR) 진입 시 점 색 전환을 짧은 모션으로 강조 */
  },
  /* F3 XOR 설명 슬라이드: 실패한 시도들을 회색 반투명으로 재등장 + 마지막 시도 직선의
     위반 점(색이 틀린 쪽에 남은 점, separationReport 기반) 하이라이트. 정적(조작 없음). */
  renderExplanation: function(container, st){
    var wrap = el('div', {class:'sep-wrap'});
    var canvasWrap = el('div', {class:'sandbox-canvas-wrap', style:{maxWidth:'300px'}});
    var canvas = el('canvas', {'aria-label':'학생이 시도한 직선들과 XOR 네 점'});
    canvasWrap.appendChild(canvas);
    wrap.appendChild(canvasWrap);
    var cssW = 300, cssH = 300;
    var ctx = setupCanvasHiDPI(canvas, cssW, cssH);
    function toPixel(x,y){ var margin=40, scale=cssW-margin*2; return {x:margin+x*scale, y:cssH-margin-y*scale}; }
    function segFor(theta, offset){
      var t = theta*Math.PI/180;
      var nx=-Math.sin(t), ny=Math.cos(t);
      var px0=0.5+offset*nx, py0=0.5+offset*ny;
      var dx=Math.cos(t), dy=Math.sin(t);
      return [toPixel(px0-dx*1.5, py0-dy*1.5), toPixel(px0+dx*1.5, py0+dy*1.5)];
    }
    var labels = SEP_POINTS.map(function(p){ return GATE_FN.XOR([p[0], p[1]]); });
    var lastLp = lineParams(st.theta, st.offset);
    var report = separationReport(lastLp.a, lastLp.b, lastLp.c, labels);

    ctx.clearRect(0,0,cssW,cssH);
    ctx.save(); ctx.strokeStyle='#c9c2ac'; ctx.lineWidth=1.5;
    var o=toPixel(-0.15,0), xEnd=toPixel(1.2,0), yStart=toPixel(0,-0.15), yEnd=toPixel(0,1.2);
    ctx.beginPath(); ctx.moveTo(o.x,o.y); ctx.lineTo(xEnd.x,xEnd.y); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(yStart.x,yStart.y); ctx.lineTo(yEnd.x,yEnd.y); ctx.stroke();
    ctx.restore();

    st.tries.XOR.forEach(function(t){
      var seg = segFor(t.theta, t.offset);
      ctx.save(); ctx.strokeStyle='rgba(10,10,10,.18)'; ctx.lineWidth=2;
      ctx.beginPath(); ctx.moveTo(seg[0].x,seg[0].y); ctx.lineTo(seg[1].x,seg[1].y); ctx.stroke();
      ctx.restore();
    });
    var lastSeg = segFor(st.theta, st.offset);
    ctx.save(); ctx.strokeStyle='#2f6df0'; ctx.lineWidth=3;
    ctx.beginPath(); ctx.moveTo(lastSeg[0].x,lastSeg[0].y); ctx.lineTo(lastSeg[1].x,lastSeg[1].y); ctx.stroke();
    ctx.restore();

    SEP_POINTS.forEach(function(p, i){
      var px = toPixel(p[0], p[1]);
      var lab = labels[i];
      var isViolation = report.violations.indexOf(i) >= 0;
      if(isViolation){
        ctx.save();
        ctx.beginPath(); ctx.arc(px.x,px.y,21,0,Math.PI*2);
        ctx.strokeStyle='#0a0a0a'; ctx.lineWidth=2; ctx.setLineDash([3,3]); ctx.stroke(); ctx.setLineDash([]);
        ctx.restore();
      }
      ctx.save();
      ctx.beginPath(); ctx.arc(px.x,px.y,15,0,Math.PI*2);
      ctx.fillStyle = lab===1?'#2f6df0':'#e5484d'; ctx.fill();
      ctx.lineWidth=2; ctx.strokeStyle='#ffffff'; ctx.stroke();
      ctx.fillStyle='#ffffff'; ctx.font="800 13px 'Inter',sans-serif"; ctx.textAlign='center'; ctx.textBaseline='middle';
      ctx.fillText(String(lab), px.x, px.y+1);
      ctx.restore();
    });

    var noteText;
    if(report.violations.length){
      var ptStrs = report.violations.map(function(i){ return '(' + SEP_POINTS[i][0] + ',' + SEP_POINTS[i][1] + ')'; });
      noteText = '이 직선은 ' + ptStrs.join(', ') + '이(가) 잘못된 색 쪽에 남았어요. 어떤 직선을 그어도 네 점을 색대로 가를 수 없어요.';
    } else {
      noteText = '어떤 직선을 그어도 네 점을 색대로 가를 수 없어요.';
    }
    wrap.appendChild(el('div', {class:'sep-fail-note', 'aria-live':'polite'}, noteText));
    container.appendChild(wrap);
  }
};

/* step1(설명) 미리보기용: 조작 없는 정적 좌표평면(점 색만 표시). LG3-06: L10 step1이 진리표
   행과 대응 점을 하이라이트로 잇도록 setHighlight(idx|null)를 반환한다 — SEP_POINTS와
   TRUTH.rows(2)는 같은 순서([0,0],[0,1],[1,0],[1,1])라 인덱스가 그대로 대응한다. */
function renderStaticLabeledPlane(container, gateFn){

  var highlightIdx = null;
  function draw(){
    ctx.clearRect(0,0,cssW,cssH);
    ctx.save(); ctx.strokeStyle='#c9c2ac'; ctx.lineWidth=1.5;
    var o=toPixel(-0.15,0), xEnd=toPixel(1.2,0), yStart=toPixel(0,-0.15), yEnd=toPixel(0,1.2);
    ctx.beginPath(); ctx.moveTo(o.x,o.y); ctx.lineTo(xEnd.x,xEnd.y); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(yStart.x,yStart.y); ctx.lineTo(yEnd.x,yEnd.y); ctx.stroke();
    ctx.fillStyle='#6a6a6a'; ctx.font="600 11px 'Inter','Malgun Gothic',sans-serif";
    ctx.fillText('A', xEnd.x-8, xEnd.y+14);
    ctx.fillText('B', yEnd.x-14, yEnd.y+6);
    ctx.restore();
    SEP_POINTS.forEach(function(p, i){
      var lab = gateFn([p[0], p[1]]);
      var px = toPixel(p[0], p[1]);
      if(i === highlightIdx){
        ctx.save();
        ctx.beginPath(); ctx.arc(px.x,px.y,20,0,Math.PI*2);
        ctx.strokeStyle='#0a0a0a'; ctx.lineWidth=2.5; ctx.setLineDash([4,3]); ctx.stroke(); ctx.setLineDash([]);
        ctx.restore();
      }
      ctx.save();
      ctx.beginPath(); ctx.arc(px.x,px.y,14,0,Math.PI*2);
      ctx.fillStyle = lab===1?'#2f6df0':'#e5484d'; ctx.fill();
      ctx.lineWidth=2; ctx.strokeStyle='#ffffff'; ctx.stroke();
      ctx.fillStyle='#ffffff'; ctx.font="800 12px 'Inter',sans-serif"; ctx.textAlign='center'; ctx.textBaseline='middle';
      ctx.fillText(String(lab), px.x, px.y+1);
      ctx.restore();

      ctx.fillText('(' + p[0] + ',' + p[1] + ')', px.x, px.y-20);

/* ============================================================
   12) LOGIC — 순수 함수 (검증 대상), window.__LOGIC 노출
   ============================================================ */
var SEP_POINTS = [[0,0],[0,1],[1,0],[1,1]];

function lineParams(thetaDeg, offset){
  var theta = thetaDeg * Math.PI/180;
  var a = -Math.sin(theta);
  var b = Math.cos(theta);
  var c = Math.sin(theta)*0.5 - Math.cos(theta)*0.5 - offset;
  return {a:a, b:b, c:c};
}

function checkSeparation(a,b,c,points,labels){
  var eps = 1e-9;
  var posLabel = null, negLabel = null;
  for(var i=0;i<points.length;i++){
    var x = points[i][0], y = points[i][1];
    var s = a*x + b*y + c;
    if(Math.abs(s) < eps) return false;
    var lab = labels[i];
    if(s > 0){ if(posLabel===null) posLabel=lab; else if(posLabel!==lab) return false; }
    else { if(negLabel===null) negLabel=lab; else if(negLabel!==lab) return false; }
  }
  return posLabel!=null && negLabel!=null && posLabel!==negLabel;
}

function isSeparable(labels){
  for(var ti=0; ti<180; ti+=1){
    for(var oi=-100; oi<=100; oi+=2){
      var off = oi/100;
      var lp = lineParams(ti, off);
      if(checkSeparation(lp.a, lp.b, lp.c, SEP_POINTS, labels)) return {a:lp.a,b:lp.b,c:lp.c,theta:ti,offset:off};
    }
  }
  return null;
}

/* separationReport (9.8, F3 SSOT): verify_halfadder_sepreport.py의 separation_report와 동일 구현
   — 두 방향 배정(양수 쪽=라벨1 / 양수 쪽=라벨0) 중 위반이 적은 쪽을 채택. 위반 = 배정과 다른
   쪽의 점 + 직선 위(경계)의 점. checkSeparation(불리언 판정)은 그대로 두고, 이 함수는 그 위에
   "왜 실패했는지"(위반 점 목록)를 얹은 리포트를 만든다 — lineParams·checkSeparation 무변경. */
function separationReport(a,b,c,labels){
  var eps = 1e-9;
  var sides = [];
  for(var i=0;i<SEP_POINTS.length;i++){
    var x = SEP_POINTS[i][0], y = SEP_POINTS[i][1];
    var s = a*x + b*y + c;
    sides.push(Math.abs(s) < eps ? 0 : (s > 0 ? 1 : -1));
  }
  var best = null;
  [1,-1].forEach(function(oneSide){
    var vio = [];
    for(var i=0;i<sides.length;i++){
      var sd = sides[i], lab = labels[i];
      if(sd === 0 || sd !== (lab === 1 ? oneSide : -oneSide)) vio.push(i);
    }
    if(best === null || vio.length < best.length) best = vio;
  });
  return {separated: best.length === 0, sides: sides, violations: best};
}

/* xorSepDone (C4): XOR "달성"(=설명 슬라이드 해금) 플래그는 실패 시도가 N회(기본 3) 미만이면
   서지 않는다 — 순수 함수라 시도 배열 없이도 게이트 조건만 검사할 수 있다. */
function xorSepDone(failCount, N){ return failCount >= (N==null ? 3 : N); }

/* F3: 실패 시도 {theta,offset} 기록 — 연산별 최근 8개 상한, 동일 (theta,offset) 중복 저장 안 함. */
function recordSepFail(st, op, theta, offset){
  var arr = st.tries[op];
  var exists = arr.some(function(t){ return t.theta===theta && t.offset===offset; });
  if(!exists){
    arr.push({theta:theta, offset:offset});
    if(arr.length > 8) arr.shift();
  }
}

/* 회로 → 식 유도 (9.5): IN→라벨, OUT→자식, NOT(x)→'NOT x', AND/OR/XOR(x,y)→'(x OP y)', NAND/NOR→'NOT (x OP y)' */
function deriveExpr(circuit){
  var byId = {}; circuit.nodes.forEach(function(n){ byId[n.id]=n; });
  function go(nodeId){
    if(nodeId == null) return '?';
    var n = byId[nodeId];
    if(n.type === 'IN') return n.id;
    if(n.type === 'OUT') return n.inputs[0]!=null ? go(n.inputs[0]) : '?';
    var ins = n.inputs;
    if(n.type === 'NOT'){
      var x = ins[0]!=null ? go(ins[0]) : '?';
      return 'NOT ' + x;
    }
    var l = ins[0]!=null ? go(ins[0]) : '?';
    var r = ins.length>1 && ins[1]!=null ? go(ins[1]) : '?';
    if(n.type === 'AND') return '(' + l + ' AND ' + r + ')';
    if(n.type === 'OR')  return '(' + l + ' OR ' + r + ')';
    if(n.type === 'XOR') return '(' + l + ' XOR ' + r + ')';
    if(n.type === 'NAND') return 'NOT (' + l + ' AND ' + r + ')';
    if(n.type === 'NOR')  return 'NOT (' + l + ' OR ' + r + ')';
    return '?';
  }
  var raw = go(circuit.output);
  return rootStrip(raw);
}
function rootStrip(expr){
  if(expr.charAt(0) === '(' && expr.charAt(expr.length-1) === ')'){
    var depth = 0;
    for(var i=0;i<expr.length;i++){
      if(expr[i] === '(') depth++;
      else if(expr[i] === ')'){ depth--; if(depth===0 && i !== expr.length-1) return expr; }
    }
    return expr.slice(1,-1);
  }
  return expr;
}
function exprHasHole(expr){ return expr.indexOf('?') >= 0; }

/* 식 → 진리표 컴파일 (9.5): 재귀하강 파서 (괄호로 우선순위 명시, 정의역: AND/OR/XOR/NOT/라벨) */
function tokenize(str){
  return str.replace(/\(/g,' ( ').replace(/\)/g,' ) ').trim().split(/\s+/).filter(Boolean);
}
function parseExprAST(str){
  var toks = tokenize(str);
  var pos = 0;
  function peek(){ return toks[pos]; }
  function next(){ return toks[pos++]; }
  function parseExprLv(){
    var left = parseNot();
    var p = peek();
    if(p==='AND' || p==='OR' || p==='XOR'){
      var op = next();
      var right = parseNot();
      return {op:op, l:left, r:right};
    }
    return left;
  }
  function parseNot(){
    if(peek() === 'NOT'){ next(); var x = parsePrimary(); return {op:'NOT', x:x}; }
    return parsePrimary();
  }
  function parsePrimary(){
    var t = next();
    if(t === '('){
      var e = parseExprLv();
      next(); /* ')' */
      return e;
    }
    return {op:'VAR', name:t};
  }
  return parseExprLv();
}
function evalAST(ast, env){
  if(ast.op === 'VAR') return env[ast.name];
  if(ast.op === 'NOT') return GATE_FN.NOT([evalAST(ast.x, env)]);
  if(ast.op === 'AND') return GATE_FN.AND([evalAST(ast.l, env), evalAST(ast.r, env)]);
  if(ast.op === 'OR')  return GATE_FN.OR([evalAST(ast.l, env), evalAST(ast.r, env)]);
  if(ast.op === 'XOR') return GATE_FN.XOR([evalAST(ast.l, env), evalAST(ast.r, env)]);
  throw new Error('bad ast');
}
function compileExprToTable(exprStr, inputIds){
  var ast = parseExprAST(exprStr);
  var rows = TRUTH.rows(inputIds.length);
  return rows.map(function(bits){
    var env = {}; inputIds.forEach(function(id,i){ env[id]=bits[i]; });
    return {bits:bits, out: evalAST(ast, env)};
  });
}
function tablesEqual(t1, t2){
  if(t1.length !== t2.length) return false;
  for(var i=0;i<t1.length;i++){ if(t1[i].out !== t2[i].out) return false; }
  return true;
}

/* 화면 표시용: 단어(AND/OR/NOT/XOR) ↔ 기호(∧∨¬⊕) 토글 (표시 전용, 내부 캐노니컬 문자열은 항상 단어형) */
function renderExprDisplay(exprStr, symbolic){
  if(!symbolic) return exprStr;
  return exprStr
    .replace(/\bAND\b/g, '∧').replace(/\bOR\b/g, '∨').replace(/\bXOR\b/g, '⊕')
    .replace(/NOT\s+/g, '¬');
}

var LOGIC = {
  evaluate: CIRCUIT.evaluate,
  truthTable: CIRCUIT.truthTable,
  enumerateRows: TRUTH.rows,
  tablesEqual: tablesEqual,
  matchTable: tablesEqual,
  checkSeparation: checkSeparation,
  lineParams: lineParams,
  isSeparable: isSeparable,
  deriveExpr: deriveExpr,
  compileExpr: compileExprToTable,
  mkCircuit: mkCircuit,
  gates: GATE_FN
};

window.__LOGIC = {
  gateEvaluate: function(type, inputs){ return GATE_FN[type](inputs); },
  circuitEvaluate: function(circuit, switchVals){ return CIRCUIT.evaluate(circuit, switchVals); },
  truthTable: function(circuit){ return CIRCUIT.truthTable(circuit); },
  enumerateRows: function(k){ return TRUTH.rows(k); },
  matchTruthTable: function(t1, t2){ return tablesEqual(t1, t2); },
  isSeparable: function(labels){ return isSeparable(labels); },
  checkSeparation: function(a,b,c,labels){ return checkSeparation(a,b,c,SEP_POINTS,labels); },
  separationReport: function(a,b,c,labels){ return separationReport(a,b,c,labels); },
  xorSepDone: function(failCount, N){ return xorSepDone(failCount, N); },
  deriveExpr: function(circuit){ return deriveExpr(circuit); },
  compileExpr: function(exprStr, inputIds){ return compileExprToTable(exprStr, inputIds); },
  mkCircuit: mkCircuit,
  GATE_FN: GATE_FN,
  /* G2-C 노출(개정 §3 G2-C, verify_logic.py C2~C5 기대 인터페이스 그대로) */
  layoutCases: function(){ return layoutCases(); },
  stageDefs: function(){ return stageDefs(); },
  gradeCircuit: function(circuit){ return gradeCircuit(circuit); },
  wouldCreateCycle: function(circuit, edge){ return wouldCreateCycle(circuit, edge); },
  halfAdderTable: function(){ return halfAdderTable(); }
};

/* L11_XOR_SOLVED: L9의 "정답 예시" 다층 회로(OR·AND·NOT·AND, XOR과 진리표 동치) — L9 stageDefs()의
   answerCircuit(팔레트=AND/OR/NOT만 써야 하므로 targetCircuit의 단일 XOR 게이트는 쓸 수 없다)과
   L11 step2(다층 회로 재등장) 양쪽이 공유하는 단일 정의(SSOT). L11_MINI_AND는 L11 step1·F2
   보너스 슬라이드가 공유하는 AND(A,B) 미니 회로. */
var L11_MINI_AND = mkCircuit(['A','B'], [{id:'G1', type:'AND', inputs:['A','B']}], 'G1');
var L11_XOR_SOLVED = mkCircuit(['A','B'], [
  {id:'S1', type:'OR', inputs:['A','B']},
  {id:'S2', type:'AND', inputs:['A','B']},
  {id:'S3', type:'NOT', inputs:['S2']},
  {id:'S4', type:'AND', inputs:['S1','S3']}
], 'S4');

var L9_STAGE = {
  id:'xor-1', inputs:['A','B'], palette:['AND','OR','NOT'], nodeCap:6,
  targetCircuit: mkCircuit(['A','B'], [{id:'TX', type:'XOR', inputs:['A','B']}], 'TX'),
  answerCircuit: L11_XOR_SOLVED
};

/* stageDefs (C3 노출 대상): L6·L9 새 조작 모델 게이트가 검사하는 스테이지 메타데이터.
   answerCircuit은 팔레트 게이트만으로 목표 진리표를 만드는 정답 예시 회로 — 2-1~3-2는
   targetCircuit이 이미 그 조건(팔레트 안 게이트만 사용)을 만족해 그대로 겸용하고, L9만
   targetCircuit이 팔레트 밖 XOR 게이트라 별도 answerCircuit(L11_XOR_SOLVED)을 쓴다. */
function stageDefs(){
  return L6_TABLE_STAGES.concat(L6_EXPR_STAGES).map(function(s){
    return {id:s.id, palette:s.palette.slice(), nodeCap:s.nodeCap, answerCircuit:s.targetCircuit};
  }).concat([{id:'L9', palette:L9_STAGE.palette.slice(), nodeCap:L9_STAGE.nodeCap, answerCircuit:L9_STAGE.answerCircuit}]);
}

/* layoutCases (C2 노출 대상): L9 v1의 "동일 좌표 완전 겹침" 결함 재발 방지 게이트가 검사하는
   배치 사례 전수. "목표" = 그 회로가 (혹시 자동배치로 그려지더라도) CIRCUIT.layout() 결과가
   겹치지 않는지, "초기" = L6·L9 PUZZLE 보드가 학생에게 처음 보여주는 배치(게이트 없음, 입력·
   출력만)가 겹치지 않는지. */
function layoutCases(){
  var cases = [];
  [
    {name:'L2 미니회로', inputs:['A','B'], type:'AND'},
    {name:'L3 미니회로', inputs:['A','B'], type:'OR'},
    {name:'L4 미니회로', inputs:['A'], type:'NOT'},
    {name:'L8 미니회로', inputs:['A','B'], type:'XOR'}
  ].forEach(function(d){
    var c = mkCircuit(d.inputs, [{id:'G1', type:d.type, inputs:d.inputs.slice()}], 'G1');
    cases.push(layoutCaseFromCircuit(d.name, c, CB_IN_H));
  });
  L5_STAGES.forEach(function(s){ cases.push(layoutCaseFromCircuit('L5 ' + s.id, s.circuit, CB_IN_H)); });
  L6_TABLE_STAGES.concat(L6_EXPR_STAGES).forEach(function(s){
    cases.push(layoutCaseFromCircuit('L6 ' + s.id + ' 목표', s.targetCircuit, CB_IN_H));
    cases.push({name:'L6 ' + s.id + ' 초기', nodeSize:SBOX_H,
      nodes: initPuzzleNodes(s.inputs).map(function(n){ return {id:n.id, x:n.x, y:n.y}; })});
  });
  cases.push(layoutCaseFromCircuit('L9 목표', L9_STAGE.targetCircuit, CB_IN_H));
  cases.push({name:'L9 초기', nodeSize:SBOX_H,
    nodes: initPuzzleNodes(L9_STAGE.inputs).map(function(n){ return {id:n.id, x:n.x, y:n.y}; })});
  cases.push(layoutCaseFromCircuit('L11 예시1', L11_MINI_AND, CB_IN_H));
  cases.push(layoutCaseFromCircuit('L11 예시2', L11_XOR_SOLVED, CB_IN_H));
  return cases;
}

function renderStageSelect(container, stageList, progressMap, onSelect){
  var box = el('div', {class:'stage-select'});
  var grid = el('div', {class:'stage-grid'});
  stageList.forEach(function(s, idx){
    var prog = progressMap[s.id];
    var locked = idx > 0 && !progressMap[stageList[idx-1].id].cleared;
    var tile = el('button', {
      type:'button',
      class:'stage-tile' + (prog.cleared ? ' cleared' : '') + (locked ? ' locked' : ''),
      disabled: locked ? true : undefined,
      'aria-label':'스테이지 ' + s.id + (locked ? ' 잠김' : (prog.cleared ? ' 완료' : ' 도전 가능'))
    });
    tile.appendChild(el('span', {class:'stage-id'}, s.id));
    var starsText = locked ? '잠김' : (prog.cleared ? ('★'.repeat(prog.stars||1) + '☆'.repeat(3-(prog.stars||1))) : '도전');
    tile.appendChild(el('span', {class:'stars'}, starsText));
    if(!locked){ tile.addEventListener('click', function(){ onSelect(s.id); }); }
    grid.appendChild(tile);
  });
  box.appendChild(grid);
  container.appendChild(box);
}

/* L2·L3·L4·L8 공용 진리표 채우기+채점 패널(AC-9 병합 step2 우측): 구 buildSwitchGateBody에서
   관찰용 renderCircuitBoard 보드를 뗀 것 — 그 자리는 같은 화면 왼쪽의 PLUG_render 끼우기
   캔버스가 대신한다(보드는 하나만, 학생이 배선·토글로 관찰하며 바로 옆 표를 채운다). */
function renderTruthFillPanel(host, cfg){
  var inputIds = cfg.switches.map(function(s){ return s.id; });
  var circuit = mkCircuit(inputIds, [{id:'G1', type:cfg.gateType, inputs:inputIds.slice()}], 'G1');
  host.appendChild(el('h3', {}, '진리표를 채워 보세요'));
  var answerFn = function(bits){
    var sw = {}; inputIds.forEach(function(id,i){ sw[id]=bits[i]; });
    return CIRCUIT.evaluate(circuit, sw).G1;
  };
  var fillApi = TRUTH.renderFillTable(host, inputIds, cfg.st.fill, answerFn);
  var checkBtn = el('button', {type:'button', class:'btn btn-primary'}, '채점하기');
  var resultMsg = el('p', {class:'muted', style:{minHeight:'20px'}, 'aria-live':'polite'}, cfg.st.done ? '정확해요! 모두 맞혔어요.' : '');
  host.appendChild(checkBtn);
  host.appendChild(resultMsg);
  checkBtn.addEventListener('click', function(){
    cfg.st.attempts = (cfg.st.attempts||0) + 1;
    /* F1(L3 OR 오개념): (1,1)행이 오답이면 전용 피드백. cfg.orMisconception이 true인 화면만 대상. */
    var sawWrong11 = false;
    var ok = fillApi.check(cfg.orMisconception ? function(bits){
      if(bits.length===2 && bits[0]===1 && bits[1]===1) sawWrong11 = true;
    } : undefined);
    STATE.save();
    if(ok){
      cfg.st.done = true;
      STATE.save();
      resultMsg.textContent = '정확해요! 모두 맞혔어요.';
      if(cfg.onPass) cfg.onPass();
      refreshNav();
    } else if(sawWrong11){
      resultMsg.textContent = '둘 다 있어도 간식은 먹죠! 수학의 OR은 하나 이상이면 1이에요.';
    } else {
      resultMsg.textContent = '틀린 칸이 있어요(빨간 줄). 다시 채워 보세요.';
    }
  });
}

function buildL1(){
  /* 1뷰포트 실측(2026-07-19, 검토_공통심사_v1/1뷰포트_실측_2026-07-19.md)에서 pane 내부 스크롤
     388px 확인 — 문항 4개+생각칸 세로 스택이 원인. 문항별 서브 슬라이드(step1~4=문항 1개,
     step5=정리)로 분해해 해소한다. eyebrow·제목은 모든 step에서 동일(콘텐츠 무변경, 구조만 분해). */
  var EYEBROW = '섹션1 · 논리 연산이란?';
  var TITLE = 'L1. 참·거짓을 0/1로';
  function headerBlock(s){
    s.appendChild(el('div', {class:'screen-eyebrow'}, EYEBROW));
    s.appendChild(el('h2', {class:'screen-title'}, TITLE));
  }
  function renderConditionCard(host, c, st){
    host.innerHTML = '';
    var row = el('div', {class:'card-hairline', style:{marginBottom:'10px'}});
    row.appendChild(el('p', {style:{margin:'0 0 8px', fontWeight:'600', fontSize:'18px'}}, el('span', {'data-katex':c.tex})));
    row.appendChild(Components.Chips({
      items: [
        {key:'t', label:'참 (1)', tone:'true', active: st.judged[c.id] === true},
        {key:'f', label:'거짓 (0)', tone:'false', active: st.judged[c.id] === false}
      ],
      onToggle: function(key){
        st.judged[c.id] = (key === 't');
        STATE.save();
        renderConditionCard(host, c, st);
        renderMath(host); /* 재렌더 후 새 data-katex 노드에 다시 그리기(초기 마운트분은 mountCurrentView가 처리) */
        refreshNav();
      }
    }));
    host.appendChild(row);
  }
  function conditionStep(i){
    var c = L1_CONDITIONS[i];
    return {
      mount: function(root){
        var st = STATE.screen('L1');
        var s = el('section', {class:'screen'});
        headerBlock(s);
        if(i === 0){
          s.appendChild(el('div', {class:'screen-prompt'}, [
            el('span', {'data-katex':'3 + 4 = 7'}),
            '은 참일까요, 거짓일까요?'
          ]));
          MASCOT.bubble(s, '아래 수학 문장들을 하나씩 읽고 참인지 거짓인지 골라보세요.');
        }
        var host = el('div', {class:'screen-block'});
        s.appendChild(host);
        renderConditionCard(host, c, st);
        root.appendChild(s);
      },
      isComplete: function(){ return STATE.screen('L1').judged[c.id] !== null; }
    };
  }
  return {
    steps: [
      conditionStep(0), conditionStep(1), conditionStep(2), conditionStep(3),
      { /* step5: 정리 */
        mount: function(root){
          var s = el('section', {class:'screen'});
          headerBlock(s);
          var summaryHost = el('div', {class:'screen-block'});
          s.appendChild(summaryHost);
          summaryHost.appendChild(el('p', {}, '컴퓨터는 참을 1, 거짓을 0으로 다뤄요.'));
          summaryHost.appendChild(Components.Highlight([
            {label:'참 = 1', tone:'true'},
            {label:'거짓 = 0', tone:'false'}
          ]));
          s.appendChild(Components.ThoughtBox({
            screenId:'L1', key:'thought', labelText:'참 또는 거짓인 수학 문장 하나 적기',
            placeholder:'예: 10 - 3 = 7 → 참',
            onChange: function(){ refreshNav(); }
          }));
          root.appendChild(s);
        },
        isComplete: function(){ return (STATE.screen('L1').thought||'').trim().length > 0; }
      }
    ]
  };
}

/* L2·L3·L4·L8 공용 3step 골격(AC-9 병합): ①설명 ②체험+진리표(PLUG 끼우기 캔버스로 배선·토글을
   관찰하며 같은 화면에서 진리표 채우기·채점까지) ③정리. cfg: {screenId,eyebrow,title,step1Body(s),
   mascot1,mascot2,gateType,switches,orMisconception,step4Before(s,st),step4After(s,st),
   step4IsComplete,summary} */
function buildConceptScreen(cfg){
  var switchIds = cfg.switches.map(function(sw){ return sw.id; });
  function headerBlock(s, suffix){
    s.appendChild(el('div', {class:'screen-eyebrow'}, cfg.eyebrow));
    s.appendChild(el('h2', {class:'screen-title'}, cfg.title + (suffix ? (' — ' + suffix) : '')));
  }
  return {
    steps: [
      { /* step1: 설명 */
        mount: function(root){
          var s = el('section', {class:'screen'});
          headerBlock(s, '소개');
          cfg.step1Body(s);
          if(cfg.mascot1) MASCOT.bubble(s, cfg.mascot1);
          root.appendChild(s);
        }
      },
      { /* step2(AC-9 병합): 체험(왼쪽 — 미리 놓인 게이트에 스위치 끼우고 토글) + 진리표
           채우기·채점(오른쪽, renderTruthFillPanel 이식). 보드는 끼우기 캔버스 하나뿐 —
           구 buildSwitchGateBody의 관찰용 renderCircuitBoard는 이 화면에서 쓰지 않는다. */
        mount: function(root){
          var st = STATE.screen(cfg.screenId);
          var s = el('section', {class:'screen'});
          headerBlock(s, '체험');
          if(cfg.mascot2) MASCOT.bubble(s, cfg.mascot2);
          var layout = el('div', {class:'game-layout', style:{minHeight:'300px'}});
          var boardArea = el('div', {class:'game-board-area'});
          var panelArea = el('div', {class:'game-panel-area'});
          var boardCard = el('div', {class:'card-hairline', style:{width:'100%'}});
          boardArea.appendChild(boardCard);
          var initVals = {};
          switchIds.forEach(function(id, i){ initVals[id] = i===0 ? (st.a||0) : (st.b||0); });
          PLUG_render(boardCard, {
            inputs: cfg.switches, gateType: cfg.gateType, values: initVals,
            onToggle: function(id, v){
              var idx = switchIds.indexOf(id);
              if(idx===0) st.a = v; else st.b = v;
              STATE.save();
            }
          });
          var truthHost = el('div', {class:'screen-block'});
          panelArea.appendChild(truthHost);
          renderTruthFillPanel(truthHost, {
            st: st, gateType: cfg.gateType, switches: cfg.switches,
            orMisconception: !!cfg.orMisconception
          });
          layout.appendChild(boardArea); layout.appendChild(panelArea);
          s.appendChild(layout);
          root.appendChild(s);
        },
        isComplete: function(){ return !!STATE.screen(cfg.screenId).done; }
      },
      { /* step3: 정리 */
        mount: function(root){
          var st = STATE.screen(cfg.screenId);
          var s = el('section', {class:'screen'});
          headerBlock(s, '정리');
          if(cfg.step4Before) cfg.step4Before(s, st);
          s.appendChild(Components.SummaryCard(cfg.summary));
          if(cfg.step4After) cfg.step4After(s, st);
          root.appendChild(s);
        },
        isComplete: cfg.step4IsComplete || function(){ return true; }
      }
    ]
  };
}
