    switches: [{id:'A', tag:'A', desc:'동전1이 앞면'}, {id:'B', tag:'B', desc:'동전2가 앞면'}],
    step4Before: function(s){
      /* 동전 예시는 step4(정리)로 이동(G2-B 지시) */
      s.appendChild(el('p', {class:'muted'}, '예: 동전 두 개가 서로 다른 면일 때만.'));
    },
    summary: {color:'teal', title:'정리', body:'배타적논리합 XOR: 두 입력이 다르면 1'}
  });
}

function buildL5(){
  /* 선형 자동 진행(개정 §B L5): "목록으로" 왕복 제거, 1-1부터 순서대로. 클리어 → 별+컨피티 →
     2초 후 자동 다음(+ "바로 다음" 버튼 병행) → 1-5 클리어는 "섹션 완료"(자동 전환 없음).
     재입장 시 첫 미클리어 판부터 재개. activeTimer는 buildL5() 스코프 공유 — 화면을 벗어나면
     onStepExit가, 같은 화면 안에서 재마운트되면 mount() 첫 줄이 정리한다(중복 전환 방지). */
  var activeTimer = null;
  function clearActiveTimer(){ if(activeTimer){ clearTimeout(activeTimer); activeTimer = null; } }

  return {
    gameLayout: true, /* L5도 L6과 같은 pane-game 1뷰포트(진리표는 패널 내부 스크롤) — 사용자 지시 2026-07-19 "한 눈에" */
    mount: function(root){
      clearActiveTimer();
      var st = STATE.screen('L5');
      /* 집중 모드(L6 동형): L5는 진입 즉시 스테이지 진행이므로 상시 집중형 — prompt·MASCOT 미렌더,
         제목은 compact. 탐구 안내는 채점 버튼·표가 자체 설명적이고 mascot 문구는 L5 도입부(L4 정리
         NextTease)가 대신한다. */
      var s = el('section', {class:'screen screen--focus'});
      s.appendChild(el('div', {class:'screen-eyebrow'}, '섹션2 · 진리표·회로 스테이지'));
      s.appendChild(el('h2', {class:'screen-title screen-title--compact'}, 'L5. 진리표 채우기 스테이지'));

      var body = el('div', {class:'screen-block', style:{flex:'1', minHeight:'0', display:'flex', flexDirection:'column', marginBottom:'0'}});
      s.appendChild(body);

      function firstUnclearedId(){
        for(var i=0;i<L5_STAGES.length;i++){ if(!st.stages[L5_STAGES[i].id].cleared) return L5_STAGES[i].id; }
        return L5_STAGES[L5_STAGES.length-1].id;
      }
      function renderProgressChips(container, curId){
        var row = el('div', {class:'chips-row', style:{margin:'0'}});
        L5_STAGES.forEach(function(s2){
          var prog = st.stages[s2.id];
          row.appendChild(el('span', {class:'chip' + (s2.id===curId ? ' active' : '')}, s2.id + (prog.cleared ? ' ✓' : '')));
        });
        container.appendChild(row);
      }

      function showStage(id){
        clearActiveTimer();
        body.innerHTML = '';
        var idx = -1;
        var stageDef = null;
        for(var i=0;i<L5_STAGES.length;i++){ if(L5_STAGES[i].id===id){ stageDef = L5_STAGES[i]; idx = i; break; } }
        var prog = st.stages[id];
        /* 칩 행과 "스테이지 N" 제목을 한 줄로 — 세로 압축(1뷰포트), 정보는 동일 */
        var headRow = el('div', {style:{display:'flex', alignItems:'center', gap:'10px', flexWrap:'wrap', margin:'2px 0 8px'}});
        headRow.appendChild(el('h3', {style:{margin:'0', fontSize:'16px'}}, '스테이지 ' + id));
        renderProgressChips(headRow, id);
        body.appendChild(headRow);

        /* LG3-03: 보드+진리표 세로 스택 → A1(보드+진리표 우측 병치)로. 3입력 판(8행 진리표)은
           game-panel-area 자체가 overflow-y:auto라 넘치면 패널 내부 스크롤로 받는다(A1 원칙).
           flex:1(고정 minHeight 아님)로 pane-game 체인에서 남는 공간을 전부 받는다. */
        var layout = el('div', {class:'game-layout', style:{flex:'1', minHeight:'0'}});
        var boardArea = el('div', {class:'game-board-area'});
        var panelArea = el('div', {class:'game-panel-area'});
        body.appendChild(layout);
        layout.appendChild(boardArea); layout.appendChild(panelArea);

        var switchVals = {};
        stageDef.inputs.forEach(function(inId){ switchVals[inId] = 0; });
        var boardHost = el('div', {class:'card-hairline', style:{width:'100%'}});
        boardArea.appendChild(boardHost);
        renderCircuitBoard(boardHost, stageDef.circuit, {switchVals: switchVals});

        /* 진리표만 스크롤 영역, 채점하기·메시지는 패널 하단 고정(스크롤에 가려지지 않게).
           panelArea 자체 overflow는 hidden으로 덮어 이중 스크롤을 막는다(L5 인라인 한정). */
        panelArea.style.overflow = 'hidden';
        var truthHost = el('div', {class:'screen-block', style:{flex:'1', minHeight:'0', overflowY:'auto', marginBottom:'0'}});
        panelArea.appendChild(truthHost);
        var answerFn = function(bits){
          var sw = {}; stageDef.inputs.forEach(function(id2,i){ sw[id2]=bits[i]; });
          return CIRCUIT.evaluate(stageDef.circuit, sw)[stageDef.circuit.output];
        };
        var fillApi = TRUTH.renderFillTable(truthHost, stageDef.inputs, prog.fill, answerFn);
        var checkBtn = el('button', {type:'button', class:'btn btn-primary'}, '채점하기');
        var msg = el('p', {class:'muted', 'aria-live':'polite', style:{margin:'4px 0 0'}}, prog.cleared ? ('스테이지 클리어! 별 ' + prog.stars + '개.') : '');
        var nextRow = el('div', {class:'btn-row', style:{marginTop:'4px'}});
        panelArea.appendChild(checkBtn);
        panelArea.appendChild(msg);
        panelArea.appendChild(nextRow);
        checkBtn.addEventListener('click', function(){
          prog.attempts = (prog.attempts||0) + 1;
          var ok = fillApi.check();
          if(ok && !prog.cleared){
            prog.cleared = true;
            prog.stars = prog.attempts<=1 ? 3 : (prog.attempts<=2 ? 2 : 1);
            STATE.save();
            FX.confetti(body);
            refreshNav();
            var isLast = idx === L5_STAGES.length-1;
            if(isLast){
              msg.textContent = '섹션 완료! 진리표 스테이지를 모두 통과했어요. 별 ' + prog.stars + '개.';
            } else {
              var nextId = L5_STAGES[idx+1].id;
              msg.textContent = '스테이지 클리어! 별 ' + prog.stars + '개. 2초 후 다음 스테이지로 넘어가요.';
              var goNextBtn = el('button', {type:'button', class:'btn btn-primary btn-sm'}, '바로 다음');
              goNextBtn.addEventListener('click', function(){
                clearActiveTimer(); st.activeStage = nextId; STATE.save(); showStage(nextId);
              });
              nextRow.appendChild(goNextBtn);
              activeTimer = setTimeout(function(){
                activeTimer = null;
                st.activeStage = nextId; STATE.save(); showStage(nextId);
              }, 2000);
            }
          } else if(ok){
            STATE.save();
            msg.textContent = '이미 클리어한 스테이지예요. 잘했어요!';
          } else {
            STATE.save();
            msg.textContent = '틀린 칸이 있어요(빨간 줄). 다시 채워 보세요.';
          }
        });
      }

      var currentId = firstUnclearedId();
      st.activeStage = currentId; STATE.save();
      showStage(currentId);
      root.appendChild(s);
    },
    onStepExit: function(){ clearActiveTimer(); },
    isComplete: function(){
      var st = STATE.screen('L5');
      return L5_STAGES.some(function(s2){ return st.stages[s2.id].cleared; });
    }
  };
}

function buildL6(){
  /* 개정 §3 G2-C: 팔레트·드래그·커스텀 배선·채점 버튼(PUZZLE) 모델로 교체. 트랙 구조((가)/(나))·
     스테이지 데이터·게이팅은 v1 유지. L5식 자동 진행(클리어 2초 후 다음 스테이지 + "바로 다음")을
     같은 트랙 안에서 적용한다. activeTimer는 L5와 동일 패턴(mount·onStepExit에서 정리). */
  var activeTimer = null;
  function clearActiveTimer(){ if(activeTimer){ clearTimeout(activeTimer); activeTimer = null; } }

  return {
    gameLayout: true,
    mount: function(root){
      clearActiveTimer();
      var st = STATE.screen('L6');
      if(!st.progress.boards) st.progress.boards = {};
      var s = el('section', {class:'screen'});
      /* 집중 모드(G2-D, ai-thinking S5 이식): 스테이지 진행 중(activeTrack && activeStage)엔
         상단 헤더 4블록(eyebrow·title·prompt·MASCOT)을 아예 렌더하지 않는다 — 트랙/스테이지
         선택 화면에서는 유지. L6는 ROUTER.refresh 없이 body.innerHTML만 직접 바꿔 내부 화면을
         전환하므로(showTrackMenu/showSelect/showStage), 헤더도 같은 방식으로 각 전환 시점마다
         다시 계산해 그린다 — 그래야 스테이지 진입/이탈에 맞춰 자동으로 접히고 펼쳐진다. */
      var headerHost = el('div', {});
      s.appendChild(headerHost);
      function renderHeader(){
        var playFocus = !!(st.activeTrack && st.activeStage);
        s.classList.toggle('screen--focus', playFocus);
        headerHost.innerHTML = '';
        if(playFocus) return;
        headerHost.appendChild(el('div', {class:'screen-eyebrow'}, '섹션2 · 진리표·회로 스테이지'));
        headerHost.appendChild(el('h2', {class:'screen-title'}, 'L6. 회로 만들기 스테이지'));
        headerHost.appendChild(el('div', {class:'screen-prompt'}, '게이트 팔레트에서 골라 보드에 놓고 배선하세요. (가) 목표 진리표, (나) 목표 식 — 두 가지 방식으로 도전해요.'));
        MASCOT.bubble(headerHost, '게이트를 꺼내 옮기고 연결한 뒤 채점하기를 눌러요. 목표와 똑같아지면 클리어!');
      }

      var body = el('div', {class:'screen-block', style:{flex:'1', minHeight:'0', display:'flex', flexDirection:'column', overflowY:'auto'}});
      s.appendChild(body);

      function showTrackMenu(){
        clearActiveTimer();
        renderHeader();
        body.innerHTML = '';
        var tableClearedCount = L6_TABLE_STAGES.filter(function(x){ return st.table[x.id].cleared; }).length;
        var exprClearedCount = L6_EXPR_STAGES.filter(function(x){ return st.expr[x.id].cleared; }).length;

        var trackA = el('div', {class:'card-hairline', style:{marginBottom:'12px'}});
        trackA.appendChild(el('h3', {}, '(가) 목표 진리표 — "이런 출력이 나오게 만들어 보세요."'));
        trackA.appendChild(el('p', {class:'muted'}, '완료 ' + tableClearedCount + ' / ' + L6_TABLE_STAGES.length));
        var goA = el('button', {type:'button', class:'btn btn-secondary'}, '도전하기');
        goA.addEventListener('click', function(){ st.activeTrack='table'; STATE.save(); showSelect(); });
        trackA.appendChild(goA);
        body.appendChild(trackA);

        var trackB = el('div', {class:'card-hairline'});
        trackB.appendChild(el('h3', {}, '(나) 목표 식 — "이 식에 해당하는 배선을 만들어 보세요."'));
        trackB.appendChild(el('p', {class:'muted'}, '완료 ' + exprClearedCount + ' / ' + L6_EXPR_STAGES.length));
        var goB = el('button', {type:'button', class:'btn btn-secondary'}, '도전하기');
        goB.addEventListener('click', function(){ st.activeTrack='expr'; STATE.save(); showSelect(); });
        trackB.appendChild(goB);
        body.appendChild(trackB);
      }
      function trackList(){ return st.activeTrack==='table' ? L6_TABLE_STAGES : L6_EXPR_STAGES; }
      function trackProgress(){ return st.activeTrack==='table' ? st.table : st.expr; }

      function showSelect(){
        clearActiveTimer();
        renderHeader();
        body.innerHTML = '';
        var back = el('button', {type:'button', class:'btn btn-secondary btn-sm'}, '← 종류 선택으로');
        back.addEventListener('click', function(){ st.activeTrack=null; STATE.save(); showTrackMenu(); });
        body.appendChild(back);
        renderStageSelect(body, trackList(), trackProgress(), function(id){
          st.activeStage = id; STATE.save(); showStage(id);
        });
      }

      function showStage(id){
        clearActiveTimer();
        renderHeader();
        body.innerHTML = '';
        var back = el('button', {type:'button', class:'btn btn-secondary btn-sm'}, '← 목록으로');
        back.addEventListener('click', function(){ clearActiveTimer(); st.activeStage=null; STATE.save(); showSelect(); });
        body.appendChild(back);
        var list = trackList();
        var idx = -1;
        var stageDef = null;
        for(var i=0;i<list.length;i++){ if(list[i].id===id){ stageDef=list[i]; idx=i; break; } }
        /* activeTrack·activeStage 불일치 저장분(변조·개명) 방어(LG3-10) — stageDef가 없으면
           PUZZLE.render가 undefined.inputs로 TypeError를 던지기 전에 목록으로 되돌린다. */
        if(!stageDef){ st.activeStage=null; STATE.save(); showSelect(); return; }
        var prog = trackProgress()[id];
        body.appendChild(el('h3', {style:{marginTop:'10px'}}, '스테이지 ' + id));
        var msg = el('p', {class:'muted', 'aria-live':'polite'}, prog.cleared ? '스테이지 클리어!' : '');
        var nextRow = el('div', {class:'btn-row', style:{marginTop:'6px'}});
        if(!st.progress.boards[id]) st.progress.boards[id] = {};
        PUZZLE.render(body, {
          board: st.progress.boards[id],
          inputIds: stageDef.inputs, palette: stageDef.palette, nodeCap: stageDef.nodeCap,
          targetKind: st.activeTrack==='expr' ? 'expr' : 'table',
          targetCircuit: stageDef.targetCircuit,
          exprDisplay: stageDef.exprDisplay,
          progress: prog,
          onCleared: function(){
            refreshNav();
            var isLast = idx === list.length-1;
            if(isLast){
              msg.textContent = '스테이지 클리어! 이 트랙을 모두 통과했어요.';
            } else {
              var nextId = list[idx+1].id;
              msg.textContent = '스테이지 클리어! 2초 후 다음 스테이지로 넘어가요.';
              var goNextBtn = el('button', {type:'button', class:'btn btn-primary btn-sm'}, '바로 다음');
              goNextBtn.addEventListener('click', function(){
                clearActiveTimer(); st.activeStage = nextId; STATE.save(); showStage(nextId);
              });
              nextRow.innerHTML = '';
              nextRow.appendChild(goNextBtn);
              activeTimer = setTimeout(function(){
                activeTimer = null;
                st.activeStage = nextId; STATE.save(); showStage(nextId);
              }, 2000);
            }
          }
        });
        body.appendChild(msg);
        body.appendChild(nextRow);
      }

      if(st.activeTrack && st.activeStage){ showStage(st.activeStage); }
      else if(st.activeTrack){ showSelect(); }
      else { showTrackMenu(); }
      root.appendChild(s);
    },
    onStepExit: function(){ clearActiveTimer(); },
    isComplete: function(){
      var st = STATE.screen('L6');
      var tableOk = L6_TABLE_STAGES.some(function(x){ return st.table[x.id].cleared; });
      var exprOk = L6_EXPR_STAGES.some(function(x){ return st.expr[x.id].cleared; });
      return tableOk && exprOk;
    }
  };
}

function buildL7(){
  return {
    /* gameLayout(G2-B): ROUTER가 이 화면의 pane에 .pane-game을 걸어 1뷰포트(페이지 스크롤 0)로
       만든다 — 정사각 보드+우측 진리표는 SANDBOX.render 내부의 .game-layout이 담당. */
    gameLayout: true,
    mount: function(root){
      /* 집중 모드(G2-D, ai-thinking S5 이식): L7은 진입 즉시가 곧 플레이(선택 단계 없음)라
         eyebrow·MASCOT는 아예 렌더하지 않고 제목만 compact로 줄인다. 과제 지시(prompt)
         1줄은 맥락 보존을 위해 유지한다. */
      var s = el('section', {class:'screen screen--focus'});
      s.appendChild(el('h2', {class:'screen-title screen-title--compact'}, 'L7. 자유 놀이터'));
      s.appendChild(el('div', {class:'screen-prompt'}, '배운 게이트로 마음껏 회로를 만들어 보세요. 오른쪽에 실시간 진리표, 아래에 논리식이 함께 나타나요.'));
      SANDBOX.render(s);
      root.appendChild(s);
    },
    isComplete: function(){ return true; }
  };
}

function buildL9(){
  /* 개정 §3 G2-C: L6과 같은 PUZZLE 모델(팔레트 AND·OR·NOT, XOR 금지) + F4(클리어 직후 구조화
     자기설명, 필수 게이팅) + F2(자기설명 후 반가산기 보너스 슬라이드 2장, 게이팅 없음)를 4step
     서브 슬라이드로 엮는다. activeTimer는 L6·L10과 동일 패턴 — step1의 자동 진행(2초+바로 다음)만
     쓰고, 모듈 onStepExit이 step 전환·화면 이탈 양쪽에서 정리한다. */
  var EYEBROW = '섹션3 · XOR와 인공지능';
  var activeTimer = null;
  function clearActiveTimer(){ if(activeTimer){ clearTimeout(activeTimer); activeTimer = null; } }

  return {
    gameLayout: true,
    steps: [
      { /* step1: XOR 조합 만들기 퍼즐(PUZZLE) */
        mount: function(root){
          clearActiveTimer();
          var st = STATE.screen('L9');
          if(!st.progress.boards) st.progress.boards = {};
          if(!st.progress.boards.L9) st.progress.boards.L9 = {};
          /* 집중 모드(G2-D, ai-thinking S5 이식): step1은 선택 단계 없이 진입 즉시가 플레이라
             eyebrow·MASCOT는 아예 렌더하지 않고 제목만 compact로 줄인다. 과제 지시(prompt)
             1줄은 맥락 보존을 위해 유지한다. */
          var s = el('section', {class:'screen screen--focus'});
          s.appendChild(el('h2', {class:'screen-title screen-title--compact'}, 'L9. XOR를 조합으로 만들기'));
          s.appendChild(el('div', {class:'screen-prompt'}, 'XOR을 우리가 배운 AND·OR·NOT만으로 만들 수 있을까요?'));
          var msg = el('p', {class:'muted', 'aria-live':'polite'}, st.cleared ? '한 개로는 안 되고, 여러 개를 층층이 연결했네요! 이게 다층이에요.' : '');
          var nextRow = el('div', {class:'btn-row', style:{marginTop:'6px'}});
          PUZZLE.render(s, {
            board: st.progress.boards.L9,
            inputIds: L9_STAGE.inputs, palette: L9_STAGE.palette, nodeCap: L9_STAGE.nodeCap,
            targetKind:'table', targetCircuit: L9_STAGE.targetCircuit,
            progress: st,
            onCleared: function(){
              refreshNav();
              msg.textContent = '한 개로는 안 되고, 여러 개를 층층이 연결했네요! 이게 다층이에요. 2초 후 다음으로 넘어가요.';
              var goNextBtn = el('button', {type:'button', class:'btn btn-primary btn-sm'}, '바로 다음');
              goNextBtn.addEventListener('click', function(){ clearActiveTimer(); ROUTER.next(); });
              nextRow.innerHTML = '';
              nextRow.appendChild(goNextBtn);
              activeTimer = setTimeout(function(){ activeTimer = null; ROUTER.next(); }, 2000);
            }
          });
          s.appendChild(msg);
          s.appendChild(nextRow);
          root.appendChild(s);
        },
        isComplete: function(){ return !!STATE.screen('L9').cleared; }
      },
      { /* step2: F4 구조화 자기설명(필수 게이팅, 칩 2빈칸) */
        mount: function(root){
          clearActiveTimer();
          var st = STATE.screen('L9');
          var se = st.selfExplain;
          var OPTIONS = ['둘 중 하나 이상이 1', '둘 다 1', '둘 다 0'];
          var ANSWER = {a:'둘 중 하나 이상이 1', b:'둘 다 1'};
          var s = el('section', {class:'screen'});
          s.appendChild(el('div', {class:'screen-eyebrow'}, EYEBROW));
          s.appendChild(el('h2', {class:'screen-title'}, 'L9. 방금 만든 회로, 말로 설명해보기'));
          s.appendChild(el('div', {class:'screen-prompt'}, '빈칸에 알맞은 말을 골라 문장을 완성하세요.'));
          MASCOT.bubble(s, '방금 만든 회로 구조(OR과 AND, NOT)를 떠올리면서 골라보세요.');

          var sentence = el('div', {class:'card-hairline', style:{fontSize:'16px', fontWeight:'700', margin:'10px 0'}});
          sentence.appendChild(document.createTextNode('XOR은 '));
          sentence.appendChild(el('span', {class:'chip' + (se.a?' active':'')}, se.a || '(____)'));
          sentence.appendChild(document.createTextNode(' 이면서 '));
          sentence.appendChild(el('span', {class:'chip' + (se.b?' active':'')}, se.b || '(____)'));
          sentence.appendChild(document.createTextNode('는 아닐 때 1이다.'));
          s.appendChild(sentence);

          /* LG3-07: F4는 필수 게이팅 단계인데 오답 피드백이 FX.shake 단일(모션) 채널뿐이었다 —
             reduced-motion·SR 사용자에게 무피드백. 문구를 announce + 하단 muted p에 병기한다. */
          var feedbackMsg = el('p', {class:'muted', style:{minHeight:'20px'}, 'aria-live':'polite'}, se.done ? '정확해요! 다음으로 넘어갈 수 있어요.' : '');
          ['a','b'].forEach(function(key){
            var locked = se[key] === ANSWER[key];
            s.appendChild(el('p', {class:'muted', style:{margin:'10px 0 4px'}}, (key==='a'?'첫 번째':'두 번째') + ' 빈칸' + (locked?' (정답 선택됨)':'')));
            var row = el('div', {class:'chips-row'});
            OPTIONS.forEach(function(opt){
              var chip = el('button', {type:'button', class:'chip' + (se[key]===opt?' active':''), disabled: locked ? true : undefined}, opt);
              chip.addEventListener('click', function(){
                if(locked) return;
                if(opt === ANSWER[key]){
                  se[key] = opt;
                  STATE.save();
                  if(se.a===ANSWER.a && se.b===ANSWER.b){ se.done = true; STATE.save(); refreshNav(); }
                  ROUTER.refresh();
                } else {
                  FX.shake(chip);
                  feedbackMsg.textContent = '아직 아니에요. 다시 골라보세요.';
                  announce('아직 아니에요. 다시 골라보세요.');
                }
              });
              row.appendChild(chip);
            });
            s.appendChild(row);
          });

          s.appendChild(feedbackMsg);
          root.appendChild(s);
        },
        isComplete: function(){ return !!STATE.screen('L9').selfExplain.done; }
      },
      { /* step3: F2 보너스1 — "방금 만든 회로가 덧셈 기계?" (표시 전용, 게이팅 없음) */
        mount: function(root){
          var s = el('section', {class:'screen'});
          s.appendChild(el('div', {class:'screen-eyebrow'}, EYEBROW));
          s.appendChild(el('h2', {class:'screen-title'}, 'L9. 보너스 — 방금 만든 회로가 덧셈 기계?'));
          s.appendChild(el('div', {class:'screen-prompt'}, '1+1은 이진수로 10(일, 영). 방금 만든 XOR이 \'합\', 이미 아는 AND가 \'올림\'이에요. 이 두 개면 컴퓨터의 덧셈이 완성!'));
          MASCOT.bubble(s, '이런 회로를 반가산기(half adder)라고 불러요. 다음 화면에서 표로 확인해볼까요?');
          root.appendChild(s);
        }
      },
      { /* step4: F2 보너스2 — 2출력 진리표 관찰 + XOR/AND 미니 뷰 병치(표시 전용) */
        mount: function(root){
          var s = el('section', {class:'screen'});
          s.appendChild(el('div', {class:'screen-eyebrow'}, EYEBROW));
          s.appendChild(el('h2', {class:'screen-title'}, 'L9. 보너스 — 반가산기 진리표'));
          s.appendChild(el('div', {class:'screen-prompt'}, '표를 보면서 A, B가 바뀔 때 올림(AND)과 합(XOR)이 어떻게 바뀌는지 관찰해 보세요(채점은 없어요).'));
          var row = el('div', {style:{display:'flex', flexWrap:'wrap', gap:'16px', flex:'1', minHeight:'0', overflowY:'auto'}});
          var tableHost = el('div', {class:'card-hairline', style:{flex:'1', minWidth:'220px'}});
          tableHost.appendChild(el('h3', {style:{marginTop:'0'}}, '반가산기 진리표'));
          var wrapT = el('div', {class:'truth-wrap'});
          var table = el('table', {class:'truth-table'});
          var thead = el('tr', {});
          ['A','B','올림(AND)','합(XOR)','이진 결과'].forEach(function(h){ thead.appendChild(el('th', {}, h)); });
          table.appendChild(thead);
          halfAdderTable().forEach(function(r){
            var tr = el('tr', {});
            [r.a, r.b, r.carry, r.sum, r.binary].forEach(function(v){ tr.appendChild(el('td', {}, String(v))); });
            table.appendChild(tr);
          });
          wrapT.appendChild(table);
          tableHost.appendChild(wrapT);
          row.appendChild(tableHost);

          var miniHost = el('div', {class:'card-hairline', style:{flex:'1', minWidth:'220px'}});
          miniHost.appendChild(el('h3', {style:{marginTop:'0'}}, '합(XOR) · 올림(AND) 미니 회로'));
          renderCircuitBoard(miniHost, L11_XOR_SOLVED, {switchVals:{A:1,B:0}});
          renderCircuitBoard(miniHost, L11_MINI_AND, {switchVals:{A:1,B:0}});
          row.appendChild(miniHost);
          s.appendChild(row);
          root.appendChild(s);
        }
      }
    ],
    onStepExit: function(){ clearActiveTimer(); }
  };
}

function buildL10(){
  /* 개정 §B L10: 슬라이드 안내형(①설명 ②AND ③OR ④XOR). op은 step마다 고정, 자동 진행은
     2초+"바로 다음"(§1 확정값 #6). activeTimer는 L5와 같은 패턴 — onStepExit·재마운트에서 정리. */
  var activeTimer = null;
  function clearActiveTimer(){ if(activeTimer){ clearTimeout(activeTimer); activeTimer = null; } }
  var EYEBROW = '섹션3 · XOR와 인공지능';

  function opStep(op, promptText, mascotText, popOnMount){
    return {
      mount: function(root){
        clearActiveTimer();
        var st = STATE.screen('L10');
        var s = el('section', {class:'screen'});
        s.appendChild(el('div', {class:'screen-eyebrow'}, EYEBROW));
        s.appendChild(el('h2', {class:'screen-title'}, 'L10. 좌표평면 선형 분리 — ' + op));
        s.appendChild(el('div', {class:'screen-prompt'}, promptText));
        if(mascotText) MASCOT.bubble(s, mascotText);
        var nextRow = el('div', {class:'btn-row', style:{marginTop:'8px'}});
        SEP.render(s, {
          op: op, progress: st, popOnMount: !!popOnMount,
          onAchieved: function(){
            refreshNav();
            if(op === 'XOR'){
              /* XOR은 "다음 화면"이 아니라 같은 step 안에서 설명 모드로 전환된다 — ROUTER.refresh()가
                 step4.mount()를 다시 불러 st.achieved.XOR===true 분기(설명 슬라이드)를 그린다. */
              ROUTER.refresh();
              return;
            }
            var nextLabel = op === 'AND' ? 'OR' : 'XOR';
            toast(op + ' 분리 성공! 2초 후 ' + nextLabel + '로 넘어가요.');
            var goBtn = el('button', {type:'button', class:'btn btn-primary btn-sm'}, '바로 다음');
            goBtn.addEventListener('click', function(){ clearActiveTimer(); ROUTER.next(); });
            nextRow.innerHTML = '';
            nextRow.appendChild(goBtn);
            activeTimer = setTimeout(function(){ activeTimer = null; ROUTER.next(); }, 2000);
          }
        });
        s.appendChild(nextRow);
        root.appendChild(s);
      },
      isComplete: function(){ return !!STATE.screen('L10').achieved[op]; }
    };
  }

  return {
    steps: [
      { /* step1: 설명 — AND 진리표와 좌표평면을 나란히, 행↔점 대응 */
        mount: function(root){
          var s = el('section', {class:'screen'});
          s.appendChild(el('div', {class:'screen-eyebrow'}, EYEBROW));
          s.appendChild(el('h2', {class:'screen-title'}, 'L10. 좌표평면 선형 분리 — 설명'));
          s.appendChild(el('div', {class:'screen-prompt'}, '입력 (A,B) 네 조합이 좌표평면의 네 점이 돼요. 그 점의 색은 출력: 1이면 파랑, 0이면 빨강.'));
          MASCOT.bubble(s, 'AND 진리표의 행을 탭하거나 키보드로 골라보면 좌표평면의 대응하는 점이 표시돼요. 같은 순서로 놓여 있어요.');
          var row = el('div', {style:{display:'flex', flexWrap:'wrap', gap:'16px'}});
          var tableHost = el('div', {class:'card-hairline', style:{flex:'1', minWidth:'220px'}});
          tableHost.appendChild(el('h3', {style:{marginTop:'0'}}, 'AND 진리표'));
          var tableApi = TRUTH.renderDisplayTable(tableHost, ['A','B'], function(bits){ return GATE_FN.AND(bits); });
          row.appendChild(tableHost);
          var planeHost = el('div', {class:'card-hairline', style:{flex:'1', minWidth:'220px'}});
          planeHost.appendChild(el('h3', {style:{marginTop:'0'}}, '좌표평면'));
          var planeApi = renderStaticLabeledPlane(planeHost, GATE_FN.AND);
          row.appendChild(planeHost);
          s.appendChild(row);
          root.appendChild(s);

          /* LG3-06: 행↔점 하이라이트 대응(§B L10-1) — 탭·호버·키보드 포커스 둘 다로 동작해야
             한다(SFC 규약: 터치+키보드 혼용). tr에 tabindex를 주고 aria-label로 대응 관계도
             텍스트로 병기(LG3-02와 연계 — 시각 강조만으로 끝내지 않는다). */
          tableApi.rowEls.forEach(function(tr, idx){
            var bits = tableApi.rows[idx];
            tr.tabIndex = 0;
            tr.style.cursor = 'pointer';
            tr.setAttribute('aria-label', '입력 (' + bits[0] + ',' + bits[1] + ') 행 — 좌표평면의 (' + bits[0] + ',' + bits[1] + ') 점과 대응');
            tr.addEventListener('pointerenter', function(){ planeApi.setHighlight(idx); });
            tr.addEventListener('focus', function(){ planeApi.setHighlight(idx); });
            tr.addEventListener('click', function(){ planeApi.setHighlight(idx); });
            tr.addEventListener('pointerleave', function(){ if(document.activeElement!==tr) planeApi.setHighlight(null); });
            tr.addEventListener('blur', function(){ planeApi.setHighlight(null); });
          });
        }
      },
      opStep('AND', '직선을 움직여서 파란 점(1)과 빨간 점(0)을 나눠 보세요.', null, false),
      opStep('OR', '진리표가 바뀌면서 점 색도 바뀌었어요. 다시 직선으로 나눠 보세요.', '하나만 1이어도 파란 점이 돼요.', true),
      { /* step4: XOR — N=3 실패 게이트(C4). 달성 전=시도, 달성 후=설명(F3 실패 직선 재등장) */
        mount: function(root){
          clearActiveTimer();
          var st = STATE.screen('L10');
          var s = el('section', {class:'screen'});
          s.appendChild(el('div', {class:'screen-eyebrow'}, EYEBROW));
          s.appendChild(el('h2', {class:'screen-title'}, 'L10. 좌표평면 선형 분리 — XOR'));
          if(st.achieved.XOR){
            s.appendChild(el('div', {class:'screen-prompt'}, '아무리 직선을 움직여도 XOR의 네 점은 갈라지지 않았죠? 왜 그런지 살펴볼게요.'));
            MASCOT.bubble(s, 'XOR은 직선 하나로는 절대 나눌 수 없어요 — AND·OR과 다르죠?');
            SEP.renderExplanation(s, st);
          } else {
            s.appendChild(el('div', {class:'screen-prompt'}, 'AND와 OR처럼 직선으로 나눠 보세요. 3번 시도해도 안 되면 이유를 알려줄게요.'));
            MASCOT.bubble(s, 'AND와 OR은 됐으니, XOR도 한번 시도해 보세요!');
            SEP.render(s, {
              op:'XOR', progress: st,
              onAchieved: function(){ refreshNav(); ROUTER.refresh(); }
            });
          }
          root.appendChild(s);
        },
        isComplete: function(){ return !!STATE.screen('L10').achieved.XOR; }
      }
    ],
    onStepExit: function(){ clearActiveTimer(); }
  };
}

/* 개정 §B L11: 정적 페이지 → 4슬라이드(내용·문구는 v1 유지, 구조만 슬라이드화).
   ①단층=직선 하나(AND 회고) ②XOR 불가→층 쌓기(L9 다층 회로 재등장) ③캠프 정리 카드
   ④소감 생각칸+루미 축하. */
function buildL11(){
  var EYEBROW = '섹션3 · XOR와 인공지능';
  return {
    steps: [
      { /* step1: 단층 퍼셉트론 = 직선 하나 (L10 회고, AND 미니 회로) */
        mount: function(root){
          var s = el('section', {class:'screen'});
          s.appendChild(el('div', {class:'screen-eyebrow'}, EYEBROW));
          s.appendChild(el('h2', {class:'screen-title'}, 'L11. 퍼셉트론 연결 — 단층'));
          s.appendChild(el('div', {class:'screen-prompt'}, '직선 하나로 나누는 게 바로 단층 퍼셉트론이에요(AI사고 학습지의 그 퍼셉트론!).'));
          var leftCol = el('div', {class:'card-hairline'});
          leftCol.appendChild(el('h3', {style:{marginTop:'0'}}, '단층 퍼셉트론 = 직선 하나'));
          leftCol.appendChild(el('p', {class:'muted'}, 'AND처럼 직선 하나로 나뉘는 규칙은 한 층으로 충분해요.'));
          renderCircuitBoard(leftCol, L11_MINI_AND, {switchVals:{A:1,B:1}});
          s.appendChild(leftCol);
          root.appendChild(s);
        }
      },
      { /* step2: XOR은 직선 하나로 불가 → 층을 쌓는다 (L9에서 만든 다층 회로 재등장) */
        mount: function(root){
          var s = el('section', {class:'screen'});
          s.appendChild(el('div', {class:'screen-eyebrow'}, EYEBROW));
          s.appendChild(el('h2', {class:'screen-title'}, 'L11. 퍼셉트론 연결 — 다층'));
          s.appendChild(el('div', {class:'screen-prompt'}, 'XOR은 직선 하나로 못 나누니, 여러 층(다층 퍼셉트론)이 필요해요.'));
          var rightCol = el('div', {class:'card-hairline'});
          rightCol.appendChild(el('h3', {style:{marginTop:'0'}}, '다층 퍼셉트론 = XOR처럼 층층이'));
          rightCol.appendChild(el('p', {class:'muted'}, '직선 하나로 안 나뉘는 XOR은 층을 쌓아야 해요. (L9에서 만든 회로)'));
          renderCircuitBoard(rightCol, L11_XOR_SOLVED, {switchVals:{A:1,B:0}});
          s.appendChild(rightCol);
          root.appendChild(s);
        }
      },
      { /* step3: 캠프 전체 정리 카드 */
        mount: function(root){
          var s = el('section', {class:'screen'});
          s.appendChild(el('div', {class:'screen-eyebrow'}, EYEBROW));
          s.appendChild(el('h2', {class:'screen-title'}, 'L11. 정리'));
          s.appendChild(Components.SummaryCard({
            color:'lavender', title:'정리',
            body:'논리도, 인공지능도 입력→출력 규칙(함수)을 다룬다. 어떤 규칙은 한 층으론 부족하다.'
          }));
          s.appendChild(Components.SummaryCard({
            color:'ochre', title:'캠프 전체 정리',
            body:'이미지=행렬, AI사고=함수·퍼셉트론, 텍스트=벡터·코사인, 논리=진리표·XOR'
          }));
          root.appendChild(s);
        }
      },
      { /* step4: 소감 생각칸 + 루미 축하 */
        mount: function(root){
          var s = el('section', {class:'screen'});
          s.appendChild(el('div', {class:'screen-eyebrow'}, EYEBROW));
          s.appendChild(el('h2', {class:'screen-title'}, 'L11. 소감'));
          MASCOT.bubble(s, '수고했어요! 오늘 배운 걸 함께 정리해봐요.', {tone:'cheer'});
          s.appendChild(Components.ThoughtBox({
            screenId:'L11', key:'thought', labelText:'오늘 배운 것 중 기억하고 싶은 것 한 가지',
            placeholder:'예: XOR은 한 층으로 안 되고 다층이 필요하다는 게 신기했다.',
            onChange: function(){ refreshNav(); }
          }));
          root.appendChild(s);
        },
        isComplete: function(){ return (STATE.screen('L11').thought||'').trim().length > 0; }
      }
    ]
  };
}

var SCREENS = {
  L1: buildL1(), L2: buildL2(), L3: buildL3(), L4: buildL4(),
  L5: buildL5(), L6: buildL6(), L7: buildL7(),
  L8: buildL8(), L9: buildL9(), L10: buildL10(), L11: buildL11()
};

/* ============================================================
   14) TEACHER — 교사 패널
   ============================================================ */
var TEACHER = {
  tapCount: 0,
  tapTimer: null,
  init: function(){
    var titleBtn = document.getElementById('appTitleBtn');
    titleBtn.addEventListener('click', function(){
      TEACHER.tapCount++;
      clearTimeout(TEACHER.tapTimer);
      TEACHER.tapTimer = setTimeout(function(){ TEACHER.tapCount = 0; }, 2500);
      if(TEACHER.tapCount >= 5){ TEACHER.tapCount = 0; TEACHER.open(); }
    });
    document.addEventListener('keydown', function(e){
      if(e.altKey && (e.key==='r' || e.key==='R')){ TEACHER.open(); }
      if(e.key === 'Escape'){ TEACHER.close(); }
    });
    document.getElementById('teacherCloseBtn').addEventListener('click', TEACHER.close);
    document.getElementById('teacherResetBtn').addEventListener('click', function(){
      var area = document.getElementById('teacherConfirmArea');
      area.textContent = '';
      var box = el('div', {class:'card-hairline', style:{marginTop:'10px'}});
      box.appendChild(el('p', {style:{margin:'0 0 10px'}}, '정말 초기화할까요? 이 학습지의 진행 상황이 모두 사라집니다.'));
      var row = el('div', {class:'btn-row'});
      var yes = el('button', {type:'button', class:'btn btn-primary'}, '예, 초기화');
      yes.addEventListener('click', function(){
        STATE.reset();
        /* 전환 중 리셋 300ms 창(새니티 minor②) 해소: ROUTER.go()는 _transitioning이면 그냥
           반환해 화면이 갱신되지 않는다. render()는 _rebuild()를 직접 불러(_transitioning을
           false로 되돌리고 대기 타이머도 취소) 전환 애니메이션 없이 즉시 다시 그린다 — go()를
           거칠 필요가 없다(screenId는 STATE.reset()이 이미 DEFAULT_STATE()의 'L1'로 설정). */
        ROUTER.render();
        TEACHER.close();
        toast('초기화되었습니다.');
      });
      var no = el('button', {type:'button', class:'btn btn-secondary'}, '아니오');
      no.addEventListener('click', function(){ area.textContent = ''; });
      row.appendChild(yes); row.appendChild(no);
      box.appendChild(row);
      area.appendChild(box);
    });
  },
  open: function(){
    document.getElementById('teacherPanel').classList.add('open');
    document.getElementById('teacherConfirmArea').textContent = '';
  },
  close: function(){
    document.getElementById('teacherPanel').classList.remove('open');
  }
};

/* ============================================================
   15) BOOT
   ============================================================ */
function boot(){
  STATE.load();
  ROUTER.screenEl = document.getElementById('screenRoot');
  MASCOT.mountMini();
  TEACHER.init();
  document.getElementById('prevBtn').addEventListener('click', function(){ ROUTER.prev(); });
  document.getElementById('nextBtn').addEventListener('click', function(){ ROUTER.next(); });
  /* ←→ 화면·step 내비(image-data.html 4278~4289 이식). 입력 요소(입력칸·선택상자 등)에
     포커스가 있거나 IME 조합 중이면 무시하고, 이미 다른 위젯(삭제·스위치 커서, SEP 각도·위치
     조작 등, 요소 레벨에서 먼저 반응)이 이 키를 처리했다면(e.defaultPrevented)도 무시한다 —
     그래야 그 위젯들의 기존 방향키 조작과 화면 이동이 겹치지 않는다. */
  document.addEventListener('keydown', function(e){
    if(e.isComposing || e.keyCode === 229) return;
    if(e.key !== 'ArrowLeft' && e.key !== 'ArrowRight') return;
    var tag = document.activeElement && document.activeElement.tagName;
    if(tag==='INPUT' || tag==='TEXTAREA' || tag==='SELECT') return;
    if(e.defaultPrevented) return;
    if(e.key === 'ArrowLeft'){ ROUTER.prev(); } else { ROUTER.next(); }
  });
  ROUTER.render();
}

if(document.readyState === 'loading'){
  document.addEventListener('DOMContentLoaded', boot);
} else {
  boot();
}

})();
</script>
</body>
</html>
