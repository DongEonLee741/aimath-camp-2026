<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>텍스트 데이터 처리 — 인공지능은 단어와 문장의 관계를 어떻게 알까?</title>
<link rel="stylesheet" href="katex/katex.min.css">
<style>
/* ============================================================
   디자인 토큰 (DESIGN-clay.md 상속 + 명세 6.1 시맨틱 색)
   ============================================================ */
:root{
  --primary:#0a0a0a; --primary-active:#1f1f1f; --primary-disabled:#e5e5e5;
  --ink:#0a0a0a; --body-c:#3a3a3a; --body-strong:#1a1a1a;
  --muted:#6a6a6a; --muted-soft:#9a9a9a;
  --hairline:#e5e5e5; --hairline-soft:#f0f0f0;
  --canvas:#fffaf0; --surface-soft:#faf5e8; --surface-card:#f5f0e0; --surface-strong:#ebe6d6;
  --on-primary:#ffffff;
  --brand-pink:#ff4d8b; --brand-teal:#1a3a3a; --brand-lavender:#b8a4ed;
  --brand-peach:#ffb084; --brand-ochre:#e8b94a; --brand-mint:#a4d4c5; --brand-coral:#ff6b5a;

  --r-xs:6px; --r-sm:8px; --r-md:12px; --r-lg:16px; --r-xl:24px; --r-pill:9999px;

  --sp-xxs:4px; --sp-xs:8px; --sp-sm:12px; --sp-md:16px; --sp-lg:24px; --sp-xl:32px; --sp-xxl:48px; --sp-section:96px;

  /* 이 학습지 시맨틱 색 (명세 6.1) — 명세 원안 색상을 유지하되, 캔버스(#fffaf0)
     배경 위 텍스트로 쓰일 때 WCAG 4.5:1을 만족하도록 살짝 어둡게 보정했다. */
  --incl:#1d54c9;   /* 포함 (원안 #2f6df0 대비 4.4:1 → 보정 6.4:1) */
  --excl:#5c6570;   /* 제외 (원안 #98a2b1 대비 2.5:1 → 보정 5.7:1) */
  --merge:#7238c9;  /* 합치기 (원안 #8957e5 대비 4.4:1 → 보정 6.5:1) */
  --sim:#2ea043;    /* 유사도 게이지 (칠 배경으로만 사용, 텍스트는 별도 보정) */
  --fail:#e5484d;

  --font-body:'Inter',-apple-system,BlinkMacSystemFont,'Apple SD Gothic Neo','Segoe UI','Malgun Gothic',Roboto,sans-serif;
  --font-serif:'Batang','Nanum Myeongjo','Apple SD Gothic Neo',serif;
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;height:100%;overflow:hidden;}
body{
  background:var(--canvas); color:var(--body-c); font-family:var(--font-body);
  font-size:16px; line-height:1.55; -webkit-text-size-adjust:100%;
}
h1,h2,h3{ color:var(--ink); font-weight:500; letter-spacing:-0.02em; margin:0 0 var(--sp-sm); }
h1{font-size:28px; line-height:1.15;}
h2{font-size:22px; line-height:1.2;}
h3{font-size:17px; line-height:1.3;}
p{margin:0 0 var(--sp-sm);}
button{font-family:inherit;}
table{border-collapse:separate;border-spacing:0;}
.sr-only{position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap;border:0;}
:focus-visible{outline:3px solid var(--incl); outline-offset:2px;}

/* ---------- 앱 셸 (1뷰포트: header·screen-root·bottom-nav 3단 flex column, logic.html 이식) ---------- */
.app-shell{max-width:960px;margin:0 auto;height:100vh;height:100dvh;display:flex;flex-direction:column;padding:0 var(--sp-md);}
.app-header{flex:none;background:var(--canvas);z-index:20;padding:var(--sp-sm) 0;border-bottom:1px solid var(--hairline);}
.header-top{display:flex;align-items:center;justify-content:space-between;gap:var(--sp-sm);}
.app-title-btn{background:none;border:none;padding:2px 4px;cursor:pointer;text-align:left;font:inherit;}
.app-title{font-size:15px;font-weight:600;color:var(--ink);letter-spacing:-0.01em;}
.section-tag{font-size:12px;color:var(--muted);font-weight:600;letter-spacing:0.02em;}
.mascot-mini{width:34px;height:34px;flex:none;}
.progress-track{display:flex;gap:4px;margin-top:var(--sp-xs);}
.progress-seg{flex:1;height:6px;border-radius:var(--r-pill);background:var(--hairline);overflow:hidden;position:relative;}
.progress-seg .fill{position:absolute;inset:0;background:var(--ink);width:0%;transition:width .25s ease;}
.progress-seg.section-done .fill{background:var(--sim);}

/* ---------- 화면 공통 ---------- */
.screen-root{flex:1;min-height:0;position:relative;overflow:hidden;}
/* ---------- 서브 슬라이드 스테이지(logic.html 1뷰포트 셸 이식, A1 개정): 화면 전환 pane.
   pane은 항상 절대배치(position:absolute; inset:0)로 겹쳐 놓이고 overflow-y:auto로 내부
   스크롤만 받는다 — 페이지 스크롤은 생기지 않는다(A1). 전환은 가로 슬라이드+페이드(A2 사양:
   약 280ms·easeInOutQuad에 준하는 cubic-bezier·prefers-reduced-motion 시 즉시 전환). ---------- */
.view-pane{position:absolute; inset:0; height:100%; padding:var(--sp-lg) 0; overflow-y:auto; transition:transform .28s cubic-bezier(.455,.03,.515,.955), opacity .28s cubic-bezier(.455,.03,.515,.955);}
.view-pane.pane-active{transform:translateX(0);opacity:1;}
.view-pane.pane-enter-right{transform:translateX(48px);opacity:0;}
.view-pane.pane-enter-left{transform:translateX(-48px);opacity:0;}
.view-pane.pane-exit-left{transform:translateX(-48px);opacity:0;}
.view-pane.pane-exit-right{transform:translateX(48px);opacity:0;}
.view-pane.pane-enter-right,.view-pane.pane-enter-left,.view-pane.pane-exit-left,.view-pane.pane-exit-right{pointer-events:none;}
.step-dots{display:flex;gap:6px;justify-content:center;margin:0 0 var(--sp-sm);}
.step-dot{width:7px;height:7px;border-radius:50%;background:var(--hairline);}
.step-dot.active{background:var(--ink);width:18px;border-radius:var(--r-pill);}
.screen{animation:screenIn .28s ease both;}
@keyframes screenIn{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:none;}}
.screen-eyebrow{font-size:13px;font-weight:600;color:var(--muted);letter-spacing:0.02em;margin-bottom:4px;}
.screen-title{margin-bottom:var(--sp-sm);}
.screen-prompt{font-size:17px;color:var(--body-strong);background:var(--surface-soft);border-radius:var(--r-lg);padding:var(--sp-md);margin-bottom:var(--sp-md);}
.screen-block{margin-bottom:var(--sp-lg);}
.muted{color:var(--muted);font-size:14px;}

/* ---------- 버튼 ---------- */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;min-height:44px;padding:10px 20px;border-radius:var(--r-md);font-size:14px;font-weight:600;border:1px solid transparent;cursor:pointer;touch-action:manipulation;}
.btn-primary{background:var(--primary);color:var(--on-primary);}
.btn-primary:hover{background:var(--primary-active);}
.btn-primary:disabled{background:var(--primary-disabled);color:var(--muted);cursor:not-allowed;}
.btn-secondary{background:var(--canvas);color:var(--ink);border-color:var(--hairline);}
.btn-secondary:hover{border-color:var(--ink);}
.btn-secondary.active{background:var(--ink);color:var(--on-primary);}
.btn-ghost{background:transparent;color:var(--ink);border-color:transparent;}
.btn-sm{min-height:44px;padding:6px 14px;font-size:13px;}
.btn-row{display:flex;flex-wrap:wrap;gap:var(--sp-xs);align-items:center;}

/* ---------- 카드 ---------- */
.card{border-radius:var(--r-xl);padding:var(--sp-lg);}
.feature-card{margin-top:var(--sp-section);}
.card-title{font-size:15px;font-weight:700;margin-bottom:6px;opacity:.85;}
.card-body{font-size:16px;font-weight:600;}
.card-cream{background:var(--surface-card);color:var(--ink);}
.card-pink{background:var(--brand-pink);color:var(--ink);}
.card-teal{background:var(--brand-teal);color:var(--on-primary);}
.card-lavender{background:var(--brand-lavender);color:var(--ink);}
.card-peach{background:var(--brand-peach);color:var(--ink);}
.card-ochre{background:var(--brand-ochre);color:var(--ink);}
.card-hairline{background:var(--canvas);border:1px solid var(--hairline);border-radius:var(--r-lg);padding:var(--sp-md);}

/* ---------- 생각칸 ---------- */
.thought-box{background:var(--surface-soft);border-radius:var(--r-lg);padding:var(--sp-md);margin:var(--sp-md) 0;}
.thought-label{display:block;font-size:13px;font-weight:700;color:var(--body-strong);margin-bottom:6px;}
.thought-input{width:100%;min-height:64px;border:1px solid var(--hairline);border-radius:var(--r-md);padding:10px 12px;font:inherit;font-size:15px;resize:vertical;background:var(--canvas);color:var(--ink);}
.thought-input:focus{border-color:var(--incl);}

/* ---------- 칩 / 세그토글 ---------- */
.chips-row{display:flex;flex-wrap:wrap;gap:8px;margin:8px 0;}
.chip{min-height:44px;padding:8px 16px;border-radius:var(--r-pill);border:1px solid var(--hairline);background:var(--canvas);color:var(--body-c);font-size:14px;font-weight:600;cursor:pointer;}
.chip.active{background:var(--ink);color:var(--on-primary);border-color:var(--ink);}
.chip.removable{padding:2px 4px 2px 16px;}
.chip .chip-x{margin-left:2px;font-weight:800;min-width:44px;min-height:44px;padding:0;font-size:17px;}
.seg-toggle{display:inline-flex;background:var(--surface-strong);border-radius:var(--r-pill);padding:4px;gap:2px;flex-wrap:wrap;}
.seg-btn{min-height:44px;padding:6px 16px;border-radius:var(--r-pill);border:none;background:transparent;color:var(--muted);font-size:13px;font-weight:700;cursor:pointer;}
.seg-btn.active{background:var(--ink);color:var(--on-primary);}

/* ---------- 하이라이트 ---------- */
.highlight-row{display:flex;flex-wrap:wrap;gap:8px;margin:8px 0;}
.highlight-chip{padding:6px 14px;border-radius:var(--r-sm);font-weight:800;font-size:14px;background:rgba(47,109,240,.12);color:#1d4fb0;}

/* ---------- 마스코트 ---------- */
.mascot-row{display:flex;align-items:flex-start;gap:10px;margin:var(--sp-sm) 0;}
.mascot-avatar{width:48px;height:48px;border-radius:50%;overflow:hidden;flex:none;background:var(--brand-lavender);display:flex;align-items:center;justify-content:center;font-size:22px;color:var(--ink);}
.mascot-avatar img{width:100%;height:100%;object-fit:cover;display:block;}
.mascot-avatar.mascot-fallback::after{content:'✦';}
.mascot-mini.mascot-fallback::after{content:'✦';font-size:16px;}
.mascot-bubble{background:var(--canvas);border:1px solid var(--hairline);border-radius:var(--r-lg);border-top-left-radius:4px;padding:10px 14px;font-size:14px;color:var(--body-strong);max-width:560px;}
.mascot-bubble.tone-cheer{background:#eef6ec;border-color:var(--sim);}

/* ---------- 넥스트 티저 / 토스트 ---------- */
.next-tease{display:flex;align-items:center;gap:8px;background:var(--surface-card);border-radius:var(--r-pill);padding:10px 18px;font-weight:700;color:var(--body-strong);width:fit-content;margin-top:var(--sp-sm);}
.toast{position:fixed;left:50%;bottom:88px;transform:translateX(-50%);background:var(--ink);color:#fff;padding:10px 18px;border-radius:var(--r-pill);font-size:14px;z-index:60;max-width:90vw;text-align:center;}
.toast:empty{display:none;}

/* ---------- 하단 내비 (1뷰포트: app-shell 내부 flex 아이템 — fixed 오버레이 아님) ---------- */
.bottom-nav{flex:none;background:var(--canvas);border-top:1px solid var(--hairline);padding:10px var(--sp-md);display:flex;align-items:center;justify-content:space-between;gap:var(--sp-sm);z-index:30;}
.nav-status{font-size:12px;color:var(--muted);}

/* ---------- 교사 패널 ---------- */
.teacher-panel{display:none;position:fixed;inset:0;background:rgba(10,10,10,.5);z-index:80;align-items:center;justify-content:center;padding:var(--sp-md);}
.teacher-panel.open{display:flex;}
.teacher-card{background:var(--canvas);border-radius:var(--r-xl);padding:var(--sp-xl);max-width:420px;width:100%;}

/* ---------- 게임필 ---------- */
.fx-pop{animation:fxPop .32s cubic-bezier(.34,1.56,.64,1);}
@keyframes fxPop{0%{transform:scale(1);}45%{transform:scale(1.16);}100%{transform:scale(1);}}
.fx-shake{animation:shakeX .4s ease;}
@keyframes shakeX{0%,100%{transform:translateX(0);}20%{transform:translateX(-5px);}40%{transform:translateX(5px);}60%{transform:translateX(-4px);}80%{transform:translateX(4px);}}
.fx-pulse{animation:fxPulse 1s ease-in-out infinite;}
@keyframes fxPulse{0%,100%{opacity:1;}50%{opacity:.55;}}
.confetti-piece{position:absolute;width:8px;height:8px;border-radius:2px;pointer-events:none;}

/* ---------- 속성 체크표 (AttrTable) ---------- */
.attr-table-wrap{overflow-x:auto;margin:var(--sp-sm) 0;}
.attr-table{font-size:13px;min-width:320px;}
.attr-table th,.attr-table td{border:1px solid var(--hairline);padding:6px 10px;text-align:center;}
.attr-table th{background:var(--surface-soft);font-weight:700;color:var(--body-strong);}
.attr-table td.attr-name{text-align:left;font-weight:600;color:var(--body-c);background:#fdfbf5;}
.attr-cell.on{background:rgba(46,160,67,.14);color:#1e7a34;font-weight:800;}
.attr-cell.off{color:var(--muted);}
.attr-row-common td{background:rgba(245,166,35,.14);}

/* ---------- 속성 체크표 압축판 (AttrTableCompact — W2·W3, 합집합 속성만) ---------- */
.attr-compact-grid{display:grid;grid-template-columns:1fr;gap:6px;margin:6px 0;}
@media (max-width:600px){ .attr-compact-grid{grid-template-columns:1fr 1fr;gap:4px;} }
.attr-compact-row{display:flex;align-items:center;justify-content:space-between;gap:8px;border:1px solid var(--hairline);border-radius:var(--r-sm);padding:6px 10px;font-size:13px;background:#fdfbf5;}
.attr-compact-row.common{background:rgba(245,166,35,.14);}
.attr-compact-row .name{font-weight:600;color:var(--body-c);}
.attr-compact-row .vals{display:flex;gap:8px;font-weight:800;}
.attr-compact-row .val.on{color:#1e7a34;}
.attr-compact-row .val.off{color:var(--muted);}

/* ---------- 코사인 레시피 ---------- */
.recipe-steps{display:flex;flex-direction:column;gap:10px;margin:var(--sp-sm) 0;}
.recipe-step{background:var(--canvas);border:1px solid var(--hairline);border-radius:var(--r-lg);padding:12px 16px;opacity:.4;transition:opacity .3s ease;}
.recipe-step.shown{opacity:1;}
.recipe-step .step-label{font-size:12px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.02em;}
.recipe-step .step-value{font-size:20px;font-weight:800;color:var(--ink);margin-top:4px;}
.recipe-step .step-detail{font-size:13px;color:var(--body-c);margin-top:4px;}
.recipe-final{background:var(--surface-card);}
.recipe-final .step-value{color:#1d4fb0;font-size:26px;}

/* ---------- 유사도 게이지 ---------- */
.sim-meter{background:var(--surface-strong);border-radius:var(--r-pill);height:26px;position:relative;overflow:hidden;margin:8px 0;}
.sim-meter .fill{position:absolute;left:0;top:0;bottom:0;width:0%;background:var(--sim);transition:width .5s cubic-bezier(.22,1,.36,1);}
.sim-meter .label{position:relative;z-index:2;display:flex;align-items:center;justify-content:center;height:100%;font-size:13px;font-weight:800;color:var(--ink);}
.sim-meter.fail .fill{background:var(--fail);}

/* ---------- 게임 (WordChainGame) ---------- */
.game-hud{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:var(--sp-sm);}
.hud-chip{background:var(--surface-card);border-radius:var(--r-md);padding:8px 14px;font-size:13px;font-weight:700;color:var(--body-strong);min-width:76px;text-align:center;}
.hud-chip .hud-num{font-size:20px;font-weight:800;color:var(--ink);display:block;}
.timer-track{height:12px;border-radius:var(--r-pill);background:var(--surface-strong);overflow:hidden;margin-bottom:var(--sp-sm);}
.timer-track .fill{height:100%;background:var(--sim);width:100%;transition:width 1s linear;}
.timer-track.low .fill{background:var(--fail);}
.current-word-card{background:var(--ink);color:var(--on-primary);border-radius:var(--r-xl);padding:20px;text-align:center;margin-bottom:var(--sp-sm);}
.current-word-card .cw-label{font-size:12px;opacity:.7;font-weight:700;}
.current-word-card .cw-word{font-size:30px;font-weight:800;margin-top:4px;}
.game-input-row{display:flex;gap:8px;margin-bottom:var(--sp-sm);}
.game-input-row input[type=text]{flex:1;min-height:48px;border:2px solid var(--hairline);border-radius:var(--r-md);padding:8px 14px;font:inherit;font-size:16px;background:var(--canvas);color:var(--ink);}
.game-input-row input[type=text]:focus{border-color:var(--incl);}
.chain-wrap{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:var(--sp-sm);}
.chain-word{background:var(--surface-card);border-radius:var(--r-pill);padding:6px 14px;font-size:13px;font-weight:700;color:var(--body-strong);}
.chain-word.chain-new{animation:fxPop .32s cubic-bezier(.34,1.56,.64,1);}
.game-feedback{min-height:22px;font-size:14px;font-weight:700;}
.game-feedback.ok{color:#1e7a34;}
.game-feedback.bad{color:#c22;}
.candidate-row{display:flex;flex-wrap:wrap;gap:6px;margin-top:4px;}
.game-modal{background:var(--surface-soft);border-radius:var(--r-xl);padding:var(--sp-lg);}
.game-summary{background:var(--surface-card);border-radius:var(--r-xl);padding:var(--sp-lg);text-align:center;}
.game-summary .summary-score{font-size:40px;font-weight:800;color:var(--ink);}
.mode-badge-row{display:flex;align-items:center;gap:8px;margin:var(--sp-sm) 0;flex-wrap:wrap;}
.mode-badge{display:inline-block;padding:4px 12px;border-radius:var(--r-pill);font-size:12px;font-weight:700;background:var(--surface-strong);color:var(--body-strong);}
.mode-badge.on{background:rgba(46,160,67,.16);color:#186b2c;}
.mode-badge.off{background:rgba(229,72,77,.14);color:#a91d21;}

/* ---------- 형태소 편집판 (MorphBoard) ---------- */
.morph-instructions{background:var(--surface-soft);border-radius:var(--r-md);padding:10px 14px;font-size:13px;color:var(--body-c);margin-bottom:var(--sp-sm);}
.morph-board{display:flex;flex-wrap:wrap;gap:10px;padding:var(--sp-md);background:var(--canvas);border:1px solid var(--hairline);border-radius:var(--r-lg);margin-bottom:var(--sp-sm);align-items:flex-end;}
.morph-token-wrap{display:flex;flex-direction:column;align-items:center;gap:2px;}
.morph-token{min-width:44px;min-height:44px;padding:6px 12px;border-radius:var(--r-md);border:2px solid var(--hairline);background:var(--canvas);cursor:pointer;font-size:16px;font-weight:700;color:var(--excl);touch-action:manipulation;position:relative;}
.morph-token.included{color:var(--incl);border-color:var(--incl);text-decoration:underline;text-decoration-thickness:2px;}
.morph-token.excluded{color:var(--excl);}
.morph-token.armed{color:var(--merge);border-color:var(--merge);border-style:dashed;box-shadow:0 0 0 3px rgba(137,87,229,.18);}
.morph-token.base-applied{background:#eef6ec;}
.postag{font-size:12px;font-weight:800;padding:2px 6px;border-radius:var(--r-xs);letter-spacing:.02em;}
.postag.pos-noun{background:rgba(232,185,74,.28);color:#6e4f0a;}
.postag.pos-particle{background:rgba(184,164,237,.32);color:#5b3fa0;}
.postag.pos-verb{background:rgba(255,176,132,.35);color:#a2481a;}
.postag.pos-adj{background:rgba(164,212,197,.4);color:#1e6e56;}
.postag.pos-ending{background:rgba(255,77,139,.16);color:#a1195a;}
.postag.pos-adv{background:var(--hairline-soft);color:#565656;}
.token-actions{display:flex;flex-wrap:wrap;gap:4px;max-width:120px;}
.token-actions button{min-width:44px;min-height:44px;padding:2px;font-size:13px;border-radius:var(--r-xs);border:1px solid var(--hairline);background:var(--canvas);cursor:pointer;}
.morph-result{background:var(--surface-card);border-radius:var(--r-lg);padding:12px 16px;margin-top:6px;}
.morph-edit-row{display:flex;flex-wrap:wrap;gap:6px;align-items:center;}
.morph-edit-row input[type=text]{min-height:44px;min-width:120px;padding:6px 10px;border:2px solid var(--incl);border-radius:var(--r-md);font:inherit;font-size:15px;background:var(--canvas);color:var(--ink);}

/* ---------- 워드클라우드 (CLOUD) ---------- */
.cloud-controls{display:flex;flex-wrap:wrap;gap:var(--sp-md);align-items:center;margin-bottom:var(--sp-sm);}
.cloud-control-group{display:flex;flex-direction:column;gap:4px;}
.cloud-control-group label{font-size:12px;font-weight:700;color:var(--muted);}
.cloud-canvas-wrap{border:1px solid var(--hairline);border-radius:var(--r-lg);background:var(--canvas);overflow:hidden;margin-bottom:var(--sp-sm);}
.check-row{display:flex;align-items:center;gap:8px;font-size:14px;font-weight:600;color:var(--body-strong);min-height:44px;cursor:pointer;}
.check-row input[type=checkbox]{width:20px;height:20px;}

/* ---------- 말뭉치 소개 그리드 (S5 step0, CorpusGrid) ---------- */
.corpus-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:8px 0;}
@media (max-width:600px){ .corpus-grid{grid-template-columns:1fr;} }
.corpus-card{border:1px solid var(--hairline);border-radius:var(--r-md);padding:8px 12px;font-size:13px;background:#fdfbf5;}
.corpus-card.focus{background:rgba(46,160,67,.12);border-color:var(--sim);font-weight:700;}

/* ---------- 빈도표 (FreqTable) ---------- */
.freq-table-wrap{overflow-x:auto;margin:var(--sp-sm) 0;}
.freq-table{font-size:14px;width:100%;max-width:420px;}
.freq-table th,.freq-table td{border:1px solid var(--hairline);padding:12px;text-align:left;}
.freq-table th{background:var(--surface-soft);}
.freq-table td.num{text-align:right;font-weight:700;}
.freq-row{cursor:pointer;}
.freq-row.selected{background:rgba(46,160,67,.12);}
.freq-row.selected td:first-child::before{content:'✓ ';color:#186b2c;font-weight:800;}

/* ---------- TF·IDF 계산기 ---------- */
.tfidf-table-wrap{overflow-x:auto;margin:var(--sp-sm) 0;}
.tfidf-table{font-size:13px;width:100%;}
.tfidf-table th,.tfidf-table td{border:1px solid var(--hairline);padding:6px 10px;text-align:center;}
.tfidf-table th{background:var(--surface-soft);}
.tfidf-cell{min-height:44px;background:var(--canvas);border:none;width:100%;cursor:pointer;font-weight:700;border-radius:var(--r-xs);padding:4px;}
.tfidf-cell.revealed{background:rgba(46,160,67,.16);color:#1e7a34;cursor:default;}

/* ---------- 비교 막대 (compare-bar — S5 B·C 시각화 공용, 흔한/드문 단어·중요도 점수 대비) ---------- */
.compare-bar-row{display:flex;align-items:center;gap:10px;margin:10px 0;}
.compare-bar-label{width:96px;flex:none;font-weight:700;font-size:14px;color:var(--body-strong);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.compare-bar-track{flex:1;height:22px;background:var(--surface-strong);border-radius:var(--r-pill);overflow:hidden;position:relative;}
.compare-bar-fill{position:absolute;left:0;top:0;bottom:0;width:0%;background:var(--incl);border-radius:var(--r-pill);transition:width .5s cubic-bezier(.22,1,.36,1);}
.compare-bar-value{width:56px;flex:none;text-align:right;font-weight:800;font-size:14px;}

/* ---------- 유사도 게이지 + 각도 호 이중 인코딩 (D-3) ---------- */
.sim-meter-row{display:flex;align-items:center;gap:8px;}
.sim-meter-row .sim-meter{flex:1;margin:8px 0;}
.angle-wedge{flex:none;}

/* ---------- 벡터·각도 장면 (D-1·D-2 — 원점+화살표 2개+각도 호) ---------- */
.vector-scene-wrap{display:flex;flex-direction:column;align-items:center;gap:6px;margin:var(--sp-sm) 0;}
.vector-scene-legend{display:flex;gap:16px;font-size:13px;font-weight:700;}

@media (prefers-reduced-motion: reduce){
  *{animation-duration:.001s !important; transition-duration:.001s !important;}
}
@media (max-width:600px){
  .app-shell{padding:0 var(--sp-sm);}
  h1{font-size:22px;}
  .current-word-card .cw-word{font-size:24px;}
}
</style>
</head>
<body>
<div class="app-shell">
  <header class="app-header">
    <div class="header-top">
      <button type="button" class="app-title-btn" id="appTitleBtn" aria-label="텍스트 데이터 처리 학습지, 다섯 번 누르면 교사 패널">
        <span class="app-title" id="appTitle">텍스트 데이터 처리 — 단어와 문장의 관계를 어떻게 알까?</span>
      </button>
      <span class="mascot-mini" id="mascotMini" aria-hidden="true"></span>
    </div>
    <div class="section-tag" id="sectionTag">섹션1 · 단어 사이의 관계</div>
    <div class="progress-track" id="progressTrack"></div>
  </header>
  <main class="screen-root" id="screenRoot" tabindex="-1"></main>
  <nav class="bottom-nav">
    <button type="button" class="btn btn-secondary" id="prevBtn">이전</button>
    <span class="nav-status" id="navStatus" aria-live="off">1 / 11</span>
    <button type="button" class="btn btn-primary" id="nextBtn">다음</button>
  </nav>
</div>

<div class="teacher-panel" id="teacherPanel">
  <div class="teacher-card" role="dialog" aria-modal="true" aria-labelledby="teacherTitle">
    <h2 id="teacherTitle">교사 패널</h2>
    <p class="muted">이 학습지의 저장 데이터(aimath26_txt_ 네임스페이스)만 초기화합니다. 다른 학습지에는 영향이 없습니다.</p>
    <div id="teacherConfirmArea"></div>
    <div class="btn-row" style="margin-top:var(--sp-md);">
      <button type="button" class="btn btn-primary" id="teacherResetBtn">전체 초기화</button>
      <button type="button" class="btn btn-secondary" id="teacherCloseBtn">닫기</button>
    </div>
  </div>
</div>

<div class="toast" id="toast" role="status" aria-live="polite"></div>
<div class="sr-only" id="liveRegion" aria-live="polite"></div>

<script src="data.js"></script>
<script src="katex/katex.min.js"></script>
<script>
(function(){
'use strict';

/* ============================================================
   1) STATE — 전역 상태 + localStorage (네임스페이스 aimath26_txt_)
   ============================================================ */
var STORAGE_KEY = 'aimath26_txt_state';
var NS_PREFIX = 'aimath26_txt_';

/* W4 게임 온라인 채점 프록시 엔드포인트(§B W4·§D 5.1). 계약: POST {a, b} -> {score, raw}.
   [E-2 프록시 배포 별도 트랙] 홈서버(math-class.it.kr) 배포는 이 세션 범위 밖 -- 배포 전에는
   핑이 항상 실패해 오프라인 폴백으로 자동 전환된다(D-5: fetch는 이 상수를 쓰는 어댑터·핑 한 곳뿐). */
var TXT_SIM_ENDPOINT = 'https://math-class.it.kr/api/txt-sim';

function mergeDefaults(def, saved){
  if(Array.isArray(def)){
    return Array.isArray(saved) ? saved : def.slice();
  }
  if(def && typeof def === 'object'){
    var keys = Object.keys(def);
    if(keys.length === 0){
      return (saved && typeof saved === 'object' && !Array.isArray(saved)) ? saved : {};
    }
    var out = {};
    for(var k in def){ out[k] = mergeDefaults(def[k], saved ? saved[k] : undefined); }
    return out;
  }
  return saved !== undefined ? saved : def;
}

function DEFAULT_STATE(){
  return {
    version: 2,
    screenId: 'W1',
    screens: {
      W1: { step:0, attrs: [], thought:'' },
      W2: { step:0, thought:'' },
      W3: { step:0, seen:{catdog:false, cartrain:false, catcar:false} },
      W4: { step:0, difficulty:'normal', mode:null, best:0, played:false, plays:0 },
      S1: { step:0, thought:'' },
      S2: { step:0, thought:'' },
      S3: { step:0, thought:'' },
      S4: { step:0, sentences:{}, confirmed:{} },
      S5: { step:0, shape:'circle', font:'sans', stopwordFilter:true, selected:{}, tfidfDoc:0, revealed:{}, calcStep:0 },
      S5C:{ step:0 },
      S6: { step:0, thought:'', computed:false }
    }
  };
}

var STATE = {
  data: null,
  load: function(){
    var loaded = null;
    try{
      var raw = localStorage.getItem(STORAGE_KEY);
      if(raw) loaded = JSON.parse(raw);
    }catch(e){ loaded = null; }
    /* 상태 v2 마이그레이션: 구버전(version!==2) 저장분은 폐기하고 기본값으로 시작한다(형제 파일
       ai·logic과 동일한 회차 위생 -- 캠프 전·실데이터 없음·교사 리셋 존재). */
    if(loaded && loaded.version !== 2){ loaded = null; }
    this.data = mergeDefaults(DEFAULT_STATE(), loaded);
    /* 변조·이종 저장분의 잘못된 screenId 새니타이즈 -- ROUTER.index()가 -1을 그대로
       SCREEN_DEFS에 인덱싱하면 TypeError로 부팅이 죽는다. */
    if(ROUTER.index(this.data.screenId) < 0){ this.data.screenId = 'W1'; }
    this.save();
  },
  save: function(){
    try{ localStorage.setItem(STORAGE_KEY, JSON.stringify(this.data)); }catch(e){}
  },
  reset: function(){
    try{
      var keys = Object.keys(localStorage);
      for(var i=0;i<keys.length;i++){ if(keys[i].indexOf(NS_PREFIX) === 0) localStorage.removeItem(keys[i]); }
    }catch(e){}
    this.data = DEFAULT_STATE();
    this.save();
  },
  screen: function(id){ return this.data.screens[id]; }
};

/* ============================================================
   2) ROUTER — 화면·서브 슬라이드(step) 목록·이동·진행바
   (logic.html 2회차 최신판의 view-pane 이중 pane·전환 엔진 이식. 이 학습지는 스크롤 페이지이므로
   pane은 정지 상태에서 일반 흐름에 놓이고, 전환 300ms 구간에서만 절대배치로 겹쳐 슬라이드한다.
   이번 단계는 10화면 전부 steps 길이 1(단일 step 래퍼) -- step-dots는 길이<2라 뜨지 않는다.) */
var SCREEN_DEFS = [
  {id:'W1', section:1, label:'속성 나열'},
  {id:'W2', section:1, label:'유사성 = 속성 겹침'},
  {id:'W3', section:1, label:'코사인 유사도'},
  {id:'W4', section:1, label:'코사인 이어말하기 게임'},
  {id:'S1', section:2, label:'문장은 어떻게 비슷할까?'},
  {id:'S2', section:2, label:'문장은 무엇을 비교하나'},
  {id:'S3', section:2, label:'다 비교해야 할까?'},
  {id:'S4', section:2, label:'문장 분해'},
  {id:'S5', section:2, label:'워드클라우드·중요도 점수'},
  {id:'S5C', section:2, label:'이 점수로 무엇을 할까'},
  {id:'S6', section:2, label:'문장의 코사인 유사도'}
];
var SECTION_LABEL = {1:'섹션1 · 단어 사이의 관계', 2:'섹션2 · 문장 사이의 관계'};

/* ---- KaTeX 렌더 헬퍼: [data-katex] 전부에 수식을 그린다. katex 미로드 시 원문 텍스트로 폴백.
   W3 코사인 레시피(CosineRecipe) 등 data-katex 사용처가 화면 곳곳에 있다. ---- */
function renderMath(root){
  if(!root || !root.querySelectorAll) return;
  var nodes = root.querySelectorAll('[data-katex]');
  for(var i=0;i<nodes.length;i++){
    var node = nodes[i];
    var tex = node.getAttribute('data-katex') || '';
    if(typeof katex === 'undefined'){
      node.textContent = tex;
      continue;
    }
    try{ katex.render(tex, node, {throwOnError:false}); }
    catch(e){ node.textContent = tex; }
  }
}

/* ---- 서브 슬라이드 엔진 헬퍼: SCREENS[id].steps(배열) 위에서 화면·step 이동을 통일 처리한다. ---- */
function currentMod(){ return SCREENS[STATE.data.screenId]; }
function stepCountOf(mod){ return (mod && mod.steps && mod.steps.length) ? mod.steps.length : 0; }
function currentStepIdx(){
  var mod = currentMod();
  var n = stepCountOf(mod);
  if(!n) return 0;
  var st = STATE.screen(STATE.data.screenId);
  var idx = (st && typeof st.step === 'number') ? st.step : 0;
  if(idx < 0) idx = 0;
  if(idx > n-1) idx = n-1;
  return idx;
}
function mountCurrentView(pane){
  var mod = currentMod();
  if(!mod) return mod;
  var n = stepCountOf(mod);
  if(n){
    var idx = currentStepIdx();
    mod.steps[idx].mount(pane);
    renderStepDots(pane, mod, idx);
  } else {
    mod.mount(pane);
  }
  renderMath(pane);
  return mod;
}
function renderStepDots(pane, mod, idx){
  if(!mod.steps || mod.steps.length<2) return;
  var row = el('div', {class:'step-dots'});
  for(var i=0;i<mod.steps.length;i++){
    row.appendChild(el('span', {class:'step-dot'+(i===idx?' active':''), 'aria-hidden':'true'}));
  }
  row.appendChild(el('span', {class:'sr-only'}, (idx+1) + ' / ' + mod.steps.length + ' 단계'));
  pane.insertBefore(row, pane.firstChild);
}
function focusView(pane){
  var heading = pane.querySelector('h1, h2');
  var target = heading || pane;
  if(!target.hasAttribute('tabindex')) target.setAttribute('tabindex', '-1');
  target.focus({preventScroll:true});
}
/* refresh()(같은 화면 내 재구성) 전용 포커스 착지: 제목으로 강탈하지 않고 호출부가 지정한
   조작 원점(selector)이 있으면 그곳, 없으면 새로 그려진 영역의 첫 컨트롤로 되돌린다. */
function focusFirstControl(pane, selector){
  var target = selector ? pane.querySelector(selector) : null;
  if(!target){
    target = pane.querySelector('button:not([disabled]), a[href], input:not([disabled]), select:not([disabled]), textarea:not([disabled]), [tabindex]:not([tabindex="-1"])');
  }
  if(!target){ focusView(pane); return; }
  target.focus({preventScroll:true});
}
function announceViewChange(def){
  var mod = currentMod();
  var n = stepCountOf(mod);
  if(n){ announce(def.label + ' 화면, ' + (currentStepIdx()+1) + ' / ' + n + ' 단계'); }
  else { announce(def.label + ' 화면'); }
}

var ROUTER = {
  screenEl: null,
  activePane: null,
  _transitioning: false,
  _transitionTimer: null,
  index: function(id){ for(var i=0;i<SCREEN_DEFS.length;i++){ if(SCREEN_DEFS[i].id===id) return i; } return -1; },
  stepCount: function(mod){ return stepCountOf(mod); },
  go: function(id, opts){
    opts = opts || {};
    if(this.index(id) < 0 || this._transitioning) return;
    var curMod = currentMod();
    if(curMod && curMod.onStepExit && id !== STATE.data.screenId) curMod.onStepExit(currentStepIdx());
    var mod = SCREENS[id];
    var tgtState = STATE.data.screens[id];
    var n = stepCountOf(mod);
    if(n){
      if(opts.enterStep === 'last') tgtState.step = n-1;
      else if(opts.enterStep === 'first') tgtState.step = 0;
      else if(typeof tgtState.step !== 'number' || tgtState.step<0 || tgtState.step>=n) tgtState.step = 0;
    }
    STATE.data.screenId = id;
    STATE.save();
    this.transitionTo(opts.dir || 'next', {silent: opts.silent});
  },
  canGoNext: function(){
    var mod = currentMod();
    if(!mod) return true;
    var n = stepCountOf(mod);
    if(n){
      var step = mod.steps[currentStepIdx()];
      return step && typeof step.isComplete === 'function' ? !!step.isComplete() : true;
    }
    return typeof mod.isComplete === 'function' ? !!mod.isComplete() : true;
  },
  next: function(){
    if(this._transitioning) return;
    var mod = currentMod();
    var n = stepCountOf(mod);
    if(n){
      var stAll = STATE.screen(STATE.data.screenId);
      var idx = (typeof stAll.step === 'number') ? stAll.step : 0;
      if(idx < n-1){
        if(!this.canGoNext()) return;
        if(mod.onStepExit) mod.onStepExit(idx);
        stAll.step = idx+1;
        STATE.save();
        this.transitionTo('next', {});
        return;
      }
    }
    if(!this.canGoNext()) return;
    if(mod && mod.onStepExit) mod.onStepExit(currentStepIdx());
    var i = this.index(STATE.data.screenId);
    if(i < SCREEN_DEFS.length-1){ this.go(SCREEN_DEFS[i+1].id, {dir:'next', enterStep:'first'}); return; }
    /* B6: 마지막 화면·마지막 단계에서 '완료' 클릭은 더 이동할 곳이 없어 그대로면 무반응이었다.
       종료 피드백(토스트+SR 안내)을 준다. */
    toast('학습을 마쳤어요!');
    announce('학습을 마쳤어요.');
  },
  prev: function(){
    if(this._transitioning) return;
    var mod = currentMod();
    var n = stepCountOf(mod);
    if(n){
      var stAll = STATE.screen(STATE.data.screenId);
      var idx = (typeof stAll.step === 'number') ? stAll.step : 0;
      if(idx > 0){
        if(mod.onStepExit) mod.onStepExit(idx);
        stAll.step = idx-1;
        STATE.save();
        this.transitionTo('prev', {});
        return;
      }
    }
    var i = this.index(STATE.data.screenId);
    if(i>0){
      if(mod && mod.onStepExit) mod.onStepExit(currentStepIdx());
      this.go(SCREEN_DEFS[i-1].id, {dir:'prev', enterStep:'last'});
    }
  },
  refresh: function(focusSelector){
    /* 화면·step을 새로 이동하지 않고 같은 위치를 다시 그려야 할 때 -- 전환 애니메이션 없이 즉시 교체. */
    this._rebuild();
    focusFirstControl(this.activePane, focusSelector);
  },
  render: function(){
    /* 최초 부팅·교사 리셋 등: 전환 애니메이션 없이 현재 위치를 그대로 그리고 제목에 포커스한다 */
    this._rebuild();
    focusView(this.activePane);
  },
  _rebuild: function(){
    /* render()·refresh() 공용 재그리기. 대기 중인 전환 타이머가 있으면 취소해 스테일 activePane
       참조·pane 누수를 막는다 — transitionTo의 전환 타이머가 나중에 발화하며 activePane을 이미
       DOM에서 떨어져나간 newPane으로 덮어써, 다음 실제 전환이 지금 새로 그린 pane을 영영 못 지우는
       문제를 막는다. */
    if(this._transitionTimer){ clearTimeout(this._transitionTimer); this._transitionTimer = null; }
    this._transitioning = false;
    var i = this.index(STATE.data.screenId);
    var def = SCREEN_DEFS[i];
    this.screenEl.innerHTML = '';
    var pane = el('div', {class:'view-pane pane-active'});
    this.screenEl.appendChild(pane);
    mountCurrentView(pane);
    this.activePane = pane;
    renderProgress(i, def);
    renderNav(i);
  },
  transitionTo: function(dir, opts){
    opts = opts || {};
    var self = this;
    var i = this.index(STATE.data.screenId);
    var def = SCREEN_DEFS[i];
    var oldPane = this.activePane;
    var newPane = el('div', {class:'view-pane'});
    this.screenEl.appendChild(newPane);
    mountCurrentView(newPane);
    renderProgress(i, def);
    renderNav(i);
    if(FX.reducedMotion){
      if(oldPane) oldPane.remove();
      newPane.classList.add('pane-active');
      this.activePane = newPane;
      focusView(newPane);
      if(!opts.silent) announceViewChange(def);
      return;
    }
    var enterCls = dir==='prev' ? 'pane-enter-left' : 'pane-enter-right';
    var exitCls = dir==='prev' ? 'pane-exit-right' : 'pane-exit-left';
    self._transitioning = true;
    newPane.classList.add(enterCls);
    void newPane.offsetWidth; /* 강제 리플로우로 진입 시작 상태를 확정한 뒤, 다음 프레임에 목표 상태로 전환한다(FLIP 기법) */
    if(oldPane) oldPane.classList.add(exitCls);
    requestAnimationFrame(function(){
      newPane.classList.remove(enterCls);
      newPane.classList.add('pane-active');
    });
    if(self._transitionTimer){ clearTimeout(self._transitionTimer); }
    self._transitionTimer = setTimeout(function(){
      self._transitionTimer = null;
      if(oldPane) oldPane.remove();
      self.activePane = newPane;
      self._transitioning = false;
      focusView(newPane);
      if(!opts.silent) announceViewChange(def);
    }, 300);
  }
};

function renderProgress(i, def){
  document.getElementById('sectionTag').textContent = SECTION_LABEL[def.section];
  var track = document.getElementById('progressTrack');
  track.innerHTML = '';
  SCREEN_DEFS.forEach(function(s, idx){
    var seg = document.createElement('span');
    seg.className = 'progress-seg' + (idx < i ? ' section-done' : '');

var _lastGateEnabled = null; /* 게이팅 상태 전환 감지용(같은 상태에서 재렌더될 때 announce 반복 방지) */
function renderNav(i){
  var prevBtn = document.getElementById('prevBtn');
  var nextBtn = document.getElementById('nextBtn');
  var status = document.getElementById('navStatus');
  var mod = SCREENS[SCREEN_DEFS[i].id];
  var n = stepCountOf(mod);
  var stepIdx = n ? currentStepIdx() : 0;
  var atFirstStep = !n || stepIdx===0;
  var atLastStep = !n || stepIdx===n-1;
  prevBtn.style.visibility = (i>0 || !atFirstStep) ? 'visible' : 'hidden';
  var isLast = (i === SCREEN_DEFS.length-1) && atLastStep;
  nextBtn.textContent = isLast ? '완료' : '다음';
  var enabled = ROUTER.canGoNext();
  /* 마지막 화면·마지막 step도 게이팅 규칙 동일 적용(완료 버튼이 실제 완료 여부를 보여준다).
     ROUTER.next()가 마지막 위치에서는 어차피 이동하지 않으므로 활성화돼도 안전하다. */
  setDisabled(nextBtn, !enabled);
  var stepTxt = n>1 ? (' · ' + (stepIdx+1) + '/' + n + '단계') : '';
  var gateTxt = enabled ? '' : ' · 아직 완료되지 않았어요';
  status.textContent = (i+1) + ' / ' + SCREEN_DEFS.length + ' · ' + SCREEN_DEFS[i].label + stepTxt + gateTxt;
  if(!enabled && _lastGateEnabled !== false){ announce('다음으로 넘어가려면 이 화면을 먼저 완료하세요.'); }
  _lastGateEnabled = enabled;
}

function refreshNav(){
  var i = ROUTER.index(STATE.data.screenId);
  renderNav(i);
}

/* ============================================================
   3) COMPONENTS — 상속 컴포넌트 팩토리
   ============================================================ */
function el(tag, attrs, children){
  var e = document.createElement(tag);
  if(attrs){
    for(var k in attrs){
      var v = attrs[k];
      if(v == null) continue;
      if(k === 'class') e.className = v;
      else if(k === 'html') e.innerHTML = v; /* 사용 금지(현재 호출처 0, G11) -- XSS 표면 축소를 위해 남겨두되 쓰지 않는다 */
      else if(k.indexOf('on') === 0 && typeof v === 'function') e.addEventListener(k.slice(2), v);
      else if(k === 'style' && typeof v === 'object'){ for(var sk in v) e.style[sk] = v[sk]; }
      else e.setAttribute(k, v);
    }
  }
  if(children){
    (Array.isArray(children) ? children : [children]).forEach(function(c){
      if(c == null) return;
      e.appendChild(typeof c === 'string' ? document.createTextNode(c) : c);
    });
  }
  return e;
}

function setDisabled(btn, disabled){
  var hadFocus = document.activeElement === btn;
  btn.disabled = disabled;
  if(disabled && hadFocus){
    var root = document.getElementById('screenRoot');
    if(root) root.focus({preventScroll:true});
  }
}

function announce(msg){
  var lr = document.getElementById('liveRegion');
  if(lr) lr.textContent = msg;
}

var toastTimer = null;
function toast(msg){
  var t = document.getElementById('toast');
  if(!t) return;
  t.textContent = msg;
  clearTimeout(toastTimer);
  toastTimer = setTimeout(function(){ t.textContent = ''; }, 2400);
}

/* ---- 한글 조사 판정 헬퍼(B5) — 가변 단어(게임 입력·병합 표면형·"문장1" 같은 숫자suffix
   라벨 등) 뒤에 붙는 조사를 마지막 글자 받침 유무로 고른다. 한글 완성형 유니코드
   범위(가=0xAC00~힣=0xD7A3)면 유니코드로, 마지막 글자가 아라비아 숫자면 그 한국어
   발음(일·이·삼...)의 받침으로 판정한다(그 외 문자는 받침 없는 것으로 취급). ---- */
var DIGIT_FINAL = {'0':'ㅇ','1':'ㄹ','2':null,'3':'ㅁ','4':null,'5':null,'6':'ㄱ','7':'ㄹ','8':'ㄹ','9':null};
function lastCharFinal(word){
  /* null = 받침 없음 / 'ㄹ' = ㄹ받침(으로·로 규칙에서만 받침 없는 것처럼 다뤄짐) / 'other' = 그 외 받침 */
  var w = String(word || '');
  if(!w) return null;
  var last = w.charAt(w.length - 1);
  if(Object.prototype.hasOwnProperty.call(DIGIT_FINAL, last)){
    var d = DIGIT_FINAL[last];
    return d === null ? null : (d === 'ㄹ' ? 'ㄹ' : 'other');
  }
  var code = last.charCodeAt(0) - 0xAC00;
  if(code < 0 || code > 11171) return null;
  var fin = code % 28;
  if(fin === 0) return null;
  return fin === 8 ? 'ㄹ' : 'other';
}
var JOSA = {
  eunNeun: function(w){ return lastCharFinal(w) ? '은' : '는'; },
  iGa: function(w){ return lastCharFinal(w) ? '이' : '가'; },
  eulReul: function(w){ return lastCharFinal(w) ? '을' : '를'; },
  waGwa: function(w){ return lastCharFinal(w) ? '과' : '와'; },
  euroRo: function(w){
    var f = lastCharFinal(w);
    return (f === null || f === 'ㄹ') ? '로' : '으로';
  }
};

var _svgIdSeq = 0; /* VectorAngleDiagram의 SVG marker id 충돌 방지용 전역 일련번호 */

/* ---- D-3 각도 호 아이콘: 코사인 값(0~1)을 0~90도 쐐기(부채꼴)로 이중 인코딩한다.
   값이 1(완전 같은 방향)이면 쐐기가 거의 안 보이고, 0(직각)이면 4분원 전체가 채워진다 —
   "코사인 1에 가까울수록 비슷하다"는 기존 언어와 같은 방향으로 읽힌다. SVG 좌표는 원점을
   좌하단에 두고(오른쪽=0도, 위쪽=90도) 그린다. ---- */
function buildAngleWedge(value){
  var v = Math.max(0, Math.min(1, value || 0));
  var theta = Math.acos(v); /* 라디안, 0~PI/2 */
  var size = 30, r = 12, ox = 4, oy = size - 4;
  var ex = ox + r*Math.cos(theta), ey = oy - r*Math.sin(theta);
  var d = 'M' + ox + ',' + oy + ' L' + (ox+r) + ',' + oy + ' A' + r + ',' + r + ' 0 0 0 ' + ex + ',' + ey + ' Z';
  var svgNS = 'http://www.w3.org/2000/svg';
  var svg = document.createElementNS(svgNS, 'svg');
  svg.setAttribute('viewBox', '0 0 ' + size + ' ' + size);
  svg.setAttribute('width', String(size)); svg.setAttribute('height', String(size));
  svg.setAttribute('class', 'angle-wedge'); svg.setAttribute('aria-hidden', 'true');
  var bg = document.createElementNS(svgNS, 'path');
  bg.setAttribute('d', 'M' + ox + ',' + oy + ' L' + (ox+r) + ',' + oy + ' A' + r + ',' + r + ' 0 0 0 ' + ox + ',' + (oy-r) + ' Z');
  bg.setAttribute('fill', 'none'); bg.setAttribute('stroke', 'var(--hairline)'); bg.setAttribute('stroke-width', '1');
  var wedge = document.createElementNS(svgNS, 'path');
  wedge.setAttribute('d', d);
  wedge.setAttribute('fill', 'var(--incl)'); wedge.setAttribute('opacity', '0.55');
  svg.appendChild(bg); svg.appendChild(wedge);
  return svg;
}

      marker.setAttribute('refX', '6'); marker.setAttribute('refY', '3'); marker.setAttribute('orient', 'auto');
      var mpath = document.createElementNS(svgNS, 'path');

    originDot.setAttribute('cx', String(ox)); originDot.setAttribute('cy', String(oy)); originDot.setAttribute('r', '3');

       코사인이 음수가 될 수 없다)를 잇는 작은 호. */

    arcPath.setAttribute('fill', 'none'); arcPath.setAttribute('stroke', 'var(--muted)'); arcPath.setAttribute('stroke-width', '2');
    svg.appendChild(arcPath);

      if(opts.labelB) legend.appendChild(el('span', {style:{color:colorB}}, '● ' + opts.labelB));

  }
};
