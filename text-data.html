var FX = {
  reducedMotion: (function(){
    try{ return window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches; }catch(e){ return false; }
  })(),
  easeOutCubic: function(t){ return 1 - Math.pow(1-t, 3); },
  easeOutBack: function(t){ var c1=1.70158, c3=c1+1; return 1 + c3*Math.pow(t-1,3) + c1*Math.pow(t-1,2); },
  easeInOutQuad: function(t){ return t<0.5 ? 2*t*t : 1-Math.pow(-2*t+2,2)/2; },
  tween: function(opts){
    var duration = FX.reducedMotion ? 1 : (opts.duration || 300);
    var start = null;
    var easing = opts.easing || FX.easeOutCubic;
    function frame(ts){
      if(start === null) start = ts;
      var t = Math.min(1, (ts-start)/duration);
      opts.onUpdate(easing(t));
      if(t < 1) requestAnimationFrame(frame);
      else if(opts.onDone) opts.onDone();
    }
    requestAnimationFrame(frame);
  },
  pop: function(node){
    if(!node) return;
    node.classList.remove('fx-pop'); void node.offsetWidth;
    node.classList.add('fx-pop');
  },
  shake: function(node){
    if(!node) return;
    node.classList.remove('fx-shake'); void node.offsetWidth;
    node.classList.add('fx-shake');
  },
  confetti: function(container, colors){
    if(FX.reducedMotion) return;
    colors = colors || ['#ff4d8b','#1a3a3a','#b8a4ed','#ffb084','#e8b94a','#2ea043'];
    var n = 16;
    for(var i=0;i<n;i++){
      (function(i){
        var piece = el('span', {class:'confetti-piece'});
        piece.style.background = colors[i % colors.length];
        piece.style.left = '50%';
        piece.style.top = '50%';
        container.style.position = container.style.position || 'relative';
        container.appendChild(piece);
        var angle = Math.random()*Math.PI*2;
        var dist = 36 + Math.random()*60;
        var dx = Math.cos(angle)*dist, dy = Math.sin(angle)*dist - 16;
        FX.tween({
          duration: 450 + Math.random()*200,
          easing: FX.easeOutCubic,
          onUpdate: function(t){
            piece.style.transform = 'translate('+(dx*t)+'px,'+(dy*t)+'px) rotate('+(t*260)+'deg)';
            piece.style.opacity = String(1-t);
          },
          onDone: function(){ piece.remove(); }
        });
      })(i);
    }
  },
  countUp: function(node, from, to, opts){
    opts = opts || {};
    FX.tween({
      duration: opts.duration || 500,
      easing: FX.easeOutBack,
      onUpdate: function(t){ node.textContent = Math.round(from + (to-from)*t) + (opts.suffix||''); },
      onDone: opts.onDone
    });
  },
  /* Canvas 2D 파티클 버스트(게임필 6.4) — 이어말하기 성공 등에 사용.
     anchorEl 중심에서 잠깐 터졌다 사라지는 작은 캔버스(라이브러리 없이 rAF 직접 구현). */
  canvasBurst: function(anchorEl, opts){
    if(FX.reducedMotion || !anchorEl) return;
    opts = opts || {};
    var colors = opts.colors || ['#2ea043','#2f6df0','#e8b94a','#ff4d8b'];
    var rect = anchorEl.getBoundingClientRect();
    var size = 180;
    var canvas = document.createElement('canvas');
    var dpr = window.devicePixelRatio || 1;
    canvas.width = size*dpr; canvas.height = size*dpr;
    canvas.style.position = 'fixed';
    canvas.style.left = (rect.left + rect.width/2 - size/2) + 'px';
    canvas.style.top = (rect.top + rect.height/2 - size/2) + 'px';
    canvas.style.width = size + 'px'; canvas.style.height = size + 'px';
    canvas.style.pointerEvents = 'none';
    canvas.style.zIndex = '70';
    document.body.appendChild(canvas);
    var ctx = canvas.getContext('2d');
    ctx.setTransform(dpr,0,0,dpr,0,0);
    var n = opts.count || 16;
    var parts = [];
    for(var i=0;i<n;i++){
      var angle = Math.random()*Math.PI*2, speed = 1.2 + Math.random()*2.0;
      parts.push({vx:Math.cos(angle)*speed, vy:Math.sin(angle)*speed - 1.2, color: colors[i % colors.length]});
    }
    var start = null, durationMs = 650;
    function frame(ts){
      if(start === null) start = ts;
      var t = (ts-start)/durationMs;
      ctx.clearRect(0,0,size,size);
      if(t < 1){
        parts.forEach(function(p){
          var x = size/2 + p.vx*t*46, y = size/2 + p.vy*t*46 + 24*t*t*46;
          ctx.globalAlpha = Math.max(0, 1-t);
          ctx.fillStyle = p.color;
          ctx.fillRect(x-3, y-3, 6, 6);
        });
        ctx.globalAlpha = 1;
        requestAnimationFrame(frame);
      } else {
        canvas.remove();
      }
    }
    requestAnimationFrame(frame);
  }
};

/* ============================================================
   6) SIM — 속성벡터·코사인 유사도 + 단어망 조회
   ============================================================ */
var SIM = {
  attrsOf: function(word){
    var w = resolveWord(word);
    return w ? DATA.words[w] : null;
  },
  /* 속성 체크표(AttrTable) — 두 단어를 나란히, 공통(둘 다 1) 속성 점등.
     container에 표를 붙이고 {commonAttrs} 를 반환한다. */
  AttrTable: function(container, wordA, wordB){
    var va = SIM.attrsOf(wordA), vb = SIM.attrsOf(wordB);
    var wrap = el('div', {class:'attr-table-wrap'});
    var table = el('table', {class:'attr-table'});
    var thead = el('tr', {});
    thead.appendChild(el('th', {}, '속성'));
    thead.appendChild(el('th', {}, wordA));
    thead.appendChild(el('th', {}, wordB));
    table.appendChild(thead);
    DATA.attributes.forEach(function(name, i){
      var a = va[i], b = vb[i];
      var tr = el('tr', {class: (a===1 && b===1) ? 'attr-row-common' : ''});
      tr.appendChild(el('td', {class:'attr-name'}, name));
      tr.appendChild(el('td', {}, el('span', {class:'attr-cell ' + (a?'on':'off')}, a ? '✓ 있음' : '— 없음')));
      tr.appendChild(el('td', {}, el('span', {class:'attr-cell ' + (b?'on':'off')}, b ? '✓ 있음' : '— 없음')));
      table.appendChild(tr);
    });
    wrap.appendChild(table);
    container.appendChild(wrap);
    var common = DATA.attributes.filter(function(name, i){ return va[i]===1 && vb[i]===1; });
    return {commonAttrs: common};
  },
  /* 속성 체크표 압축판(AttrTableCompact) — W2·W3 개정: 32속성 전행 대신 두 단어 중
     하나라도 가진 속성(합집합)만 표시하고, 둘 다 0인 속성은 "N개 접힘" 한 줄로 존재만
     알린다(기본 접힘, 탭 시 펼침). 좁은 화면에서는 CSS로 2단 그리드로 재배치된다. */
  AttrTableCompact: function(container, wordA, wordB){
    var va = SIM.attrsOf(wordA), vb = SIM.attrsOf(wordB);
    var wrap = el('div', {class:'screen-block'});
    wrap.appendChild(el('p', {class:'muted', style:{margin:'0 0 6px'}}, '속성 비교: ' + wordA + ' · ' + wordB + ' (둘 중 하나라도 가진 속성만)'));
    var grid = el('div', {class:'attr-compact-grid'});
    var common = [], hidden = [];
    DATA.attributes.forEach(function(name, i){
      var a = va[i], b = vb[i];
      if(a !== 1 && b !== 1){ hidden.push(name); return; }
      if(a === 1 && b === 1) common.push(name);
      var row = el('div', {class:'attr-compact-row' + (a===1 && b===1 ? ' common' : '')});
      row.appendChild(el('span', {class:'name'}, name));
      var vals = el('span', {class:'vals'});
      vals.appendChild(el('span', {class:'val ' + (a?'on':'off')}, a ? '✓' : '—'));
      vals.appendChild(el('span', {class:'val ' + (b?'on':'off')}, b ? '✓' : '—'));
      row.appendChild(vals);
      grid.appendChild(row);
    });
    wrap.appendChild(grid);
    if(hidden.length){
      var open = false;
      var hiddenText = el('p', {class:'muted', style:{display:'none', fontSize:'13px'}}, hidden.join(', '));
      var toggle = el('button', {type:'button', class:'btn btn-ghost btn-sm', 'aria-expanded':'false'},
        '둘 다 없는 속성 ' + hidden.length + '개 접힘');
      toggle.addEventListener('click', function(){
        open = !open;
        hiddenText.style.display = open ? '' : 'none';
        toggle.setAttribute('aria-expanded', open ? 'true' : 'false');
        toggle.textContent = '둘 다 없는 속성 ' + hidden.length + '개 ' + (open ? '펼침' : '접힘');
      });
      wrap.appendChild(toggle);
      wrap.appendChild(hiddenText);
    }
    container.appendChild(wrap);
    return {commonAttrs: common};
  }
};

/* ============================================================
   7) GAME — 코사인 이어말하기 (타이머·콤보·점수) — 9.2 · [이미지] 규칙
   W4 게임 채점 한정 온라인 어댑터(§B W4): 시작 모달에서 프록시 핑 -> 성공 시
   온라인(Gemini 임베딩 경유) 채점, 실패 시 기존 속성벡터 채점(오프라인)으로
   자동 전환. 게임 중 연속 2회 실패해도 동일하게 폴백한다(D-8 게이팅과는 별도 관심사).
   ============================================================ */
var GAME = {
  THRESHOLDS: {easy:55, normal:60, hard:70},
  timerHandle: null,
  live: null,
  onTick: null,  /* 현재 마운트된 W4 화면이 갈아끼우는 렌더 콜백 (화면 이동 후 복귀해도 갱신되도록) */
  mounted: false,  /* W4 화면이 실제로 마운트돼 있는지(D-8 게이팅 홀 수정) */
  failStreak: 0,   /* 온라인 채점 연속 실패 횟수(판마다 리셋) */

  pickStartWord: function(){
    var keys = Object.keys(DATA.words);
    return keys[Math.floor(Math.random()*keys.length)];
  },
  start: function(difficulty){
    GAME.stop();
    GAME.failStreak = 0;
    var threshold = GAME.THRESHOLDS[difficulty] || 60;
    var w0 = GAME.pickStartWord();
    var used = {}; used[w0] = true;
    GAME.live = {current:w0, used:used, chain:[w0], combo:0, score:0, timeLeft:60, threshold:threshold, difficulty:difficulty, running:true};
    GAME.timerHandle = setInterval(function(){
      if(!GAME.live || !GAME.live.running) return;
      GAME.live.timeLeft -= 1;
      if(GAME.live.timeLeft <= 0){ GAME.live.timeLeft = 0; GAME.finish(); }
      if(GAME.onTick) GAME.onTick();
    }, 1000);
  },
  /* 타이머만 멈춘다(진행 저장 없음) — "그만하기"에서 사용 */
  stop: function(){
    if(GAME.timerHandle){ clearInterval(GAME.timerHandle); GAME.timerHandle = null; }
    if(GAME.live) GAME.live.running = false;
  },
  /* 화면 이탈(unmount) 시 호출 — 진행 중인 판을 stop()으로 무효화하고, 마운트 상태·
     렌더 콜백을 함께 끊는다. G3/D-8 게이팅 홀 수정의 핵심: 이 훅이 배선돼 있어야
     "이탈해도 타이머가 백그라운드에서 계속 돌아 완료 처리되는" 결함이 사라진다. */
  onScreenExit: function(){
    GAME.stop();
    GAME.mounted = false;
    GAME.onTick = null;
  },
  /* 자연 종료(60초 소진) — 완료 처리 + 최고점 저장. 9.5 완료 조건.
     gameRecordable()로 "W4가 실제로 마운트된 상태에서 60초를 소진했는지"를 한 번 더
     방어적으로 확인한다 — unmount 경로에서는 onScreenExit가 이미 타이머를 지우므로
     이 tick 자체가 발생하지 않지만, T6 게이트가 요구하는 이중 방어를 만족시킨다. */
  finish: function(){
    if(GAME.timerHandle){ clearInterval(GAME.timerHandle); GAME.timerHandle = null; }
    if(!GAME.live) return;
    GAME.live.running = false;
    var elapsed = 60 - GAME.live.timeLeft;
    if(gameRecordable(GAME.mounted, elapsed)){
      var st = STATE.screen('W4');
      st.plays = (st.plays||0) + 1;
      st.played = true;
      if(GAME.live.score > (st.best||0)) st.best = GAME.live.score;
      STATE.save();
      refreshNav();
    }
    if(GAME.onTick) GAME.onTick();
  },
  /* 오프라인 채점(기존 속성벡터 142단어 + 후보 안내) — 온라인 모드에서도 요청 실패 시
     이 경로로 그 제출을 마저 처리한다(폴백). input은 이미 위생 필터를 통과한 문자열. */
  scoreOffline: function(input, live){
    var resolved = resolveWord(input);
    if(!resolved){
      return {type:'unknown', candidates: topCandidates(live.current, 3)};
    }
    if(live.used[resolved]){
      return {type:'reused', word:resolved};
    }
    var cosVal = wordCosine(live.current, resolved);
    var score = gameScore(cosVal);
    if(score >= live.threshold) return applyGameSuccess(live, resolved, score);
    return applyGameFail(live, resolved, score);
  },
  /* 오프라인 모드 제출(동기) — 기존 로직 그대로, scoreOffline으로 위임만 정리 */
  submit: function(raw){
    var live = GAME.live;
    if(!live || !live.running) return {type:'inactive'};
    var input = (raw||'').trim();
    if(!input) return {type:'empty'};
    return GAME.scoreOffline(input, live);
  },
  /* 온라인 모드 제출(비동기) — 프록시로 현재 단어(a)·입력(b)을 보내 score를 받는다.
     성공/콤보/시간보너스 효과는 applyGameSuccess/applyGameFail로 오프라인과 동일하게
     처리한다(채점 소스만 다르다). 요청 실패·타임아웃이면 그 제출은 오프라인 채점으로
     마저 처리하고, 연속 실패가 fallbackDecision 기준에 닿으면 모드 자체를 offline으로
     전환한다(진행·점수·timeLeft는 그대로 유지). */
  submitOnline: function(raw, cb){
    var live = GAME.live;
    if(!live || !live.running){ cb({type:'inactive'}); return; }
    var input = sanitizeInput(raw);
    if(!input){ cb({type:'empty'}); return; }
    if(live.used[input]){ cb({type:'reused', word:input}); return; }
    fetchSimScore(live.current, input, function(err, result, timedOut){
      if(err){
        GAME.failStreak += 1;
        var fellBack = fallbackDecision(GAME.failStreak, !!timedOut);
        if(fellBack){
          var st = STATE.screen('W4');
          st.mode = 'offline';
          STATE.save();
        }
        cb(GAME.scoreOffline(input, live), {fellBack: fellBack});
        return;
      }
      GAME.failStreak = 0;
      var score = result.score;
      cb(score >= live.threshold ? applyGameSuccess(live, input, score) : applyGameFail(live, input, score));
    });
  },

  mount: function(container){
    GAME.mounted = true;
    var st = STATE.screen('W4');
    var wrap = el('div', {class:'screen-block'});
    container.appendChild(wrap);
    var els = {};

    function renderIdle(){
      GAME.onTick = null;
      wrap.innerHTML = '';
      var intro = el('div', {class:'game-modal'});
      intro.appendChild(el('h3', {}, '코사인 이어말하기'));
      intro.appendChild(el('p', {}, '코사인 유사도? 두 단어의 의미적 유사성을 0~1 사이의 값으로 나타내요. 값이 1에 가까울수록 두 단어의 의미가 비슷해요.'));
      intro.appendChild(el('p', {}, [el('strong',{},'게임 방법'), el('br'),
        '현재 단어와 의미상 유사한 명사를 입력하세요', el('br'),
        '유사도 점수가 난이도 기준 이상이면 성공!', el('br'),
        '60초 안에 최대한 많은 단어를 연결하세요', el('br'),
        '연속 성공 시 콤보 보너스 시간 +5초!']));
      intro.appendChild(el('p', {}, [el('strong',{},'점수 시스템'), el('br'),
        '60~69점 기본 +10점 · 70~79점 +15점 · 80~89점 +20점 · 90점 이상 +30점', el('br'),
        '3콤보 이상: 시간 +5초 보너스!']));
      intro.appendChild(el('p', {}, '여러분이 방금 손으로 계산한 그 코사인 유사도를, 이번엔 진짜 AI의 벡터로 계산해요.'));
      intro.appendChild(el('p', {class:'muted'}, '최고 점수: ' + (st.best||0) + '점' + (st.played ? ' · 플레이 완료' : '')));

      var modeRow = el('div', {class:'mode-badge-row'});
      var modeBadge = el('span', {class:'mode-badge', 'aria-live':'polite'}, '연결 확인 중…');
      modeRow.appendChild(modeBadge);
      intro.appendChild(modeRow);

      function refreshModeBadge(){
        var mode = st.mode;
        modeBadge.className = 'mode-badge' + (mode === 'online' ? ' on' : mode === 'offline' ? ' off' : '');
        modeBadge.textContent = mode === 'online' ? '온라인 모드' : mode === 'offline' ? '오프라인 모드' : '연결 확인 중…';
        var oldRetry = modeRow.querySelector('.retry-btn');
        if(oldRetry) oldRetry.remove();
        if(mode === 'offline'){
          var retry = el('button', {type:'button', class:'btn btn-ghost btn-sm retry-btn'}, '다시 연결해보기');
          retry.addEventListener('click', doPing);
          modeRow.appendChild(retry);
        }
      }
      function doPing(){
        st.mode = null; STATE.save(); refreshModeBadge();
        pingProxy(function(ok){
          st.mode = ok ? 'online' : 'offline';
          STATE.save();
          refreshModeBadge();
          updateModeBadge();
        });
      }
      refreshModeBadge();
      doPing();

      var diffLabel = el('div', {class:'thought-label'}, '난이도 선택');
      intro.appendChild(diffLabel);
      intro.appendChild(Components.SegToggle({
        ariaLabel:'난이도 선택',
        value: st.difficulty,
        options:[{value:'easy',label:'쉬움(55점)'},{value:'normal',label:'보통(60점)'},{value:'hard',label:'어려움(70점)'}],
        onChange:function(v){ st.difficulty = v; STATE.save(); }
      }));
      var startBtn = el('button', {type:'button', class:'btn btn-primary', style:{marginTop:'var(--sp-md)'}}, '게임 시작');
      startBtn.addEventListener('click', function(){
        GAME.start(st.difficulty);
        buildPlayingShell();
        refreshChain();
        renderHUD();
        if(els.input) els.input.focus();
      });
      intro.appendChild(startBtn);
      wrap.appendChild(intro);
    }

    function buildPlayingShell(){
      wrap.innerHTML = '';
      var hud = el('div', {class:'game-hud'});
      els.timeNum = el('span', {class:'hud-num'}, '60');
      els.comboNum = el('span', {class:'hud-num'}, '0');
      els.scoreNum = el('span', {class:'hud-num'}, '0');
      hud.appendChild(el('div', {class:'hud-chip'}, [els.timeNum, '초 남음']));
      hud.appendChild(el('div', {class:'hud-chip'}, [els.comboNum, '콤보']));
      hud.appendChild(el('div', {class:'hud-chip'}, [els.scoreNum, '점']));
      els.modeBadge = el('span', {class:'mode-badge', 'aria-live':'polite'}, '');
      hud.appendChild(els.modeBadge);
      wrap.appendChild(hud);
      updateModeBadge();

      els.timerFill = el('span', {class:'fill'});
      els.timerTrack = el('div', {class:'timer-track'}, els.timerFill);
      wrap.appendChild(els.timerTrack);

      els.cwWord = el('div', {class:'cw-word'}, GAME.live ? GAME.live.current : '');
      els.currentCard = el('div', {class:'current-word-card'}, [el('div', {class:'cw-label'}, '현재 단어'), els.cwWord]);
      wrap.appendChild(els.currentCard);

      els.meterHost = el('div', {});
      wrap.appendChild(els.meterHost);

      var inputRow = el('div', {class:'game-input-row'});
      els.input = el('input', {type:'text', 'aria-label':'유사한 명사 입력', autocomplete:'off'});
      var submitBtn = el('button', {type:'button', class:'btn btn-primary'}, '제출');
      function setBusy(busy){
        els.input.disabled = busy;
        setDisabled(submitBtn, busy);
        submitBtn.classList.toggle('fx-pulse', busy);
        submitBtn.textContent = busy ? '채점 중…' : '제출';
      }
      function doSubmit(){
        if(!GAME.live || !GAME.live.running) return;
        var val = els.input.value;
        els.input.value = '';
        if(st.mode === 'online'){
          setBusy(true);
          GAME.submitOnline(val, function(res, meta){
            setBusy(false);
            handleResult(res);
            if(meta && meta.fellBack){
              updateModeBadge();
              toast('연결이 원활하지 않아 오프라인 모드로 전환했어요.');
            }
            els.input.focus();
          });
        } else {
          handleResult(GAME.submit(val));
          els.input.focus();
        }
      }
      submitBtn.addEventListener('click', doSubmit);
      els.input.addEventListener('keydown', function(e){
        if(e.isComposing || e.keyCode === 229) return;
        if(e.key === 'Enter'){ e.preventDefault(); doSubmit(); }
      });
      inputRow.appendChild(els.input);
      inputRow.appendChild(submitBtn);
      wrap.appendChild(inputRow);

      els.feedback = el('div', {class:'game-feedback', 'aria-live':'polite'});
      wrap.appendChild(els.feedback);
      els.candidates = el('div', {class:'candidate-row'});
      wrap.appendChild(els.candidates);
      els.chainWrap = el('div', {class:'chain-wrap'});
      wrap.appendChild(els.chainWrap);

      var stopBtn = el('button', {type:'button', class:'btn btn-secondary btn-sm'}, '중단하고 나가기');
      stopBtn.addEventListener('click', function(){ GAME.stop(); renderIdle(); });
      wrap.appendChild(stopBtn);

      GAME.onTick = function(){
        if(GAME.live && GAME.live.running){ renderHUD(); }
        else { renderDone(); }
      };
    }

    function updateModeBadge(){
      if(!els.modeBadge) return;
      var mode = st.mode;
      els.modeBadge.className = 'mode-badge' + (mode === 'online' ? ' on' : mode === 'offline' ? ' off' : '');
      els.modeBadge.textContent = mode === 'online' ? '온라인' : mode === 'offline' ? '오프라인' : '확인 중';
    }

    function refreshChain(newWord){
      if(!els.chainWrap || !GAME.live) return;
      els.chainWrap.innerHTML = '';
      GAME.live.chain.forEach(function(w){
        els.chainWrap.appendChild(el('span', {class:'chain-word' + (w===newWord?' chain-new':'')}, w));
      });
    }

    function handleResult(res){
      if(res.type === 'inactive' || res.type === 'empty') return;
      if(res.type === 'unknown'){
        els.feedback.textContent = '그 단어는 아직 없어요. 이런 단어는 어때요?';
        els.feedback.className = 'game-feedback bad';
        els.candidates.innerHTML = '';
        res.candidates.forEach(function(c){
          var chip = el('button', {type:'button', class:'chip'}, c);
          chip.addEventListener('click', function(){ els.input.value = c; els.input.focus(); });
          els.candidates.appendChild(chip);
        });
        return;
      }
      els.candidates.innerHTML = '';
      if(res.type === 'reused'){
        els.feedback.textContent = '"' + res.word + '"' + JOSA.eunNeun(res.word) + ' 이미 사용했어요. 다른 단어를 입력해 보세요.';
        els.feedback.className = 'game-feedback bad';
        return;
      }
      if(res.type === 'success'){
        els.feedback.textContent = '성공! "' + res.word + '" 유사도 ' + res.score + '점 (+' + res.points + '점)' + (res.comboBonus ? ' · ' + res.combo + '콤보 보너스 +5초!' : '');
        els.feedback.className = 'game-feedback ok';
        els.meterHost.innerHTML = '';
        els.meterHost.appendChild(Components.SimilarityMeter({value: res.score/100, label: res.score + '점'}));
        FX.pop(els.currentCard);
        FX.canvasBurst(els.currentCard);
        refreshChain(res.word);
        renderHUD();
        return;
      }
      if(res.type === 'fail'){
        els.feedback.textContent = '아쉬워요. 유사도 ' + res.score + '점 (기준 ' + GAME.live.threshold + '점 미만). 다시 시도!';
        els.feedback.className = 'game-feedback bad';
        els.meterHost.innerHTML = '';
        els.meterHost.appendChild(Components.SimilarityMeter({value: res.score/100, label: res.score + '점', fail:true}));
        FX.shake(els.currentCard);
        renderHUD();
      }
    }

    function renderHUD(){
      var live = GAME.live;
      if(!live || !els.timeNum) return;
      els.timeNum.textContent = String(live.timeLeft);
      els.comboNum.textContent = String(live.combo);
      els.scoreNum.textContent = String(live.score);
      els.timerFill.style.width = Math.max(0, (live.timeLeft/60)*100) + '%';
      var low = live.timeLeft <= 10 && live.timeLeft > 0;
      els.timerTrack.classList.toggle('low', low);
      els.timerTrack.classList.toggle('fx-pulse', low);
      els.cwWord.textContent = live.current;
    }

    function renderDone(){
      wrap.innerHTML = '';
      var summary = el('div', {class:'game-summary'});
      summary.appendChild(el('div', {class:'muted'}, '이번 판 점수'));
      summary.appendChild(el('div', {class:'summary-score'}, String(GAME.live ? GAME.live.score : 0)));
      summary.appendChild(el('p', {}, '최고 점수: ' + (st.best||0) + '점 · 플레이 ' + (st.plays||0) + '회'));
      var again = el('button', {type:'button', class:'btn btn-primary'}, '다시 하기');
      again.addEventListener('click', function(){ renderIdle(); });
      summary.appendChild(again);
      wrap.appendChild(summary);
      FX.confetti(summary);
    }

    if(GAME.live && GAME.live.running){
      buildPlayingShell(); refreshChain(); renderHUD();
    } else if(GAME.live && !GAME.live.running && GAME.live.timeLeft === 0){
      renderDone();
    } else {
      renderIdle();
    }
  }
};

/* ============================================================
   8) MORPH — 형태소 토큰 편집판(MorphBoard) — [이미지] 인터랙션 그대로
   클릭=포함/제외, Shift+클릭=합치기 선택, 더블클릭=직접 수정,
   Ctrl+클릭=기본형→명사, ✂=분리. 조사·어미 자동 분리(기본 제외 후보).
   터치 대체(6.5): 롱프레스=합치기 선택, 두 번 탭=수정, 토큰 옆 아이콘
   버튼(🔗합치기·명사·✂분리·✏수정)으로 마우스 없이도 전부 가능.
   ============================================================ */
var MORPH = {
  POS_GROUP: {
    NNG:'noun',
    JX:'particle', JKS:'particle', JKO:'particle', JKB:'particle', JKG:'particle', JC:'particle',
    VV:'verb', VA:'adj',
    EC:'ending', EF:'ending', ETM:'ending', ETN:'ending',
    MAG:'adv', MM:'adv'
  },
  /* 품사 태그 한글 라벨화(2026-07-17 확정) — 토큰 위 칩·aria-label의 원시 코드(NNG·JX…) 대신
     이 라벨을 쓴다. POS_GROUP 색 계열은 그대로 유지. */
  POS_LABEL: {noun:'명사', particle:'조사', verb:'동사', adj:'형용사', ending:'어미', adv:'부사'},
  posGroup: function(pos){ return MORPH.POS_GROUP[pos] || 'adv'; },
  defaultIncluded: function(pos){ return pos === 'NNG'; },
  armedIndex: {},  /* sentenceIdx -> tokenIndex, 합치기 대기중(한 번에 하나) */

  ensureState: function(idx){
    var st = STATE.screen('S4');
    var cur = st.sentences[idx];
    /* B7: 손상값 방어 -- 배열 + 각 원소가 최소한의 토큰 형태(surface/pos/included)를
       갖췄는지만 확인한다. 변조·이종 저장분이면 원본 데이터로 재빌드한다. */
    var valid = Array.isArray(cur) && cur.length > 0 && cur.every(function(t){
      return t && typeof t === 'object' && typeof t.surface === 'string' && typeof t.pos === 'string' && typeof t.included === 'boolean';
    });
    if(!valid){
      var src = DATA.sentences[idx].tokens;
      st.sentences[idx] = src.map(function(t, i){
        return {id:'t'+idx+'_'+i, surface:t.surface, pos:t.pos, lemma:t.lemma || null,
                included: MORPH.defaultIncluded(t.pos), armed:false, baseApplied:false, nounStem:null, parts:null};
      });
      STATE.save();
    }
    return st.sentences[idx];
  },

  render: function(container, idx){
    var tokens = MORPH.ensureState(idx);
    /* T9·G4: armed(합치기 대기)는 화면 세션 안에서만 유효하다. 저장분에 armed:true가 남아있으면
       (armedIndex는 메모리 변수라 새로고침 후 소실되므로) 마운트 시 일괄 해제해 보라색 토큰
       잔류·이중 대기를 막는다. */
    var hadArmed = false;
    tokens.forEach(function(t){ if(t.armed){ t.armed = false; hadArmed = true; } });
    MORPH.armedIndex[idx] = null;
    if(hadArmed) STATE.save();
    var text = DATA.sentences[idx].text;
    var wrap = el('div', {class:'screen-block'});
    wrap.appendChild(el('h3', {style:{fontSize:'15px'}}, '예시 문장 ' + (idx+1) + ' — "' + text + '"'));
    wrap.appendChild(el('div', {class:'morph-instructions'},
      '클릭 → 포함/제외 · Shift+클릭(또는 길게 누르기·🔗버튼) → 합치기(2개 선택 시 자동 합침) · ' +
      '더블클릭(또는 두 번 탭·✏버튼) → 직접 수정 · Ctrl+클릭(또는 "명사"버튼) → 동사·형용사 기본형을 명사로 · ✂ → 분리'));

    var board = el('div', {class:'morph-board'});
    var resultHost = el('div', {class:'morph-result'});
    var confirmBtn = el('button', {type:'button', class:'btn btn-secondary', style:{marginTop:'8px'}});
    wrap.appendChild(board);
    wrap.appendChild(resultHost);
    wrap.appendChild(confirmBtn);
    container.appendChild(wrap);

    function findIndexById(id){ for(var i=0;i<tokens.length;i++){ if(tokens[i].id===id) return i; } return -1; }

    function toggleInclude(id){
      var i = findIndexById(id);
      if(i<0) return;
      tokens[i].included = !tokens[i].included;
      STATE.save(); renderBoard(id);
    }

    function armForMerge(id){
      var i = findIndexById(id);
      if(i<0) return;
      var prevIdx = MORPH.armedIndex[idx];
      if(prevIdx == null){
        MORPH.armedIndex[idx] = i; tokens[i].armed = true; renderBoard(id); return;
      }
      if(prevIdx === i){
        tokens[i].armed = false; MORPH.armedIndex[idx] = null; renderBoard(id); return;
      }
      if(Math.abs(prevIdx - i) === 1){
        var lo = Math.min(prevIdx, i), hi = Math.max(prevIdx, i);
        var merged = mergeTokens(tokens[lo], tokens[hi]);
        merged.id = 't' + idx + '_m' + lo + '_' + hi + '_' + tokens.length;
        merged.included = true; merged.armed = false; merged.baseApplied = false; merged.nounStem = null;
        tokens.splice(lo, 2, merged);
        MORPH.armedIndex[idx] = null;
        STATE.save(); renderBoard(merged.id);
        toast('"' + merged.surface + '"' + JOSA.euroRo(merged.surface) + ' 합쳤어요.');
      } else {
        tokens[prevIdx].armed = false;
        tokens[i].armed = true;
        MORPH.armedIndex[idx] = i;
        renderBoard(id);
        toast('바로 옆에 있는 토큰끼리만 합칠 수 있어요. 새로 선택했어요.');
      }
    }

    function applyBaseForm(id){
      var i = findIndexById(id);
      if(i<0) return;
      var t = tokens[i];
      if(t.pos !== 'VV' && t.pos !== 'VA') return;
      if(t.baseApplied){ t.baseApplied = false; t.nounStem = null; STATE.save(); renderBoard(id); return; }
      var out = toBaseForm(t);
      if(!out.baseApplied){ toast('"' + t.surface + '"' + JOSA.eunNeun(t.surface) + ' 명사 어근으로 바꿀 수 없어요(고유어 동사).'); return; }
      t.baseApplied = true; t.nounStem = out.nounStem; t.included = true;
      STATE.save(); renderBoard(id);
    }

    function splitTok(id){
      var i = findIndexById(id);
      if(i<0) return;
      var parts = splitToken(tokens[i]);
      if(!parts){ toast('이 토큰은 나눌 수 없어요(원래부터 하나의 토큰).'); return; }
      var a = {}; for(var k in parts[0]){ a[k] = parts[0][k]; }
      var b = {}; for(var k2 in parts[1]){ b[k2] = parts[1][k2]; }
      a.id = tokens[i].id + 'a'; b.id = tokens[i].id + 'b';
      a.armed = false; b.armed = false;
      tokens.splice(i, 1, a, b);
      STATE.save(); renderBoard(a.id);
    }

    /* E-12: window.prompt() 대신 인라인 입력(토큰 자리에서 확인/취소)으로 직접 수정한다. */
    var editingId = null;
    function manualEdit(id){ editingId = id; renderBoard(); }
    function cancelEdit(id){ editingId = null; renderBoard(id); }
    function commitEdit(id, val){
      var i = findIndexById(id);
      editingId = null;
      if(i<0){ renderBoard(); return; }
      var next = (val||'').trim();
      if(!next){ renderBoard(id); return; }
      tokens[i].surface = next;
      tokens[i].lemma = null;
      STATE.save(); renderBoard(id);
    }

    function attachTokenGestures(tokenEl, t){
      var timer = null, longFired = false, startX = 0, startY = 0;
      tokenEl.addEventListener('pointerdown', function(e){
        longFired = false; startX = e.clientX; startY = e.clientY;
        timer = setTimeout(function(){ longFired = true; armForMerge(t.id); }, 550);
      });
      tokenEl.addEventListener('pointermove', function(e){
        if(Math.abs(e.clientX-startX) > 8 || Math.abs(e.clientY-startY) > 8) clearTimeout(timer);
      });
      tokenEl.addEventListener('pointerup', function(){ clearTimeout(timer); });
      tokenEl.addEventListener('pointerleave', function(){ clearTimeout(timer); });
      tokenEl.addEventListener('click', function(e){
        if(longFired){ longFired = false; return; }
        if(e.shiftKey){ armForMerge(t.id); return; }
        if(e.ctrlKey || e.metaKey){ applyBaseForm(t.id); return; }
        toggleInclude(t.id);
      });
      tokenEl.addEventListener('dblclick', function(e){ e.preventDefault(); manualEdit(t.id); });
      tokenEl.addEventListener('keydown', function(e){
        if(e.key === 'Enter' || e.key === ' '){ e.preventDefault(); toggleInclude(t.id); }
      });
    }

    function renderBoard(focusId){
      board.innerHTML = '';
      var focusTokenEl = null;
      tokens.forEach(function(t){
        var group = MORPH.posGroup(t.pos);
        var tokWrap = el('div', {class:'morph-token-wrap'});
        if(t.id === editingId){
          tokWrap.appendChild(el('span', {class:'postag pos-' + group}, MORPH.POS_LABEL[group]));
          var editInput = el('input', {type:'text', class:'morph-edit-input', 'aria-label':'"' + t.surface + '" 새 표면형 입력', value:t.surface});
          var okBtn = el('button', {type:'button', class:'btn btn-secondary btn-sm'}, '확인');
          var noBtn = el('button', {type:'button', class:'btn btn-ghost btn-sm'}, '취소');
          okBtn.addEventListener('click', function(){ commitEdit(t.id, editInput.value); });
          noBtn.addEventListener('click', function(){ cancelEdit(t.id); });
          editInput.addEventListener('keydown', function(e){
            if(e.isComposing || e.keyCode === 229) return;
            if(e.key === 'Enter'){ e.preventDefault(); commitEdit(t.id, editInput.value); }
            if(e.key === 'Escape'){ e.preventDefault(); cancelEdit(t.id); }
          });
          var editRow = el('div', {class:'morph-edit-row'});
          editRow.appendChild(editInput); editRow.appendChild(okBtn); editRow.appendChild(noBtn);
          tokWrap.appendChild(editRow);
          board.appendChild(tokWrap);
          return;
        }
        tokWrap.appendChild(el('span', {class:'postag pos-' + group}, MORPH.POS_LABEL[group]));
        var label = t.baseApplied ? (t.nounStem + ' ← ' + t.surface) : t.surface;
        var cls = 'morph-token ' + (t.included ? 'included' : 'excluded') + (t.armed ? ' armed' : '') + (t.baseApplied ? ' base-applied' : '');
        var tokBtn = el('button', {type:'button', class:cls,
          'aria-pressed': t.included ? 'true' : 'false',
          'aria-label': t.surface + '(' + MORPH.POS_LABEL[group] + '), ' + (t.included?'포함됨':'제외됨') + (t.armed?', 합치기 대기중':'')}, label);
        attachTokenGestures(tokBtn, t);
        tokWrap.appendChild(tokBtn);
        if(focusId && t.id === focusId) focusTokenEl = tokBtn;

        var actions = el('div', {class:'token-actions'});
        var mergeBtn = el('button', {type:'button', title:'합치기 선택', 'aria-label':'"' + t.surface + '" 합치기 선택'}, '🔗');
        mergeBtn.addEventListener('click', function(){ armForMerge(t.id); });
        actions.appendChild(mergeBtn);
        if(t.pos === 'VV' || t.pos === 'VA'){
          var baseBtn = el('button', {type:'button', title:'기본형→명사', 'aria-label':'"' + t.surface + '" 기본형을 명사로 변환'}, '명사');
          baseBtn.addEventListener('click', function(){ applyBaseForm(t.id); });
          actions.appendChild(baseBtn);
        }
        if(t.parts){
          var splitBtn = el('button', {type:'button', title:'분리', 'aria-label':'"' + t.surface + '" 다시 나누기'}, '✂');
          splitBtn.addEventListener('click', function(){ splitTok(t.id); });
          actions.appendChild(splitBtn);
        }
        var editBtn = el('button', {type:'button', title:'직접 수정', 'aria-label':'"' + t.surface + '" 직접 수정'}, '✏');
        editBtn.addEventListener('click', function(){ manualEdit(t.id); });
        actions.appendChild(editBtn);
        tokWrap.appendChild(actions);

        board.appendChild(tokWrap);
      });
      if(editingId){
        var focusInput = board.querySelector('.morph-edit-input');
        if(focusInput) focusInput.focus();
      } else if(focusTokenEl){
        focusTokenEl.focus({preventScroll:true});
      }
      renderResult();
      refreshNav();
    }

    function renderResult(){
      var included = tokens.filter(function(t){ return t.included; })
        .map(function(t){ return t.baseApplied ? t.nounStem : (t.lemma || t.surface); });
      resultHost.innerHTML = '';
      resultHost.appendChild(el('div', {class:'card-title'}, '지금 포함된 핵심어'));
      resultHost.appendChild(el('div', {}, included.length ? included.join(', ') : '(1개 이상 포함해 보세요)'));
      var st4 = STATE.screen('S4');
      var isConfirmed = !!st4.confirmed[idx];
      confirmBtn.textContent = isConfirmed ? '이 문장 확정 ✓' : '이 문장 확정하기';
      confirmBtn.onclick = function(){
        var st4b = STATE.screen('S4');
        var ok = included.length > 0;
        st4b.confirmed[idx] = ok;
        STATE.save();
        renderBoard();
        toast(ok ? '확정했어요.' : '핵심어를 1개 이상 남겨야 확정할 수 있어요.');
      };
    }

    renderBoard();
  }
};

/* ============================================================
   9) CLOUD — 워드클라우드(모양·폰트·빈도) — [이미지] 옵션 + FreqTable
   ============================================================ */
function pointInPolygon(pts, x, y){
  var inside = false;
  for(var i=0,j=pts.length-1;i<pts.length;j=i++){
    var xi=pts[i][0], yi=pts[i][1], xj=pts[j][0], yj=pts[j][1];
    var intersect = ((yi>y) !== (yj>y)) && (x < (xj-xi)*(y-yi)/(yj-yi)+xi);
    if(intersect) inside = !inside;
  }
  return inside;
}
function buildStarPoints(){
  var pts = [], outerR=0.95, innerR=0.40;
  for(var i=0;i<10;i++){
    var r=(i%2===0)?outerR:innerR;
    var ang=-Math.PI/2 + i*Math.PI/5;
    pts.push([Math.cos(ang)*r, Math.sin(ang)*r]);
  }
  return pts;
}
function buildHeartPoints(){
  var raw=[], N=120, minX=Infinity,maxX=-Infinity,minY=Infinity,maxY=-Infinity;
  for(var i=0;i<N;i++){
    var t=(i/N)*Math.PI*2;
    var hx=16*Math.pow(Math.sin(t),3);
    var hy=-(13*Math.cos(t)-5*Math.cos(2*t)-2*Math.cos(3*t)-Math.cos(4*t));
    raw.push([hx,hy]);
    if(hx<minX)minX=hx; if(hx>maxX)maxX=hx;
    if(hy<minY)minY=hy; if(hy>maxY)maxY=hy;
  }
  var cx=(minX+maxX)/2, cy=(minY+maxY)/2;
  var half=Math.max(maxX-minX,maxY-minY)/2;
  return raw.map(function(p){ return [(p[0]-cx)/half*0.92, (p[1]-cy)/half*0.92]; });
}
var STAR_PTS = buildStarPoints();
var HEART_PTS = buildHeartPoints();
var SHAPES = {
  circle: function(x,y){ return x*x+y*y <= 0.90*0.90; },
  square: function(x,y){ return Math.max(Math.abs(x),Math.abs(y)) <= 0.86; },
  diamond: function(x,y){ return Math.abs(x)+Math.abs(y) <= 0.95; },
  cloud: function(x,y){
    var lobes=[[-0.4,0.12,0.42],[0.0,-0.16,0.5],[0.42,0.12,0.4],[-0.12,0.32,0.4],[0.2,0.32,0.38]];
    for(var i=0;i<lobes.length;i++){ var dx=x-lobes[i][0], dy=y-lobes[i][1], r=lobes[i][2]; if(dx*dx+dy*dy<=r*r) return true; }
    return false;
  },
  star: function(x,y){ return pointInPolygon(STAR_PTS, x, y); },
  heart: function(x,y){ return pointInPolygon(HEART_PTS, x, y); }
};
var SHAPE_LABEL = {circle:'원형', heart:'하트', star:'별', cloud:'구름', diamond:'다이아', square:'사각형'};
var FONT_STACKS = {
  sans: {family:"'Inter',-apple-system,BlinkMacSystemFont,'Apple SD Gothic Neo','Segoe UI','Malgun Gothic',Roboto,sans-serif", weight:'700', label:'고딕'},
  serif:{family:"'Batang','Nanum Myeongjo','Apple SD Gothic Neo',serif", weight:'700', label:'명조'},
  bold: {family:"'Inter',-apple-system,BlinkMacSystemFont,'Apple SD Gothic Neo','Segoe UI','Malgun Gothic',Roboto,sans-serif", weight:'900', label:'굵게'}
};

/* 9.4 배치(D-7 개정): 빈도 큰 단어부터 중앙 근처, 스파이럴로 이동하며 겹치지 않고
   모양 마스크 안에 들어가는 자리를 찾는다. 폭은 measureFn(실측, 예: ctx.measureText 래퍼)
   으로 구한다 -- 글자수 추정(구 ×0.66)을 쓰지 않는다. 자리를 못 찾으면 폰트를 ×0.85씩
   최대 8단계까지 줄여 재시도하고, 그래도 실패하면 그 단어는 구름에서 생략한다
   (중앙(0,0) 적층 fallback 없음 -- 겹쳐 그리는 것보다 낫다, T1 게이트).
   measureFn(word, fontPx) -> 실측 폭(px)은 필수 인자다: 목(mock) 환경엔 canvas가 없으므로
   폴백 canvas를 만들지 않는다(미주입 시 크래시 허용, sanity-5). 이 함수 자체는 DOM/canvas를
   전혀 건드리지 않는 순수 함수 -- 실제 측정은 호출부가 주입한 measureFn이 담당한다. */
function layoutCloud(entries, shapeFn, canvasSize, measureFn){
  var maxCount = entries.length ? entries[0].count : 1;
  var minCount = entries.length ? entries[entries.length-1].count : 1;
  var placed = [];
  var MAX_SHRINK_STEPS = 8;
  entries.forEach(function(it, idx){
    var t = maxCount === minCount ? 1 : (it.count - minCount)/(maxCount - minCount);
    var baseFontPx = 15 + t*32;
    var found = null;
    for(var step=0; step<=MAX_SHRINK_STEPS && !found; step++){
      var fontPx = baseFontPx * Math.pow(0.85, step);
      var w = measureFn(it.word, fontPx) + 8;
      var h = fontPx * 1.2;
      var maxR = canvasSize*0.62;
      for(var r=0; r<=maxR && !found; r += 3){
        var steps2 = Math.max(8, Math.round(r/6));
        for(var s=0; s<steps2; s++){
          var ang = (s/steps2)*Math.PI*2 + idx*0.7;
          var cx = Math.cos(ang)*r, cy = Math.sin(ang)*r;
          var nx = (cx)/(canvasSize/2), ny = (cy)/(canvasSize/2);
          var hw = (w/2)/(canvasSize/2), hh = (h/2)/(canvasSize/2);
          var corners = [[nx-hw,ny-hh],[nx+hw,ny-hh],[nx-hw,ny+hh],[nx+hw,ny+hh]];
          var okShape = corners.every(function(c){ return shapeFn(c[0], c[1]); });
          if(!okShape) continue;
          var box = {x:cx-w/2, y:cy-h/2, w:w, h:h};
          var overlap = placed.some(function(p){
            return !(box.x+box.w < p.box.x || box.x > p.box.x+p.box.w || box.y+box.h < p.box.y || box.y > p.box.y+p.box.h);
          });
          if(overlap) continue;
          found = {cx:cx, cy:cy, box:box, fontPx:fontPx};
          break;
        }
      }
    }
    if(found){
      placed.push({word:it.word, count:it.count, fontPx:found.fontPx, x:found.cx, y:found.cy, box:found.box});
    }
    /* else: 자리를 못 찾음 -- 생략(중앙(0,0) fallback 없음). 빈도표에는 그대로 남는다. */
  });
  return placed;
}

function rawFrequency(){
  var freq = {};
  DATA.sentences.forEach(function(s){ s.tokens.forEach(function(t){ freq[t.surface] = (freq[t.surface]||0) + 1; }); });
  return freq;
}
function filteredFrequency(){
  var freq = {};
  DATA.sentences.forEach(function(s){ contentWords(s.tokens).forEach(function(w){ freq[w] = (freq[w]||0) + 1; }); });
  return freq;
}
function freqEntries(useFiltered){
  var freq = useFiltered ? filteredFrequency() : rawFrequency();
  return Object.keys(freq).map(function(w){ return {word:w, count:freq[w]}; })
    .sort(function(a,b){ return b.count - a.count || a.word.localeCompare(b.word); });
}

var CLOUD_TOP_N = 16; /* E-7 기본값: 상위 16개 표시 */
var CLOUD = {
  /* S5 step1(워드클라우드): 모양·폰트·불용어 제거 컨트롤 + 캔버스만 담당.
     선택(빈도표)은 renderFreqTable로 분리했다(각 step 1뷰포트). */
  renderCloud: function(container){
    var st = STATE.screen('S5');
    var wrap = el('div', {class:'screen-block'});
    container.appendChild(wrap);

    var controls = el('div', {class:'cloud-controls'});
    wrap.appendChild(controls);

    var shapeGroup = el('div', {class:'cloud-control-group'});
    shapeGroup.appendChild(el('label', {}, '모양'));
    var shapeRow = el('div', {class:'chips-row'});
    Object.keys(SHAPE_LABEL).forEach(function(key){
      var chip = el('button', {type:'button', class:'chip' + (st.shape===key?' active':'')}, SHAPE_LABEL[key]);
      chip.addEventListener('click', function(){
        st.shape = key; STATE.save();
        Array.prototype.forEach.call(shapeRow.children, function(c){ c.classList.remove('active'); });
        chip.classList.add('active');
        drawCloud();
      });
      shapeRow.appendChild(chip);
    });
    shapeGroup.appendChild(shapeRow);
    controls.appendChild(shapeGroup);

    var fontGroup = el('div', {class:'cloud-control-group'});
    fontGroup.appendChild(el('label', {}, '폰트'));
    var fontRow = el('div', {class:'chips-row'});
    Object.keys(FONT_STACKS).forEach(function(key){
      var chip = el('button', {type:'button', class:'chip' + (st.font===key?' active':'')}, FONT_STACKS[key].label);
      chip.addEventListener('click', function(){
        st.font = key; STATE.save();
        Array.prototype.forEach.call(fontRow.children, function(c){ c.classList.remove('active'); });
        chip.classList.add('active');
        drawCloud();
      });
      fontRow.appendChild(chip);
    });
    fontGroup.appendChild(fontRow);
    controls.appendChild(fontGroup);

    var stopWrap = el('label', {class:'check-row'});
    var stopCheck = el('input', {type:'checkbox'});
    stopCheck.checked = !!st.stopwordFilter;
    stopWrap.appendChild(stopCheck);
    stopWrap.appendChild(document.createTextNode('불용어 제거(조사·어미 등)'));
    controls.appendChild(stopWrap);

    var canvasWrap = el('div', {class:'cloud-canvas-wrap'});
    var canvasSize = 400;
    var canvas = el('canvas', {role:'img', 'aria-label':'워드클라우드: 자주 등장한 단어일수록 크게 표시됩니다.'});
    canvasWrap.appendChild(canvas);
    wrap.appendChild(canvasWrap);
    var dpr = window.devicePixelRatio || 1;
    canvas.width = canvasSize*dpr; canvas.height = canvasSize*dpr;
    canvas.style.width = canvasSize+'px'; canvas.style.height = canvasSize+'px';
    var ctx = canvas.getContext('2d');
    ctx.setTransform(dpr,0,0,dpr,0,0);

    function drawCloud(){
      var entries = freqEntries(st.stopwordFilter).slice(0, CLOUD_TOP_N);
      var shapeFn = SHAPES[st.shape] || SHAPES.circle;
      var fontDef = FONT_STACKS[st.font] || FONT_STACKS.sans;
      /* D-7: 폭은 ctx.measureText 실측(폰트 적용 후 측정) -- 글자수 추정 아님 */
      function measureFn(word, fontPx){
        ctx.font = fontDef.weight + ' ' + Math.round(fontPx) + 'px ' + fontDef.family;
        return ctx.measureText(word).width;
      }
      var placed = layoutCloud(entries, shapeFn, canvasSize, measureFn);
      ctx.clearRect(0,0,canvasSize,canvasSize);
      var palette = ['#0a0a0a','#1d4fb0','#8a6410','#a2481a','#5b3fa0','#1e6e56'];
      placed.forEach(function(p, i){
        ctx.save();
        ctx.font = fontDef.weight + ' ' + Math.round(p.fontPx) + 'px ' + fontDef.family;
        ctx.fillStyle = palette[i % palette.length];
        ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
        ctx.fillText(p.word, canvasSize/2 + p.x, canvasSize/2 + p.y);
        ctx.restore();
      });
      var topWords = entries.slice(0, 5).map(function(e){ return e.word + '(' + e.count + '회)'; }).join(', ');
      canvas.setAttribute('aria-label', '워드클라우드: 자주 등장한 단어일수록 크게 표시됩니다. 상위 단어: ' + (topWords || '없음') + '.');
    }

    stopCheck.addEventListener('change', function(){
      st.stopwordFilter = stopCheck.checked; STATE.save();
      drawCloud();
    });

    drawCloud();
  },
  /* S5 step2(빈도표): 정확한 횟수 확인 + 상위 8~12개 선택(현행 로직 유지). */
  renderFreqTable: function(container){
    var st = STATE.screen('S5');
    var wrap = el('div', {class:'screen-block'});
    container.appendChild(wrap);

    var freqHost = el('div', {class:'freq-table-wrap'});
    wrap.appendChild(freqHost);
    var selCountMsg = el('p', {class:'muted'});
    wrap.appendChild(selCountMsg);

    function selectedCount(){ return Object.keys(st.selected).filter(function(k){ return st.selected[k]; }).length; }

    function drawFreqTable(focusWord){
      freqHost.innerHTML = '';
      var entries = freqEntries(st.stopwordFilter);
      var table = el('table', {class:'freq-table'});
      table.appendChild(el('tr', {}, [el('th',{scope:'col'},'단어'), el('th',{scope:'col'},'횟수')]));
      var focusRowEl = null;
      entries.forEach(function(e){
        var selected = !!st.selected[e.word];
        var tr = el('tr', {class:'freq-row' + (selected?' selected':''), tabindex:'0', role:'checkbox', 'aria-checked': selected?'true':'false', 'aria-label': e.word + ', ' + e.count + '회, ' + (selected?'선택됨':'선택 안 됨'), 'data-word': e.word});
        tr.appendChild(el('td', {}, e.word));
        tr.appendChild(el('td', {class:'num'}, String(e.count)));
        function toggleSel(){
          var already = !!st.selected[e.word];
          if(!already && selectedCount() >= 12){ toast('최대 12개까지 선택할 수 있어요.'); return; }
          st.selected[e.word] = !already;
          STATE.save();
          drawFreqTable(e.word);
        }
        tr.addEventListener('click', toggleSel);
        tr.addEventListener('keydown', function(ev){ if(ev.key==='Enter'||ev.key===' '){ ev.preventDefault(); toggleSel(); } });
        table.appendChild(tr);
        if(focusWord && e.word === focusWord) focusRowEl = tr;
      });
      freqHost.appendChild(table);
      if(focusRowEl) focusRowEl.focus({preventScroll:true});
      var n = selectedCount();
      selCountMsg.textContent = '선택한 단어: ' + n + '개 (8~12개를 선택하세요)' + (n>=8 && n<=12 ? ' ✓' : '');
      refreshNav();
    }

    drawFreqTable();
  }
};

/* ============================================================
   10) TFIDF — 중요도 점수 계산기(§C worked-example 스테퍼): 문장1 핵심어를 한 단어씩
   ⓐ횟수 → ⓑ×희소 점수 → ⓒ=중요도 점수 3비트로 계산한다. [이전][다음]+진행 점, 자동재생 없음
   (학생 페이스 제어). 구 탭-공개 표(revealed) 방식은 폐기 — st5.revealed는 더 이상 쓰지
   않되 읽기만 해도 무해하다(마이그레이션 불요). st5.calcStep으로 진행 위치를 저장한다.
   ============================================================ */
var TFIDF = {
  /* 문장1(포커스) 계산에 필요한 자료. words는 §C "실계산 기준 선정"(등장 순서, 4~6개). */
  prep: function(){
    var focusIdx = DATA.focusPair[0];
    var docsWordLists = DATA.sentences.map(function(sent){ return contentWords(sent.tokens); });
    var docWords = docsWordLists[focusIdx];
    return {focusIdx:focusIdx, docsWordLists:docsWordLists, docWords:docWords, words: tfidfStepperWords(), n: docsWordLists.length};
  },
  clampStep: function(st5){
    var total = tfidfStepperTotal();
    if(typeof st5.calcStep !== 'number' || isNaN(st5.calcStep) || st5.calcStep < 0) st5.calcStep = 0;
    if(st5.calcStep > total-1) st5.calcStep = total-1;
    return st5.calcStep;
  },
  isComplete: function(){
    var st5 = STATE.screen('S5');
    return tfidfStepperComplete(TFIDF.clampStep(st5));
  },
  render: function(container, st5){
    container.innerHTML = '';
    var data = TFIDF.prep();
    var words = data.words, total = words.length*3 + 2;
    var calcStep = TFIDF.clampStep(st5);

    container.appendChild(el('h3', {style:{fontSize:'15px'}}, '중요도 점수 계산기 — 문장1을 단어별로 함께 계산해요'));

    var dotsRow = el('div', {class:'step-dots'});
    for(var i=0;i<total;i++){ dotsRow.appendChild(el('span', {class:'step-dot'+(i===calcStep?' active':''), 'aria-hidden':'true'})); }
    container.appendChild(dotsRow);
    container.appendChild(el('p', {class:'sr-only', 'aria-live':'polite'}, (calcStep+1) + ' / ' + total + ' 단계'));

    var statusHost = el('div', {class:'screen-block'});
    container.appendChild(statusHost);

    var navRow = el('div', {class:'btn-row'});
    var prevBtn = el('button', {type:'button', class:'btn btn-secondary'}, '◀ 이전 단계');
    var nextBtn = el('button', {type:'button', class:'btn btn-primary'}, '다음 단계 ▶');
    navRow.appendChild(prevBtn); navRow.appendChild(nextBtn);
    container.appendChild(navRow);

    function goTo(step, focusCls){
      st5.calcStep = Math.max(0, Math.min(total-1, step));
      STATE.save();
      TFIDF.render(container, st5);
      refreshNav();
      var target = container.querySelector(focusCls);
      if(target) target.focus({preventScroll:true});
    }
    prevBtn.addEventListener('click', function(){ goTo(calcStep-1, '.btn-row .btn-secondary'); });
    nextBtn.addEventListener('click', function(){ goTo(calcStep+1, '.btn-row .btn-primary'); });
    setDisabled(prevBtn, calcStep<=0);
    setDisabled(nextBtn, calcStep>=total-1);

    if(calcStep === words.length*3){
      TFIDF.renderFinaleA(statusHost, data);
    } else if(calcStep === words.length*3 + 1){
      TFIDF.renderFinaleB(statusHost, data, st5);
    } else {
      var wordIdx = Math.floor(calcStep/3), bit = calcStep%3;
      var w = words[wordIdx];
      statusHost.appendChild(el('p', {class:'muted'}, '단어 ' + (wordIdx+1) + '/' + words.length + ' · "' + w + '"'));
      if(bit === 0) TFIDF.renderBitA(statusHost, w, data);
      else if(bit === 1) TFIDF.renderBitB(statusHost, w, data);
      else TFIDF.renderBitC(statusHost, w, data, words.slice(0, wordIdx+1));
    }
    renderMath(container);
  },
  /* ⓐ 횟수: 문장1 원문에서 단어를 하이라이트하고 그 문장 안에서 나온 횟수를 보여준다 */
  renderBitA: function(container, w, data){
    container.appendChild(el('div', {class:'screen-prompt'}, 'ⓐ 이 문장에서 "' + w + '"' + JOSA.iGa(w) + ' 몇 번 나왔을까요?'));
    var sentText = DATA.sentences[data.focusIdx].text;
    var idx = sentText.indexOf(w);
    var sentBox = el('p', {class:'card-hairline', style:{fontSize:'16px'}});
    if(idx < 0){
      sentBox.textContent = '"' + sentText + '"';
    } else {
      sentBox.appendChild(document.createTextNode('"' + sentText.slice(0, idx)));
      sentBox.appendChild(el('mark', {class:'highlight-chip', style:{fontSize:'inherit'}}, sentText.slice(idx, idx+w.length)));
      sentBox.appendChild(document.createTextNode(sentText.slice(idx+w.length) + '"'));
    }
    container.appendChild(sentBox);
    var tfVal = tf(w, data.docWords);
    container.appendChild(el('div', {style:{fontSize:'28px', fontWeight:'800', textAlign:'center', margin:'12px 0'}}, tfVal + '번'));
  },
  /* ⓑ ×희소 점수: B의 8문장 스윕 연출을 재사용해 몇 문장에 나오는지 보여주고 희소 점수를 계산 */
  renderBitB: function(container, w, data){
    container.appendChild(el('div', {class:'screen-prompt'}, 'ⓑ "' + w + '"' + JOSA.eunNeun(w) + ' 8문장 중 몇 문장에 나올까요?'));
    var sweepHost = el('div', {class:'screen-block'});
    container.appendChild(sweepHost);
    var dfVal = renderSentenceSweep(sweepHost, w, data.docsWordLists);
    var idfVal = idf(w, data.docsWordLists, 'ratio');
    var fmt2 = function(v){ return (Math.round(v*100)/100).toFixed(2); };
    container.appendChild(el('p', {}, el('span', {'data-katex': data.n + ' \\div ' + dfVal + ' \\approx ' + fmt2(idfVal)})));
    container.appendChild(el('div', {style:{fontSize:'22px', fontWeight:'800', textAlign:'center', margin:'8px 0'}}, '희소 점수 ' + fmt2(idfVal)));
  },
  /* ⓒ =중요도 점수: 횟수x희소 점수 조립 + 값 비례 막대 + 지금까지 계산한 단어 누적 순위표 */
  renderBitC: function(container, w, data, wordsSoFar){
    var tfVal = tf(w, data.docWords), idfVal = idf(w, data.docsWordLists, 'ratio'), scoreVal = tfVal*idfVal;
    var fmt2 = function(v){ return (Math.round(v*100)/100).toFixed(2); };
    container.appendChild(el('div', {class:'screen-prompt'}, 'ⓒ 횟수 × 희소 점수 = 중요도 점수'));
    container.appendChild(el('p', {}, el('span', {'data-katex': tfVal + ' \\times ' + fmt2(idfVal) + ' \\approx ' + fmt2(scoreVal)})));

    var allScores = wordsSoFar.map(function(ww){ return {word:ww, score: tf(ww, data.docWords)*idf(ww, data.docsWordLists, 'ratio')}; });
    var maxScore = Math.max.apply(null, allScores.map(function(x){ return x.score; }).concat([0.0001]));
    var barRow = el('div', {class:'compare-bar-row'});
    barRow.appendChild(el('div', {class:'compare-bar-label'}, w));
    var track = el('div', {class:'compare-bar-track'});
    var fill = el('div', {class:'compare-bar-fill'});
    track.appendChild(fill);
    barRow.appendChild(track);
    barRow.appendChild(el('div', {class:'compare-bar-value'}, fmt2(scoreVal)));
    container.appendChild(barRow);
    requestAnimationFrame(function(){ fill.style.width = Math.max(0, Math.min(100, scoreVal/maxScore*100)) + '%'; });

    var ranked = allScores.slice().sort(function(a,b){ return b.score-a.score || a.word.localeCompare(b.word); });
    var tableWrap = el('div', {class:'screen-block'});
    tableWrap.appendChild(el('p', {class:'muted'}, '지금까지 계산한 단어 순위'));
    var list = el('ol', {style:{margin:'0', paddingLeft:'20px'}});
    ranked.forEach(function(item){
      list.appendChild(el('li', {style:{fontWeight: item.word===w ? '800' : '600', margin:'2px 0'}}, item.word + ' — ' + fmt2(item.score)));
    });
    tableWrap.appendChild(list);
    container.appendChild(tableWrap);
  },
  /* 마무리A(§F-1 스크롤 분할): 완성된 순위표(막대 포함) + 정리 카드 */
  renderFinaleA: function(container, data){
    var words = data.words;
    var fmt2 = function(v){ return (Math.round(v*100)/100).toFixed(2); };
    var scored = words.map(function(w){ return {word:w, score: tf(w, data.docWords)*idf(w, data.docsWordLists, 'ratio')}; });
    scored.sort(function(a,b){ return b.score-a.score || a.word.localeCompare(b.word); });
    container.appendChild(el('h3', {style:{fontSize:'16px'}}, '완성된 순위표'));
    var maxScore = scored.length ? scored[0].score : 1;
    scored.forEach(function(item, i){
      var row = el('div', {class:'compare-bar-row'});
      row.appendChild(el('div', {class:'compare-bar-label'}, (i+1) + '. ' + item.word));
      var track = el('div', {class:'compare-bar-track'});
      var fill = el('div', {class:'compare-bar-fill'});
      track.appendChild(fill);
      row.appendChild(track);
      row.appendChild(el('div', {class:'compare-bar-value'}, fmt2(item.score)));
      container.appendChild(row);
      requestAnimationFrame(function(){ fill.style.width = Math.max(0, Math.min(100, item.score/maxScore*100)) + '%'; });
    });
    container.appendChild(Components.SummaryCard({color:'cream', title:'정리', body:'가장 중요한 단어 = 문장의 특징이에요.'}));
  },
  /* 마무리B(§F-1 스크롤 분할): 워드클라우드 크기 배지 + 문장2 비교 한 줄 */
  renderFinaleB: function(container, data, st5){
    var words = data.words;
    var scored = words.map(function(w){ return {word:w, score: tf(w, data.docWords)*idf(w, data.docsWordLists, 'ratio')}; });
    scored.sort(function(a,b){ return b.score-a.score || a.word.localeCompare(b.word); });
    var top = scored[0];
    if(top){
      var stopFilter = !!(st5 && st5.stopwordFilter);
      var allEntries = freqEntries(stopFilter);
      var topEntries = allEntries.slice(0, CLOUD_TOP_N);
      var topEntry = topEntries.filter(function(e){ return e.word === top.word; })[0];
      var badgeHost = el('div', {class:'screen-block'});
      if(topEntry){
        var maxCount = topEntries[0].count, minCount = topEntries[topEntries.length-1].count;
        var t = maxCount===minCount ? 1 : (topEntry.count-minCount)/(maxCount-minCount);
        var px = 15 + t*32;
        badgeHost.appendChild(el('p', {class:'muted'}, '가장 중요한 단어 "' + top.word + '"' + JOSA.eunNeun(top.word) + ' 워드클라우드에서는 이만큼 작았어요(적게 나온 단어라서) — 중요도는 크기(자주 나옴)가 아니라 얼마나 드문지에서 나와요:'));
        badgeHost.appendChild(el('span', {style:{fontSize:px+'px', fontWeight:'700'}}, top.word));
      } else {
        badgeHost.appendChild(el('p', {class:'muted'}, '"' + top.word + '"' + JOSA.eunNeun(top.word) + ' 워드클라우드 상위 목록 밖이었어요 — 그만큼 드문 단어예요.'));
      }
      container.appendChild(badgeHost);
    }

    var focusB = DATA.focusPair[1];
    var docWordsB = data.docsWordLists[focusB];
    var seenB = {}, wordsB = [];
    docWordsB.forEach(function(ww){ if(!seenB[ww]){ seenB[ww]=true; wordsB.push(ww); } });
    var scoredB = wordsB.map(function(ww){ return {word:ww, score: tf(ww, docWordsB)*idf(ww, data.docsWordLists, 'ratio')}; });
    scoredB.sort(function(a,b){ return b.score-a.score || a.word.localeCompare(b.word); });
    var topB = scoredB[0];
    if(top && topB){
      container.appendChild(el('p', {class:'muted'},
        '문장2의 1등 단어는 "' + topB.word + '"' + (topB.word===top.word ? ' — 문장1과 같아요!' : ' — 문장1의 1등("' + top.word + '")과 달라요.')));
    }
  }
};

/* ============================================================
   11) LOGIC — 순수 함수 (검증 대상, window.__TXT 로 노출)
   data.js(window.__DATA)는 큐레이션 "출제 데이터"로 두고, 이 섹션의
   함수만 그 위의 알고리즘(코사인·TF·DF·IDF·게임 채점·형태소 편집)을 계산한다.
   ============================================================ */
var DATA = window.__DATA;

function cosine(a, b){
  var dot = 0, na = 0, nb = 0;
  for(var i=0;i<a.length;i++){ dot += a[i]*b[i]; na += a[i]*a[i]; nb += b[i]*b[i]; }
  na = Math.sqrt(na); nb = Math.sqrt(nb);
  if(na === 0 || nb === 0) return 0;
  return dot/(na*nb);
}

function resolveWord(w){
  if(!w) return null;
  if(DATA.words[w]) return w;
  var syn = DATA.synonyms[w];
  if(syn && DATA.words[syn]) return syn;
  return null;
}

function wordCosine(w1, w2){
  var r1 = resolveWord(w1), r2 = resolveWord(w2);
  if(!r1 || !r2) return null;
  return cosine(DATA.words[r1], DATA.words[r2]);
}

function jsRound(x){ return Math.floor(x + 0.5); }

function gameScore(cosVal){ return jsRound(cosVal*100); }

/* 9.2 점수대: 60~69 +10 / 70~79 +15 / 80~89 +20 / 90+ +30.
   [구현] 쉬움 난이도 임계값(55)은 60 미만이라 표에 없는 55~59 구간이 생긴다
   -- 성공은 성공이므로 최소 보너스 +5로 채운다. */
function gamePoints(score){
  if(score < 60) return 5;
  if(score < 70) return 10;
  if(score < 80) return 15;
  if(score < 90) return 20;
  return 30;
}

function comboTimeBonus(comboCount){ return comboCount >= 3 ? 5 : 0; }

function topCandidates(word, k){
  k = k || 3;
  var w = resolveWord(word);
  if(!w) return [];
  var others = Object.keys(DATA.words).filter(function(x){ return x !== w; });
  others.sort(function(x,y){ return cosine(DATA.words[w], DATA.words[y]) - cosine(DATA.words[w], DATA.words[x]); });
  return others.slice(0, k);
}

/* ---- W4 온라인 채점 어댑터(§B W4·D-5) ----
   calibrate/fallbackDecision/gameRecordable 셋만 순수 함수로 window.__TXT에 노출한다
   (T2·T6 게이트 대상). fetchSimScore·pingProxy·sanitizeInput은 fetch를 쓰는 비순수
   어댑터라 __TXT에는 넣지 않는다 -- fetch 호출은 이 두 함수(어댑터 본체·핑)뿐이다. */

/* [E-1 확정 대기] 원시 코사인 -> 0~100 점수 구간 선형 재매핑 placeholder(§5-3).
   기준 쌍(높음·중간·낮음) 실측 후 교체 전제 -- 지금은 항등에 가까운 보수적 매핑이다.
   서버가 이미 calibrate된 score를 주는 게 계약이지만, raw만 오는 경우나 방어적
   재계산을 위해 클라이언트에도 순수 함수로 둔다. 단조 증가 · 0~100 범위. */
function calibrate(rawCos){
  var pts = [[0,0], [0.55,55], [0.7,70], [1,100]];
  if(rawCos <= pts[0][0]) return pts[0][1];
  for(var i=1;i<pts.length;i++){
    if(rawCos <= pts[i][0]){
      var x0 = pts[i-1][0], y0 = pts[i-1][1], x1 = pts[i][0], y1 = pts[i][1];
      var t = (rawCos - x0) / (x1 - x0);
      return jsRound(y0 + t * (y1 - y0));
    }
  }
  return pts[pts.length - 1][1];
}

/* 온라인 채점 요청 실패·타임아웃의 "연속 2회" 폴백 규칙(T2). failCount는 이번 실패까지
   포함한 연속 실패 누적 횟수 -- 일반 실패든 타임아웃이든 같은 연속 실패로 센다.
   timeoutFlag는 이번 실패가 타임아웃이었는지 표시하는 신호값으로 호출부(토스트 문구 등)가
   쓸 수 있게 받아두되, 폴백 여부 판정 자체는 failCount 하나로 통일한다. */
function fallbackDecision(failCount, timeoutFlag){
  return (failCount || 0) >= 2;
}

/* W4 게이팅 홀 수정(G3/D-8): 판 기록(plays·best·played)은 W4 화면이 마운트된 상태에서
   60초를 모두 소진했을 때만 남긴다. mounted=false(화면 이탈)면 elapsed 값과 무관하게
   항상 false -- 이탈 후 어떤 경로로도 played가 참이 되지 않게 하는 최종 방어선(T6). */
function gameRecordable(mounted, elapsed){
  return !!mounted && elapsed >= 60;
}

/* 성공/실패 판정 공통 처리(§B W4 "게임 규칙 구조 유지") -- 콤보·시간보너스·점수 누적·
   체인 갱신은 채점 소스(온라인 fetch / 오프라인 wordCosine)와 무관하게 동일해야 한다. */
function applyGameSuccess(live, word, score){
  var pts = gamePoints(score);
  live.combo += 1;
  live.score += pts;
  var bonus = comboTimeBonus(live.combo);
  if(bonus) live.timeLeft += bonus;
  live.used[word] = true;
  live.chain.push(word);
  live.current = word;
  return {type:'success', score:score, points:pts, comboBonus:bonus, combo:live.combo, word:word};
}
function applyGameFail(live, word, score){
  live.combo = 0;
  return {type:'fail', score:score, word:word};
}

/* 입력 위생(§B W4 [구현]): 한글 1~6자·공백 제거 정도의 가벼운 필터만. 명사 여부는
   판정하지 않는다(온라인 채점은 임의 문자열도 벡터화되어 낮은 점수로 자연 처리됨). */
function sanitizeInput(raw){
  var s = (raw || '').replace(/\s+/g, '');
  return /^[가-힣]{1,6}$/.test(s) ? s : '';
}

/* 온라인 채점 어댑터 본체 -- fetch를 쓰는 유일한 두 지점 중 하나(다른 하나는 pingProxy가
   재사용하는 이 함수 자체). 엔드포인트 계약(§D 5.1): POST {a, b} -> {score, raw}.
   score가 오면 그대로, raw만 오면 calibrate()로 매핑한다. 타임아웃 2.5초. */
function fetchSimScore(a, b, cb){
  var timedOut = false;
  var ctrl = (typeof AbortController !== 'undefined') ? new AbortController() : null;
  var timer = setTimeout(function(){
    timedOut = true;
    if(ctrl) ctrl.abort();
  }, 2500);
  fetch(TXT_SIM_ENDPOINT, {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({a: a, b: b}),
    signal: ctrl ? ctrl.signal : undefined
  }).then(function(res){
    clearTimeout(timer);
    if(!res.ok) throw new Error('http ' + res.status);
    return res.json();
  }).then(function(json){
    var score = (typeof json.score === 'number') ? json.score : calibrate(json.raw);
    score = Math.max(0, Math.min(100, jsRound(score)));
    cb(null, {score: score, raw: json.raw});
  }).catch(function(err){
    clearTimeout(timer);
    cb(err, null, timedOut);
  });
}

/* 시작 모달 프록시 핑(§B W4·§5-5): {a:'테스트',b:'테스트'} 1회로 온라인/오프라인 모드를
   가른다. fetchSimScore를 그대로 재사용하므로 fetch 호출 지점은 늘어나지 않는다. */
function pingProxy(cb){
  fetchSimScore('테스트', '테스트', function(err){ cb(!err); });
}

/* ---- 텍스트 처리(9.3): 내용어 추출 · TF · DF · IDF · TF·IDF · 문장 벡터 ----
   내용어 규칙: NNG는 그대로(또는 lemma가 있으면 lemma) 포함.
   VV/VA는 lemma가 "~하다/~되다"로 끝나 명사 어근을 뽑을 수 있을 때만 포함
   (기본형 변환의 결과가 곧 "포함된 명사"). 조사·어미·부사는 내용어 아님. */
function contentWords(tokens){
  var out = [];
  tokens.forEach(function(t){
    if(t.pos === 'NNG'){
      out.push(t.lemma || t.surface);
    } else if(t.pos === 'VV' || t.pos === 'VA'){
      var lemma = t.lemma || '';
      if(lemma.slice(-2) === '하다' || lemma.slice(-2) === '되다'){
        out.push(lemma.slice(0, -2));
      }
    }
  });
  return out;
}

function tf(word, docWords){
  var c = 0;
  for(var i=0;i<docWords.length;i++){ if(docWords[i] === word) c++; }
  return c;
}

function df(word, docsWordLists){
  var c = 0;
  docsWordLists.forEach(function(d){ if(d.indexOf(word) >= 0) c++; });
  return c;
}

/* IDF = n/DF(비율판, 기본) 또는 log(n/DF)(로그판, 선택). 9.3 */
function idf(word, docsWordLists, mode){
  var n = docsWordLists.length;
  var d = df(word, docsWordLists);
  if(d === 0) return 0;
  var ratio = n/d;
  return mode === 'log' ? Math.log(ratio) : ratio;
}

function tfidf(word, docWords, docsWordLists, mode){
  return tf(word, docWords) * idf(word, docsWordLists, mode);
}

function sentenceVector(docWords, vocab, docsWordLists, mode){
  return vocab.map(function(w){
    return mode === 'tfidf' ? tfidf(w, docWords, docsWordLists, 'ratio') : tf(w, docWords);
  });
}

function sentenceCosine(vecA, vecB){ return cosine(vecA, vecB); }

/* ---- 형태소 편집(9.3 · 6.2): 합치기 · 기본형 · 분리 ---- */
function mergeTokens(a, b){
  return {surface: a.surface + b.surface, pos:'NNG', parts:[a, b]};
}
function toBaseForm(t){
  var out = {};
  for(var k in t){ out[k] = t[k]; }
  var lemma = t.lemma || '';
  if((t.pos === 'VV' || t.pos === 'VA') && (lemma.slice(-2) === '하다' || lemma.slice(-2) === '되다')){
    out.baseApplied = true;
    out.nounStem = lemma.slice(0, -2);
  } else {
    out.baseApplied = false;
    out.nounStem = null;
  }
  return out;
}
function splitToken(t){
  if(!t.parts || t.parts.length !== 2) return null;
  return t.parts;
}

/* ---- S6 어휘(D-6): 학생이 S4에서 confirmed한 두 포커스 문장의 included 토큰 집합의
   합집합. 각 토큰은 nounStem(기본형→명사 변환 적용됨)이 있으면 그 어근, 없으면
   lemma||surface를 쓴다. 구 "S5 선택 단어를 벡터 어휘로" 경로를 대체한다(T7②:
   S5 선택수에 더 이상 의존하지 않음). 순수 함수 -- tokensA/tokensB는 호출부(S6 화면)가
   STATE.screen('S4').sentences[idx]에서 읽어 넘긴다. ---- */
function s6TokenWord(t){ return t.baseApplied ? t.nounStem : (t.lemma || t.surface); }
function s6Vocab(tokensA, tokensB){
  var seen = {}, out = [];
  (tokensA || []).concat(tokensB || []).forEach(function(t){
    if(!t.included) return;
    var w = s6TokenWord(t);
    if(!seen[w]){ seen[w] = true; out.push(w); }
  });
  return out;
}

/* ---- S5 §C 중요도 계산기 스테퍼 지원 함수 -- 문장1(focusPair[0])의 고유 내용어를
   등장 순서대로 뽑는다(하드코딩 없이 매번 실계산, 명세 §C: "실계산 기준 선정"). ---- */
function tfidfStepperWords(){
  var focusIdx = DATA.focusPair[0];
  var docsWordLists = DATA.sentences.map(function(sent){ return contentWords(sent.tokens); });
  var docWords = docsWordLists[focusIdx];
  var seen = {}, words = [];
  docWords.forEach(function(w){ if(!seen[w]){ seen[w] = true; words.push(w); } });
  return words;
}
/* 스테퍼 전체 슬라이드 수 = 단어수 x 3비트(ⓐⓑⓒ) + 마무리 2장(§F-1: 순위표/정리 · 워드클라우드 배지/문장2 비교
   — pane 스크롤 실측 초과로 분할) */
function tfidfStepperTotal(){ return tfidfStepperWords().length * 3 + 2; }
/* 완주 게이팅(§C): 마지막 슬라이드(calcStep === total-1)에 도달해야 완료 */
function tfidfStepperComplete(calcStep){ return calcStep >= tfidfStepperTotal() - 1; }

/* ---- D-2 축 단어 선정: 두 문장 벡터값(vecA[i], vecB[i])이 가장 크게 갈리는 2개 축을
   고른다(§D-2: "두 문장 값이 갈리는 쌍을 실계산으로 선정"). 동점이면 vocab 배열 순서로
   타이브레이크(결정적). vocab이 2개 미만이면 축을 고를 수 없으므로 null. ---- */
function pickAxisWords(vocab, vecA, vecB){
  if(!vocab || vocab.length < 2) return null;
  var scored = vocab.map(function(w, i){ return {word:w, idx:i, diff: Math.abs(vecA[i]-vecB[i])}; });
  scored.sort(function(a, b){ return b.diff - a.diff || a.idx - b.idx; });
  return [scored[0], scored[1]];
}

/* ---- D-1 사전 체험 프리셋(§D-1) -- "같은 방향・다른 길이"는 명세가 지정한 좌표
   (1,0)/(5,0) 그대로. 나머지 두 프리셋(조금 다른 방향·직각)의 좌표는 이 구현의 설계
   선택([초안], 선생님 확인 대상) -- 코사인·각도 값은 이 좌표에서 매번 실계산한다(하드코딩 금지). */
var D1_PRESETS = [
  {key:'same', label:'같은 방향・다른 길이', A:[1,0], B:[5,0]},
  {key:'slight', label:'조금 다른 방향', A:[5,0], B:[5,2]},
  {key:'right', label:'직각', A:[5,0], B:[0,4]}
];

/* ---- stepDefs(): SCREENS(13장에서 정의) 각 화면의 step 수·isComplete 유무 요약.
   순수 함수 -- DOM에 접근하지 않고 SCREENS/stepCountOf만 읽는다. 함수 선언은 여기 있지만
   본문은 호출 시점에만 실행되므로(클로저), SCREENS가 이 위치보다 아래에서 정의돼도
   무방하다(호출은 전체 스크립트 평가 이후에만 일어난다). ---- */
function stepDefs(){
  var out = {};
  Object.keys(SCREENS).forEach(function(id){
    var mod = SCREENS[id];
    var n = stepCountOf(mod);
    if(n){
      out[id] = {steps: n, isComplete: mod.steps.map(function(s){ return typeof s.isComplete === 'function'; })};
    } else {
      out[id] = {steps: 1, isComplete: [typeof mod.isComplete === 'function']};
    }
  });
  return out;
}

window.__TXT = {
  cosine: cosine,
  wordCosine: wordCosine,
  jsRound: jsRound,
  gameScore: gameScore,
  gamePoints: gamePoints,
  comboTimeBonus: comboTimeBonus,
  topCandidates: topCandidates,
  contentWords: contentWords,
  tf: tf,
  df: df,
  idf: idf,
  tfidf: tfidf,
  sentenceVector: sentenceVector,
  sentenceCosine: sentenceCosine,
  mergeTokens: mergeTokens,
  toBaseForm: toBaseForm,
  splitToken: splitToken,
  layoutCloud: layoutCloud,
  s6Vocab: s6Vocab,
  calibrate: calibrate,
  fallbackDecision: fallbackDecision,
  gameRecordable: gameRecordable,
  stepDefs: stepDefs,
  tfidfStepperWords: tfidfStepperWords,
  tfidfStepperTotal: tfidfStepperTotal,
  tfidfStepperComplete: tfidfStepperComplete,
  pickAxisWords: pickAxisWords,
  d1Presets: D1_PRESETS
};

/* ============================================================
   12) SCREENS — 화면 정의(빌더) — 원문 문구 상수 (8장)
   ============================================================ */

function buildW1(){
  return {
    steps: [{
    mount: function(root){
      var st = STATE.screen('W1');

      function renderChips(focusIdx){

        st.attrs.forEach(function(a, i){

          xBtn.addEventListener('click', function(e){
            e.stopPropagation();
            st.attrs.splice(i, 1);
            STATE.save(); renderChips(i); refreshNav();
          });
          xBtns.push(xBtn);
          chipsHost.appendChild(el('span', {class:'chip removable'}, [a, xBtn]));
        });
        if(typeof focusIdx === 'number'){
          if(xBtns.length) xBtns[Math.min(focusIdx, xBtns.length-1)].focus({preventScroll:true});
          else input.focus({preventScroll:true});
        }
      }
      function addAttr(){
        var v = input.value.trim();
        if(!v) return;
        st.attrs.push(v);
        input.value = '';
        STATE.save();
        renderChips();
        refreshNav();
        input.focus();
      }
      addBtn.addEventListener('click', addAttr);
      input.addEventListener('keydown', function(e){
        if(e.isComposing || e.keyCode === 229) return;
        if(e.key === 'Enter'){ e.preventDefault(); addAttr(); }
      });
      renderChips();

      s.appendChild(Components.SummaryCard({color:'peach', title:'정리', body:'모든 단어에는 그 속성과 의미가 있다.'}));
      s.appendChild(Components.NextTease('이 속성들을 표로 정리해 볼까요?'));
      root.appendChild(s);
    },
    isComplete: function(){ return STATE.screen('W1').attrs.length >= 3; }
    }]
  };
}

           ①②단은 "AI가 잰 값" 요약으로 축약하고 ③ 미터만 실값(§A 두 번째 분기). */
        mount: function(root){

            var inputRow = el('div', {class:'game-input-row', style:{flexWrap:'wrap'}});
            var wrapA = el('div', {style:{display:'flex', flexDirection:'column', gap:'4px', flex:'1', minWidth:'120px'}});
            wrapA.appendChild(el('label', {class:'thought-label', 'for':'w3s5-word-a'}, '단어 A'));
            var inputA = el('input', {type:'text', id:'w3s5-word-a', 'aria-label':'단어 A 입력', placeholder:'예: 고양이', autocomplete:'off'});
            wrapA.appendChild(inputA);
            var wrapB = el('div', {style:{display:'flex', flexDirection:'column', gap:'4px', flex:'1', minWidth:'120px'}});
            wrapB.appendChild(el('label', {class:'thought-label', 'for':'w3s5-word-b'}, '단어 B'));
            var inputB = el('input', {type:'text', id:'w3s5-word-b', 'aria-label':'단어 B 입력', placeholder:'예: 호랑이', autocomplete:'off'});
            wrapB.appendChild(inputB);
            inputRow.appendChild(wrapA); inputRow.appendChild(wrapB);
            statusHost.appendChild(inputRow);

            var goBtn = el('button', {type:'button', class:'btn btn-primary', style:{marginTop:'var(--sp-xs)'}}, '재보기');
            statusHost.appendChild(goBtn);
            var resultHost = el('div', {class:'recipe-steps', 'aria-live':'polite'});
            statusHost.appendChild(resultHost);

            function setBusy(busy){
              inputA.disabled = busy; inputB.disabled = busy;
              setDisabled(goBtn, busy);
            }
            function doGo(){
              var a = sanitizeInput(inputA.value), b = sanitizeInput(inputB.value);
              if(!a || !b){ toast('한글 단어를 1~6자로 입력해 주세요.'); return; }
              setBusy(true);
              resultHost.innerHTML = '';
              var step12 = el('div', {class:'recipe-step'});
              step12.appendChild(el('div', {class:'step-label'}, '① · ② AI가 잰 값'));
              var loadingVal = el('div', {class:'step-value fx-pulse'}, 'AI가 벡터로 재는 중…');
              step12.appendChild(loadingVal);
              resultHost.appendChild(step12);
              fetchSimScore(a, b, function(err, result){
                setBusy(false);
                loadingVal.classList.remove('fx-pulse');
                step12.classList.add('shown');
                if(err){
                  loadingVal.textContent = '연결이 원활하지 않아요. 다시 시도해 보세요.';
                  return;
                }
                loadingVal.textContent = '확인 완료';
                step12.appendChild(el('div', {class:'step-detail'},
                  'AI는 "' + a + '"' + JOSA.waGwa(a) + ' "' + b + '"' + JOSA.eulReul(b) + ' 수백 개의 숫자로 된 벡터로 재요. "함께 나온 정도"와 "각자 크기"를 계산해서 하나의 값을 냈어요.'));
                FX.pop(step12);
                setTimeout(function(){
                  var step3 = el('div', {class:'recipe-step recipe-final shown'});
                  step3.appendChild(el('div', {class:'step-label'}, '③ 0~1 값 (코사인 유사도)'));

                  resultHost.appendChild(step3);
                  FX.pop(step3);
                }, FX.reducedMotion ? 0 : 320);
              });
            }
            goBtn.addEventListener('click', doGo);
            function enterGuard(e){
              if(e.isComposing || e.keyCode === 229) return;
              if(e.key === 'Enter'){ e.preventDefault(); doGo(); }
            }
            inputA.addEventListener('keydown', enterGuard);
            inputB.addEventListener('keydown', enterGuard);
          }

          pingProxy(function(ok){ if(ok) renderForm(); else renderOffline(); });
          root.appendChild(s);
        },
        isComplete: function(){ return true; }
      }
    ]
  };

/* ---- S5 §B/§C 공용: 8문장 미니 카드 뷰에서 targetWord를 포함한 문장을 하나씩 순차
   하이라이트(스윕)한다. B의 3a와 C의 ⓑ비트가 재사용한다(§C: "B의 3a 연출 재사용").
   컨테이너에 카드 그리드를 붙이고, 나온 문장 수(df)를 반환한다. ---- */
function renderSentenceSweep(container, targetWord, docsWordLists){
  var n = docsWordLists.length;
  var containing = DATA.sentences.map(function(sent, i){ return docsWordLists[i].indexOf(targetWord) >= 0; });
  var dfCount = containing.filter(function(v){ return v; }).length;
  var counterHost = el('div', {style:{fontSize:'20px', fontWeight:'800', textAlign:'center', margin:'6px 0'}}, '0 / ' + n);
  container.appendChild(counterHost);
  var grid = el('div', {class:'corpus-grid'});
  var cardEls = [];
  DATA.sentences.forEach(function(sent){
    var card = el('div', {class:'corpus-card'}, '"' + sent.text + '"');
    cardEls.push(card);
    grid.appendChild(card);
  });
  container.appendChild(grid);
  var matched = [];
  containing.forEach(function(has, i){ if(has) matched.push(i); });
  var count = 0;
  matched.forEach(function(idx, order){
    var delay = FX.reducedMotion ? 0 : order*220;
    setTimeout(function(){
      if(!cardEls[idx].isConnected) return; /* 다른 슬라이드로 이동해 DOM이 제거됐으면 무시 */
      cardEls[idx].classList.add('focus');
      FX.pop(cardEls[idx]);
      count++;
      counterHost.textContent = count + ' / ' + n;
    }, delay);
  });
  return dfCount;
}

/* ---- S6가 읽는 S4 접근자(하드 제약: S4 기존 로직은 무변경, 읽기 전용 접근자만 추가) ---- */
function s4TokensFor(idx){
  var st4 = STATE.screen('S4');
  return (st4.sentences && st4.sentences[idx]) ? st4.sentences[idx] : [];
}
function s4FocusConfirmed(){
  var st4 = STATE.screen('S4');
  return !!st4.confirmed[DATA.focusPair[0]] && !!st4.confirmed[DATA.focusPair[1]];
}
/* T7③: 영벡터(전부 제외)·완전 동일(구별어 전부 제외 시 1.0) 입력에 대한 안내 문구 */
function s6ExtremeNote(ratio){
  if(ratio <= 0) return '두 문장에 남긴 핵심어가 하나도 겹치지 않아요 — 완전히 다른 문장처럼 계산돼요. S4로 돌아가 무엇을 남겼는지 다시 살펴볼까요?';
  if(ratio >= 0.999) return '두 문장의 핵심어 목록이 (거의) 똑같아요 — 정말 완전히 같은 문장일까요? 어떤 핵심어를 남겼는지 다시 살펴보세요.';
  return null;
}

          function draw(A, B){

            }));

          }

          var current = D1_PRESETS[0];
          var lastA = current.A.slice(), lastB = current.B.slice();
          /* 애니 경합 락(세션17 선례 패턴): 프리셋 클릭마다 토큰을 올리고, 그 tween의
             onUpdate/onDone은 자기 토큰이 "최신"일 때만 그린다. 이전 tween을 막지 않고
             그대로 진행시키되(반응성 유지) 화면에는 항상 가장 최근 클릭만 반영되게 한다 --
             연타 시 먼저 시작한 tween의 늦게 도착한 프레임이 나중 클릭 결과를 덮어쓰는 경합을 막는다. */
          var clickToken = 0, buttons = [];
          function selectPreset(p){
            var myToken = ++clickToken;
            buttons.forEach(function(b){ b.classList.toggle('active', b.dataset.key === p.key); });
            var fromA = lastA, fromB = lastB;
            FX.tween({
              duration: 380,
              onUpdate: function(t){
                if(myToken !== clickToken) return; /* 더 최근 클릭이 있으면 이 프레임은 버린다 */
                draw([fromA[0]+(p.A[0]-fromA[0])*t, fromA[1]+(p.A[1]-fromA[1])*t],
                     [fromB[0]+(p.B[0]-fromB[0])*t, fromB[1]+(p.B[1]-fromB[1])*t]);
              },
              onDone: function(){
                if(myToken !== clickToken) return;
                lastA = p.A.slice(); lastB = p.B.slice(); draw(p.A, p.B);
              }
            });
          }
          D1_PRESETS.forEach(function(p){
            var b = el('button', {type:'button', class:'btn btn-secondary'+(p.key===current.key?' active':'')}, p.label);
            b.dataset.key = p.key;

           값 표기는 생략(실제 고차원 코사인과 다를 수 있음을 오해하지 않도록). 관찰형이라
