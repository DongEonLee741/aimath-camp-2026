          s.appendChild(f1);

          /* F4: 온라인 모드일 때만 노출(요청서 원칙 그대로) — 고정 쌍이라 프록시 캐시
             히트율이 높다. GAME.submitOnline이 쓰는 것과 같은 어댑터(fetchSimScore)를
             재사용하므로 fetch 호출 지점이 늘어나지 않는다. */
          if(STATE.screen('W4').mode === 'online'){
            var pairs = [['선생님','학교'], ['고양이','강아지']];
            var f4 = el('div', {class:'card feature-card card-peach'});
            f4.appendChild(el('div', {class:'card-title'}, '우리 속성벡터 점수와 AI 점수 비교'));
            var f4body = el('div', {class:'card-body'});
            pairs.forEach(function(pair){
              var wc = wordCosine(pair[0], pair[1]);
              var attrScore = wc == null ? '?' : Math.round(wc*100);
              var aiSpan = el('span', {class:'fx-pulse'}, '확인 중…');
              f4body.appendChild(el('div', {style:{margin:'4px 0', fontSize:'14px'}},
                [pair[0] + '·' + pair[1] + ' — 속성벡터 ' + attrScore + '점 · AI 점수 ', aiSpan]));
              fetchSimScore(pair[0], pair[1], function(err, result){
                if(err){ aiSpan.textContent = '연결 실패'; return; }
                aiSpan.className = '';
                aiSpan.textContent = result.score + '점';
              });
            });
            f4.appendChild(f4body);
            s.appendChild(f4);
          }

          /* F3: 교사 시연 카드(요청서 §F3) — 표시 전용, 게이팅 없음. 클릭 전에는 어떤
             네트워크 요청도 발생하지 않는다(링크는 새 탭에서 이동만 한다). */
          var f3 = el('div', {class:'card feature-card card-ochre'});
          f3.appendChild(el('div', {class:'card-title'}, '더 알아보기 — 진짜 AI의 벡터 공간 (교사 시연)'));
          f3.appendChild(el('div', {class:'card-body'}, [
            '여러분이 만든 속성 벡터처럼, 실제 AI도 단어를 수백 차원의 벡터로 나타내요. Embedding Projector에서 그 공간을 3D로 둘러볼 수 있어요. ',
            el('a', {href:'https://projector.tensorflow.org', target:'_blank', rel:'noopener'}, 'projector.tensorflow.org')
          ]));
          f3.appendChild(el('div', {class:'muted', style:{marginTop:'4px'}}, '(온라인 필요 · 영어 화면 · 교사가 함께 봐요)'));
          s.appendChild(f3);

          root.appendChild(s);
        }
      }
    ]
  };
}

var SCREENS = {
  W1: buildW1(), W2: buildW2(), W3: buildW3(), W4: buildW4(),
  S1: buildS1(), S2: buildS2(), S3: buildS3(), S4: buildS4(), S5: buildS5(), S5C: buildS5C(), S6: buildS6()
};

/* ============================================================
   14) TEACHER — 교사 패널
   ============================================================ */
var TEACHER = {
  tapCount: 0,
  tapTimer: null,
  _trigger: null,
  init: function(){
    var titleBtn = document.getElementById('appTitleBtn');
    titleBtn.addEventListener('click', function(){
      TEACHER.tapCount++;
      clearTimeout(TEACHER.tapTimer);
      TEACHER.tapTimer = setTimeout(function(){ TEACHER.tapCount = 0; }, 2500);
      if(TEACHER.tapCount >= 5){ TEACHER.tapCount = 0; TEACHER.open(); }
    });
    document.addEventListener('keydown', function(e){
      if(e.altKey && (e.key==='r' || e.key==='R')){ TEACHER.open(); }
      if(e.key === 'Escape'){ TEACHER.close(); }
      if(e.key === 'Tab'){ TEACHER.trapTab(e); }
    });
    document.getElementById('teacherCloseBtn').addEventListener('click', TEACHER.close);
    document.getElementById('teacherResetBtn').addEventListener('click', function(){
      var area = document.getElementById('teacherConfirmArea');
      area.textContent = '';
      var box = el('div', {class:'card-hairline', style:{marginTop:'10px'}});
      box.appendChild(el('p', {style:{margin:'0 0 10px'}}, '정말 초기화할까요? 이 학습지의 진행 상황이 모두 사라집니다.'));
      var row = el('div', {class:'btn-row'});
      var yes = el('button', {type:'button', class:'btn btn-primary'}, '예, 초기화');
      yes.addEventListener('click', function(){
        /* 교사 리셋은 W4 화면 밖(닫힌 패널)에서도 눌릴 수 있으므로 GAME.stop()뿐 아니라
           mounted 플래그·onTick도 함께 끊는다(G3/D-8 -- 리셋 후 재진입 시 새 판으로 시작). */
        if(GAME && GAME.onScreenExit) GAME.onScreenExit();
        STATE.reset();
        /* ROUTER.go()는 _transitioning 중이면 무시되어 리셋이 씹힐 수 있다 -- render()는 이 가드를
           거치지 않고 즉시 다시 그린다(screenId는 STATE.reset()이 이미 DEFAULT_STATE()의 'W1'로 설정). */
        ROUTER.render();
        TEACHER.close();
        toast('초기화되었습니다.');
      });
      var no = el('button', {type:'button', class:'btn btn-secondary'}, '아니오');
      no.addEventListener('click', function(){
        area.textContent = '';
        document.getElementById('teacherResetBtn').focus({preventScroll:true});
      });
      row.appendChild(yes); row.appendChild(no);
      box.appendChild(row);
      area.appendChild(box);
      yes.focus({preventScroll:true});
    });
  },
  open: function(){
    TEACHER._trigger = document.activeElement;
    document.getElementById('teacherPanel').classList.add('open');
    document.getElementById('teacherConfirmArea').textContent = '';
    var shell = document.querySelector('.app-shell');
    if(shell) shell.setAttribute('aria-hidden', 'true');
    var first = document.getElementById('teacherPanel').querySelector(
      'button:not([disabled]), [href], input:not([disabled]), select:not([disabled]), textarea:not([disabled]), [tabindex]:not([tabindex="-1"])');
    if(first) first.focus({preventScroll:true});
  },
  close: function(){
    var panel = document.getElementById('teacherPanel');
    if(!panel.classList.contains('open')) return;
    panel.classList.remove('open');
    var shell = document.querySelector('.app-shell');
    if(shell) shell.removeAttribute('aria-hidden');
    var trigger = TEACHER._trigger || document.getElementById('appTitleBtn');
    TEACHER._trigger = null;
    trigger.focus({preventScroll:true});
  },
  /* 모달이 열려 있는 동안 Tab을 패널 안의 컨트롤끼리만 순환시킨다(포커스 트랩). */
  trapTab: function(e){
    var panel = document.getElementById('teacherPanel');
    if(!panel.classList.contains('open')) return;
    var focusables = panel.querySelectorAll(
      'button:not([disabled]), [href], input:not([disabled]), select:not([disabled]), textarea:not([disabled]), [tabindex]:not([tabindex="-1"])');
    if(!focusables.length) return;
    var list = Array.prototype.slice.call(focusables);
    var first = list[0], last = list[list.length-1];
    var inside = panel.contains(document.activeElement);
    if(e.shiftKey){
      if(!inside || document.activeElement === first){ e.preventDefault(); last.focus({preventScroll:true}); }
    } else {
      if(!inside || document.activeElement === last){ e.preventDefault(); first.focus({preventScroll:true}); }
    }
  }
};

/* ============================================================
   15) BOOT
   ============================================================ */
function boot(){
  STATE.load();
  ROUTER.screenEl = document.getElementById('screenRoot');
  MASCOT.mountMini();
  TEACHER.init();
  document.getElementById('prevBtn').addEventListener('click', function(){ ROUTER.prev(); });
  document.getElementById('nextBtn').addEventListener('click', function(){ ROUTER.next(); });
  /* ←→ 화면·step 내비. 입력 요소(입력칸·선택상자 포함 모든 input)에 포커스가 있거나
     IME 조합 중이면 무시하고, 이미 다른 위젯이 이 키를 처리했다면(e.defaultPrevented)도
     무시한다 — 전수 감사 결과(2026-07-19) 이 학습지에는 화살표키를 소비하는 위젯이 없어
     충돌 없이 안전하다. */
  document.addEventListener('keydown', function(e){
    if(e.isComposing || e.keyCode === 229) return;
    if(e.key !== 'ArrowLeft' && e.key !== 'ArrowRight') return;
    var tag = document.activeElement && document.activeElement.tagName;
    if(tag==='INPUT' || tag==='TEXTAREA' || tag==='SELECT') return;
    if(e.defaultPrevented) return;
    if(e.key === 'ArrowLeft'){ ROUTER.prev(); } else { ROUTER.next(); }
  });
  ROUTER.render();
}

if(document.readyState === 'loading'){
  document.addEventListener('DOMContentLoaded', boot);
} else {
  boot();
}

})();
